body:
  text: 周易像象述卷二明吳桂森撰屯元亨利貞勿用有攸往利建侯屯難也物始生而未通之意險中能動雖可以亨而在險則宜守正而未可遽進彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧天造猶言天運草雜亂昧晦冥也屯是乾坤後第一卦要識天地開闢後如何便有屯象邵子曰無極之前隂含陽也有象之後陽分隂也何謂隂含陽二氣未分以靜含動是隂含陽也何謂陽分隂二氣既判陽常為主而統乎隂是陽分隂也易於乾坤後首列屯卦正是隂陽既剖靜而向動陽出而統隂之始屯上坎萬物入坎隂含陽下震萬物出震陽分隂名曰屯者此際生機雖動渾淪未判混混沌沌然屯即沌字之義故序卦曰盈天地之間皆萬物屯盈也物之始生也以時運言之為冬至子之半一陽初動之歷元以一日言之為半夜雷聲坎為子時以人生言之為孩提初覺之念落地一聲以天地言之為人物初生聖人始出之時此時生生伊始充天塞地渾是一個生機所以謂之盈乾資始坤資生皆於屯中造端托始故屯有元亨利貞四德邵子詩一陽初動處萬物未生時屯正其時也這點子中陽最宜安俟不宜輕動故勿用有攸往這震初一陽在四德為善之長在人為不學不慮之良心在世為天地間第一仁人故利建侯建者從此立基從此下腳震足君子務本本立而道生則建侯之謂也屯建侯就是人起手學問孔之志學孟子尚志皆本於此乾剛坤柔屯交之始交則生之始凡始生自是難故曰始交而難生儲康甫曰頭胎生必難坎一陽陷於隂在險中從險中而動萬物之生何者不從此出坎物之孕藏從坎一動動而生不可已所以動乎險中自然大亨貞這一動動則充塞乾坤盈天地皆動滿天地皆動必有這一畨盈滿天地之雲雷方開得乾坤成得清明世界故云天造草昧此時正要開闢宇宙創造一個清寧世界若不從天地根元處竪基如何為天地主得心為生民立得命故須建侯而不寧曰侯正是天地之元善之長也程子曰學者須先識仁是這個意思曰不寧有一息不可緩之意猶云不得少停也屯義於鳥卵最可觀卵中黃白相含分明坎象卵將出生必須動動者一點陽氣也俗云有雄動則黃白交所謂始交自然生而不可已所謂動乎險中也陽動則全卵皆動所謂滿盈也此時一毫輕動不得少泄漏便不生所謂勿用有攸往然必須時時保護此陽謂之建侯雞抱卵建侯法也彖不釋勿用有攸往句其義見於雷雨之動滿盈蓋不輕往正是待其滿盈也雲雷未合豈可先雨象曰雲雷屯君子以經綸經綸治絲之事經引之綸理之也雲雷屯與雷雨作其義不同雷雨將作之前必先有一團結塞絪緼之氣鬱蒸於天地之間此屯時也作則其氣解矣故屯有元會運世之屯洪荒之世是也有一代之屯亂極思治人心鬱結時也君子何以經綸之曰為天下求仁人而已故湯之經綸商也不於南巢而於聿求元聖時武之經綸周也不於牧野而於既獲仁人時所謂利建侯也初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也屯六爻坎輪震馬分明駕車之象四柔爻駟馬之象皆坤中行地無疆之馬也兩剛爻則乾中乘龍御天之人也故必待初動則合四柔同為開屯之人矣爻中三言班如正駕以待人之象初九磐桓震初之才天生一乾坤柱石撑天拄地者柱礎曰磐植基如此寧定也柱立曰桓自竪如此挺徑也分明以己身天下之任者只是輕易出不得故利居貞居以正蓋為欲行以正也故象下一雖字如以不進為磐桓則雖字無用如初者本生民之主故惟建之為侯則大得民矣象曰以貴下賤者初位在下也建立仁人為公侯正為仁民計書經建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民居貞乃初之利建侯則非但五之利通天下之利也六二屯如邅如乘去聲馬班如匪寇婚媾女子貞不字十年乃字字許嫁也至于十年數窮理極則妄求者去正應者合而可許矣象曰六二之難乘剛也十年乃字反常也六三即鹿無虞惟入於林中君子幾不如舍往吝妄行取困之象象曰即鹿無虞以從禽也君子舍之往吝窮也六四乘馬班如求婚媾往吉無不利象曰求而往明也二邅如是當致其難之謂以時未可動而乘初易動故象曰六二之難乘剛也二正應在五非為有寇害我之婚媾者也本義初非為冦也乃求與己婚媾耳一體無婚媾以初為冦不如虛説只是女子輕從則失正故必待正應之合十年乃字方得其常道用世大君子尚未可有為豈輕出干進之時乎六三震動終爻又不應五不言班如有喜動之象故詳言其失鹿衆隂之象鹿以象民虞人初剛之象林中撰坤之象所幸震體猶能知幾可以舍而不往也舍安靜不輕動之謂三五合則撰艮故有行止之介四與初正應可以交初者全在四之下求故曰求婚媾曰往與初同往也吉若四能為天下得人者故象曰明也內三爻震體同一戒輕動之詞四坎體示以求通之路九五屯其膏小貞吉大貞凶象曰屯其膏施去聲未光也上六乘馬班如泣血漣如象曰泣血漣如何可長也五屯膏屯時之膏元輕施不得只有經綸事當做小貞只做柔事也大貞剛大之作為也大貞凶乃時有必然蓋屯時經綸草昧之主舉世未能知舉世未能從渾身是凶境故只有柔小事可做做不得大貞這膏要珍重即文王可見如小心服事獻地請去炮烙之刑皆小心膏澤如何大霈得雲雨然幾不免虎口矣直到化行南國戡黎伐密方是文王底大貞此則脫屯而解矣論屯時只是凶也惟凶而終不失大貞方見聖人之變化上去初逺不能得初所以至於泣坎象然必有此泣血苦心則濟屯精神方為真切可以通一卦之人而皆心五之心矣泣血正是不寧之極以此要終有味總屯之時以唐虞觀之帝堯在上如稷契臯陶伯益在下然屯膏未能施必堯得舜舜得禹方為建侯而洪荒之草昧造矣司養者仍是稷司教者仍是契司刑者仍是臯陶司火者仍是益但無舜禹只是乘馬得舜禹便都是經綸之人屯可一日無建侯哉三之無虞象鯀禮月令仲冬水泉動屯之實象是月也隂陽爭諸生蕩注云蕩動也屯之明義爭即所云交屯天地開闢之子中陽復一年一轉之子中陽每卦有六樣位可就六等人説有六樣時可就一人身上説前解就六位言也因屯總是不可動之時故爻辭如此蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞蒙昧也物生之初蒙昧未明也彖曰蒙山下有險險而止蒙蒙亨以言行句時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也釋利貞之義物生必蒙蒙者物之稚也乾坤交而生三男坎中交人之心也震下動即人心之生機艮上止即人心之定體亦即人心之明覺艮體光明所以屯後受之以蒙坎震合為屯人物始生震一陽則人心初念孩提愛敬是也坎艮合為蒙即人心真知艮一陽從坎透上即初念一點光明孟子所云幾希是也屯後為蒙以初心之明明而未著艮為少男少時之明蒙蒙然命之曰蒙即鴻𪷟𪷟字之義坎為子艮為寅子寅之交天光將發未發有蒙之象人心平旦此明現體時也即為人心真覺一定之體聖人所以覺萬世者不過欲覺此人之所以學先覺者不過學乎此故師道于蒙而立舊説屯言君道蒙言師道猶二之也天生聖人為斯民主不開羣蒙登覺路何言君道故君師一事屯蒙一道匪我以下則詳言師道也人生而靜天之性也坎在艮止之下正是人生而靜之心寂然不動天命本然之體也此為山下有險然這點心體即是天理至極天下之至善在焉故曰險而止惟其險乃山下所有之險其險也為天下之定極此正見得純然天體不識不知一無揉雜是赤子真心故象之曰蒙此靜中心體即是天下大本萬理具足蒙所以亨其命之於天所謂皇降之衷者在是其稟之於人所謂受中以生者在是立之即天下之大本達之即天下之達道立之即為建極之中達之即為隨時之中在人能行與不行耳故能以亨道行之則隨時皆天則隨時皆有中曰時中也此句極言蒙之義如此其大虞廷人心道心所謂山下有險允執厥中所謂以亨行時中也時中也一句極贊蒙之亨其妙如此與别卦大矣哉一例非訓釋亨字也論蒙之心體人人具足聖凡同一中也惟以亨行則聖凡不啻千里矣故必待先知以覺後知先覺以覺後覺而師道立矣九二只吾心這點剛中便是覺天下之主然所以覺天下者只在于我不在求蒙而覺之我之心體克完於此則天下人人同此心人人同此求明之念自然響應影從不期來而自來匪我求之童蒙自求我有所以感自有所以應故曰志應也何為初筮以初心來求我也初心是本來真心以此心求者則告之正就其本心上指點曰以剛中也惟蒙不可求故爻中只説包納若二三之心便有為而求非初出無染之水乃有汚有染之瀆水不可告矣這點剛中性命之正從此培養豈不是作聖根基故蒙之利貞養聖之功也蒙彖指一中于人心又提聖功于一正孟子曰人心有同然聖人與我同類又曰人皆可以為堯舜正是此旨萬世心學之宗師道之宗也蒙彖中六爻之義井然可見故知周公作爻辭一毫無增入象曰山下出泉蒙君子以果行育德泉水之始出者必行而有漸也坎曰維心亨行有尚故蒙言心而曰以亨行心體之正不正在行耳山下出泉有源之水可以無逺不達但恐塞而不行或行而有阻若果其行則日流日衍達之無非天德矣故可以育德果行是實落行也親親仁也敬長義也無他達之天下也此所謂果行育德本義必行貼果字有漸貼育字看育字是養正之義故主一直初六發蒙利用刑人用説音脫桎梏以往吝象曰利用刑人以正法也九二包蒙吉納婦吉子克家象曰子克家剛柔接也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也二剛爻不必専指司教言剛中一念即是包剛克一念即是擊初在下順以承二故取法乎二莫善於初曰以正法也不知法二而以已往則必吝之道發者發動之發如孟子云待文王而興也初因二興起發蒙也二身覺世之任須有天包度量包蒙者有教無類也其有順德者尤不可以不受納婦者擇賢而與也包之吉以容衆納之吉以得賢故兩言之子克家者作君作師原是父母天下之事因五柔有位而德不足師世二代為之此宗子天下為家之事也謂之克家世無飛龍故見龍出世以代其任曰剛柔接也謂以剛接柔所以克家納婦有精義六禮有納采納幣納吉納徵夫有所以納于婦則婦納於夫為順婦矣教者有所以納於蒙則蒙納於教者為順婦矣三之女與婦正相反初在二之下能順三在二之上不順順而貞於一者可以為婦三不順也未見其貞於一女之未知所從者故有見可貴金夫不必泥上九爻而不能有諸己之象所以不可取勿取無往教之意只可待其來也六四困蒙吝象曰困蒙之吝獨逺實也六五童蒙吉象曰童蒙之吉順以巽也上九擊蒙不利為寇利禦冦治蒙過剛故為擊蒙之象然取必太過攻治太深則又反為之害惟捍其外誘以全其真純則雖過于嚴密乃為得宜象曰利用禦寇上下順也上下皆得其道四以逺二故困困蒙如質下如過時皆困也故亦須困以教之如不憤不啓五正應二真能不失赤子之心故稱童若上九雖不若二之中其欲開一世之蒙立心與力量則一但未免亢於剛故至於擊然擊而傷蒙是為寇也為蒙除不善是禦冦也但可禦冦豈利為冦蓋蒙有真心可順養不可戕賊善教者防患禦害皆所以順其本心擊而不為冦以上順下也如此必無行不順如三者下亦順上也此為上下順擊是擊醒之如孟子于樂克教中之變法也總人有生來氣質就是桎梏習染又是桎梏惟學則氣不能拘物不能蔽儀型正人學先覺也所以脫桎梏蒙以養正法正人養蒙第一義也人涉世後情欲是冦名利是冦到底不可不防利禦冦養蒙究竟義也四柔為蒙其位各異初在下只貴取法乎剛中即養之正也三不順反而順二何不可取之有原在包中則雖乘二亦必下順乃為得師四曰逺實繫辭曰逺近相取雖逺而能取乎二亦何吝之有五以中應二故直曰順以巽可見蒙之所貴者順而已故要終言上下順也本義三爻順改慎不必人人聖基只此孩提一念從此萌動曰發就此涵養曰包不取所以防外見困學所以破愚柔必不得已後設擊之一法蒙養無遺教矣需有孚光亨貞吉利涉大川需待也彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也物稚不可不養也故受之以需蒙以養正需之所養正是養此聖基蒙坎在下山下有險人本來之心體這心體不從天理上涵濡如何得出險需之所養正從此心養人一日不養不可以生故需為飲食之道吾人莫危於此心亦莫微於此心坎上乾下此心以乾天為主心方得其為心有孚坎中一陽與乾孚孚則心與理合而為一矣故光而亨而貞而吉又利涉大川生人之養孰大於此人生涉世有順有逆有常有暫於心體上無不是險富貴有富貴之險貧賤有貧賤之險夷狄患難固是險安常處順尤是險人正要在險處養不歷得險天理如何得熟不得天理為主險如何得不陷故彖曰需須也乾須坎坎須乾相須為養也又曰險在前時時有險在前也不知險則為險所陷知險則險不能為陷乾易知險故能險在前也乾在內險在前則隨所涉之險盡從乾天中透出險境俱是天理流行皆成坦途何陷之有故其義不困窮矣在前二字可玩如此心才證得天理人人有心天之理是心之本位到得剛健不陷心即理理即心適得其位而成孚故光亨貞吉位乎天位以正中也以此往往無不利險都是日用飲食曰有功也需養也需須也需不進也凡三解惟相須乃所以成養惟從容乃可以相須總之所以成其養每卦有幾義俱要通象曰雲上於天需君子以飲食宴樂水在下有險上於天則雲矣雲上於天何險之有人心不合天理則險上於天則皆成妙用何險之有雲皆太虛中之變化也人心皆天理中之流行也如此終日之飲食方得為知味飲食所涉之境遇皆宴樂安居故曰以飲食宴樂初九需于郊利用恆無咎未近于險之象也象曰需于郊不犯難行也利用恆無咎未失常也九二需于沙小有言終吉沙則近于險矣象曰需于沙衍在中也雖小有言以吉終也九三需于泥致冦至泥將陷于險矣象曰需于泥災在外也自我致冦敬慎不敗也郊取曠逺需郊者置身於可進可退之地是全身逺害學問這無他疑難只要安常處易不犯險難故曰未失常也此是能見險于逺不以逺慮遺近憂者也二得中不求逺險初亦不犯險三却自有個置身於無害之道取象于沙沙是在水而水不濡能使水流行而無礙者象曰衍在中衍字更妙衍之路路皆通君子得理之中真是用之境境皆通此需沙之妙也三近坎取象于泥有不避艱險不辭汚濁之義此臨難不苟免學問也又曰致冦至致冦之事更不易言古兩軍相遇必用勇將致師勝敗之機全看致師力量必如孔子之磨不磷涅不緇方可以致師可以需泥矣涵養到此等處歷得過是全副本領故於乾終爻言之象曰敬慎不敗正見非此必致敗甚嚴之也解之三爻象曰致戎戎與冦其義有辨在外言相去不逺人不能處險只為先不知有常道在知得常道險不過境何足患只依常道去自有坦途故初要不失常人既臨患難不得不犯難而行但須先有個必不陷之道方可以身試故有致冦之説不是養得十分勇氣何能當事勇決若此然曰敬慎則原非輕試也六四需于血出自穴穴者險陷之所四交坎體入乎險矣故為需于血之象象曰需于血順以聽也九五需于酒食貞吉象曰酒食貞吉以中正也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也當都浪反後同作平聲是四則入險矣內三爻見險猶是境上涵養到得在險中實實身受要在血脈內下工夫討調理絲絲線線都是自家身子內事故象需於血其需之道只有個順以聽聽者聽於天理也又曰出自穴者惟四己在險中所以必須能出凡險原不足陷人只怕人自穴于險中即如坎之窞如孟子所云安其危而利其災虎險而不為險所穴是則出之道也亦只是順聽五則正位乎天位者稱需于酒食是醉以酒飽以德者也養道以五而成上六亦險體曰入于穴四要出矣何以又要入蓋若求去險以為出終無出法就險中不陷于險方是真出上之入穴所謂穴不能囿以入為出者也入穴則無心於去患必有自致之吉機有不速之客來也但敬之則終吉矣上柔體下乾三陽上行有客三人之象人能安于險則天理之妙隨處發現不待邀求而吉自至惟吾所遇是不速之客也四居險之下則言出上居險之上則言入一出一入皆為妙境入而不出出而不入險而險者也入而出出而入則險非險也皆乾易之坦途矣彖言不陷正與出入之義互發象曰不當位者何入穴之力量比出穴更大是視險如夷無入不自得境位也然視五之酒食天下則為不同以位非五位也然于剛健不陷之義已是一毫無欠故曰雖不當位未大失也總內三爻以險在前為義外三爻以能不陷為義初有恆二有衍三敬慎四順聽一步一步養去方有酒食可需養道豈可不從客以待乎訟有孚窒惕中吉終凶利見大人不利涉大川訟爭辨也彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入於淵也訟爭辨也只是個爭字之義看做好字面堯説丹朱曰嚚訟孔子有云內自訟俱是從心上爭辨是非不可便認作訐訟之訟序曰飲食必有訟禮始諸飲食故汙樽抔飲相親相悅必以飲食為揖讓相咈相忤必於飲食起攘奪人情大抵然今驗之孩提赤子其嬉怒之情猶為可見故需後有訟需從天理中養心體必得心體都是天理流行方成需訟從心體中勘天理必得心體盡與天理符合方成訟故屯蒙後即有需訟學問大關頭在此訟上天下水天一生水原是一氣然一成水水便下注天是上運不免相違起來故論人心與天理何曽有兩然一落人心便日流日下趨而下甚易挽而上甚難與天相違起來只為坎體下注之故所以訟之命義正要在違處爭爭者謂天人之界上達下達之界於此分不得不爭也若知得這個險一味自反自爭爭則始之違者究竟不違這訟便不可少若不知這個險聽其相違日違日逺只管與天背馳但見已是不見已非其爭也不用於內反用於外究竟爭勝爭奪無所不至這訟便不可有故聖人干訟明繫吉凶兩路警省特嚴所謂毫釐之差千里之謬正在訟卦辨别彖曰上剛下險惟剛在上不下交險在下不上行所以相違然能於險中透健則乾坎原合這須是自訟之功故曰險而健訟坎中一剛原從乾剛而來其相違者陷于兩柔之故即人之落于形氣也若從這剛中論何嘗有二體自然有孚所以人心與天理自然信得真合得真要他孚而不違只在知窒損窒欲之窒只在知惕窒者從坎上用力也心體惕者從乾上著功也天理中者心體與天理一線不差處也故窒惕而中則吉剛來而得中也若任從這一點違端日流日長不審剛中只任氣質便必至違與天理相逺之極便成了個訟局如何挽回得故曰終凶訟不可成也尚書怙終即此終字蓋差錯之端一不辨究竟到大相背謬不至遂非怙惡不止矣天地間只有一個中正之理便是天命便是大人行事能見得個中正在何至有違行故利見大人尚中正也不利涉大川言不可冒險而前也需之險在外故利涉大川可以向前出險訟之險在內豈可冒險而行故不利於涉須還從自心中求出險象曰入於淵正從內心徹底去此險也入淵恐陷其説膚淺入淵有妙義論人心之險不知而冒涉有無限風波不可測識最易陷最易溺者此險天下之大川也若知其險而自求有無限義理不勝自得其極深沈極空洞者此險也吾心之淵淵也乾曰在淵淵是自家心體要自家能入入淵方探得靜深之本則自有時出之妙更何險可言若不能入只管泛泛涉去大川如何涉得過所以不利涉而當入也入淵入穴同一義能入淵則淵即天天即淵淵坎也天乾也必無天水違行之端象曰天與水違行訟君子以作事謀始違行二字特筆要另看違行二字把天人界劃然分開來謀始正從違之起頭處下挽回之力也虞廷惟危惟微惟精惟一之語正是訟學初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也九二不克訟歸而逋其邑人三百戶無眚象曰不克訟歸逋竄也自下訟上患至掇也掇自取也象三百户兩柔爻初爻正是天水違行之始訟之端皆起于此能辨不能辨正分于此九二中能以剛中正初之違者故不克訟九四乾體應初能以天理克初之違者故不克訟不克訟訟心難抑易熾曰不克用幾許窒惕氣力味語意如曰克不訟然訟最怕成成于永久所以從初説不永所事這須是小處就辨起小有言就辨其不可叫做其辨明二剛來得中二能險中透健便不成訟曰不克訟歸者歸于天理也乾五中正之理逋者出于險局也坎爻上下兩柔歸而逋自歸於正理跳出險機如此方不克訟故能化一邑之人皆息險而無訟三百户無眚也眚是小誤書經云眚災眚且無必不至于怙終可知矣象曰竄者舜竄三苗是移置地方改文亦曰點竄把這須險穴盡情改換歸于天理謂之竄不是這竄必至自下訟上自取其患矣何為下訟上凡理能勝我者其所處在上理屈于人者其所處在下訟者正是不服在下要爭勝為上豈知患害立至所謂掇也知得下不可與上爭則惟有歸逋一著卒之化一邑為無眚不克訟豈不貴乎六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也食猶食邑之食六三隂柔非能吉訟者故守舊居正則雖危而終三與初同為柔險然初在下而下注三則在上而上從合四五撰巽是三以柔順從上者也三之才非二四雖未能不克訟却能以柔順自安謂之食舊德舊德謂本分中素有之德循理守已只於本分中生活三之得吉能安意從上也人之好勝好爭皆起不安常分一念安于從上則是非可否惟上之聽何至違而成訟此為貞此所以厲終吉若出而從王事則不敢自主其成就是從上之道蓋為臣任事難於一味自守故申此義無成正是守分也坤曰地道無成訟三即坤之三三之妙全在一從從與違行正相反食舊德即吃虧二字九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也即就也命正理也渝變也九五訟元吉象曰訟元吉以中正也上九或錫之鞶帶終朝三褫之終訟無理而或取勝然其所得終必失之象曰以訟受服亦不足敬也四乾體初或有違乎四四即能正乎初何至有訟故亦稱不克訟反初之違而復還天理是在乎四故曰復即命命五中正之天命也改初之違而歸於一正亦在乎四故曰渝安貞命指理言曰復貞指事言曰渝如此方無違行之失象曰不失也二之力在一歸四之力在一復九五中正其訟也以至當天理照本來真心正剛中之相應也時時內自訟正是聖人盡心至命心與天一步不違工夫所以元吉上九過剛不中處訟之終有成訟之象以其居高應柔有訟勝之象訟而勝即或錫之鞶帶能束服人而不敢爭然能服其外不能服其心安得有敬畏之心終朝而三褫之矣褫徹去也按本義訟而能勝之故有錫命受服之象大意因訟得利皆是必失之道故以三褫示警此亦至理但鞶帶以皮為之禮記男鞶革所以束下體未見為命服也且訟而強束縳人者恆有訟而獲賜於上者不恆有故從服人之説總處訟善道二以德自勝四以理剋制初能識微于事先三能自屈於當局五盡歸中正故稱元吉元吉第一義也工夫豫于平時若不克訟之義則人人所宜置力亦臨事當機之要訣也師貞丈人吉無咎卦惟九二一陽居下卦之中為將之象上下五隂順而從之為衆之象九二以剛居下而用事六五以柔居上而任之為人君命將出師之象故卦之名曰師丈人長老之稱彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣以謂能左右之也應謂六五應之需訟心體從乾上摩蕩過師比心體從坤上摩蕩過從乾上摩蕩只透得乾始知體從坤上摩蕩方透得坤能行事師之險在內正要從千險萬險中透出坤順故夫子雜卦于乾坤之後首列之以比樂師憂然不有先天下之憂何以有後天下之樂故序卦師先于比正是從前下手憂危剋戰治心最切工夫也師者衆之死生國之存亡係焉故行師者戰戰兢兢無一時不險無一念不險摻心之法能時時念念常知此險真見得一或不慎便是死生存亡關係知此可與言師矣師道無過一正師以正動乃為王者之師故曰征之為言正也各欲正已也以師之正正天下之不正者便是王道然必先于自正能使一軍同以正天下為心方是能以衆正也丈人云者即爻中所稱長子以二撰震故也坎中一陽即震初一陽震為長男元善之長是天地之仁德也行師天下之至險惟有以仁德行之殺道盡是生道如此天下豈有不順從者所謂行險而順丈人正神武不殺之仁將也所以正衆者在此正天下者在此蓋師以戢暴禁亂安民和衆故非仁人不可以言師師之所加不但被師者受荼毒即行師者勞民傷財亦極受毒然不是這一畨毒不足以勘暴亂定民生成正邦之功也人心難正不是一畨毒亦不能尅治以收清明寧一之功故非毒天下而民從之何得吉又無咎象曰地中有水師君子以容民畜衆地中有水險藏于順也容民之中而畜衆焉兵藏於民也險王公之所以守國惟民中藏兵可以潛消天下之邪心而無敢不一於正天下之至險在焉先王養兵之法如此初六師出以律否臧凶否臧謂不善也象曰師出以律失律凶也九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也六三師或輿尸凶象曰師或輿尸大無功也初在下從主帥初之律也故從律則臧失律則否臧其律謂何不殺二之律也二曰在師中真能以衆正方稱得在師中在字重看左傳不在軍事孟子曰無敵于天下者天吏也為將之道一行一止都奉天為生殺方是師中之道如此方承得天寵而受王三錫之命矣小象承天寵句起下文語蓋主將事事奉行天道則事事皆生天下之道萬邦自然歸心故曰懷萬邦也二為主師則三四皆偏禆矣三乘二有輿尸之象輿尸謂參輿中之事如二主仁三則主殺豈能使長子成師中之功故必凶而謂之大無功也六四師左次無咎象曰左次無咎未失常也六五田有禽利執言無咎長子帥師弟子輿尸貞凶敵加于己不得已而應之故為田有禽之象言語辭也象曰長子帥師以中行也弟子輿尸使不當也上六大君有命開國承家小人勿用論功行賞之時也象曰大君有命以正功也小人勿用必亂邦也四順體左次者聽命於主將之義也此禆將之常道故曰未失常軍事尚右故左次即次之次非必退舍順帥之象亦尚仁之象左仁也右義也五命將者也田有禽妨民者也故利執言聲罪致討也惟命將也原為去亂以仁民故使將也必且任仁而黜暴中行長子所以可使輿尸弟子所以不當使上六則師之成功惟其有承天之仁將所以致有受命之大君故稱有命若小人一用則違天逆命所以必不可用為必亂邦也小人勿用小人未嘗無功只以殺為功與仁人之功正相反故其害必亂邦與懷萬邦亦正相反師中之小人即理中之欲念弟子必不可輿尸欲念豈得使勝理知此方可以承天而有命總何謂師貞則仁而已矣士卒之律律此也故失律謂之不臧王之所寵寵此也故錫命謂之承天懷柔萬國之上公即不殺為威之仁將五云田有禽有殘吾民之禽獸則執言以討之討其害仁者也上云以正功有以衆正之功臣則開國以賞之賞其行仁者也故將有五德首曰仁為將且然况大君乎震生元善也為人心真主宰舍此無可憂者矣比吉原筮元永貞無咱不寧方來後夫凶比親輔也以一人而撫萬邦以四海而仰一人之象彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也乾坤既列凡敘六坎以人生坎險難平之故自屯蒙需訟而至于師曰行險而順已從師憂中百般防攝過來至此險者已出而不見其險矣故聖人于比獨不言險字蓋師之險在內內而克盡其憂危比之險在外則外險自得其通達比所以樂雜卦比樂從兢業中透出心體達之無不遍滿能通天下為一心故樂也心體到比才得乎心之正位滿得心之分量九五剛中全是乾五飛龍體假所謂百體皆從此剛也所謂萬物皆覩此剛也故比自吉其所以吉以衆隂輔一陽無不順從于下也卦德莫吉於一陽為主有一君統衆民之象惟比以一陽居九五言其德德則居乎天位言其位位乃位乎天德真是大君建極之象故特稱原筮原者萬化一原之原筮者千變萬化推衍不窮之道比五剛中真能執一以御萬居中以定四方萬事萬化無不於此出謂之原筮也以其德之可大曰元以其德之可久曰永以其可大可久而又無不正曰元永貞五字皆贊辭元永貞是與天地合其德也元乾道永貞坤道以此其德自無一人不順從矣不寧方來者下之人內外逺近不同同一心以歸往內而近者不敢自安于內且近外而逺者不敢自阻於外且逺方方而來上下順也又有後夫凶只因上六一爻乘五有不順之象以其在上之人也稱夫以其過于五也稱後夫蓋比之貴惟在德德之貴惟在剛中今上六既無其德又非其位全是過中失正何以成比故曰其道窮言不能比五又不能為下所比也即如堯舜之德一當倦勤尚且擇賢禪位正為中不可過也上六之無所終即此義比無上比下下比上兩義凡位在下者自比上位在上者自比下相須成比只一個道理本義分屬未妥象曰地上有水比先王以建萬國親諸侯地五方異氣高下燥濕之不同血脈則流貫而通于一水是也故地上有水比象萬國之民氣稟習俗之不同其血脈亦流貫而通于一心是也故建萬國親諸侯欲使上下之心常得流通如地上之水也天子得諸侯心與民通坎象民得諸侯心與天子通坤象初六有孚比之無咎有孚盈缶終來有他吉象曰比之初六有他吉也比輔也下順從也其所以能使之順從者全以歸往之德在五初在下其去五最逺通之不易然初為坤順首爻初若不從何由成比故惟一心向往以孚元永貞之德方得比于五而無咎也又曰有孚盈缶者初雖與五不相當却與四正相應初六孚五之誠積之滿而得比於四則合于五矣缶土器坤象盈缶取其透過坤之三爻而及于四也又曰終來者六四上六同為坎體初之孚既盈于四而四來則上六亦孚而終來合全卦成比有他吉也有他者猶云意外初原始要比之成必于初乎始故爻辭先及終吉焉以心體言之從初要信得中體真是為有孚然必從一事孚積而至于事事孚方是盈缶如此心體到底相安曰終來縱有意外疑難亦無他害有他吉也以王道言之初是下位逺臣四是公卿近地初之比須是一片誠心充積之盛通於王之近臣則亦通於王而成大順矣如此天下豈復更有不從王者是皆初之誠意感孚有他吉也六二比之自內貞吉象曰比之自內不自失也六三比之匪人隂柔不中正承乘應皆隂象曰比之匪人不亦傷乎六四外比之貞吉象曰外比于賢以從上也二以應五稱內比三以應上為比匪人四以近五反稱外比何謂內比觀小象曰不自失則所云內者一心以向上只是內自盡其心也何謂外比觀小象曰比于賢則所云外者合衆心之順以歸五所以謂之以從上也以者能左右之二如天子心腹臣四乃公侯之位能聨逺近內外以從五故有此象曰比于賢能順五者即賢也二之內比非無外聨衆人之心四之外比非無自盡其誠之意因位而分言之互觀則同一比之善道也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也天子不合圍開一面之網來者不拒去者不追故為用三驅失前禽邑人不誡之象蓋雖私屬亦喻上意不相警備以求必得也隂之比陽逺近內外不同若五之比下何分內外何分逺近中正而天下歸蕩蕩平平顯用其道天下共由人人得而比之曰顯比王用三驅下則正舉王者田獵一事以明顯比之象三驅之禮從王者行則為順而取之背王者行則為逆而舍之是王者明明白白與人一條大明之路人人可由但人自不肯由如前禽之失是也失謂失其正路邑人不誡王者此心人人共曉故王者所取人皆取之王者所舍人皆舍之不求其必得也此句又極狀王道之顯而共由如此朱子曰田獵之禮置旃以為門獵者自門驅而入禽獸向我而出者免被驅而入者皆獲按如此舍者生獲者死矣蓋獲者獲以供祭祀享賔客充君庖也用莫大焉此為盡物之性惟君之獲士亦然羅而致之生之用也死之用也期無見棄焉則皆吉矣孫聞斯説又説細察田獵之禮當以向王者而來為順取者為使之去而得生也以背王者而入為逆舍者舍其生也故失者為前禽而邑人不誡亦曰不求必得也此論亦有理存之上六比之無首凶象曰比之無首無所終也上于位則已亢于德則過中必不能為天下首出者也以此為比究竟何終此必凶之道曰無所終也如觀之上九方是有終也總欲識心體之廣大只觀一比五爻師內坎一段戰兢恐懼之心不可不在內比外坎一段流通公溥之心不可不在外皆在坤順中置力小畜亨密雲不雨自我西郊畜未極而施未行故有密雲不雨自我西郊之象彖曰小畜柔得位而上下應之曰小畜上下謂五陽健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也本義畜止之説切于大畜不切于小畜聞斯説柔得位而上宜句下應之另句孫小畜履二女與乾摩蕩柔道之用與三男之用絶不同如震之動坎之陷艮之止皆以一剛為君故爻専以剛為主如巽之入兊之説雖以一柔為用然須以中爻之剛為主柔而得乎剛中則巽所當巽説所當説柔道之用無非所以從剛若不得剛中則所巽所説便易有弊故小畜四履三兩柔爻通卦之主而皆無吉詞以柔不能主剛也此易之大旨小畜以柔小畜乾是從細微處涵養天德曰小畜大畜以艮剛畜乾是大涵養曰大畜蓋乾只是一個天德無可分大小然其用功却不同必從細微精密處一一透過方可尋歸根詣極而成大涵養故小畜之功在大畜前天下萬理紛紜皆是天德散見無一處不貫通無一處不吻合才得天理流行故必如風之行天無所不入無所不到才成得畜畜云小乃以一貫萬功夫所謂一本而萬殊大畜則所謂萬殊而一本交相為養者也小畜一柔乃得位之柔乃上下皆應之柔以其居四而巽五剛中謂之得位居當巽之地也惟有此柔內外相通本末相通巨細相通上下應也以健而巽所巽者又剛中何畜不成故曰剛中而志行乃亨亨曰乃見非剛中不足以行不足以亨也密雲不雨二句則發明畜之義必積久而盛然後有流行之妙故積之貴不已也乾是老陽巽是長女少隂以隂畜陽必畜久而隂陽相和方成妙用故以雲之積盛而雨為象雲必積而密密則自然雨未密而雨雨必不霈故須密之又密只管積而不已曰尚往也又曰自我西郊乾在西北巽在東南以巽來畜乾是雲在西郊也這只是隂來感陽必雲之密自西北而滿于東南則陽亦應隂相和而雨矣此時尚未故曰施未行直至上九則滿東南矣故爻曰既雨云程傳云東風多雨西風多不雨今驗之東南風必在雨前西北風必在雨後雨之施行正在二氣感應和合時東南風多雨必積得多西北風早雨必止得早小畜取象正在積時恰好密雲尚在西也自我西郊往西去也象曰風行天上小畜君子以懿文德風行天上巽風所到皆天之生氣所到所以發育萬物成天道之精華君子巽德所通皆乾剛之德所通所以兼備衆美成文德之精華懿美之至也初九復自道何其咎吉象曰復自道其義吉也九二牽復吉象曰牽復在中亦不自失也九三輿説輻夫妻反目象曰夫妻反目不能正室也程子曰説輻反目三自為也畜之名小以六四一柔然以剛而用此一柔則皆畜也如主六四以為畜則柔要成弊大凡學問能巽志以入何處不可取益然或逐流忘源徇末遺本未免都做了弊病必須仍以九五剛中為主方合得乾來此小畜之精義初九是畜之始又是乾體與四柔正應不患不能用四為畜只是先要識本領天理乾是本本立然後可以博取所以貴復復者自復于道自家道理一復乃知散殊道理一一皆吾故有巽之所入皆畜乾也此畜第一要義故咎自無而又吉也無咎只是補過何咎則咎自無九二稍與四不相當然却得中雖不如初之自復却也可以牽而復牽復便未免要借巽之力牽巽繩之象因其得中所以轉得快醒得早一巽便知復歸天德亦如初之能復於道曰亦不自失也兩自字同可味初復顔子之克復與博約也牽復子貢之繇多學而一貫也九三剛過而􅏥矣與四柔不能相取有以乾德自用不能巽畜之象殊不知非巽乾終不可行也故謂之説輻乾車也巽輻也三十輻共一轂分之則各一輻於車何用合之則一輪車不得不可行散殊之理亦然有乾無巽是車而自説其輻也不惟不得其用必至於僨車矣又如夫婦然夫而能用婦則婦夫之助也婦可廢乎惟夫不能用婦則婦有反目視夫以傷其夫者矣此其失在夫不在妻所以致此故曰不能正室也六四有孚血去惕出無咎象曰有孚惕出上合志也九五有孚攣如富以其鄰象曰有孚攣如不獨富也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也四五有孚皆孚於乾三爻也剛柔相孚健巽相孚到有孚是學問最妙境界四五雖同體却要知得四是血血隂氣人身不可一日無然只活得形骸血氣中還有主乎血氣者天性乾是也故須血去惕出方得無咎惕乾之惕惕出血氣透出天性也要去這血合五之剛便不成血故曰上合志也到得五中乾巽合一剛相合天德便是衆理衆理亦是天德融通浹洽故曰有孚攣如若膠結而不可解然時習而悅光景如此五之富通上下俱成富無不成畜以其鄰也上九巽德於此極畜道於此成矣西郊密雲於此雨矣正室夫婦於此處矣車不脫輻積而載載皆德矣婦道之克盡可謂能貞矣可謂能危矣如此女道巽克配乾道是月而幾望也然其道只是個順只是個從剛究竟婦要知有個夫在月要知有個日在若認這女道就是男道一路只管前行此為君子征凶何也為其隂而疑陽也坤上隂疑於陽嫌於無陽就是這疑字學問中小畜功夫真是會萬歸一由博反約必不可少然到底要忘這博化這多故曰君子多乎哉又曰吾何執正怕犯了君子征凶之病如大畜上九則曰何天之衢道大行也此則君子征吉之路也二卦互相發其旨精矣易先小畜于大畜謂通小而後成大也若執小為得便都成意見私心皆血氣也血之取象於人身最切血才有餘不足都是病坤要戰血需要養血小畜要去血都治這血病後渙卦渙其血象曰逺害也血字之義益分明學問凝滯處一會到本源處便不是血都是惕血去惕出曽無兩件總小畜先取象雨即乾中雲行雨施之雨又取象輻取象夫妻取象血取象月曲盡隂陽相胥之義而尊卑之分截然輹在車之中詳大畜以不動宰輻之動故以象大畜輻在車之下以善動運輹之動故以象小畜大小相資為用履虎尾不嘻人亨彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也剛中正三句釋亨字序卦物畜然後有禮故受之以履小畜乾在內履乾在外有巽德以畜此乾則條條理理一一可措之踐履間故履者禮也天理人所本來具足若不見之躬行實踐終非我有履是步步實踐功夫然要履得這禮須是有一段中心樂循天理意思故説在內乾在外方可言履蓋天理至剛極是尊嚴直截必以柔道履這剛方得委委曲曲從容和婉而中乎天理之自然故履之為義以柔履剛之謂也只是這履甚非容易一毫差失不得履之至尊貴却至可畏至威嚴却至可危無異履虎尾然若履之道少未盡善傷害立至未有不為虎所嘻者其難履如此如何是善履若所云可畏可危者是天秩天序之當然這禮便不妨人底若可畏可危者不合于天秩天序之當然這禮便要妨人底所以要履又要他不嘻人若論天理自然何至難履若此雖在以柔履之柔道上却易有病其所為柔説者説而得中則自心即是天理應乎乾之説也如説而不得中則心之所説未必天理之當然不能應乾之説也故彖曰説而應乎乾是以履虎尾不嘻人要看是以二字其得亨如何九二九五本以剛中相應惟其説諸心者剛中之説則其見諸作用者皆剛中正之禮以此履尊居正所行者必中節之禮非和而不知節之禮何疚之有以此為履正是禮而和用先王之道以斯為美小大由之者也豈不光且明乎疚字正在説之中不中處看光明則乾之大明所以亨小畜曰剛中志行明指巽五言履曰應乎乾即繼之曰剛中正則知所以應五者全在兌二之剛中可知然不曰説應健而曰應乎乾健以德言不可見履實實見諸行事曰乾所謂天則是也象曰上天下澤履君子以辨上下定民志程傳曰上下之分明然後民志有定民志定然後可以言治民志不定天下不可得而治也上天下澤截然定分不可踰越君子於定分一毫無越思必在上者克盡得天在上之道在下者克盡得澤在下之分上下必不可紊實見諸行事方成得履上下之辨正要在履上辨用一片精細心思去辨乃君子之用柔辨定而志定是君子之履剛初九素履往無咎象曰素履之往獨行願也九二履道坦坦幽人貞吉象曰幽人貞言中不自亂也六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也履之三即小畜之四皆卦主也柔而不可用所以嘻人之凶繫于三是柔之病也只用剛中所以從二之剛方救得此病故小象曰志剛與畜之四曰上合志兩志字正一般初九説個素字見得人腳下自有一條潔潔淨淨本分內天理措足可樂只是人不肯依著行行須是出於中心之願中庸素位願外之願故象謂之獨行願九二説個坦字見得人腳下自有一條寬寬平平天理內道路舉步至安只怕人不能安靜去行行須是有不逐世味幽間貞靜心腸故又説幽人貞吉夫必幽人之貞而得吉乃知于世情少有一毫熱閙心必不能履坦坦之道也人當此境最易亂故曰中不自亂也六三是個柔體於天理上見得不全便是眇之不足以明他却自以為能視行不能中便是跛之不足以行他却自以為能履如此去必要認錯了非禮之禮誤己誤人如何無妨害所以嘻人凶畢竟辨一片剛説之心只照天理中正處説而應之方可無此病故云武人為于大君為于大君效命於君也如舊説于字無用大君指九五中正而履帝位者取武人貴専一也巽卦利武人亦如此只要一心從剛故曰志剛也邵子曰五伯者借虛名以爭實利者也帝不足則王王不足則伯伯又不足則夷狄矣若然則五伯不謂無功於中國語其王則未也過夷狄則逺矣猶能維持二十四君王室不絶如線夷狄不敢屠害中原者猶五伯借名之力也所以聖人有言曰眇能視跛能履履虎尾嘻人凶武人為于大君其斯之謂歟按邵子説此爻精矣桓丈之所嚴者天澤也而非中非剛故雖視亦眇雖履亦跛未免嘻人何者履者禮也正誼而不謀利明道而不計功盡去名利兩見所謂幽人之貞若假之而已借虛名爭實利豈禮也哉所以凶也九四履虎尾訴訴終吉象曰訴訴終吉志行也九五夬履貞厲象曰夬履貞厲位正當也上九視履考祥其旋元吉象曰元吉在上大有慶也四乾體訴訴乾之惕也四雖剛不得中以敬謹勝所以履虎尾而得終吉禮主於敬敬則無不可行象故曰志行五曰夬履澤上于天為夬其彖云夬決也健而説決而和決則極分極明和則一一自然天理今履五剛中正應説之中至分明中却一毫天則不差所謂履和而至五之履也曰夬履如此而嚴之以貞又加之以厲只有和之美更無説之病履帝位而不疚者非此履乎故見其位正當上九履之已成特以反觀考驗結之考祥云者吉事有祥非中非正安得有祥考祥考中德也視履考祥則目常顧步其旋則要終步步返照本心此君子一步不放學問故履道以此為完局焉總人腳下一離了素一離了中便都是嘻人之履訴訴恐懼者此也貞厲防危者此也直到其旋一一反諸心而無不適愜方得了手方稱元吉履德之基也豈易言哉小畜初與四應曰復自道從頭反復起所畜者無非天矣履上與三應曰其旋到底常反觀所履者無非天矣義互相發總要完此乾德履履剛也履天理也聖人嚴此履於上下名分至擬之以履虎尾不嘻人其戰兢惕厲之小心有不可勝言者矣只想履虎尾時腳下輕重敢一毫自由否泰小往大來吉亨泰通也正月之卦也彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也易三十六宫分而六之每六宫當一爻乾坤至履凡六宫一爻已盡泰否又以乾坤始焉泰否兩卦合説否泰反其類謂之泰是極安極治極明盛天地間極好氣象謂之否是極塞極亂極幽暗天地間極不好氣象相去何啻如氷炭之不可同語然同是這乾坤乾在內便成泰坤在內便成否所爭只在個一來一往之間反覆出入間不容髮所以聖人論泰否正要在不定處論於泰曰小往大來於否曰大往小來泰之不可為否否之不可為泰此既定之泰否也若論往來往者何不可復來來者何不可復往來來往往豈有常局此其間有個主宰而執其樞者有人豈不能旋轉乾坤有泰無否故曰財成天地之道輔相天地之宜泰運人摻之也非乘龍御天何以語此何為小往大來大往小來説者曰只以四時看春夏陽來萬物日生日長一路開通去為泰秋冬隂來萬物日消日滅一路閉塞去為否似矣而實非也如此説泰否乃一成之定運如兩相對待然不可相無者也看來泰否是倚伏之機一正一反然故曰反其類否乃泰之反泰失而後有否者也夫天地交而成泰天地有一息不交者乎不交則天地毁矣是有泰而無否者天地之常也有不交其變也春夏發生陽出而隂從之出固大來也秋冬收斂陽入而隂從之入亦大來也是陽常為主而隂聽命謂之內陽惟夫春夏而寒沍秋冬而煦燠陽不為主而隂得凌逼之反小為大然後謂之小來是隂不從陽而陽反受制謂之內隂此非天地之常也泰是清寧天地否是有病天地天地何以失其常而有病蓋造化無心人為天地之心故陽當長則有𨗳迎之人事隂當消則有節縮之人事譬之一身隂陽者血氣心官常正方得血氣常調惟經綸天地燮理隂陽者無其人以致二氣為乖為沴顛倒錯亂把個開通世界翻做湮塞世界故于否獨曰否之匪人可見天地本是泰所以成否皆人非其人之故人之本來俱可以開泰所以致否皆自入於匪之故則大來也小來也皆人為之往來也所以説泰否之運無常總繇人造天地間生物者只是陽氣陽明君子做了主便日日把生道去開通隂塞路天地得其天地萬物得其萬物故曰萬物通若隂柔小人做了主便日日把隂道去閉殺了開通路天地不成天地萬物失其萬物則世界亦非世界故曰天下無邦這通與塞之間只在人心一邪正間一念主于陽剛便是內陽內健內君子一念主于隂邪便是內隂內柔內小人內者人自內之也即如堯時洪水為災四凶在朝丹朱在宫豈不是將否消息堯舉舜禹舉九官舉十六族便成宇宙泰寧此堯開通之也後世隂陽舛逆日月告凶山川不寧以為適當否運看來孰非人事上感召而然故不患無泰運患無開泰之人有其人泰固常泰否亦回泰夫天地間豈有一世無開泰其人者其內之也與外之也則上下交與不交之分耳內則長外則消泰否轉移係一念間先天天弗能違者也象曰天地交泰后以財成天地之道輔相天地之宜以左右民財成以制其過輔相以補其不及不曰陽內而隂外曰內陽而外隂有主其內與外者矣不曰天地泰天地否而曰天地交泰天地不交否有主其交與不交者矣此其故可思天地之道無過一生天地之宜無過一時小人用事都弄毁裂經常的事戕賊生理如何財成得天地之道都行乖違人物的事顛倒當然如何輔相得天地之宜然則舍下交君子别無財成輔相之法則别無交泰之義也責在君故稱后初九拔茅茹以其彚句征吉象曰拔茅征吉志在外也九二包荒用馮河不遐遺朋亡得尚於中行象曰包荒得尚于中行以光大也主乎泰而得中道者也九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也泰否只是通塞兩路所以初爻皆取象拔茅孟子曰則茅塞之矣所以茅要拔又要連茹根拔泰茅在外世路上茅塞這茅有一根未拔去終不成全盛之世否茅在內是人心上茅塞這茅有一根留得種終是否塞機括留得在泰陽剛君子同類在下開闢茅塞方是君子通行世路以其彚征之象也何吉如之誅鋤外穢正要把全坤在外開廓清明故曰志在外也主持泰運全在九二包荒者全坤都在胞與中是以宇宙為一身者也荒者荒逺之義亦草昧之義用馮河是臨深履薄安不忘危意思不遐遺是視逺如邇一民不遺意思朋亡者三陽本君子之朋如以陽為同類與隂不同有兩樣看便不是包荒之度所以要亡這見合此四者又所尚只是一中五柔中在上二得尚中行方與五合而成交如此可以舉全坤盡成開泰故曰以光大坤之光大也坤二曰知光大九三是乾之盡坤之交正是平陂往復往來之介然隂陽雖有往復氣運之不常也只是以陽道開通隂道則理之一定者也貞也能于往復之際艱以貞之自無咎蓋隂之來復原不足憂能以陽孚得隂還是泰交還是天地通故曰勿恤其孚言不足恤只要孚于食有福則泰寧之福可以常亨也食字有味只如否卦六爻處法何憂于隂之復來故曰勿恤保泰全在往復之際故著際字六四翩翩不富以其鄰不戒以孚隂虛陽實故凡言不富者皆隂爻也象曰翩翩不富皆失實也不戒以孚中心願也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也上三爻皆隂只順了陽便是下交其順之從四始翩翩順飛貌四順則三隂皆順是四以其鄰同去孚陽也順陽者隂之願故不富而可以能左右之曰以不戒而可孚三陽在下以彚上征三隂在上以鄰下孚豈不交而成泰象中失實實指陽只明不富二字之義惟不富而能以方見心之同故曰中心願也翩翩順陽雖是好處然處泰而得意之狀亦隱然在言外六五尊位必五與二合而成交方是天地交而萬物通上下交而其志同故取象帝乙歸妹歸妹納后也少女為妹中爻撰震兑却好歸妹卦以比君臣相得如夫婦之和天下泰寧之福皆五所造故曰以祉元吉五得中能與四同從陽謂之中以行願即四之願上六則坤極于上而必反于下矣城復于隍之象天時人事俱過於泰而不可為矣坤衆則亢而失正故戒以勿用師非不當用不可用也但于自邑修其告命則可然雖貞而亦吝何也告命於可用之時則治命告命於不可用之時則亂命也至城復於隍豈告命可以終治故謂之亂也可見聖人制泰全在未然至於勢已極必不免於往復蓋泰之進只有亂故既濟亦曰初吉終亂不有聖人御天妙用與時變化泰未易亨也總六爻各一竗用初拔是開泰手段三包是善保泰大力量三艱貞則當機一著所以使泰之不入于否者全在此四五柔爻能享泰寧而已至於上特係泰極必否危機警戒無窮之意盡闡於此否之匪人不利君子貞大往小來否閉塞也七月之卦也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也大義已詳泰卦健順德也故泰可言內健外順不可以內順外健言否謂之內柔外剛柔主於內剛露於外則剛柔皆失其正矣曰內隂內小人明乎三隂為小人然隂盡得居隂之道小人盡得處小之道便都是轉否為泰妙理何為處小之道從大是也所以否內三爻聖人言吉不言凶明與以處否之法見得挽回否運不専在君子人皆有其事也若小人而從君子則君子之道轉消而長矣泰之時非無小人也是難乎其為小人否之時非無君子也是難乎其為君子故曰不利君子貞夫持危定傾君子未嘗無其具全身逺害君子未嘗無其哲於君子何有不利且君子之貞亦何所不利惟天下不得蒙正人之澤天地不得遂生賢之功是天下之大不利也象曰天地不交否君子以儉德辟去聲難不可榮以祿天地閉賢人隱到否時君子只有閉藏便是順天地之道以其愈收斂愈堅貞寂無聲響曰儉德避難非畏禍也避小人耳本義只訓斂未盡儉字義初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也六二包承小人吉大人否亨隂柔而中正小人而能包容承順乎君子之象小人之吉道也象曰大人否亨不亂羣也言不亂于小人之羣六三包羞象曰包羞位不當也茅隂類泰隂在外泰初拔茅拔人也否隂在內否初拔茅自拔也否不曰征而曰貞吉隂不可征從陽則其貞也否之隂柔同類在下若不自己剪除了茅塞如何順從得君子從初拔去病根方才衆隂從之皆正以其彚貞也如此吉而且亨陽為隂之君芟除己私順從天理即順君之道故曰志在君君字一君二民之君五有君象否初之貞即坤道君子之安貞也泰二包否二亦包泰之包乾包坤不遺一物不漏一處乾包度量也否之包坤自包承受得起含容得下坤包能事也曰包承一味以承乾為事包承力量原不減于包荒但其事只是順道柔道小道故小人吉若大人處此自有個即否即亨之道大人同在否時同行柔順之事然却有個默默主宰乾坤事業把個否世界自成亨世界豈是隂柔之羣所能希其萬一可以同日語故曰不亂羣非但小人不可同君子亦未易幾故稱大人六三亦是隂柔却居了高位挽回氣運撑持宇宙如何做得來不免取羞然却要包羞有此包之一念方不入媢嫉妬忌侵害君子一路蓋藏垢納汚掩瑜匿瑕亦是善處否一件事羞字對嫉字看方明忮人之勝己則嫉恥己之不若為羞以其德不稱位曰位不當也九四有命無咎疇離祉命謂天命象曰有命無咎志行也九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也上九傾否先否後喜象曰否終則傾何可長也內三爻坤道只有一個安順外三爻乾道則有旋轉乾坤之任其事業絶不同如當泰運盡處泰的事當否運盡處否的事這只説得俟命説不得有命天命原只有泰無所謂否故能于否時回得氣化仍舊是泰運方可言有命有命即孟子所云立命天之命自我主之也這才是統天御天行事否四即泰三泰艱貞則平陂往復都不為氣數用故于食有福否有命則陂還是平亂還是治氣數聽命于我故疇離祉離麗也疇坤象泰初以彚泰四以鄰否初亦以彚皆以其同類也到否四有命則不必言以矣合天下無不在覆被中陽類固被福隂類亦附陽而同被福故謂之疇離祉九五正位大人大人出世則把一個世界自然一日休美一日更無否可言謂之休否一世成休美方見大人造福此為大人吉然大人亦無竒法只是念念不忘危亂所以國命日固一日自然世道日好一日故又繫其亡二語上九則極而必變之時傾則把一個乾坤直翻過來故先否後喜休之力極其大傾之力極其難休則不必言傾傾則究竟亦休然于旋轉否運鼎立乾坤其功則一也休否文王可以當之傾否則武王之事大人否亨孔孟當之總九二隂柔若不得擬以大人不知惟可泰可否剛柔無所不宜乃成其為大人否亨之大人即休否之大人在下則用柔中在位則用剛中此之謂與天地合其德乾坤泰否之分泰否乾坤之合知乾坤六爻作用與泰否爻義相通則六十卦皆可類通周易像象述卷二

body:
  text: 周易像象述卷七明吳桂森撰革已日乃孚元亨利貞悔亡兑澤在上離火在下火燃則水乾水决則火滅彖曰革水火相息二女同居其志不相得曰革息滅息也又為生息之義滅息而後生息也已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉自夬姤至此凡八卦自乾而坤而坎而離一一從巽兑摩蕩過至革鼎而完完于離九革去故也天地間造化無故而不新者前日之行事皆後來之陳迹自然要革革是聖人窮則變變則通必不可無之妙用取象于澤火者河圖一六北三八東二七南四九西洛書一居北三居東不變七居西九居南則變此造化自然之變遷故水木有定質不變火以薪傳金以火鎔皆無定質必變革之象也有一番革方成一番變化其實革中原有不革不變者在只看水與火本相息滅然火能乾水水何曾滅蒸而上者注之還是水也水能滅火火何曾滅息于此者燃之還是火也故滅息中有生息之妙但見一番變化耳二女同居各一其志論本性自不相得若能變化自可相得只要經一番改革耳此革之義也水火句見自然有革之妙二女句見不可無革之用與暌卦二女不同行其義有別只是這革却蚤一時不得遲一時不得有一個恰當之候在巳日是也何為巳日坎離居陰陽之中戊土藏于坎陽生子中也為戊日主生物已土藏于離陰生午中也戊即艮土已即坤土為已日主成物必到巳日則陽生之信轉為陰成之信已日而革正是氣化更易時候當此而革革自成孚所謂革而信之也言其德內則文明文明內藴則革中之美一一無不具備文明而以說說在外則其革之適當一一中乎人心如此豈不大亨以正這才是革而當悔所以亡謂之曰乃亡可見非巳日非明以說都稱不得當革而未當悔有不可勝言者矣聖人致謹于革如此看革只看四時春榮夏茂都是生長之氣到了秋忽然轉而為肅殺收斂之氣天地若變換一番然萬物却于此成就結實不是這一革如何成得四時上澤下火正是自夏轉秋時候也邵子曰三皇之世如春五帝之世如夏便都如生長氣候三王之世如秋便當了肅殺時令所以湯武不得不革德轉而為功揖遜轉而為征誅這都是天命自然謂之革命所以合諸天理而順質諸人心而當不革不成造化征誅之事仍無改于揖遜何也其時然也革之時豈不大矣哉南面而聽天下者必先有自坎厯震生天下之德然後可言自離厯兑成天下之功如此方是巳日蓋生物之德已完而成物之候斯至若未有以生之但曰何以成之非已日之義也以此孚天下天下其誰信之象曰澤中有火革君子以治厯明時澤中有火澤上行火下伏正是秋夏之交革象治厯明時天運時至則革君子亦時至則革日有新無日不革時有習無時不革君子之治厯明時也月令中王者隨時行事方謂之治厯觀厯極可見革象初九鞏用黃牛之革象曰鞏用黃牛不可以有為也雖當革時居初無應未可有為鞏固也黃中也牛順物常堅確固守而不可以有為聖人之于變革其謹如此六二巳日乃革之征吉無咎象曰已日革之行有嘉也九三征凶貞厲革言三就有孚象曰革言三就又何之矣革主全在六二一柔是離中之黃牛所謂成物之已土此也初九尚去二一位是革時而未至巳日者故初之道在一心從二不到巳日不輕革是二之中待初而完固故曰鞏用黃牛之革言初專一用二之信也這是時未可為不輕于有為革之始事只當如此二則正可以有為之時于此而革巳日之革也所以云乃革乃字有力如此征自然有吉無咎如二之征二五方合而成孚美之所㑹曰行有嘉也三過中之離也二得中時當革恰好如此革皆合乎中故征吉若過乎中是于當革處又過求一分也革豈可過故至于征凶而有貞厲之戒貞厲必求合中也又曰革言三就者三與上正應言指兑口其革也必一謀之再謀之至于三謀而皆說則無不孚者矣象曰又何之正言無有不可革者也就者革而信之之謂以時言之三過時而革故當致其謹兑三爻俱孚三就之象九四悔亡有孚改命吉象曰改命之吉信志也四兑體正上下相革之際到此而革真革而當者故悔亡真革而信者故有孚惟孚而改所以改命吉象曰信志正見孚于人心之謂改命即革命與變字相應惟其有改于革前之經綸斯有變于革後之功化如下文所云九五大人虎變未占有乎虎大人之象變自新新民之極順天應人之時也必自其未占之時人已信其如此乃足以當之耳象曰大人虎變其文炳也上六君子豹變小人革面征凶居貞吉革道已成君子如豹之變小人亦革面以聽從矣不可以往而居正則吉變革之事非得已者不可以過而上六之才不可以有行也象曰君子豹變其文蔚也小人革面順以從君也五主革者也有此大人把乾坤另鑄造一番氣運更新虎變之象能使天下悅而從之俱成文明之化故曰其文炳也有耀一世于光明氣象乾五大人稱龍虎革五大人止稱虎其聖作物覩無異也特以兑秋肅殺之氣便有威可畏所以與神武不殺者稍不同然雖虎也實順天應人故天下不言而自信其孚不待有占也凡見其益我而言之此以占而孚者也若湯武之東征西怨南征北怨其君子迎君子其小人迎小人何待于占未占而孚所謂已日之孚革而當也上六則革之成矣君子豹變君子成文明之象也小人革面小人亦從文明之化也虎大而神有位者之象其文顯故言文炳豹小而性介無位者之象其文著豹文最奇故言文蔚炳通天下言豹就一身言惟能變則為君子若止于革面則為小人曰順以從君謂向教化而來但不知君子之文耳不必說革面不能革心又著征凶居貞之戒蓋世道已有變革之象更無容過求只居貞以俟不患不成大順也可見革道到底因其自然不得加一分有意三征凶革前之穿鑿也上征凶革後之多事也然後知已日征吉正是恰好處總五行之理木從水生金從火革所以澤火有革象人須要從離革兑烈火中陶冶精金五有鑄造一世之洪爐所以文炳上有百千煆煉之精粹所以文蔚即離文也革真是全體變化學問易至革第四十九卦大衍之數其用四十九變化之門盡于此所以繫革然其要只在一孚故爻中三言有孚其有不孚則征之皆凶所以孚不孚時為之也火氣既足兑金自變此之謂時有井之源泉時出然後可言變化故井之後方有革有革之變化然後有烹飪之養故革之後方有鼎鼎元吉亨下陰為足二三四陽為腹五陰為耳上陽為鉉有鼎之象又以巽木入離火而致烹飪鼎之用也故其卦為鼎彖曰鼎象也以木巽火烹飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨革去故鼎取新惟常新而後可以無故所以革而受之以鼎鼎象也全取以木巽火之象上古未有火化食草木之實鳥獸之肉飲其血茹其毛後聖有作然後修火之利以炮以燔以烹以炙皆取木巽火之象故聖人制器尚象觀木巽火而制鼎後人觀鼎則得木巽火之妙用故曰鼎象也象木火之烹飪也民非水火不生活以木巽火人可得養故聖人于井曰養而不窮以木巽火人可善其養故聖人于鼎曰烹飪也皆象也烹飪之養雖人人所必需惟以之享上帝養聖賢而後見鼎之功用如此其大井之妙妙于得源鼎之妙妙于得飪皆巽德為之也鼎之妙用成于一巽字是調鼎真火候也飪釋文曰烹調生熟之節可見不飪便生而不熟如何成鼎之用若不是巽火候不調如何得生熟合節學問火候正在一巽人有聰明不得調伏都是強陽之氣惟有一巽自然見善而入所以耳目聰明聰明則飪矣其功夫全在柔上行與得中而應剛惟柔上行以一段虛中為巽志何善不入惟得中而應剛執中在已又見善而能從自非無主之柔此所以為耳目聰明可以享上帝養聖賢此也故曰元吉亨惟聰明所以成烹飪惟柔上行所以聰明文勢緊緊相接一氣而貫離為目兼言耳鼎耳之象人一㸃離中虛明便是帝天明命如何不通得上帝而成享便是聖賢同然如何不合得聖賢而成大烹之養但人自失于調養之節把有用聰明都成無用故只提一巽字便覺心平氣下火性自調便是無窮妙用假若鼎設而不能以火巽豈惟無以養人烹飪不熟已且無以自養不自失生理乎噫巽之道微矣象曰木上有火鼎君子以正位凝命木上有火象鼎以二體為象不以六畫為象古人立國以鼎為重所以帝王受命則曰定鼎革命則曰遷鼎主器必有位南面向明而治方為正位位正則所受之命凝矣巽而聰明乃所以正位之道也享上帝養聖賢皆凝命之事初六鼎顛趾利出否鄙得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也我仇謂初二能以剛中自守則初雖近不能以就之矣鼎以巽成然所貴者非初柔也貴在巽之剛中初畢竟有病故本爻曰否二曰疾四曰折足皆指柔言鼎之實在二鼎之耳在五一體一用也鼎象也六爻趾腹耳鉉皆是定象初雖巽木主爻然要善用用以從二方得巽中義取顛趾者能顛方舊否惡也盡出宿垢盡去去故即新妙用全始于此初位在下從二則有助二之功故又曰得妾以其子子謂內子主烹飪者也能左右之曰以初不知從二便是悖能出否以從二謂之未悖巽之可貴者在二曰以從貴也學問最妙是出否將舊日腹腸傾倒而出不藏匿些子方有光明透出便有日新之路若始初留這些查滓要終焉得如金如玉巽初之妙只是自家虛衷洗滌所以便有變化胚胎九二剛中稱有實初雖柔二之同體本好仇也以初視二曰子貴在二也以二視初曰仇匹也巽之主也二雖得中只是還要慎所用用初之柔而不受柔之病方為善用故曰我仇冇疾不我能即初原有疾能使疾不我即鼎實方到底是美物曰終無尤也何吉如之九三鼎耳革其行塞雉膏不食方雨虧悔終吉過剛失中故為鼎耳方革而不可舉移苟能自守則陰陽將和而失其悔矣象曰鼎耳革失其義也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也三過剛近離以巽木則躁近大則烈有耳革之象革謂變其常度鼎以耳行耳革故行塞雖有美實而不得食矣承上卦文明之腴有雉膏之象鼎以實養為義不食故為失義若能從五便陰陽和而成雨三五合而撰兑雨象雨則火氣漸漸退減虧也漸漸自知轉移悔也所以曰虧悔而終得吉也二慎所之一心以進五二五正應也三失其義不能善巽火所以致耳革三五不相應也耳仍指五言四雖剛質有實然不應二之中却應初之柔這明便偏了所以為德薄知小如此不足為五之正麗所以有覆餗之凶渥厚漬也只是澆濕渾身象曰信如何大有以上履柔中謂之履信鼎四近柔中而不能從是不知信從五之聰明也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也鉉貫耳以舉鼎者也上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也五位則耳德則黃可用則鉉而金既利且貞其妙全在應剛以二之中為實故云中以為實上九明之極五之明全麗于上如鼎之行全係于鉉玉鉉用之至貴者也剛柔節雖就上爻言然惟木巽火烹飪和然後玉鉉得以施其用是上之節乃一卦皆得其節也如此可以享上帝養聖賢而鼎之用成矣大吉無不利鉉有橫于鼎上者玉鉉也有貫于兩耳者金鉉也兩鉉具而後鼎行總初爻巽主實在二重剛中也有實則可用矣三則曰不食四則曰覆餗可見雖有聰明而用之不以善道猶為無用也五之金上之玉則精純粹美無以加矣噬嗑曰得黃金得金矢正與金鉉玉鉉同義然噬嗑離震之合猶用烈火煆煉鼎離巽之合直用慢火溫養工夫愈精愈妙所以享帝養賢成大功用書經平秩南訛謂萬物變化皆在夏令鼎正春末夏中之候學問變化全在此時故革物者莫若鼎天地間萬物化于火革故于斯鼎新于斯人心萬理變于明去舊于斯從新于斯震亨震來虩虩笑言啞啞震驚百里不喪匕鬯虩虩恐懼驚顧之貌彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也出謂繼世而主祭也乾坤居首局之前坎離居中局之中震艮巽兑居末局而不以要終以四卦皆偏體無全功也震艮撰坎在中三男緯地之事于斯而完震為長子先天乾為首後天震為首震是乾之第一動初剛動而兩柔皆動有這一動乾來闢開了坤闔生生化化俱從此起故萬物出乎震震全是一團生氣仁氣所以雷聲一震萬象昭蘇其在人心便是天理念頭發動也此念一震萬理俱從此發生震自然亨只為這一動全是天動所謂帝出乎震故人理念一震便冥頑者惺怠惰者振渾身竦動不期敬畏自然知敬畏試看雷聲一轟毛骨自竪天理一爆汗透通身未有震而不恐者只是震來而恐是天之自動以恐為震方是人之動以天若震來而恐隨恐隨忘如何承得震生之氣即如萬物起于蟄雷若生氣自斷雷亦不能生人心震于天理若不息息常惺亦是自斷了生意故震來須要虩虩虩虩周旋顧慮無一息不恐也虩蠅虎無一息不動如此方是動與天俱必自天祐之矣故曰恐致福也常有這一段恐懼自然常有一段和樂笑言啞啞正見其一語一笑都是順適安樂境界蓋放逸不可言和樂合天則自然和樂虩虩之人一步不離天則如何不和樂天下之福孰大于合天則乃知恐處正是福處此為恐致福也後有則後字有力惟有恐然後有則震驚百里二句則發明長男之義以見主宰乾坤責任蓋長子主器宗廟社稷所係若非兢兢業業一段恐懼精神徹逺徹邇如何守得器所以說震驚百里雷聲一震則百里之中逺者驚近者懼主器精神亦要貫逺貫邇戒于耳目所及懼邇也戒于耳目所不及驚逺也如此以出出皆帝則所以不喪匕鬯也出字好玩此不獨國君為然父母天地人人有個承受之器有周一身一家之敬謹則能守一身一家之器究極之非敬懼周四海不能守天下大器也但國君之尊深居稱大欲言驚逺懼邇之道則難矣震有三義恐懼也動也起也然惟動于恐懼方是真動這動方是起不恐不動便是犯了不起之疾匕鬯匕長三尺以棘為之所以升鼎實于爼鬯所以灌地降神國君主祭必親者二事故特舉之象曰洊雷震君子以恐懼修省一震再震曰洊雷地有復雷而後有豫雷天有無妄之雷而後有大壯之雷洊雷之謂恐懼在先修省在後君子之洊雷也修者修其既往省者省其將來初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也六三震蘇蘇震行無眚象曰震蘇蘇位不當也震主在初四兩剛而尤以初剛為主故爻辭即因彖文加一後字蓋論震初未便能啞啞而所以致啞啞必由之故特添後字其義方精六二震于初剛者也以其乘剛所以震來之厲人心一受震驚不覺思慮莫容手足失措故至于億喪貝貝者人所自私自利之物平日積之以為已有居之以為已多者惟當天理一爆恍然自失一齊隕落所謂喪也此時此際若曉得這是天心發見步步循此恐懼而行謂之躋震之究為健躋而不已便造到乾健所謂躋于九陵也有此造詣自有真得所喪之貝始以為不足寶者至此皆為我寶勿逐七日得也二本六從陽便是七貝本陰私從陽便是理故得以七日其喪也不期喪而喪必不可無此喪其得也無意于得而得方謂之真得躋于九陵即虩虩之義六三去初漸逺不如二之來厲所以蘇蘇死而復生曰蘇漸漸回轉生意來曰蘇蘇這時節略怠緩便接不得震生之意所以震行方可無眚震行亦如二之躋用力自警動也只為三與兩剛俱不相當故曰位不當九四震遂泥遂者無反之意象曰震遂泥未光也六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也初震于內四震于外其為震主一也而初震與洊震其力則逈然不同初從根本中動其動易四動已在上下重陰之中其動難所以有遂春秋傳遂者繼事之辭而有專主之意極是著力煩難之意才有遂則便有泥之病水土和為泥撰艮坎之象謂行之未易通也蓋初震是孩提真念發動若常存此恐動就是乾體何有再震可言只為不免有緣染汩沒所以又有一番震動然完得震初之動者在此一震只是發于陷溺既深之後其奮出豈不百倍費力所以遂處便有泥而難通處泥則便非光大曰未光即如雷初發于蟄時者也四發于夏秋者也春雷和緩夏雷迅疾而其生物之功反有不及春雷者遂泥之象也能知其易泥而不為所泥常恐常懼善達此雷則仍是初雷之體也何泥之有惟始無虩虩之周詳所以有遂之費力遂而致泥之難通則安得有啞啞之和樂言四之泥正欲人虩初之虩也五當主位初四兩震五皆有之故往來皆厲有洊雷自有往來不必以初為往四為來前念恐懼才過後念恐懼又至往來有厲自無行不虩虩故曰危行也以危厲為有事自萬萬中無一失故曰億無喪五惟得中所以恐懼修省能盡其事如此上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言能及其震未及身之時恐懼修省則可以無咎象曰震索索中未得也雖凶無咎畏鄰戒也中謂中心上去四已逺去初更逺是一冥然無覺人故雖有初之震四之洊震皆不能動也但索索與矍矍而已索索倉皇失措之貌與虩虩義絶不同虩虩恐懼在心索索不震于心而但震于耳祗見其手足無措之狀視矍矍是目瞪口呆茫無知識之狀視字形容曲盡象曰中未得言此中全無所得蓋下愚一品征而必凶者也然雖不能從自身警覺若曉得因鄰而震知所畏懼猶可無咎何為鄰如二如三如五同德者皆鄰也不専指五二來厲三震行五往來厲皆以震而恐懼修省上亦法之以恐懼修省震鄰之謂也然亦不免婚媾有言婚媾有言如室人交謫之意夫人不能警戒于早至禍患及鄰而後畏其取咎于人雖親戚不免怨尤矣然猶是惺悟之門也若再不知警如陶答子其妻求去而不悟難乎免矣有言一語最有味庶幾回生起死之路震生之機未窮于一線故繫于終焉總震一陽初動為天地之心復雷即此于人為善之元屯之建侯即此三百八十四爻從此一爻首出震初一出而三百八十四爻之則皆則此一爻故出可以守宗廟社稷以為祭主善之長在此也人生天地間只有這個真主人四不過此念之再發本無兩體此念得即生不得即死躋也行也有事也都是步步提醒法惺得此念便是上帝臨汝自無時不恐懼震驚所謂虩虩自一息停不得髙子曰人有生惟恐懼一念是真主人即長子也真主人常定恐懼之事所不能驚所以有得無喪言匕鬯舉其重也真主人不定便未免為恐懼動動則有喪矣若因動而知戒懼則可以無喪億喪貝億無喪此也即匕鬯之義也若全失真主則恐懼之來不知所措矣蘇蘇索索是也其喪不可勝言矣艮其背不獲其身行其庭不見其人無咎身動物也惟背為止艮其背則止于所當止也止于所當止則不隨身而動矣是不有其身也如是則雖行于庭除有人之地而亦不見其人矣蓋艮其背而不獲其身者止而止也行其庭而不見其人者行而止也動靜各止其所而皆主夫靜焉所以得無咎也彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也背者止之所也不相與則內不見已外不見人而無咎矣艮三索而得男艮是乾道之終有震始必須有艮終艮詣極之功也天地間至極道理本至定而不可移人能詣其極自然常定而無移易故艮止也止而不動也惟其止止于定理豈是以靜而不動為止直以動靜皆定為止蓋動靜相乘除不可為定在者也其當動當靜之理常因乎時則一定者也惟止以時止行以時行則動靜皆不失時動靜皆時則皆得止矣這才是乾道之終其始大明終始之象所以其道光明一剛止于上成乾之光明天道光明是艮之止乾止也何為艮其背人四肢百骸有行有止皆係于背以為行止背不動者也實以不動為衆動主惟不動而主動則止之所在是矣所以動靜皆止方是止其所所者天理恰當安穩處也正是時人未得止所不能以理主乎所止便從自身上起見我如何行我如何止却都是形骸上著腳這個謂之獲身既有身見于行止感應間必不免于人身上起見因人有行因人有止這個謂之見人紛紛馳逐都是茫無定主見識如何無咎若得了止所見得我有我當盡之道無與于人人自有人當盡之道無與于我我與人終日敵應終日不相與眼前只見得道理當然以身聽理忘其為我既忘我見隨感隨應亦忘其為人故曰上下敵應不相與也是以不獲其身行其庭不見其人也是以字緊承上下敵應艮體上下兩山分明人已對峙之象惟曉得本不相與各止其所方是合為一止而得止其所則其相敵者正自相應不相與者正所以成相與也以子臣言之對君先見得自家是忠對父先見得自家是孝這是獲身見也又思我忠君當如何樣仁我孝父當如何樣慈是又有人見也君父只管自家仁慈臣子只管自家忠孝這是不相與却不各得其止却不共為一止文勢不獲身根艮背來不見人根不獲身來一貫而下行庭者出而與人往來之所艮為門闕所以為庭能艮其所者見得通天地是一身安得有形骸之一身可獲通天下往來是一人安得有物我之人可見震戒謹不覩恐懼不聞兜根工夫艮無所不用其極透頂工夫震起手艮了手然了得手才有起手可說故艮為成始成終震曰則艮曰所人要認得始之者即是終之者象曰兼山艮君子以思不出其位山形髙卑大小不齊而安止則一故兼山象艮兼者以一而兼其不一也君子內體外用感應萬有不齊而當止之所則一其一處即思之定在處也故思不出位位在心為所在理為時在身為背一定的是理在理上思思而無思所以動亦無動靜亦無靜皆止也若出了理不是我見便是人見紛紛何時止此出位不出位之說也兼山正象各得其所止初六艮其趾無咎利永貞象曰艮其趾未失正也六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也九三艮其限列其夤厲薰心象曰艮其限危薰心也限身上下之際即腰胯也夤膂也艮止于兩剛而主尤在上九所謂背也初最下象趾是止之第一步于此能止何有失正但利在永貞耳二得中然亦是柔體與初相聨腓象腓足肚也夫以二之居中似乎得止所可以拯初拯上舉也艮手能事今惟腓也則不能拯而但能隨以隨為止豈是真止所以心不快也隨謂隨三心能思是止之主朱子曰心在羣妄自退聽二惟未能聽于心所以不能拯而但有隨也九三則剛而能止者也特其止在上下四柔之界艮限之象限腰胯也人上身下足身靜足動動靜皆限于腰胯艮限正是從中止惟止在中一身上下脈絡分列都不妄動列其夤之象人身中有八夤謂之曰維周身之脈絡也列上下分開也如三之止正在居中扼要人感應間理欲有個界限內外有個界限脈絡一毫不可渾這正是動靜關頭若于此處止不得如何能勾止于極三艮限已是能止了只是用力去止却煩難而未得安所以危厲又曰薰心謂用力之苦不但身受之心亦受之也薰漸漸之義禪家薰修薰染同藥中有薰可以通一身非焚灼之薰為心害也謂之薰心雖未到忘我忘人之自然却已非二之心不快蓋以其止尚為有心在然必先有勉強然後有自然則艮限亦止之不可無者也心位在五曰言有序心之聲也六四艮其身無咎象曰艮其身止諸躬也六五艮其輔言有序悔亡象曰艮其輔以中正也上九敦艮吉象曰敦艮之吉以厚終也外三爻四五皆止于九同得止所者也四曰艮其身艮所貴者不獲身然未有身未得止而遽可言不獲者子事父臣事君身先止于忠孝然後言忘忠孝四上艮之始正從自身上先止者也象曰止諸躬者身向上為伸身同向下為恭躬同人只屈身向下凡事反身克己只求靜不求動只求內不求外這便是不有其身路頭所謂止躬也四已是全身得安居學問五曰艮輔止到五已是極至了言有序則語默動靜都合于時豈不悔亡蓋人已感應間最難得止是言言而止于序是人已相應相與同得止景象以五中正故有此也五已是體用得所止學問上曰敦艮敦非是言艮身之上更有加益只到底止于是而不遷始終如一見其敦厚于止中庸曰大德敦化萬化從出之源也人身自趾而口無不當止只是有件止可名便非全體直到衆止㑹于一止而無一件可名敦艮之義也象曰厚終艮成始成終故凡艮在上卦無不是吉至于敦艮則不特六爻成其終三百八十四爻皆于此成其終故曰以厚終也總艮六爻自下而上以漸詣極工夫擇地而蹈不輕指趾初止也恬靜無為隨人行止二止也執之定守之卓介然不移其三之限乎反身求已庶幾四之止躬語默因時則惟五之中正若夫動靜一原行止無迹通人已于一而渾然詣極者敦艮之吉也非神明默成者其孰能當之震四艮三其體同其情與義亦同聖人曰泥曰薰擬諸形容妙在一字之間蓋震原始初念為主四幾于再念矣故遂不如虩然因遂而虩是初之得力處又賴有四也特不可使其泥耳則泥震中一關厄不可不知也艮要終絶頂為主三幾于中止矣故限不如敦然因限而敦是上之得力處必先于三也特必先難于薰耳則薰艮中一關鍵不可不知也若一震便到底雖不言遂泥亦可一造便詣極雖不言厲薰亦可此上智一等作用未易輕議也震艮是一體于爻詞可見與坎離一體同漸女歸吉利貞止于下而巽于上為不進之義有女歸之象焉彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也謂九五止而巽動不窮也漸歸妹巽兑來摩蕩艮震二女之事于此完漸巽柔在上艮剛在下惟其以得止之剛用巽入之柔見其能漸所以有女歸之吉彖曰漸之進也謂行而進之字虛中有力晉進也以進德言是柔已進而在上取其得所進漸之進也以出處言是能用柔道為進取其不輕進義重漸字不重進字其曰之進猶云進而漸以漸進也漸之義其妙無窮學問以漸進必無躐等輕浮之患出處以漸進必無躁進失身之患但非有巽順從容之德不能漸非有艮止為之主亦不能善巽柔之用惟其艮剛內止而以巽柔為進男道得女道為用所謂女歸吉也天下進而漸者莫如女歸六禮一不備女不出門故雜曰漸女歸待男行也妙在待男必男以主之則進必不敢以已輕進君子之進也常有女待男之心上不求則下不往終身做個不失身之女何吉如之咸曰取女吉亦以艮剛貞兑女之故進之貴于漸者只為進而要得正自然要漸若進而不漸如何得正所謂正不正得位不得位是也進而得位這進才有功這進才正夫進以正則正已而物正不令而天下歸可以正邦也三句釋利貞卦體九五剛中分明一個正位在能以艮之止不輕進者主之又以巽之順善其道以行之如此以進自無不得位自無不有功所謂動不窮也得位方是得正得中方是得位以艮而用巽則得中之道也語脈自一貫女歸吉君子自有女道與家人之女貞女正位其義不同象曰山上有木漸君子以居賢德善俗山上有木山不動而木自進長患無常定之山不患山上之木不漸長也君子居賢德則俗自日善患無居身之賢德不患能居而無漸進之善俗也居如居積之居艮山常定之象山木不能以驟髙風俗不可以驟變皆漸之義初六鴻漸于干小子厲有言無咎鴻之行有序而進有漸干水涯也象曰小子之厲義無咎也六二鴻漸于磐飲食衎衎吉磐大石也衎衎和樂意象曰飲食衎衎不素飽也九三鴻漸于陸夫征不復婦孕不育凶利禦冦鴻水鳥陸非所安也象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也漸取鴻象鴻夫婦有序進退有序飛行有序秋冬則南春夏則北有定則最可觀漸義玩爻辭只一個不輕進為正內三爻艮體在東北鴻所生長之地也干水濵初柔而在下象小子欲進以正必慎之自初始人之進德自小子始故小子而知厲則有言亦可以無咎有言撰坎象有險則有言矣訟有言坎體明夷有言撰坎在前震有言撰坎在後六二曰磐水中之石最可安居故飲食衎衎然安樂知磐之可安自不妄進矣象曰不素飽者若但求飽何必于磐必求安樂之磐惟其志不在一飽曰不素正明志不在溫飽之義九三漸于陸陸有南陸北陸艮三自北向南所漸者南陸鴻之自北而南飛也南飛則罹人道之患故有不復不育之凶鴻之實事論三艮之主爻本自能止特以剛體上進與巽柔近不相得所以在三為征而不復之夫離其羣類而獨進也則在四為孕而不育之婦失其相與之道也安得不凶然亦是危其有患之辭非必一定不復不育故又教以防患之道若知禦冦則夫婦相順而可相保矣蓋知相保則其進必以漸豈有征而不復之失可見進便有寇不進何冦利禦冦之法安止而已六四鴻漸于木或得其桷無咎鴻不木棲桷平柯也或得平柯則可以安矣象曰或得其桷順以巽也九五鴻漸于陵髙阜婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也外三爻巽體在東南鴻所南翔之地也漸木巽象木非鴻之所安然能順以巽則隨所棲止可以得安如得平柯之桷也漸桷此進之最善者然曰或得則得之亦不易矣九五漸陵居髙則無人患可謂得所處矣然而不孕者何蓋陵雖髙非鴻安居之地也鴻水居鴻南翔則不孕是實事然雖不孕却終無有得勝而奪之者故吉其不孕而三嵗也見守正自持不以久而有變遷之志進之正也與三不孕各一取義其終莫之勝也見所處得正終無失其夫婦之常正之吉也鴻南翔則不孕然不以不孕而改其度歸北則終復其孕之常不失本性曰得所願也髙陵之義不以得位為髙而以得正為髙得願之義不以髙位為願而以終莫勝為願此聖人象漸之精意上九漸陸則自巽東南返北陸鴻之復而歸于北者也先有進後有復夫婦仍是孕育飲食仍是安樂一毫不失其序直可為觀法故曰可為儀吉莫如之惟其有始有終有進有退有往有來謂之不可亂此為漸之終若無北陸一漸從首徹尾皆亂動耳何以為動而不窮總漸六爻士君子進退之義分別甚明從初便知厲始又去了素飽之念必求安樂之飲食則利祿之見不入其胸次矣征而南曉得有人道無窮之患常常存禦冦之思則利祿之患必不敢輕蹈矣又能擇桷而處非平柯不居又能居髙雖三年無奪要終又知全歸一著如此進退真是已正而物正所謂進得位動不窮此道也內外卦對看俱有深㫖初干則生而安之水濵四桷則擇而安之棲止然初曰無咎桷曰或得則已漸之安難得不如未漸之安從初自具也二磐在水中五陵在髙平然二曰衎衎五曰不孕則漸而在髙之危不如漸而在下和樂之安也三之陸南進上之陸北歸陸當作逵謂雲路也按改陸為逵未安然三曰不復不育上曰可儀則往而前之凶不如來而歸不亂之吉也是知進甚艱不進甚易進有險不進自平故君子三揖後進一辭即退非故難于進也不如此非正非中則漸之義固然耳歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也歸者女之終生育人之始說以動所歸妹也征凶位不當也無攸利柔乘剛也漸女自外而來歸其歸也以男下女是男主女也歸妹女自內而往歸其歸也以女說男是男不主乎女也以女說男豈得如漸女之貞而吉所以這歸要辨假若是個賢女何嘗不可歸歸仍是男女大義若是個非中非正二中正賢女也三非中正者也之女這歸便有無窮弊病故一曰征凶又曰無攸利皆究言一失所歸其害必至于此蓋防禁之辭非卦德本有此凶不利也以卦體言之陽交陰自震始陰交陽自兑始震兑合天地相交故歸妹天地之大義也出乎震萬物之所由生入乎兑萬物之所由成一出一入則天地交若不交是萬物不興也生物天地之始事成物天地之終事兑女歸震男一終一始人道之終始也女道以兑歸而終夫婦生育之道以震出而始由此而觀歸妹何嘗有病病在說以動說動二字亦未見可病病在說先而因之以動蓋當說而說當動而動俱有個天然之則不容一分有意若先有個說意為主因之而有動這個說是私說分明少女見男而說這個動是妄動分明長男因少女而動故曰所歸妹也且其爻位震剛不居內不當中不當夫專主之位兑柔不居外陰在外陽在內方交不應剛不當婦從夫之位所以征凶三本柔也乘乎二之剛婦為以賤凌貴之柔四本剛也為五所乘夫為見荏于柔之剛悖剛柔倡隨大用所以無攸利然謂之征凶則不征何凶乘而無攸利則不為所乘有何不利征也乘也非一定而不易者也推移變化之妙存乎人焉耳兑說也人情最難合性體者是說才失正便都成私意之說第三一柔正是私意根也此說豈可使居內作主故內兑八卦無一卦吉乾兑嘻人坤兑甘臨隨曰動以說動為主也大亨貞說以動其不貞可知矣故命曰歸妹夫好莫真于好色說莫說于少女于此說而不妄動則無不貞之說矣聖人以歸妹示戒有深㫖象曰澤上有雷歸妹君子以永終知敝澤氣上蒸則雷動故澤上有雷以陰感陽有女說動之象少女說男其終必隙故君子欲圖永終必先知其敝也永終必在善動善動必先防說先雷後雨陰陽相感之常雨後之雷陰陽不正之氣且以時言之兑上雷秋雷也非生物之雷初九歸妹以娣跛能履征吉陽剛在女子為賢正之德君但為娣之賤僅能承助其而已故又為跛能履之象象曰歸妹以娣以恆也跛能履吉相承也九二眇能視利幽人之貞上有正應而反陰柔不正乃賢女而配不良不能大成內助之功故為眇能視之象象曰利幽人之貞未變常也六三歸妹以須反歸以娣須女之賤者象曰歸妹以須未當也歸妹三四兩卦主爻不相當惟二五得中故以二五之歸為正所謂天地相交之大義也其不正之說在三上應之故皆不吉四雖震主亦不當位故有愆初雖在下與二四同德故吉兑女之得中在二則二正嫡君夫人也初與三皆其娣媵初剛而從二惟君夫人所左右以娣之象獨應震足能履之象但初與三同為二之娣初能從而三不從未免為跛之履耳如初最得為娣之常道曰以恆最妙在承二曰相承初蓋賢娣也二歸五之正嫡剛中合四成離有能視之象但不得剛中正配六五未免為眇之視耳蓋兑只是半用故稱跛眇履之跛眇同義惟不得正配所以利幽人之貞幽靜而貞也婦德莫善于幽幽而貞寧復有非道之說此方是可久常德故曰未變常也未變謂不可變六三以柔說之質近震動之男女之至賤而易失貞者二而以三是以須也天文須女四星賤妾之稱此最不當以者故曰未當若能反而從二則仍是二之娣也何不可以之有蓋女無常貴賤說男則自賤從正則自貴惟反歸不上而說男却下而順二則與初同為相承之娣矣所云以娣也歸妹得失兩途係六三一爻在人之知擇耳九四歸妹愆期遲歸有時賢女不輕從人而愆期以待所歸之象象曰愆期之志有待而行也六五帝乙歸妹其君之袂不如其娣之𬒮良月幾望吉尚德而不貴飾然女德之盛無以加此象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也上六女承筐無實士刲羊無血約婚而不終者無攸利象曰上六無實承虛筐也九四震主與兑中不當相應之位故象之以愆期謂過時也然雖愆期不可輕動必須要待寧遲以待待賢德相配而後歸故曰有待而行也惟待則不輕動于說而無弊矣本義指女愆按震是男指男說亦可總要待正配五歸妹之主以其居尊象婦之歸于大君其稱帝乙或帝乙得后少而賢或帝乙即位後娶后必有所取義不可考也若云帝乙制下嫁之禮非惟無據于象亦不合書曰降二女于媯汭下嫁舊矣其君指二以中德為尚不以美飾為尚故不如娣之袂良可貴莫如德故曰以貴行袂之良無如三然不足貴甚矣五出震自震向兑如日之中天二入兑自兑向震如月之方望震撰離日象兑撰坎月象故月幾望如是方成天地之交人之終始所以吉象中兩言行推開說不必指女歸為行上正與六三應三既非正女上又不能以剛德主之以柔相應所以不成夫婦此歸之必不終者故自上言之有筐無實女之所不得承也自三言之有羊無血士之所不足刲也夫婦所以主宗廟祭祀女承筐無實何以薦籩豆士刲羊無血何以備牲牷夫婦之道不成故彖中無攸利繫于此爻歸妹女之終也難在有終如上正是歸之不終者以三之為女不有始故也總精義工夫于歸妹最可玩少女長男雖非正配然未常不可成夫婦敝都生于一說然雖有敝中間時位各有一個正道在盡其道便不至于征凶無攸利每爻中如承如反皆指中也中則寧為幽人不為須女必無非義之說矣如待如貴皆指中德也中則寧無良袂不取虛筐必無非義之動矣如此便都歸正道士君子難進易退其自愛常為守貞之處女慎始圖終其自貴不為良袂之賤妾此漸與歸妹之義豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎豐要明以動惟動最易蔽明所以豐多故旅要止麗明惟明最易失正所以親寡旅也以三十六宫分之此以下為第六爻豐大也人一身在天地間藐乎小矣何者為大惟這㸃明心即是天體與天同大故乾彖曰大明火在天上則曰大有然明體雖大不見于動不實實成其大惟明與動合這㸃心天之明實見諸發用流行才是光輝發越炳天燭天何大如之所以說明以動故豐豐則自亨聖人觀象命豐不是稱揚明德如此大要人識得心體之大若有一毫遮蔽便自失本來必使明者常無失其明斯大者能無失其大有十分提醒警愓之意故又曰王假之勿憂宜日中通徹天地人為一王字三畫之象謂之王假至也與感格之格同明動通徹得詣極之謂也論人心之明聖凡無加損何人不大但有蔽有翳不勝自小只是不知尚其大惟王者明明德于天下明與動交詣其極故曰王假之尚大也王字重見得非王者不知尚非尚不能至要知王德人人之所宜有不必居位為王云勿憂宜日中句則又直指王者能假之心法最精語也尚大之道何如必常明方謂之尚大論明體易蔽最為可憂然不必憂自有常中之照在蓋人不怕動來蔽明只怕明先自昃不能主動若使此心常為中天之日則大明常懸而蔽障不能干何患有不假故曰宜照天下也非中則照不足遍天下非照天下不足以見大明此所以聖人相傳只一中字又繫日昃一段正發常中之精義蓋日有昃月有食者造化盈虛消息之運人與鬼神所不能違者也得其常中之理有不與之俱昃俱食者聖人制盈虛消息之妙用所以通變化而行鬼神者也此之謂尚大日東升西沈自人視之有中有昃不知此局于形骸方隅之見然也在東在西日之明原未嘗加損人心之明亦然可加損者非日中之明無加損者中天之明也得其無加損者而隨消息盈虛皆有常中之照矣當消則消當息則息就是常中家人王假有家通一家之明為明豐王假之通天下之明為明不得中憂不明之心亦蔽也能得中本無蔽也又何憂勿字宜字相呼俱有個著力處象曰雷電皆至豐君子以折獄致刑雷電皆至至極也皆至交相極致也即假之義雷電噬嗑雷為主明罰敕法以明來善動也雷電皆至豐離為主折獄致刑動必合于至明也極致謂致務到得刑之極當處即尚書制百姓于刑之中致制二字相通折獄以致刑方是明以動無時不惺惺無處不兢兢君子之雷電皆至折獄致刑也初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也配主為四當豐之時明動相資豐以二四為主然而位不相當必以離中為主方是照天下之日中故爻三言日中所蔽者蔽此中也所來者來此中也初剛在下雖非明主所應者四則動主也陰陽相匹曰配四本二之配主二不相遇初能遇之曰遇其配主遇則明動可合矣然初之明非日中也只是向進之明故雖旬無咎由此而往漸進于大所以往有尚即尚大也蓋十曰為旬雖是盈數然在初九猶是一月之上旬如月之上弦日之辰巳可以進于中故無咎若再過一旬是一月之下旬如月之下弦日之未申盈而昃矣所以曰過旬災也人之明何為雖旬凡用之于圖先者雖十分求精皆當用之明總未必中亦無害故雖旬無咎若用之于計後則全是謀利算效皆用于不當用取災必矣過旬之謂也三為過旬六二豐其蔀剖日中見斗往得疑疾有孚發若吉蔀蔽障也大其蔽障故日中而昏也象曰有孚發若信以發志也九三豐其沛日中見沫折其右肱無咎沛其蔽甚于蔀矣沫小星也象曰豐其沛不可大事也折其右肱終不可用也九四豐其蔀日中見斗遇其夷主吉夷等夷謂初九象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也二本離中然所應者非動主而應六五是雷電晦冥之日中而非光天之日中也故二三至四有豐蔀豐沛之象震為蕃鮮又撰巽蔀象也又撰兑沛象也大星為斗小星為沫見斗見沫因日光蔽斗沫俱可見總是以白日同于昏夜之象蔀雲也沛雨也公羊傳革棘曰沛韻㑹微晦曰沫皆通三四之蔽皆以二蔽之故其蔽雖同所以通蔽者則各一條路時位不同二五正應也能通五者畢竟在二但當其方蔽而往則必得疑與疾若能以誠信相通離多言信則中心相孚而障翳可開如發蔀而日可見其發也從自已中心有以發之故曰信以發志其道只是積誠信以為感動必五來二然後二往非輕往也三剛而不中一偏一曲之明殊非大中之明所以不可大事折其右肱則因其不可用而不敢輕于有為也故無咎折曲折之折人以右肱為用折右肱收斂退藏如書之用靜而不用作也然但可免咎豈善明善動之道故夫子曰終不可用只為見沫時之極暗一事不可為故有此象九四是震之主爻與離不相應所以亦為蔽日之蔀以位不相當也所見者斗全是幽暗中之見這如何成得動曰幽不明見其不可有動也然有初在下與四同德是夷主也遇初之明則動而吉矣曰吉行也遇初是以本心之明為動所以吉初遇四為配主四尊也四遇初為夷主初在二下下一等矣以其非離主特稱夷主夷平也下也能下則愈平矣六五來章有慶譽吉象曰六五之吉有慶也上六豐其屋蔀其家窺其户闃其無人三嵗不覿凶象曰豐其屋天際翔也窺其户闃其無人自藏也五柔居尊位雖非震主能來離中之主則為尚大之王矣所以有慶又有譽至美在離中為章但五不有以來之則二不往為含章之章五來之則為雷電合而章故明王不得明良之遇合不成美治事功不合本來之明德不成美業來章之謂也上六以柔暗居髙亢有以明自髙之象天下莫暗于自明之一念所以豐屋蔀家至于人不能見凶之甚矣這都是自侈自大從一念揚而不能下來致成此蔽故狀之曰天際翔也如此日趨日暗都是自起遮蔽故危曰自藏也自藏則何由有出頭所以至三嵗不覿不見離日也三嵗不見則終無向明之日矣隔三爻三嵗象豐屋之見正與照天下反若曉得尚大之見必通天下以為明何至自藏若此哉總豐大也人一生名譽要大事業要大富貴家計要大却不知尚大夫天下之大有大于一㸃天明者乎不尚這個大却尚外物之大不知這外物盡是蔽明之物所以都做了豐蔀豐沛豐屋遮天黑地若得本心之明一出頭大明中天這些蔽便片時消化如何纍得明所以從初要防過旬初無過想到底方不至自藏已私不生天理自常常光采日中之謂也這是天德王道一徹齊徹學問故云王假之旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉人有生來只有明德要終始故明人之象也豐明在內明以動則明體通于萬應矣旅明在外止于明則明之萬應歸于一止矣斯為至明旅取旅寓為義人必有個止止之至無定在者旅然必不可以無止者亦是旅故旅而得所止能于至無定中有個一定者可謂真止旅之止何在則明是也論人生境遇遷徙流轉倐忽變換何者可為定局然所以處之之道各有個定則在却分寸不可差人能遇一境明得一境時義便境境皆得其安止是止所不在境乃在吾心之明此真主也完得此明以之應感真是天地可為蘧廬造化可為託宿無地不是安居則旅者豈徒一逆旅之用已哉聖人之隨寓而安過而不留皆旅也天地間時義無大于此矣只是其道之亨却以小而亨小亨者用柔小而亨也蓋離之所貴全在柔中今離在外柔得中而順乎剛是以外用之明內順當止之理其能順者此柔小也艮在內止而麗乎明是以當止之剛上麗離明其所麗者此柔小也所以亨所以為旅貞無非小之用也曰旅貞見得非用小便無旅道詩稱文王緝熙敬止又云小心翼翼可見文王之止仁止孝皆小心中來小亨之義也由此看來旅之用小正是止其所止與知其所止極大時義故曰旅之時義大矣哉原來小亨處正是大處明在內為家人明在外為旅人乃知人一身無內外無家國無常暫只明是安身立命處也象曰山上有火旅君子以明慎用刑而不留獄慎刑如山不留如火山有定體火無定用故山上有大為旅象君子以明慎用刑止有一定也能使獄之不留明無遺照也獄有疑而未晰則必不免于留矣不留之義常中知變變中知常最妙于用刑最妙于處旅初六旅瑣瑣斯其所句取災象曰旅瑣瑣志窮災也六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦已傷矣以旅與下其義喪也以旅之時而與下之道如此義當喪也旅即豐之倒體無非以離中一柔為主初在下去五最逺即豐之上也惟其逺明所見愈卑愈細至于瑣瑣斯析也詩經斧以斯之瑣瑣之人自失安居斯其所也這必自取其咎曰取災志莫窮于瑣瑣窮不通也皆從始不明之故二得柔中止于三下即次之象與五相應懷其資之象能資二者五之明也初所順從得童僕之象旅以柔亨能即能懷自有童僕之得旅道之最貞又何尤然曰懷資但藉五之明為資耳未得如豐二之發志也三雖艮主然以剛用非旅小亨之義也且所應者亢極之上九上焚則三之次焚矣如此初與二皆不能從矣喪童僕之象此不知貞不知危者也故又警曰貞厲當以貞為厲也艮柔在下兩爻能得兩柔相與則明可麗三以剛道為旅以剛與下失其與矣故其義喪也晉重耳因從者多賢而復國魯昭公不能用子家而客死童僕之得喪于旅義大矣昭公之喪用剛不用柔之故也旅一卦所言要識其事小其義大九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也六五射雉一矢亡終以譽命雉文明之物離之象也象曰終以譽命上逮也上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也四亦剛體不能如二之即次不得中然以離體近五于處之象于行貌于處暫有所處也有明可處則資身以之利用以之可以得資斧然得者相近而得非中心自有之明故我心不快蓋明人所自有無須臾離得之則于心慊于居安但借資偶得而已于心豈能快乎四不得柔中之故曰未得位也六五離中一卦之主以其明知止之明也以其止至善之止也故稱射雉雉之為物其質則文明其性則安止雉分疆而居每疆有一長長雊衆雉方雊射之為言繹也各繹已之志也君子念念求文明之止射雉之義也曰一矢亡者何君子之射雉時時此射終日此射非曰一射而可遽得一得而遂可以無射者也若操一矢之見則先事期得去射義逺矣故惟去此一矢之見以無意必之心求明乃真明乃真止也如此則終以譽命矣譽者人心之所歸命者天命之所助蓋得中之明已得其止合一卦而麗其明則人人各得其止人歸天祐理所必致故曰上逮謂一人明而下得麗其明謂之上逮逮即及之意旅亨貞其道盡于六五本義一矢亡謂不無矢亡之費說亦徑直然不如前說味長上九剛而過亢與小亨之義正相反故象則鳥也無復文明巢則焚矣從何安止其義但有喪必無得先笑後號咷之象離中之明原可畜之牝牛亦可安之坦途易象只一念自亢便喪牛于易到底無開悟之路終莫之聞也不曰莫見而曰莫聞人雖不足于見能聞言而悟猶之可也惟莫之聞則耳目皆塞終無明之路矣羊喪其剛壯故無悔牛喪其順德故凶六爻言旅五不言旅到五已是通天下為家通天下為明非旅也即賁之文明以止人文也化成天下之明也旅之時大矣哉于此見其大一矢之義猶俗云一箭便中才有此見便害虛中之明一矢亡正是去此見明而無意必明斯真明矣總旅義只在柔順剛剛麗明故剛爻無吉者莊子曰仁義先王之蘧廬也可一宿而不可久處這便大差了境有遷改仁義無遷改止于仁義則無所往而非明矣如莊子之言正是焚巢之明豐多故二無應于外也能來章則故不足患矣旅親寡五無應于內也能射雉則親者自衆矣此豐之日中旅之時義巽小亨利有攸往利見大人巽入也陰為主故占為小亨以陰從陽故利有所往然必知所從乃得其正故曰利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人八純卦巽兑獨在後柔道也女道也巽兑撰離在中三女經天之事于斯而完橫圖八卦乾一兑二離三震四皆屬陽儀巽五坎六艮七坤八皆屬陰儀而震巽為陰陽交互之際震陽交陰也陰非陽不變故萬物以震雷而變巽陰交陽也陽非陰不化故萬物以巽風而化試看天地間物動而飛走植而夭喬其破胎出卵勾萌甲拆者震也其油油欣欣日長日進鼓舞而不知者皆巽為之長育也巽東南長養之風故天地之化物莫神于巽風聖人之化民莫神于巽命巽之為德有默移默感化物而不忤物之妙故巽為伏又有漸進漸深動物而物不覺之妙故巽為入又有從容和緩化成而無迹之妙故巽為順是以有長女方配得長男而成生生化化之功有巽之女道方助得男道而成陰陽變化之妙用故曰巽德之制也又曰巽以行權巽學與震相須並重不可相無者也卲子詩天向一中分造化妙處還從震巽分巽以兩剛得一柔來成巽非以剛而巽柔也乃剛以柔用而成其為巽也故論成卦則主在柔而論巽德之妙則主仍在剛第剛以柔而行耳所以巽有命令之象重巽便有申命之象君子以善入人剛以直遂行之不若柔以婉曲行之既命令之又從而申之皆柔道妙用也故巽以小亨九五一爻剛而中正巽之主也而所以行之者則以兩柔故曰剛巽乎中正而志行分明是出命之主以中正風民而用委曲之道以行之也初四兩柔成巽者也而所巽惟剛中故曰柔皆順乎剛分明所行之命無非中正是以也以此申命何往而不入所以利有攸往舉天下皆成中正之風莫不見五之剛中所以利見大人是巽之為巽只在兩柔善其行豈不是小亨剛中志行非另一個柔去行其剛也只是行之宛而順見其柔耳論語巽與之言言有時巽柔也所言之理仍是一定此為剛巽中正以中正之道巽入乎人也象曰隨相繼之義風巽君子以申命行事月令八風云風者何謂也風之為言萌也養物成功八風以象八卦巽風東南夏令之景風也景大也陽氣長養而大王者景風至則爵有德封有功隨風者前後接續如相隨然君子以隨風申命以巽德行長養之事事即所命之事也朱子曰申是反覆丁寧非有兩番降命觀月令知風便是天之命令放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之禹曰戒之用休董之用威勸之以九歌俾勿壞皆申命行事皆柔道為用初六進退利武人之貞象曰進退志疑也利武人之貞志治也九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也九三頻巽吝象曰頻巽之吝志窮也巽固是美德然畢竟先定個主宰其巽方無弊故得中則吉若一味巽必窮之道所以爻中兩戒其窮謂失中也若不巽之凶不必言矣初柔主巽者巽為進退進者進而從二退者以不果而退這都是從心疑二之見若能專一從剛如武人之專决剛果則貞矣震剛奇畫一而無二巽柔偶畫二而不一所以進退而疑疑則亂能從剛則仍歸于一而不亂所謂志治也與履卦取武人之象同義二以中巽五者也五出令之主尊而坐于牀上二巽之在牀下之象二申令之人貴在得五之中史掌記事巫司事神在五前後禮記王前巫而後史王中心無為也以守至正最能達五之志者二用史巫則能通五中正而以之風天下矣故吉並舉史巫者雜離為史雜兑為巫紛若者史巫之言雖紛然無所不用也夫巽于五則所巽惟中正用史巫則其巽又委曲而得柔道之用二最得巽中者也象故云得中史巫指四九三則非中矣謂之頻者其巽也有急迫而無從容和緩之象近躁之故吝道也以此為巽巽道之窮蓋巽可隨而不可頻有巽入之心而急急入之便是頻此皆從中心不得中正來故曰志窮也三不應五有此象六四悔亡田獲三品一為乾豆一為賔客一以充庖象曰田獲三品有功也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉先庚三日丁也後庚三日癸也丁所以丁寧于其變之前癸所以揆度于其變之後如是則吉也象曰九五之吉位正中也上無巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也六四上巽之主與初同德而爻辭不同者初去五逺故有疑四之從五近故無疑無疑則悔亡巽功成于用柔故四有功三品者有巽初之柔則進而離明此柔也再進而兑說此柔也四却好撰離撰兑其功一成則三女之道皆成獲三品之象田字本義作田獵若作土田亦好三品上中下三等也五出命大人以剛中正風天下者故貞而吉又悔亡又無不利巽德至五而滿故終物之功六庚之用皆係于此震生物有始巽不能如震之有始巽齊物有終由此而兑有終震却得巽而有終蓋物有生便有始非長養而成變化不能終其始巽萬物之所潔齊也雖齊却各一其生謂之潔所以無初有終十干六甲主生震六庚主變化故庚者更也有甲以生之無庚以變化之便非造化全局九五巽德完滿則六庚完滿而周天之運全矣吉曰先曰後重巽之象蓋甲有先三日後三日之事則庚亦有先三日後三日之事無非所以終震之事也故蠱之六甲則曰終則有始巽之六庚則曰無初有終其義交發上九居五之上而無五之位則亦巽在牀下者也二巽在牀下能下四柔故能用史巫而得五之中上九亢而居髙不能下取四則不能得五之中矣何以取資何以利用喪資斧之象以其巽豈不貞乎以其喪則終于凶也巽牀下不是病病在喪資斧以不用柔小之故所以巽不能行而至于窮曰上窮也總天地間四時變化只是一個風故萬物以風化人速于變化只有一個巽學以巽入則德日變日化矣政以巽行則治日變日化矣然而有制只中正便是此所謂庚也有善其事于變之前者是先庚有善其事于變之後者是後庚時時巽則時時有庚矣所以從先要專决不要疑中間要歸一不要頻到底要能斷不要喪如此何患無成功成功則巽德變化即乾道之變化矣巽德之制也以剛中為制巽以行權以剛中審權周易像象述卷七

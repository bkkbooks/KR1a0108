body:
  text: 周易像象述卷一明吳桂森撰乾元亨利貞乾者健也陽之性也元大也亨通也利宜也貞正而固也易有太極極一而已一而兩兩而四而八而六十四要知六十四不出乎八也八不出兩也兩不出一也以其畫而竒也象一謂之乾畫而耦也象兩謂之坤其實竒耦無二畫乾坤無兩體耦者竒之分乾者坤之主也故曰闢戶謂之乾闔戶謂之坤闔闢兩也而戶惟一知此則知乾之為乾非專指六畫純陽象其為乾凡爻中一百九十二陽皆乾也豈惟陽爻為乾凡三百八十四爻皆乾也全易所言無非乾之變化也明乎此義然後可以觀乾卦易無始何從說起從動而陽處說起曰乾乾不可名有四樣德可名曰元亨利貞四德不可見其生物處可見觀一物可以知天地所以看四德須就物上看方得分曉凡物何由生有個始其生者這是乾之元一生自㑹長育成就此所謂亨然生一物自有一物之宜如宜動宜靜宜陽宜隂有宜便有用此所謂利自有生後到底完完全全不失這生理此所謂貞其亨也利也貞也自一有生時已完足此理所以元為大始然畢竟到得貞方才利者利亨者亨則元為圓滿所以貞為終其始周子曰元亨誠之通利貞誠之復一部易皆為利貞二字而說卦皆有利貞字論四德大而亘宇宙小而一事物無不該貫非言說可盡如諸儒一向相沿配春夏秋冬看頗為易明然只說得流行之四德還要看其全體就四時言之合春夏秋冬總一元氣也其循環流行不已者亨也春生夏長秋斂冬成利也時春時夏時秋時冬不失其正則貞也其有元則有亨天道之自然惟夫元亨同而利未必利貞未必貞則因終之不同而始之同者亦失本然矣即如四時之序豈非天運自然而儘有春行秋令冬夏反常者則元亨而不利貞之故也聖人於此處看得非有體乾者以克盡其道不能貞得乾元此易所以作而獨歸其責于人中庸曰誠者天之道言元亨也誠之者人之道言利貞也四德易之入門須認得真切味下文彖傳與文言其義自見觀繫辭雷動章六子藏于坤皆乾以君之也又觀乾父章有父然後有母然後生男女則元字之義明矣觀出震齊巽章八卦流行無息則亨字之義明矣觀神妙萬物章八卦各妙萬物則利字之義明矣觀天地定位章八卦相錯至紛雜也而一定之體不改則貞字之義明矣初九潛龍勿用九二見龍在田利見大人剛健中正澤及於物物所利見九三君子終日乾乾夕惕若厲無咎九四或躍在淵無咎淵者上空下洞深昧不測之所九五飛龍在天利見大人上九亢龍有悔亢者過于上而不能下之意也爻也者效天下之動者也乾六爻取象於龍者震為龍象乾之動也天有雲雨非龍不施行聖人有雲雨非動不見六爻各一其時各一其動故六龍各有其變化各有其雲雨不以潛而為無不以飛而後有六樣一般是聖人神功妙用當其潛則潛勿用便是潛龍之神通見龍則已出於潛而見於世矣聖人之不在高位而德足以用世者也見龍之雲雨滴滴㸃㸃可以生養一世利濟民生故曰在田田斯民待以生者也見龍聖人出世天下都曉得有中正之德可法可則所以利見大人謂九二大人天下所利見也九三言君子就人身上說龍德凡物屬陽者晝動夜息屬隂者夜動晝息惟龍德剛健晝夜無息君子終日乾乾又夕惕若方是真龍德又何咎若字可味無惕而無乎不惕也到四在外卦已是出而為世用了謂之躍躍字正對潛字此時謂之潛已非可潛謂之飛尚未得飛所以躍而曰或正是兩在不測之境須要先立於空虛不測之地惟淵者既空又洞靜深之極可飛可潛不得而囿故躍必於淵聖人用世不有個淵深不測之所為藏身之密者如何得進退上下惟其變化而無礙所以說惟天下至誠淵淵其淵有淵淵方有時出此龍之躍必在淵也在淵之意要深玩九五則飛矣飛龍雲雨能使物物普被天之所覆無有不利聖人在位直使盡天下人各得其所無不覆幬於聖人之天此之謂在天也舉天下在聖人之天則舉天下利見此大人矣在田在淵在天三在字重看至於上則龍而亢矣以龍德言何至有亢其亢者時為之也時值其亢愆隂愆陽皆謂之亢龍不能違聖人值其亢聖人亦不能違所以不免有悔然雖悔也惟聖人善憂其悔憂悔吝者存乎介故時雖亢也惟聖人不窮於亢至於亢而不害其為龍然後見變化之神而聖人功用為極妙故以此為乾道之終總而觀之位雖六樣然在上位者以飛龍為極則在下位者以見龍為極則有一聖人在下可以使人皆識所趨向開得天下之眼此利見二之大人也有一聖人在上可以使人皆得所依歸滿得天下之望此利見五之大人也乾始利天下無利於此矣本義中五利見二二利見五是餘意不必泥凡易中所言利皆如此非為一身一己言利用九見羣龍無首吉百九十二陽爻之通例也剛而能柔吉之道也六龍分明有六樣變化雖然是六樣變化都只是一樣龍其潛見惕躍飛亢時至則然惟其所用可以一身備六樣變化亦可以一身各成一變化總定不得何者可用何者不可用故曰用九見羣龍無首首者定一尊之謂若有首見便是主於一主于一則是一龍之用非羣龍之用也而龍非變化之龍矣惟見羣龍則可潛可見可愓可躍可飛可亢臚列條分惟吾所用惟見無首則隱見一機出處一時渾無轍跡皆成妙用自古大聖或君或相或師或用世或出世總非先有定局此所謂化裁之變推行之通也故繫之曰吉總六龍皆無首見則吉也用九用剛也剛戒為天下先故要去首見無首便剛不以剛用成變化之門矣用九之妙何如曰毋意毋必毋固毋我彖曰大哉乾元萬物資始乃統天釋元義也元大也始也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之終始故曰統天雲行雨施品物流形釋乾之亨也大明終始六位時成時乘六龍以御天始即元也終謂貞也不終則無始不貞則無以為元也乾道變化各正性命保合太和乃利貞釋利貞之義也各正者得于有生之初保合者全于已生之後首出庶物萬國咸寧蓋嘗統而論之元者物之始生亨者物之暢茂利則向于實也貞則實之成也實之既成則其根蒂脫落可復種而生矣此四德之所以循環而無端也然而四者之間生氣流行初無間斷此元之所以包四德而統天也乾元一彖聖人把三才一源處從頭說出識乾元方知人與天地是一個何為乾元即本彖性命二字也乾元非是萬物未生前先有一個元以資其生也試看有生以來形形色色何止萬萬其生萬萬其情物物各具一性命而性命何曽有兩樣是知萬者皆從一而出也一者元也即以易理觀理只一個理有一便生兩生四生八八又生六十四生三百八十四以至萬有一千五百二十何者不統於一則一其起頭也統宗也全體也故贊曰大哉乾元而謂之萬物資始細看來天壤間雖一蠕一動一草一木遡其由來必有自始何者不從乾道一始中造端無乾元則性命根宗何自來所以曰資始資有二義以其出有源則資本也以其出無窮則資藉也如此說來天還是一物必竟屬陽屬氣就有物可名少不得資始於乾元故曰乃統天統天則無不統可知矣乾之始是性命之自始所謂元也人試自思形氣本於天地何為吾之統天者則乾元睹矣物雖同一資始然萬萬其生者萬萬其理一物一則如品之有定者然只看天壤間變變化化一樣一樣流行出來流者如水之從源流出形者如物之自內形外形只是現出來未到成形也禮風霆流形正此二字這孰流形之乾之施行也故云雲行雨施品物流形言雲雨者物之變化不外二氣絪緼感而為雲和而為雨皆乾之所為也生意所動即謂之雲雨這個流形皆乾元自然之呈現性命之自流形所為亨也此以上彖明元亨兩字乾所以始萬物者如此然既有始須要終其始如何得終其始大明方得終其始何為大明即本彖各正二字也既是品物流形則各一其品便各一其性情所謂一本而萬殊也然萬殊中物物具一乾元必乾元如此以始之還得如此以終之不但一物有終必物物各能有終方得言大明人試細看即含靈一物莫不有個自條自理的知覺無情木石也有個不移不易的物性剛柔異質五氣異用有始來何嘗不分明後來豈能盡完其始即人自體驗天明一竅何嘗不從頭炯炯只是後來豈能到底如初所以大明方謂之終始明不明之介正是利貞不利貞緊關聖人一口道破蓋只說個始萬物同源有何分别說到終其始則一本者萬殊直到萬殊者同歸一本方是完成如此則天地不得尸其功而唯體乾聖人有全能矣下正言其事也如何方得大明只為這乾道一流形出來便有三便有兩三者三才之道也有一物必有上中下三等有一事必有始中終三候兩者體用之道也內外上下動靜本末兼三才而兩之所以等其大約有六樣位當其位行其事便有六樣時這是天然品則故曰六位時成有一個位自有一個當動道理此動乾動也龍也雲行雨施者也因其時乘其位此之謂時乘六龍六龍乘則純是天道周流把一個天隨我運動團團旋轉故曰御天車之運行御者司之天之運行惟我司之是以我御天也御得天何所不利皆性命之美利所謂利也六位就是乾道六樣變化時乘六龍則豈惟六樣直有千變萬化皆是乾道矣如此才是開物成務己性盡人性盡物性盡各正性命也却不完完全全一個乾元本體太和元氣方才保合而無歉所謂貞也太和字狀性命妙處此段彖明了利貞二字元與亨是一事故只提一元字利貞是一事故總結曰乃利貞惟四德完全才是乾德叫得首出庶物才有了首成始成終萬國咸寧矣說到首出天地無權惟人自為之出故御天人御之也統天亦人統之也人豈徒與天地竝而為三合天道地道方為人道耳論凡與聖資始處是同流形處是同其不同是大明處不同也明之本來亦何嘗不同所以明其明者人事則大不同只為有生以來把這天明一日抹殺一日所以永無首出之期若得大明中天則乾道變化一齊凑手是以後天圖推離明居乾位明便是人之天也所以統天者在此四聖作易無非要提出人這㸃乾知故曰乾以易知非此明無性命亦無學大學首明明德易上下經終離卦終事始事只此一事而已體用皆乾大明終始也統天御天一篇中兩大關鍵統得天人原是三才統體之人御得天人方是兼體天地之人乾道變化都是太和元氣流行宇宙間一物失和如何貞得乾元故保合太和乃利貞保無失也合無虧也乾彖該一部全易乾元曰統天便是八物兼舉動靜相生隂陽來往便是雲行雨施成象成爻雷風水火山澤一一發現是為品物流形西北一下大明中天萬物相見是為大明終始震為龍變化之始自出震而成艮是為乘龍御天一卦六樣變化八卦六十四變化以至每卦六十四變是乾道變化總完得一個乾元是為保合太和乾為首乾字到手便是首出庶物象曰天行健君子以自强不息象首像也要人去像這象乾為天只看天行健這乾德便分明可見所以天為乾象人若一息不行健如何像得天象故君子以自强不息以字全是自家著力自强不息君子之乾德也便成天象六十四皆要成象自字要認一日不自强天行息於一日一時不自强天行息於一時終身不自强其人雖存天道已息矣故君子時習潛龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也造猶作也亢龍有悔盈不可久也用九天德不可為首也陽剛不可為物先初曰陽在下也人知陽升而在上發生萬物其功用大不知斂而在下原有生生功用天地生機不有蟄藏如何得有發育龍德時潛正是在下功用其位然也在下與在田在淵在天同一分量二為見龍雖未居天位其德已足以被及一世故曰德施普也三曰反復道即復卦之復剛反之反蓋天行所以不息只為有往有復自春而冬冬則復春若往而不反如何得復要復必須反人所難是一反不反無復便都有間斷工夫且不克終日何况終夜都是有纍心體君子朝乾乾又夕惕是時時反則乾體時時復此之謂天行健有反有復方得貞下起元至日有復所以年年不息朝夕有復所以日日不息九三下乾之終所以要在此際反而復躍龍曰進者德業俱在此時進故進則無咎飛龍德位時兼至天地民物皆在天德造就中上可以造天下可以造地有聖人天地自成一開闢氣象中可以造人謂之大人造上九時位巳極極則盈聖人德業亦居其盈惟知盈不可久所以有悔悔則天地盈虛與時消息者必有道存焉而所謂窮則變變則通者聖人之妙用於此出矣六龍之用皆天德也缺一龍之變化非天德執一龍之用亦非天德惟天德不可為首故用九當以無首為見也有首則定于一非天德矣程子以六龍擬帝舜帝真時乘六龍者也然六龍有分而各一時者有六龍竝用於一時者惟唐虞時六龍竝出巢許之隱潛龍也臯䕫稷契或見或惕也舜飛則堯亢而禹躍禹飛則舜亢而益躍此純乾極盛之世也方成太和若六龍各以時出如泰伯能潛文王孔子能見能惕湯武能躍能飛伊尹於太甲周公於成王能亢以一龍御天下者也要知聖人其一各用時未有不備六龍之德者學聖人者勿問用且問德洗心退藏能潛乎形著動變能見乎戒謹恐懼能惕乎溥博淵泉有淵乎中和位育能飛乎窮則變變則通能亢乎不然能大能小能有能無龍之變化則然而人猶未能也如龍德何文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也幹木之身而枝葉所依以立者也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞非君子之至健無以行此首假直指出乾元曰仁是也仁者以天地萬物為一體仁是乾元真面目禮義事皆仁也蓋乾元資始是萬理統宗豈不是萬善一個頭所謂善之長也君長之長惟其萬善之始元一出頭衆美自然㑹合來所謂亨者嘉之㑹也相耦曰嘉只看二而四而八而六十四那一件不是至美之德都向乾元中流出豈不亨然這㑹合來的嘉美那一件不是利物的物物有則物物各得其宜何等利就其各得所宜言之義之分辨甚析然總合於天理之自然何等和所謂利者義之和也然這嘉之㑹義之和不是空虛但有理實實有其事必事事得正都合乾元則叫做貞所謂貞者事之幹也幹是木之本元是萬事之本不貞得元如木有枝葉無本幹所以貞方是立了幹也四德總是一元所以乾元君子只有一個體仁仁便是生生之理萬善源頭體仁者直以天地民物為一體如此君子一身便是天地民物命脉豈不足以長人體得仁流形出來都是嘉㑹三千三百枝分脉貫自然吻合豈不足以合禮時而措之都合天理宜人情物物各當無非精義妙用豈不足以和義這等君子之行事件件得正仁體完固所云保合太和此也豈不足以幹事這叫做乾道行此四德故也然雖云四德其實禮義不在仁之外所謂事則無非體仁之事也故本文先提體仁二字在前禮義事三字皆放在下面然後曰合禮仁合之曰和義仁和之曰幹事仁是幹也四德原是一其下語一一分明或以貞屬智或以屬信皆不妥初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也龍德聖人之德也乾卦六爻皆以聖人明之有隱顯而無淺深也潛龍不易乎世不以宇宙之大易其一己也這已破了世局故能遁世而無悶不成乎名獨知獨信一㸃光輝不露也這已斷了名根故能不見是而無悶樂則行之心之所樂則行從吾所好是也憂則違之苟非心之所適則違而去之危不入亂不居非禮不進是也其行其違全在心上看以樂行為出憂違為藏者固非又說憂如禹稷之憂樂如顔子之樂亦未融其必行必違則確乎一定而不可拔所以不可拔有個根抵在所性根心故也此非人之所可知只自已可知故無悶不拔正是潛的時中管寧曰潛龍以勿用為憂泰伯三以天下讓不易乎世也民無得而稱不成乎名也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也正中不潛而未躍之時也見龍曰正中天下只有庸德是正中若不庸則不正不中便都是邪間了邪就是誠存得誠自然無邪無兩層工夫總只是一個中庸如此言行皆可為世所法則故足以善世擬言行即所以成變化故德博而化夫維皇建極不過得中所以龍德在中是為君德乾以君之人皆有君德猶言德之君也不必君天下而後為君本義以不潛未躍言中極妙惟可潛可躍而非潛非躍乃見時中潛龍遁世見龍善世君子所性隨處充滿無少缺缺遁世減不得毫釐如何悶善世加不得毫釐如何伐九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣雖有忠信之心然非修辭立誠則無以居之九三說進修工夫至精至細忠信者一念不欺是誠意工夫透得欺慊關自然上達不已故進德以之修辭立誠者言為心聲言滲漏即是心滲漏辭上立誠是誠立于心也此正修工夫故居業以之業曰修又曰居如治屋者修而後居之也知至知終是致知工夫何謂知至是德之至處至之是到了至處大學之止至善也何謂知終是德之全體終之是完了全體大學之一止衆止也如止仁止孝等譬之射至之是正中紅心終之則百發百中知至至之則心體得止定靜安慮中豈不能先幾而照故可與幾幾者動之微吉之先見者也知終終之則心體緝熙感而遂通豈不能時措之皆宜故可與存義義曰存者道義之門出於成性存存惟能存所以能應也可與幾則靜而含動存義則動而常靜動靜一致無非乾惕流行則在上在下而不驕不憂德所以日進業所以日富也故無咎內卦體也屬德屬知至屬下位外卦用也屬業屬知終屬上位然內外總一體故德業等亦無兩事也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離去聲羣也君子進德修業欲及時也故無咎內卦以德學言外卦以時位言進德修業九三備矣此則欲其及時而進也躍龍無定位無專主故曰無常曰無恆上下有正位無常便似不正而邪物以羣分上下之羣不可亂無恆便似離了羣類即羣龍不知君子豈是無常無恆蓋時不可常不可恆惟從時耳力在一及字乾內三爻說聖人心體一言以蔽之曰因時而惕外三爻說聖人作用一言以蔽之曰欲及時九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也作起也飛龍通天地萬物為一身能覆物能載物能成物故聲應氣求極感召之神謂之在天不獨聖人在天舉一世人物俱登天何也物莫不有天皆與聖人同天但聖人未作有天不開雖有目而不覩故不相應求不從不親聖人一作則普天同朗萬物在其間者同耀光天便是另開一個世界各得其天故百世之下聞者興起而况親炙之者乎此萬物覩也聖人與我同類故覩聖人天德者親於上如賢賢親親覩聖人地德者親於下樂樂利利各從其類親上者萬物育於上親下者萬物育於下此之謂利見上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也賢人在下位而無輔者以地則亢而過髙以時則亢而極盈在下位者雖有同心同德之賢不得分其猷任其責共其事故謂之無輔言不可得而輔此時聖人如之何憂悔吝者存乎介正不正之介不可爽針芒惟聖人極深研幾知若何以善其動而不失正是以動而有悔也動而悔是到底一團乾惕之心潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也此假言六位之時不同以發明勿用在田等字之義陽本上行潛龍一下如天道之下濟非龍德如何能下其下處正是當勿用而勿用也見龍曰時舍舍者安而居之人要出而有為須先有個安身之處庸德庸言正是只做自家本等因時安止此所以為在田也君子進修實實有事君子乾德真要見諸行事所以朝乾夕惕所行何事潛有潛的事見有見的事非無事而空為此兢惕也四則出而躍矣曰自試何以自試試其可飛不可飛也這須立於進退兩虛之境所以必在淵也飛曰上治居上位而司治世之事畢竟有所以上治者非在天不足以當也上九曰窮乃時之窮這是天災非人所得免所以聖人不能不悔也時雖六樣六樣是乾道自然變化惟乾元用九隨時而用則物物各正各正天下治也故用九吉冠以乾元二字者六樣時用不同無非一元生氣流行也潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革離下而上變革之時飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則此假言聖人乘時妙用以發明利見無咎等字之義陽氣有收斂然後有發育潛正是收斂深固處神龍一潛莫測其所在聖人一潛亦莫測其所在一毫聲臭不露故不繫無咎利見莫得而見也見龍出世以先知覺後知舉一世而光輝之本義雖不在上位然天下已被其化天下成文明之世詩曰為龍為光是也所以天下利見與時偕行者時行物生天行不已君子乾乾正與時俱不已又何咎乾道乃革者乾道時時變革君子進德修業變易從時唯恐不及則隨時有革皆乾道自然又何咎九五雲龍風虎聖作物覩這豈是人能全是天德惟天德可以陶冶一世有飛龍聖人才證了天德分量這叫做登了天德之位曰位乎天德比人君天位更超一層故有位天德而又居天位者堯舜也然於此德不加些子有位天德而不居天位者仲尼也其於此德不減些子然為天下利見之大人則一也上九所處者是絶頂一條路亢龍所行亦是絶頂一路事時之既極聖人不得不與之偕極所以悔也亢龍之德非不與飛龍同只是世所不恆見亦不宜見故不繫利見無咎等辭這六件時潛時明時行時革時位時極都是自然天則惟先無首見天則一一隨時可見乾元用九惟其不主一見所以天則時時見曰乃見天則乾元用九曰天下治潛龍勿用何以治得天下觀荆蠻一逃而詩頌之曰載篤之慶載錫之光則八百周基泰伯所開也潛龍之雲雨覩矣又曰乃見天則亢龍有悔何以見其天則觀東山一避而詩咏之曰狼跋其胡載㚄其尾則破斧之征災悔何如然周公不能自已也亢龍之天則覩矣乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也旁通猶言曲盡易所以順性命大哉乾元一彖明性命也然謂之曰各正性命則有性命而失正者矣天下豈有不正之性命皆因不知性中之情都在用情處錯了故此條專發性情二字以明利貞之義蓋人必有始然後好說有終然必有終然後方得有始乾元始也始而必亨者也謂之曰始而亨可見離了元始更無處尋有終之道然則何以有終只利貞便是有終何為利貞只這個乾始之性情便極利貞故曰利貞者性情也蓋惟元初來性情本是利貞然必得其利貞則情方是性情故利貞者乾始之性情也不利不貞非乾始之性情矣惟以性情言利故乾始之利其利至美利盡天下而不可名言蓋乾始善之元也仁也嘉于此㑹義于此和事于此幹豈不是至美之利利豈不大矣哉只看二五兩爻利見大人其利天下何可勝言然則如何樣情方得為性情只看乾之剛健中正純粹精便曉得性情至剛是不屈至健是不息中是不倚正是不邪又不二又不雜而極純與粹其純粹者又微妙而至精這是人有始來自具之乾德發而為情天成之妙用此所謂性情其用處時位不同故有六爻發揮之如不拔也存誠也忠信也進修也不失正也無非曲暢旁通此情使同歸於利貞焉情通則俱是美利利天下施而雨行而雲人人正性命保太和天下所以平也蓋情而性則好惡皆得平而天下之情無不平矣此之謂終始此之謂利貞人生而靜天之性也性命也感于物而動性之欲也性情也中庸喜怒哀樂情也未發性也發而中節性情也人能性其情則天地清寧四時順序民無夭札物無疵癘美利孰加焉情而不性程伊川云性其情情其性則侵薄隂陽舛逆五氣至於夏霜冬雷人物顛倒皆情不正所致也不利孰大焉故聖人之情必以乾之剛健中正純粹精為情喜怒哀樂一一效天之動非乾始之動不動隨時變化六龍時乘通此情也三百八十四爻皆通此情也故曰爻彖以情言惟情出於乾始則情歸於性利貞得其利貞斯元亨不失元亨矣人於喜怒哀樂細體驗之真是剛健等七德俱備乾元全體在人試看四者有觸即發發不及持死生利害所不能奪何等剛健可喜則喜喜必有則怒與哀樂皆然何等中正一念之發如是萬念如是終身如是何等純粹大感大應小感小應衡量不爽分毫何等樣精但人自失其正耳這情性到得旁通處一人性其情天下人無不性其情豈不是雲行雨施天下平所謂乃利貞文言首假重元字此假重貞字相為首尾之辭君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也行俱去聲君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也日可見之行君子之德日日可以行雲施雨惟時當其潛雲雨之功化不可見于天下謂之未成是以弗用乃君子必不出而為天下用也不用之權仍君子自主之行而為世法方成得行禮記人情者聖王之田也修禮以耕之陳義以種之講學以耨之本仁以聚之播樂以安之與在田之義通張橫渠日心大則百物皆通故學問須寬以居之九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎因而重之爻在其中故三四皆曰重剛重剛疑剛過而有咎非惕非疑不能補其過三雖不天不田猶有在者也四則不天不田又或天或田無在無不在不得以人位定之故又曰不在人疑之者何疑也疑與初之潛體有異也苟其躍而視不可拔者稍移易是變塞也疑正是擬議變化精義入神處如舜河南之避疑也若無這疑縱是天下歸心亦無異居堯之宫逼堯之子河南一去而天下歸天命人心一時凑合此所謂及時也重剛句明其位之難處夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先去聲天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎天地鬼神本無二理特蔽於有我之私是以牿於形體而不能相通大人無私以道為體曽何彼此先後之可言哉夫人本至大頭圓趾方分明天地之體開眼見明分日月之照陽舒隂慘備四時之氣喜善惡惡司鬼神之禍福只是人形骸為囿都自小了一念顛倒有天地易位而不知者終身迷謬有白日而自同長夜者發念乖戾無異春夏之氷霜而秋冬之雷電好惡舛錯如魑魅魍魎之現形如此何能合德合明合序合吉凶大人不能出人類而自大能無失其大故人即天天即人先天弗違人即可主宰乎天後天奉時天必有待承奉於人天豈能違之鬼神又豈能違之此之謂統天中著况於人乎非空語也正發明利見大人句反剔文法先天後天皆聖人事也雖然一言之善可以感熒惑七日之修可以枯祥桑則人皆有可以先天者不可不知亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其唯聖人乎知進不知退是但有進而無退此所以謂之亢存亡得喪義同不知此正是聖人進退不測之神也何也時為之也處亢時行亢事不如此便不謂之正蓋惟聖人極深研幾精義到入神處方曉得進而不退之中有個進退適合之妙所謂旁行不流是也行人之所不能行為人之所不敢為只為見得至正道理當如此故曰知進退存亡而不失其正然謂之不失其際難言矣非成變化而行鬼神何足語此故曰其唯聖人乎如桐宫負扆之事伊周此時只知進不知退若有知退一念天下事不可為矣然陳一德志明農聖人何嘗不知退當其亢時則不可退然後知二聖之行事不失正也到亢而不失正然後可言性命各正利貞終乾始此正而已故乾卦以不失正要終總四聖相傳心法盡一乾卦乾元資始提出仁字是源頭所以體此仁者在性情只從仁字認性情則知人終日應用那一件不是乾元流行所以論工夫自一言一行與夫存誠也主忠信也愈切愈近無非以體此仁論功化通極於天地日月四時鬼神以至萬有含生極逺極大無非以通此情這體本自昭朗何待刮磨此謂大明本自不息何待聨屬此謂行健至於乾乾惕若則終日終夜純是仁體即純是乾元所謂保合太和此也中庸一書節節根此發揮千年而下識仁主敬之說是一脉真傳後儒於此處未見親切輒自立宗門幾混入異端曲學實於易㫖未有窺也坤元亨利牝馬之貞君子有攸往先迷後得主句利西南得朋東北喪朋安貞吉坤者順也隂之性也安順之為也貞健之守也乾坤為易之門六畫陽為乾陽爻一百九十二皆乾也六畫隂為坤隂爻一百九十二皆坤也然暢統隂隂不過承陽故陽以全用隂以半用六隂命曰坤坤順也所以順乾也只一順字盡坤卦之義然坤以承乾無坤亦不成其為乾何以言之陽闢隂闔無闔則亦無闢可言矣陽先隂後無後則亦無先可見矣故繫辭云乾坤合德而剛柔有體惟其體不同所以兩者相為對待惟其德本合所以流行處原自合一故坤有元亦即是乾之元坤有亨利貞亦即是乾之亨利貞但乾無所不統必物物各正乃為乾之貞坤惟一於承乾能順乾乃為坤之貞故取象於牝馬牝馬行地與牡馬同而又一於從牡最得坤之順者牧馬之法一牡十牝牡之所至則牝亦至其餘獸類多牝猛於牡先迷以下則詳言坤所以順乾之義先迷後得主坤不可先乾以後為順也西南得朋在隂方則得朋為順東北喪朋在陽方則喪朋為順皆以乾為主也皆牝馬之貞也能安其貞則吉論乾體直頭無不利惟坤便有利可言有利於此則有不利于彼矣所以乾坤一交六子有各樣性情便有個相得不相得一部易皆從此起大約為柔爻難得利貞也直到剛柔無不利則坤貞而即乾貞矣彖曰至哉坤元萬物資生乃順承天首言元也至極也始者氣之始生者形之始坤厚載物德合無疆含𢎞光大品物咸亨言亨也牝馬地類行地無疆柔順利貞君子攸行言利貞也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶陽大隂小陽得兼隂隂不得兼陽故坤之德常减於乾之半也安貞之吉應地無疆坤純隂隂主成乾之所始皆坤成之乾元無所不統則坤元無所不至故稱至哉乾元於萬物只資得始其所以受形受象生成之功則皆資之於坤元故曰萬物資生其生也原是乾始之生坤順以承之故曰乃順承天如此看來萬物非乾不發育非坤不翕受乾之生生化化皆坤中一槩承載資始資生豈不合而竝大故曰坤厚載物德合無疆只看四時之氣其流行來往孰非自坤中一升一降百昌之育其生長收藏孰非自坤中變之化之真是坤德之厚包含萬象無不孕藏天道都以地道而含蓄謂之含𢎞其條條理理又不見而自章天道因得地道而光顯謂之光大品物流形于乾到含𢎞光大形形色色實落充塞兩間故曰品物咸亨咸皆也言一齊皆亨也此上明坤之元亨皆以順乾而元亨如何得利貞只是柔順到底乃坤之利貞牝馬柔順之極所以從牡馬而行地無疆人之柔順亦如牝馬之行地本義順而健妙則又安往而不利安往而不得正者故彖曰君子利有攸往柔順乃無不利也柔順句正與乾大明句相對乾何以利貞大明終始則利貞坤何以利貞柔順攸行則利貞乾以易知故言明坤以簡能故言行乾本大明只怕人不明所以能終始其明為乾之貞坤本柔順只怕人不順所以能柔順攸行為坤之貞兩卦相互發合觀義自曉然如何可以言大明終始時乘六龍以御天則大明終始矣如何可以言柔順利貞不先而後得朋喪朋則柔順利貞矣坤承天則乾為坤之主豈可以先乾所以先則迷而失道後則順而得常後天圗西南三女所居皆坤之明同類相從順也則以得朋為利東北三男所居坤所宜從舍類從陽順也則以喪朋為利蓋在隂方而與類行相率以順陽也往陽方而離其類專一以從陽也當喪而喪喪處正是得處故曰乃終有慶此皆坤之貞也安貞者宜後則安乎後之貞宜得則安乎得之貞宜喪則安乎喪之貞坤之道全在靜安貞正是應乎地之靜所以吉應地無疆與乾之乘龍御天相對御天應地才是三才合一有資始而無資生則資始虛言也有六龍之時乘而無牝馬之攸行則乘龍亦虛言也乾知始坤作成故人舉念便是乾措躬便是坤無須臾離乾坤不相離雖堯舜之聖無時不有乾道無時不有坤道闢門廣聽即是乾舍己從人即是坤故曰成象之謂乾效法之謂坤乾坤全具在一身人自不知體乾坤耳卲子曰一身還有一乾坤見之真矣象曰地勢坤君子以厚德載物天曰行地曰勢者如勢力之勢蓋天以動而行於地外地以靜而順於天中若不是博厚氣力凝結不動如何承受得天來所以看地德要從勢上看惟其勢積之極厚所以含𢎞光大無一物不載君子若無一假積厚氣力載得萬物是少了坤德也地載物順萬物而無私厚薄君子載物順萬情而無偏好惡行是動之力勢是靜之力初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也魏志作初六履霜今當從之馴順習也堅氷曰至氷而堅又堅之至也坤六爻一一要照著乾來看乾言雲雨陽和之氣坤言氷霜嚴凝之氣承陽和之時其順之為易承嚴凝之時其順之為難坤初爻順之首須要從難順處順起故言履霜霜而曰履實實要在踐履上承受這個霜步步身經歷過也履得霜則由此而氷氷而堅天地之氣愈嚴凝而極至吾之操履愈凛冽而與之俱極其至至字宜另為句觀小象及文言可見此為堅氷至也詣極雖在堅氷時能順與否則在履霜時定矣故小象曰隂始凝又曰馴致其道隂德妙在于凝有凝結凝定二義不能凝如何承得霜氷來所以要從始凝方得至曰馴致不過凝之極也人生天地間邪世不能亂富貴不能淫威武不能屈只為有氷霜之履在人不能履氷霜而能為雲雨者無之尹吉甫聽後妻之言逐其子伯竒伯竒乃作履霜操投河而死古人履霜之義如此六二直方大不習無不利柔順正固坤之直也賦形有定坤之方也德合無疆坤之大也象曰六二之動直以方也不習無不利地道光也六二坤之動以乾動為動者也夫乾其動也直故六二之動亦直有不直便有回邪倚側上下四旁如何得一直則蕩蕩平平均齊整一其德自方直而方乃與乾配得來而同其大曰直方大直方大自然無不利若這直方大要加一分人力雖無不利也要習惟二之動只順了乾自如此何待你思勉得來故又曰不習無不利學問最貴者是習然所習者是本來之性體則猶然不習而利者也直方大正是坤德自然體假不見而章底故曰地道光也坤中多言光蓋乾道變化皆從坤中顯出來此地之光也不習所謂坤以簡能光即下文章字六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知音智光大也三曰含章天道之行生變化皆于地而藏之則皆地之章也特地常含而不發必待天以發之夫含則未嘗發也未嘗不發也必當可發而發是以可為貞也曰可貞如何而後可天時至則可故象曰以時發也其出而從王事但有終事必無成事蓋成者以我主其成先之事也故有所不敢終者為王盡力盡勞後之事也故必於有終有終則乾之大于此有終能光其大也皆由六三先知有乾在故象曰知光大也三為內卦之終所以言有終含章能順以待時無成有終能順以從事六四括囊無咎無譽象曰括囊無咎慎不害也譽者過實之名括囊坤以藏之囊象囊本應用之具括囊者本義結口而不出也隨時有用隨時有藏也三在內卦言時發惟於含章內藏得用方可以時行而行四在外卦言括囊惟于致用時善得藏方可以時止而止特繫無譽二字非泛泛無譽蓋有譽非臣子善物功能盡歸諸君父則自無譽無譽方是順之至此非一意自小敬謹之極不能故象曰慎不害也慎不但指括囊兼該無譽六五黃裳元吉黃中色裳下飾中順之德充諸內而見于外故其象如此象曰黃裳元吉文在中也言黃則知所以主之者有𤣥在言裳則知所以主之者有衣在坤道中正在黃裳故元吉非有中順之美積於中安得有黃裳之美形於外故曰文在中也舍見龍之庸言庸行别尋飛龍聖作之事無之舍坤二之直方大别尋黃裳在中之文亦無之上六龍戰于野其血𤣥黃象曰龍戰于野其道窮也繫辭曰戰乎乾言隂陽相薄音迫也隂陽相薄則必戰何也陽必不為隂所敵也上六隂極所以薄陽而戰戰者陽來制隂也稱龍正提出陽字謂之于野言無地不有戰也龍飛則動而在九天龍潛則靜而在九淵惟戰當隂陽相薄之際故必于野于野處處是戰也上隂之極盛不敢自為主而必以陽為主以自尅自制戰龍之義也凡涉隂陽可疑事事必戰處處必戰于野之義也凡臣子居極位處極地必不可無此戰龍不戰隂可以抗陽而逆施地可以抗天而倒置血可以抗氣而妄行惟龍戰隂得陽而成其為隂陽地得天而正其為天地血得氣而順其為血氣故曰其血𤣥黃可見臣子之道到底一個順只是從陽故處在盡頭做到盡頭順到盡頭龍戰順之極也此外更無别著象曰其道窮所以不得不如此乾坤外有六十二卦卦卦有坤道那一爻一位不以乾為主這便是龍戰上下四旁周流六虛那一處不是戰這便是龍戰于野用六利永貞象曰用六永貞以大終也用六坤爻位之用不同所以用柔之道則一一于從乾而已不從乾非貞有從有不從始從而終不從亦非貞故曰利永貞永貞乾始方有終故曰以大終乾首出者也而用九則曰見無首固知雖先知先覺之聖不得以剛大自先也用九還要用六也坤後乾者也而用六則曰以大終以字有力固知雖至卑至邇之功無非以貞此剛大也用六仍是用九也九六合用此君子所以能御天能應地文言曰坤至柔而動也剛至靜而德方方謂生物有常後得主而有常含萬物而化光坤道其順乎承天而時行坤道惟其至柔所以能動也剛蓋柔到至處無非以乾之動為動故其動也剛惟其至靜所以德方蓋靜到至處是一定而不移的所以有凖則而德方後得主一味處後不處先只主乾而又有常到底不變也地道最有常故能永貞含萬物而化光則其功用直與乾同大矣其動剛則承得乾之剛健其德方則承得乾之中正有常方承得乾之時乘變化化光方承得乾之品物流形坤惟一于順乾所以有許大功用故總之曰坤道其順乎承天而時行歸重二句積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也坤道只一順要起頭順故發於初爻蓋臣子有大順大不順皆積漸所成也其分不在既積之後從一念之順不順分其能順不能順之分又不在君父春溫中辨須從君父秋肅中辨故辨之須早可喜可怒可生可殺從幾微之際念念以順為主則亂萌何由生不善何由積斯之謂履霜馴此不變斯之謂堅氷至蓋君父有拂逆之來其難順處一念隱隱甚微不知這一念積之便是弒逆胚胎從微處辨就從此處順方是履霜實際故曰蓋言順也本義改為慎只為舊說合不上順字直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也程傳君子主敬以直其內守義以方其外敬立而內直義行而外方六二一卦之主發敬義二字人生本來自直直便是正故曰直其正也所謂敬只是常主于直故敬立而內直曰敬以直內及其動而應用于外無一非正而截然不易截然義之方也曰義以方外敬是體義是用原是一個內外交致德自大而不孤不孤不偏也不疑其行者凡不順理則有疑疑從勉强上生敬直內義方外一團自然天理夫又何疑又何不利朱子曰敬義只是一事如兩腳立定是敬才行是義又曰若要以敬去直內以義去方外便非矣乾二言誠坤言敬敬所以存誠乾二言仁坤言義義所以輔仁隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括􅌩無咎無譽蓋言謹也三四兩爻含括二字同意而各義坤以斂藏為主故當其相可而發主含含于未發也當其謹密不出主於括括于方用也君子終日間有無時不當含無時不用括者含之中有無限包藏順受之道故宜于妻宜于臣括之中有無限謹畏小心之道故謂之隱隱只是韜而不露非隱遁之隱蓋天地有變化則有閉藏草木有蕃而發生必有斂而凝結賢人君子有顯而彰著必有隱而祕密此是一闔一闢天然道理括􅌩正是君子隱而不發露妙用故下文接曰蓋言謹也則知閉隱二字有精義如中庸云暗然也君子一言一動要與天地同變化一默一止要與天地同閉藏此為括􅌩君子黃中通理釋黃字之義正位居體釋裳字之義美在其中而暢於四支發于事業美之至也何謂黃中天地間只是一理理有常而不易天尊地卑决無髙于天之地上衣下裳决無加於衣之裳此定理也即定位定體也理本人性固有即受於天地之中元自萬理畢具只有通有不通如坤五之順不以黃而思混乎𤣥不以裳而思加乎衣適得乎理之中則一中俱中一通俱通一念而至念念無非此理謂之通理通理方是位得其正居得其體視聽言動手舞足蹈莫不是理此暢于四肢者也隨時而措日新日富此發於事業者也宛然乾之美利利天下豈非美之至乎四句釋元吉之義隂疑于陽必戰為其嫌于無陽也故稱龍焉猶未離去聲其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃上六隂極隂與陽相敵則疑疑則與陽二夫陽主也隂可與陽二乎是不知有陽在謂之無陽龍戰以陽來理隂也純隂而無陽不成世界猶純血而無氣不成生理以陽理隂乃以氣來理血也坎為血中畫陽是血中之氣無此不成血陽氣到血中血方成𤣥黃龍戰不言血氣𤣥黃單言其血𤣥黃就隂象言隂類也惟戰𤣥黃方雜天地雜天地乃交血氣雜血氣乃行故𤣥黃雜而氣得其氣血得其血矣天地雜而天得其天地得其地矣天𤣥而地黃才成了清寧世界隂盛則陽自來戰必然之勢也陽來戰隂只是順無有抗于野者極廣大之地隨地有戰則隨地有順决不飛而在天也方成得𤣥黃然曰戰陽要首出必有一畨蕩爭之勢于此順直到底順不必說到殺傷𤣥黃天地之雜也六十二卦皆從此雜起純乾純坤無有不吉吉凶皆起于雜繫辭曰剛柔雜居而吉凶可見又曰物相雜曰文文不當故吉凶生焉但使陽常為主隂常順陽便雜而當龍戰雜所當雜也聖人作易雜物撰德辨是與非正要人於此等處辨是非辨則無疑無疑則無二故曰因二以濟民行以明失得之報常得天𤣥地黃則乾坤成列成位乎其中矣總坤學一言蔽之曰主乎乾所謂天理是也天理一發一路跟著這主而行純純常常畢盡其力這叫做坤之至若未見天理當然先以私意用事便是先迷凡事向天理底是當得之明不向天理底是當喪之朋所以從初要辨而其徹表徹裡工夫無過一敬其所云含也括也黃而裳也步步是務實行事總是一個後而不先至於要終龍戰則到底乾為首出才完得一順字這個力量極是至剛至大方承順得天來所以有坤學乾學方有實際豈是一曲謹柔靜卑瑣事業學者務談髙明透悟卑薄柔順行地工夫是可以有乾而無坤也于參兩之道何居六十四卦皆乾坤兩卦之往來也以一爻之動言乾來坤則為復師謙豫比剝坤來乾則為姤同人履小畜大有夬乾主也故復師六卦皆以主陽爻為義其主爻皆吉隂從也故姤同人六卦皆以隂從陽為義卦中一隂爻有吉有不吉能從不能從之分也十二卦象爻皆從乾坤二卦爻辭來如復之閉關分明一個潛字姤之繫金柅分明一個順字又如比之顯比分明乾五聖作物覩氣象同人之通天下志分明坤二德不孤氣象其餘皆可類推以此旁通而六十四象三百八十四爻之情可互見矣周易像象述卷一

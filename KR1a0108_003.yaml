body:
  text: 周易像象述卷三明吳桂森撰同人于野亨利涉大川利君子貞于野謂曠逺而無私也有亨道焉然必其所同合君子之道乃利彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利步大川乾行也文明以健中正而應君子正也唯君子為能通天下之志通天下之志乃為大同不然則是私情之合而已何以致亨而利涉哉同人大有離入易之始人未有生以始乾天是人之所以生人既有生以後離明是人之所為天完得離明便完得乾天故後天圖離居乾位洛書離數居九即乾九之數也離明就是人本來心體從心體上言同何人不同謂之大同從心體上證有何所不有謂之大有同人乾在外離在內是心體中現出天理人之心天也心天中何民非吾胞何物非吾與不期同而原無不同只是這點心體人都認作一己之有規規焉自囿一膜之中橫起物我之見此心體與天體全無干涉如何同得人須擴如天之量同人于野野者天之九野天有三垣九野廣大無外故萬物無不在覆幬中人心天宇亦如天之廣大方謂之同人于野蓋離中一柔坤上交乾原有同天分量得位則本自至正至大得中則本自無偏無倚應得天之廣大來同人于野心體一如天體何人不同自無爾我形骸間隔所以得亨利涉大川者利于不息之明也天明不息人心之明亦不息才有息便非常明之體此心之明日日在天理上運旋自然是不息則何川不可涉如日雖明然一升一沉唯其天行日行所以燭四海而常明人心之明一以乾健不息為行才是常明故利涉大川乾行也同人而乾行為行豈更有私意間隔得亦豈可以私情比昵得明也健也是人人本有的同心惟文明以健既無了私蔽又無了間斷二既中正五又中正心天與乾天相應這是天下極公極正君子之正道也得了正道天下人心自默默相通非特情相通也是直從心志中相通此同人之貞也故曰利君子貞謂其通天下之志者君子正道也若形骸意氣之同豈稱同人哉易有天行有乾行其義不同天道自然之運曰天行以人行天之健曰乾行乾行人所以合天也故于同人言之人能識得離明心體自然一物不遺漏于心外心體即天體天量即心量所謂同人如此象曰天與火同人君子以類族辨物審異而致同也先天乾位即後天離位天純陽火生于隂而成于陽故天以日為明以火為用是以天與火言同同而曰人這點天明人之所同以為人者也同類曰類同黨曰族物即理也同人不是一概混同處之各當其物方是中正之同故賢與不肖有類親與疏有族惟一一辨其物賢者還其賢不賢亦不使之遺親者還其親疏者亦不致于失此之謂同人辨處是離明各得處是天度以類以族辨得物分明方是天下各得其所各得其所方是大同儲康父曰遏惡揚善正可與類族辨物參看初九同人于門無咎象曰出門同人又誰咎也六二同人于宗吝象曰同人于宗吝道也同人之同全在二五柔應乎乾所謂中正之同初在下不能同五限于門中二耦象門之象故須出門交方可免咎二與五同道中之同可謂得所宗者矣但五剛在上未易下交二柔在下欲求上同己自可羞又有三四之間合之不易故曰吝然雖吝不可以不同故象曰道也宗者道之所當同蓋不能大同則擇可而同亦不失為正也九三伏戎于莽升其高陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也三嵗言終不興也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也三四正當兩卦相合之際三四同則無不同三明離體而過中以明伺人每見人之不可同所以自起戎心有伏戎之象莽撰巽木也然此乃自生之疑能進而升髙觀乎天理之髙明則戎心自然不興矣其始伏戎以四剛在前而思敵之其既三嵗不興則疑蔽去而安行也四以剛乾體居上卦剛易凌物每忮人之不我同故有乘墉之象若知其不可以義反而自克自然攻不成吉之道也攻人立困之道自反天理當然四能弗攻故曰困而反則大抵人之不同不是自生疑忌便是氣質凌人內不使險心伏藏外不以強陽橫加自無人不同三四雖有二病却是剛體故伏而能開攻而能反于不同中久而能同者也九五同人先號咷而後笑大師克相遇五二同心為三四所隔不得其同然義理所同物不得問故有此象象曰同人之先以中直理直也大師相遇言相克也上九同人于郊無悔象曰同人于郊志未得也五二本中正有何難同然二五同中五尤剛直天下唯中直之同最是不易五剛二柔剛柔相劑同歸中直方得融合豈可速致故有先號咷之象又必有大師之克然後可以相遇象言相克見克之不易也即如人心本明何難符合天理然非經一畨克戰工夫心與理終是間隔不合號咷之呼大師之克俱不可無者也上九乾之上爻天包度量似為有餘于中直之道或有未當不得中正同人于郊之象郊與野别曠逺之地不分界限不設畛域以此同天下故可以無悔然形迹之大同而已如以中正通天下之志則非于郊之同可得故曰志未得言未得同天下之志也總同人之道于宗尚有吝于郊又未得惟通志則同辨物則同相克則同易中精義之功可覩大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨同人明在內天下人心同然之明故足通天下之志然只是在己之明德必己德既明合天下之人盡歸于明方是明明德于天下事業離明分量才圎滿天德方為我有此為大有此非聖人之德居天子之位不足以成大有故彖中首提柔得尊位一語惟柔中又得尊位明是大明中是大中上下自然協應有所以大也得位之明乃當午之日大明中天則萬象無不在燭照中其明即天體所以有元亨之德同人之德文明以健中正而應只是循天理行事由明而健大有之德剛健文明應天時行則純是天光發越隨日用運旋無處非天體流行謂之時行則時時常明者也德之大孰大于此德之亨孰亨于此是以元亨離在乾上心體到大有才登心天之位方寸光明全然一天體方稱得人是天的心謂之大明終始大有之德居然一乾德但繫元亨不繫利貞者乾可該得離離該不得乾如乾道變化各正性命大有尚難語此故乾曰統天御天大有止曰自天其分量蓋不可同語矣象曰火在天上大有君子以遏惡揚善順天休命火在天上日在天上也太陽當空萬物盡在光明中大有之象明德君子在位則善惡畢照一遏一揚舉一世盡登光明之域一人明德天下盡明其德此君子之火在天上也天命有善無惡遏之揚之天休莫休于此故為順天休命初九無交害匪咎艱則無咎未涉乎害何咎之有象曰大有初九無交害也九二大車以載剛中在下得應下上之象有攸往無咎象曰大車以載積中不敗也九三公用亨作享于天子小人弗克象曰公用亨于天子小人害也大有天明人人所固有有雖大于本來上加不得分毫只怕人自生係纍為明體之害害不必物欲陷溺只人終日間與物交接一為物所交便都是害若真明常朗終日應物原未嘗交方謂之無交害無交咎不生曰匪咎然要無交甚是不易常常知艱方得交而不交故艱則無咎天有交始交終天首交始天尾交終日與月並行于交中則蝕故天日無交日方得貞明所以人心無交方得明體故大有從初爻揭出交之為害正苟日新功夫一疵不存方可望其萬理明盡大有根本在于初爻明不積不得大明有不積不稱大有二以中而乾健不息有新而益新積而又積之象如大車之積而載也乾為全車以此攸往又何咎二之能積由于得中故象曰積中不敗即無害五有之主二為正應非二不承五之有故曰新又新之功二足以勝之同人曰利涉大川乾行也大有之大車以載有攸往正是乾行九三乾之終爻乾健之功已到積而成有矣有而不能為天下有未足言有也惟以其有進之為大君有方是先知覺後知明德于天下之事故有公用亨于天子之象若私而自匿為一己之明則雖有亦小人之有而已故曰小人弗克蓋明德公之則君子私之則小人所見者小小人之見不足以為明適見其為害而已害如初之害凡一點己私皆蔽明之翳則皆害也天子即居尊大中之明德是也九四匪其彭無咎象曰匪其彭無咎明辨晳明貌也彭盛貌六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也上九自天祐之吉無不利象曰大有上吉自天祐也四是離體能有不見其明之大惟有而不有方見其明之大故大舜舍己夫子無知顔子虛亡惟其明之極所以虛之極人愈見其盛已愈見其無曰匪其彭彭衆盛也衆盛原非我之得有故匪其彭明至此為真明象曰明辨晳昭灼之至也五居位大中之明已一無所有合天下之有皆其所有無善不投無人不取所以孚而交如惟上以天下之明為明故天下之人因上之明而共向于明其去暗即明皆上之大明足以開發之同人之明通天下之志而已大有之明則使人自發其明非六五一假真實心直透人心何以及此故曰信以發志也舉天下共耀于光明則德明之明即是德威之威蓋聖主當陽則凡在瞻仰何人不起敬畏豈非威如之吉然聖人自是坦坦平平平夷可近故曰易而無備易即乾之易無備猶言無多術也聖人大明只是一個乾之易知豈有他道多端無備即是大舜無為恭已正南面氣象上九明之全體其明天明地其行天行也人之心體合乎天則天之明命即在人所謂自天祐之也繫曰履信思順尚賢乾在下見履信離得位見思順一隂孚衆陽見其尚賢如大有之剛健文明措足而履者都是天地間實理何履不信蓋明得真切自然踐處真實所謂信也一心只依著天理何思不順蓋明得透徹自然念念依從都是天所謂順也天下之善無不樂受何賢不尚蓋虛與明之極自然惟德是崇所謂尚賢也如此純是一團天命周流故曰自天祐之元來只在自己心天上造命總爻辭有次第初是不染功夫二是充積功夫三則有而能公四則有而能忘至五明體方完上則有之極致離乾合全是乾體故六爻無不吉明不應天必不能通天下天不時行必不能大明終始惟應天而時行是以元亨六爻皆從此句來謙亨君子有終謙者有而不居之義止乎內而順乎外謙之意也山至髙而地至卑乃屈而止于其下謙之象也彖曰謙亨天道下濟而光明地道卑而上行言謙之必亨天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也卦巾最貴者一陽為主即一君之義一陽爻是天道天道崇髙地道卑順今謙以一陽居三不在上在下有降而自卑之意以天之崇髙不自居髙却藴藏于卑順之中故其象為謙序卦曰有大者不可以盈故受之以謙謙與盈正相反若本無所有虛以自居何足為謙惟其艮體在內實有崇髙之德却能有若無實若虛所以見其謙以其易盈而不盈謂之謙也盈便是損道謙便是益道故謙自能亨下天道四句皆以盈謙對舉艮體光明來居于內是天道下濟而光明也坤往居外是地道卑而上行也天道本自光明惟其下濟才顯得光明地道可以上行地惟以卑為道容受得天氣承順得天行天地之氣方交而地道得以上行天非下不光明地非卑不上行見天地非謙不亨也天道益謙地道流謙鬼神福謙人道好謙極言謙道之必亨如此故人能以謙處尊則尊而光以謙處卑則卑不可踰天道下濟而光明居尊而謙得了天道所以能光光則尊者益見其可尊地道卑而上行居卑而謙得了地道所以不可踰惟不可踰卑者反見其可尊是謙者君子終身一個定則隨你德髙天下功蓋一世少不得到底要用這著非此不足以結局故曰君子之終也象曰地中有山謙君子以裒多益寡稱物平施山本髙地本卑然山豈能出大地之外惟地之卑能藏畜得山下故謂地中有山地能有山謙象也山自下也人只為高卑多寡之見橫在胸中按納不下便不能謙若知得髙原不足居之以為髙多原不足居之以為多便自能降故君子以裒多益寡裒非損去其多也只是藴之而不露其多謂之曰裒益不是有所加于寡只是常以虛無自處使能容受取益謂之益寡如此多寡一概平觀是稱物平施也合人已同是物人已齊一謂之平施裒多山之能自藏益寡地之能容載初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也六二鳴謙貞吉象曰鳴謙貞吉中心得也九三勞謙君子有終吉象曰勞謙君子萬民服也謙道只是一下初六最下曰謙謙不是一味謙是虛心之極如顔子若無若虛可稱謙謙全是消盡了這點自髙之念故象云自牧牧字有無窮意味人不是養得心體和平如何便降得功能之心下養得定時一切險陷盡為坦途矣故利涉大川見于此爻由中聲外則有鳴謙主雖在三二乃艮中以柔居之真見得這些功能一毫不得為我有根心如是故聲外如是不覺鳴皆謙也鳴者聲音笑貌皆是之意這是由衷之不可強故曰中心得三為卦主勞謙者舉天下事任無不負荷之舉在己之功能無不盡忘之能勞而又謙也夫懷退讓之心因而遜避天下事何貴于謙惟曰勞謙真是功髙一世而藴藏于廣大之中大君子全局故以有終歸之象曰萬民服必如大禹之成允成功克勤克儉不矜不伐方足以名之六四無不利撝謙象曰無不利撝謙不違則也外三爻坤體四近居三上則藴藏髙山用力全在此爻四乃順首有此能事故無不利但其用力須知不易故謂之撝謙撝者有作有為必盡其事也有而能謙雖是天然之則若非實用一畨苦力如何按伏得下撝謙正求不違此天則也謙之著力是一撝得力亦是一撝象中裒益二字善發撝字之意撝字古揮麾通用宜從麾去之義六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也五以柔中居位當位而謙人皆化于謙德之中不得以謙名之故不言謙但言不富以鄰也如此天下不期服而自服非服于力也皆謙德之所正也此為利用侵伐小曰侵大曰伐無所不宜也力爭之征有服有不服謙德之征不正者自正故無不服三苖之征班師振旅而有苖格謙之征不服其神如此上六三之正應其謙表裏一致故亦根心而鳴也第處上則髙而不可下處極則窮而將必變其時位不能如二之得心故曰志未得要在上能謙在一家則一家自服在一國則一國自服可以攝衆志平邦國用師征國何不利之有上戰服心孟子曰以善養人然後能服天下此謂謙師若云居卑自下可以用兵于謙義逺矣二近三曰鳴上應三亦曰鳴撰震善鳴象總謙不言卦德曰止曰順而變文言天道地道專重一陽見其獨尊也艮剛一止剛柔皆得所止彖云君子有終以此艮成終全卦六爻皆吉以此爻義周公一身可備以公才之美無驕且吝是卑以自牧之小心也居位而握髮吐哺身下白屋則二中心之鳴也當其負扆而朝身任天下制禮作樂若恐不逮所謂勞謙及夫流言一起東都逺避碩膚之遜赤舄几几豈非撝謙風雷之迎天下信之東征大定則五之征不服也東都既作曰豫明農此上六之鳴也王曰公後志未得也乃治洛七年從容俟其化則自治為先始終一謙德妙用也君子有終非公而誰當之豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉一陽斂而在內固藏博厚之下何等含蓄藴藉一陽達而在外發越博厚之上何等通徹欣暢所以名豫豫悅樂也坤體在內震動從地透出夫坤德寧靜震德發揚鼓蕩極是天地間激烈之氣惟到當動之時雷聲一奮遍大地鼓動自然鬱結者無不通凝滯者無不達萬物勾萌甲坼豈不是天地至欣暢時候人心寧靜中一念震動動處極是震驚恐懼然有這動百體皆通自有一假震生仁意流貫透徹其間何悅樂如之蓋震初一剛乃羣陰響應之剛剛應以震剛達而上行志行陽道得以通暢坤陰在下順之而動合陰陽盡成通暢惟順以動不期然而自動天地之氣所以流行和洽也震剛即屯初長民之元侯故利建侯即師中不殺之長子故利行師天地無順動之雷隂陽便有乖沴日月之行如何不差錯四時如何成得生長收藏之功聖人無順動之雷宇宙便有沴氣刑罰如何得清清者措而不用之意民心如何得和這出地之雷是天地間一日不可少豫之時義所以大時義者時宜也凡事豫則立豫有先事之義蓋待天地有不和之氣而後動動亦不成大和惟其時到即動所以為順動聖人待天下有事然後動動亦不能安樂惟其當時則動所以成順動故繫辭重門擊柝蓋取諸豫無事而防有事豫正是順動天下所以常得和樂也象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考雷出地奮奮是發越充滿有這一奮才得天地之氣都通暢陽居四爻是四陽月令二月節氣此時雷聲一奮萬象欣榮變動豫之象禮記樂者和也和故百物皆化聖人作樂正是把一假和氣鼓動天下使事帝事親成大順之世也崇德者禮樂百年而後興非有厚德涵濡于人心如何作得樂故作樂所以崇德殷盛也作樂薦上帝是以德享上帝也所以薦之者豈不盛哉享帝時配以祖考故曰配豫是驚蟄雷所以和初六鳴豫凶象曰初六鳴豫志窮凶也六二介于石不終日貞吉象曰不終日貞吉以中正也六三盱豫悔遲有悔象曰盱豫有悔位不當也盱上視也宜有悔者也當事而速悔若悔之遲則必有悔也所謂順動只一時字所以審時只一幾字二得中幾正在中上審先一分是鳴後一分是遲三爻合看順動之精義洞然豫主在動爻坤居內主于閉藏雷惟有蟄藏其藏也固然後有奮發其發也時坤初爻正在閉藏時全未見可動若一鳴便泄漏了含藏之氣所以至于凶鳴以應四而鳴惟中心已向于動故有此聲響夫當豫尚且不可萌諸心况先豫而鳴乎其志先已極矣故曰志窮凶也二得順之中惟中也可以語幾故介則如石之有辨斷則有不終日之蚤貞而吉者也撰艮石象六三近四未免為四所動盱豫之象瞪目為盱目中只見得動之為豫也夫聖人時動則動原未嘗見得可豫方動若有一盱之見必非時動所以有悔悔是去凶即吉最捷之路只要蚤蚤便可無悔若稍遲必至有悔有悔則悔亦無及矣能見幾必不見豫一見豫必不能見幾所以有悔有遲三所居之位乃出坤向動之介順不順正要在此處得力三之盱非順動之宜故曰位不當九四由豫大有得勿疑朋盍簮象曰由豫大有得志大行也四是豫主當動而動由于自然故謂之由豫二只是見得這幾四則實實身之所動皆時動也如出之由户自然而由正是不先不後適當其然妙境故曰大有得震剛應志行在此一由只是有一個疑端要知得位非五位却以身任一卦之動未免上有逼五之疑下有得衆之疑此疑一毫不去如何合得天地順動消息必須去此疑勿疑則動而衆柔自從從而合于四四之朋皆五朋也同來聚于五有盍簮之象簮聚首象此爻周公當之制禮作樂開成周太和公誠其時也然負扆可疑三監可疑公皆不疑惟握髮吐哺合天下之朋為急皆以順動也使公少有疑不可為矣然非公之過于任天下也時當順動公由之而已六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也上六冥豫成有渝無咎象曰冥豫在上何可長也五以柔居中却乘乎四夫四以剛動動則時矣而所以持其動之中者尤難故雖貞有疾其疾如何少有自喜其動之心即鳴之疾也少有自安其動之心即盱之疾也惟有時常審中則道可久而不死矣出豫必入危故有死道死于安樂五得位處豫最若可安然曰疾則一事無可安曰恆則一時不容自安知其疾又知其恆庶幾曰不死云爾處豫亦危矣哉上過于豫則為冥矣冥非必沉于逸樂如後世昏迷之極然後謂之冥凡日夕為冥即一日至于夕以豫為樂即謂之冥蓋終日而不知警醒即終月終嵗之漸怠荒之門也所以要渝逸豫之念方成而即渝庶幾過猶可補云爾若沉冥則已極矣何渝之有總豫六爻之辭析禍福最微于二中言介此得失大限也于三言盱危矣而開之以悔悔之中又戒以遲于五言貞得矣而警之以疾疾之中又示之以恆四最吉者也未嘗無疑之當防上最失者也又未嘗無渝之一路蓋得失轉移如環無端所以善處其道無過先幾一著知此者可以言豫矣謙之體靜豫之體動吉凶悔吝生乎動故處謙易處豫難程子曰將此身公共放在天地間與萬物一般看大小快活此可觀稱物平施之義又曰百官萬務金革百萬之衆飲水曲肱樂在其中萬變皆在人其實無一事此可觀順動之義隨元亨利貞無咎彖曰隨剛來而下柔動而説隨大亨貞無咎而天下隨時隨時之義大矣哉邵子詩泰到盛時須入蠱否當極處即成隨惟曉得蠱自泰來則人人盡其事泰可常保矣惟曉得隨自否來則時時有妙用否可立傾矣隨蠱是常泰無否之道隨之取義全在剛來下柔一下字乾初曰陽在下若陰居初不言下惟陽來居下乃見其能下惟能下所以能隨蓋陽尊隂卑故陽上而隂下陽唱而隂從此理之常不必言隨今兑柔體也為少女為秋斂居上震剛體也為長男為春生居下非當春發聲之雷為當秋收聲之雷此震隨兑斂也當發動而發動固雷自主之當收斂而收斂亦雷自主之內卦為主故能出者震也能入者亦震也皆時至則然非隨兑也隨時也然時出而出不見其為隨惟時入而入其隨時處乃見得親切明隨之義故凡尊有時而從卑貴有時而從賤舍己從人皆所以隨時也時之所在即理之所在人只從天理上行則動是天動説是天説自然動都可悅故曰動而説隨隨之妙原一毫不假勉強正是天理自然恰當處乾卦見羣龍無首此見也故隨有元亨利貞之德又無咎所云隨之貞者其隨時變遷處正是理之一定不移處時在則隨在只一個隨時便是大亨貞無咎道理故曰天下隨時言天下無往非此理也隨之義盡一時字下句因贊其大易所言不過一時孔子聖之時能隨而已天地大化無過一出一入聖人知幾無過出幾入幾震出兑入合而成隨易中指出時字微矣象曰澤中有雷隨君子以嚮晦入宴息雷藏澤中隨時休息人只曉得出而順應君子有隨時之妙用不曉得入而退藏君子有隨時之主宰只曉得雷興澤從為天地之生機不曉得澤靜雷藏為天地之息機故澤中有雷聖人取以名隨世人紛紛接搆妄動妄説出而應用皆非只緣入而退藏先沒有這雷君子嚮晦先有了澤中之雷則其入宴者都是雷體藏密造化息機時入而入即時出而出隨時之義孰顯于此澤中之雷何嘗不驚天動地嚮晦之息何嘗不時行物生初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也卦以物隨為義爻以隨物為義按物隨非經旨不必混入六二係小子失丈夫象曰係小子弗兼與也初陽在下而近五陽正應而逺故其象如此六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也與二相反隨主全在震初一剛非剛必不能自下非剛必不能成隨故稱曰官官者主之謂也一尊獨主之義惟其主宰先定于一故見善而能從有渝也從而不失正渝貞吉也然從善之主在初至善之極在五蓋隨善不過一隨時九五中正天下之至善在焉却與初不相當故必無以門自囿撰艮門象出而從五斯為得所隨有大亨之功也震剛具乾剛力量故可語出門事業若二三柔體何能逺從但以陰求陽而從只可謂之係惟其係便能近不能逺所以係初則失五二之係小子也係五則失初三之係丈夫也係小子係丈夫亦未嘗無可係之道但時可隨則隨丈夫小子何一不可與只有係便有失婦人之隨非丈夫事業故曰弗兼與然二者係丈夫稍見其大故其隨可求而得然求而得則易于失正尤在此隨故又以利居貞戒之九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也九五孚于嘉吉象曰孚于嘉吉位正中也四乃説體以説而隨未免有計得之心有獲之謂也最不可有是個獲心以此心謀道便是計功以此心事君便是容悅所以雖貞亦凶其隨之事雖或正其隨之心則不正矣然四與五本同體同德若以此相孚則其隨也以道相隨如此有獲非先有獲心乃明足以擇善而有獲又何咎哉故曰明功亦如初之交有功也無心契合為孚正與計獲之心相反孚者孚五也在道初隨五之道卦主在初三陽爻合德為同道也五居中正天下之所隨豈復隨人然善之所在則舍已而從是合天下之善皆其所隨也以其衆善之所聚曰嘉以其無善不從不曰隨而曰孚此隨道之至也大亨以正唯五足以當之上六拘係之乃從維之王用亨如字于西山象曰拘係之上窮也上六隨之終爻故以能守言隨善未得所隨當惟善是從無成心為隨善既得所隨當執一不移守而勿變為隨拘係之又從維之正守而勿失之謂也上乃兊入主爻不是變動有為時節故曰上窮惟其不當動便不動一味謹守不出正見其隨時之義也故隨道以此為盡手一著王用亨于西山以太王事象之狄人之難避而不爭隨時也使守之不堅不勝一念之憤與從事干戈未為非義然太王却執之堅守之固寧輸貨寧避地必不忍以土地害其民此隨之極至也其去而西山也乃兑之收斂孰知一收斂中便是八百興王之基惟有此兑入乃有此震出隨之亨孰亨于太王剛下柔雷隨澤于太王西山之亨曲盡其義上居隨極隨之固結而不可解者也窮極也總隨之第一義是渝渝如徙義徙字惟善是與而無成迹也其最妙是孚孚如一氣相孚與善吻合而無臆度也係則膠滯而非大通獲則私心而入功利故有主之官不可無有獲之主不可有偏一之係不可有堅一之係不可無隨之義盡于此蠱元亨利涉大川先甲三日後甲三日甲日之始事之端先甲三日辛也後甲三日丁也前事過中而將壞則可自新以為後事之端不使至于大壞後事方始而尚新然更當致其丁寧之意以監其前事之失不使至于速懷聖人之戒深也彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也卦德無不善者本義不可從蠱事也雜曰蠱則飭也彖曰蠱元亨而天下治只事其所事謂之蠱人生父乾母坤父母之事皆乾坤之事乾坤之事皆父母之事乾坤父母之事皆吾人本分內事蠱衆也天地間千事萬事皆人子當為之事必做得天地間一個克肖之子方成得天地間一個完人可見人一有此生便有此莫大之事所謂蠱也若有得這個人幹得這件事前人所已為者後人復有以為之自然一畨振作依舊一畨生氣此蠱所為飭也若無這個人幹不得這件事前人總有所為無後人以為之便不覺日朽日蠧日惰日窳此蠱所以壞也蠱原是活字髙子曰天地間何時不蠱何處不蠱雖唐虞之盛其蠱自在只看幹蠱何如耳此説得之卦體艮剛在上巽柔在下先天艮位後天乾位也艮在上乾父之事便一擔都在艮上要承得乾來先天巽位後天坤位也巽在下坤母之事便一擔都在巽下要承得坤來蠱卦之象負荷乾坤之象也其德巽而止這事不是容易做得惟巽德在下至柔至順一味卑已盡力無微不入從下而上造其極致直做到至當不可易處方稱得子道盡得子道天下何事不從此始天下何事不從此通孝弟之至通神明光四海不過了得人子身上事故曰蠱元亨而天下治也但説一個子字甚近却不知有畢世難竟之事所以千險萬阻不容易過子道却怕不得險阻一一要涉得過其涉之道只有一個克盡其事如舜處家庭方稱得人稱得子稱得盡事故曰利涉大川往有事也蠱之要義盡于往有事一語先甲後甲以震言甲也震乾坤之長子于德為仁于氣為春于五行為木天地生生之心全寄于震惟震能體天地父母之心能行天地父母之事故帝出乎震然後齊巽以至成艮皆震之流行也蠱巽艮之合巽之所齊何事無非此震之始事先甲也艮之所成何事無非此震之終事後甲也有巽以先之有艮以後之則長子之事盡長子之事盡則乾坤父母之事盡矣言三日者周天之數共有六甲自巽歷艮周天事業六甲之用完全也天道之行既出乎震巽以始之艮以終之四時之運一周則又出乎震矣始終迭運循環無端人道亦然前人之事已終則吾當復有以始之吾之事已終則後人復將有以始之巽始艮終亦循環無窮然吾之始事所以承前人之終無震生之仁不足為有終吾之終事所以開後人之始非震生之仁不足以有始所以先之者必三甲後之者必三甲也此為終則有始此為天行人一有生天地父母之事一齊交付豈待前人事壞然後當做故蠱人人當有之事亦終身無己之事盡其道者無如文王周公止孝止慈制禮作樂亦是子道中分內尋常非為前人補綴也象曰山下有風蠱君子以振民育德巽風東南生氣山體常靜巽之生氣一年一到則成一畨生長人承先啓後前人事業不移只要這生氣一畨有一畨接續故山下有風蠱象君子以振民育德振者興起其孝弟良心由此克長養育其德行也振以起之用風之鼓動育以成之如山之詣極蒙曰育德養不染之初心蠱曰育德養孩提之真念真念即是初心無有二也初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也六二幹母之蠱不可貞象曰幹母之蠱得中道也六三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也六四裕父之蠱往見咎象曰裕父之蠱往未得也六五幹父之蠱用譽象曰幹父用譽承以德也爻皆言幹貞者事之幹天地如此生得來我完完全全如此交得還方謂之幹以一身全副承當全體完備如木之全體只一幹然故幹蠱之事自天子至于庶人無人不有幹亦無人不可幹天子非幹不能為宗子庶人能幹不沗為克肖初曰父二曰母人子身上自有父事母事當幹如君天下者教民以復性是父天之事養民以厚生是母地之事如學者立身行道是幹父事不敢毁傷是幹母事父事母事皆人子一身上事初是巽柔之主巽順是子道第一義所以稱得有子有子才得考無咎考成德之稱父有成德全在于有子故曰大孝尊親非喻親于道不足語此又嚴之曰厲方得終吉可謂難矣此必從先意承志默默感孚中來故曰意承考幹母之蠱雖是人子所必不可少然要䁱得幹母之事皆所以完幹父之事也若堅執幹母之事以為貞其或不合幹父之局者亦為之則有所不可如周平王之戍申便是明證蓋只幹母蠱必了不得人子之事結不得人子之局所以不可貞必幹母蠱原合幹父蠱方為得中道也三亦幹蠱之子只是巽之究為躁不能盡如初之柔順所以小悔然于子道無歉故終能補過子道到終無咎亦大不易四以止體而為柔爻有裕之象裕只是略放寬緩才放寬便不是一力擔當責分是以往而見吝往字見字可味五得柔中止于孝者也用譽有揚名後世以顯父母能事此惟德之致故曰承以德爻中三言幹父蠱因位而有不同意承考養志之事也無位者亦可盡故言于初三乃行止之際到得出處俱無悔方到底可以免咎故言于三若用譽非德位尊養兼致不足當之此幹蠱極則于五言之也上九不事王侯髙尚其事象曰不事王侯志可則也幹蠱至五承以德則其事盡矣然皆有位有分之事有位之所不得拘分之所不得限上參天下兩地最上一乘之事則雖尊貴如王侯亦不足以名其事所謂不事王侯不以王侯之事為事髙尚其事是也髙尚即孟子尚志之事居仁由義法今傳後自有天地父母惟此一事稱得仰不愧俯不怍此其事非一身一己之事萬世可法可則之事故曰志可則人子幹蠱之道至此方得盡頭一著故于上九係之五之用譽如大舜德為聖人名位兼至是也髙尚其事非夫子以萬世之教顯親烏足以名之總隨之上不言隨而言守蠱之上不言事而言志不如是不足以盡隨蠱極之義故曰卒成之終六爻之義至是方完備凡卦上爻大意皆然震東兑西盡八卦一出一入大局故聖人發隨時之妙用巽先艮後該八卦始事終事大義故聖人發幹蠱之重任觀二卦者要具隻眼隨初有全乾能事蠱初有全坤能事隨初一下乾初之下也要終兑柔則乾該坤矣蠱初一順坤初之順也要終艮剛則坤合乾矣蠱鼓同音即鼓之舞之字義故曰振民又説文蟲化蛾為蠱取變换之義臨元亨利貞至于八月有凶臨進而逼于物也二陽浸長以逼于陰故為臨彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也按臨大也將滿之義故妊滿曰臨月臨觀二陽爻為主兩君子合四民主持世道之象故皆以教化命名陽德來而在下便是浸灌天下的真惠澤所以成臨尊而在上便是感動天下的真風聲所以成觀臨取象地澤不取止水之義説萬物者莫説乎澤澤是流通天地之真脈二陽在一陰之下是陽氣蒸騰隂氣以成澤也澤為天地一團和潤之氣所以能説萬物君子持世把這一假陽和氣脈遍大地流注將去豈不淪肌浹髓人人沾被故謂之臨陽來而下則上進臨之二剛有日進日長之勢漸漸足以遍及四隂故曰臨大也以其得浸長之勢所以見其大其德説而順説則足以舉萬物而和懌之順則足以承惠澤而容受之又剛中而應其所説者非私恩小惠也皆中正至當而天下自應之如此豈不大亨以正乎説而順故元亨剛中故利貞夫居髙而善下者天之道臨以陽下隂全是得了天道所以有天道之元亨利貞臨者尊臨卑貴臨賤聖人不取陽在上為臨而以陽在下為臨可見所謂尊而貴者不有一假陽生德澤實實從斯民徹底浸灌來未可言臨也臨曰剛長陽進之時也又有八月之戒何以故此正聖人之危詞也惟曰浸長可以長固在此時可以消亦在此時蓋兑雖二陽原是隂卦是消體卦氣又是八月所以二陽前進一位便是兑隂主爻便是消局不待積之既久而後消即長時即有消機消長之機間不容髮故至于八月有凶言一至于消便凶也長曰浸消曰不久長之甚難消之甚易故寧于長時即防其消無寧至于消時再兾其長必不可得矣味至于字不久字緊切之甚象曰澤上有地臨君子以教思無窮容保民無疆上臨下之義非經旨不必混入不曰地下有澤曰澤上有地主在澤之二陽也澤之薰蒸能盡地之廣大皆在浸潤中稱有地故君子臨民必盡坤輿之衆皆在容保中方是有民之量然非教思所及真有深仁厚澤之浸灌何以有之故以澤之無窮教思為地之容保無疆也非澤無以注地非地無以受澤非教無以言保非容保無以明教大君澤民可知初九咸臨貞吉象曰咸臨貞吉志行正也九二咸臨吉無不利象曰咸臨吉無不利未順命也陽之感隂隂之感于陽是自然而然之理不假一毫造作二陽居下四隂自然取正彼此自相感通而成臨故初與二皆謂之咸臨咸感也感而無心所謂咸也初為説之初心從初剛感感之最正所謂正己物正身正而天下歸之者故曰志行正也二為剛中之説一卦主爻剛浸而長全在于二故吉無不利象曰未順命也此義要另看是夫子發一卦中大窾係處論二陽在下是陽進長故臨大也最吉之卦論四隂在上隂方處盛又陽爻二非一君之義殊非可恃之時極是可危之時故曰未順命陽便是天命三陽成泰方舉世順命若臨二陽如何稱得順命蓋無不利者就剛中之德言感之者盡善也其未順命就四隂爻位言其應之未全吉則所處之勢然不可不知也八月有凶正此之故特係此象指憂危于進長之時警戒深意存焉看臨二爻文王三分有二時似之六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也臨之病全在三爻剛説無心而正柔説未免以情用便落了歡娛私意之説故曰甘臨甘則何利之有八月之消其機皆在一甘憂與甘正是對病之藥才甘便入逸樂就成消局才憂便知戒謹就成長局故憂之可以補咎凡兑三多言位不當以柔居二剛之上為不宜也非以柔居剛之謂六四至臨無咎象曰至臨無咎位當也六五知臨大君之宜吉象曰大君之宜行中之謂也上六敦臨吉無咎象曰敦臨之吉志在內也上三爻坤民之象以澤之所到漸積積深為義六四曰至臨坤曰至哉澤之所至與坤同至如中庸云洋溢中國施及蠻貊無地不至是也四為順首首被咸臨之澤者四之位曰位當也進而五又得中澤之浸灌能使物物各得其所中庸曰成物知也故謂之知臨方是盡人盡物能事故云大君之宜惟其行無不中故于民物無不宜臨之妙以知臨為極至上則積之不已悠逺博厚氣象故曰敦有加無已厚之至也然所云敦厚者不是從治功上積只是從德感上積二陽在內日進日長不使之消自然德澤日深日厚故曰志在內也至臨只是普遍知臨則知明處當有舉一世而昭明之氣象敦臨則淪肌浹髓愈深愈至一步進一步方為澤上有地總卦中長消二字是吉凶之介所以長與消在咸與甘二者之辨所謂咸與甘在貞不貞一字之辨説萬物者莫説乎澤無遍臨坤宇之澤不足稱兑德撓萬物者莫疾乎風無大觀坤宇之風不足稱巽德文王易以隂陽對待相反覆為體自臨而遁只在一轉展間故八月之消不待陽長既滿之後也觀去盥而不薦有孚顒若盥將祭潔手也薦奉酒食以祭也顒然尊敬之貌言致其潔清而不輕自用則孚信自中顒然可仰戒占者當如是也彖曰大觀去在上順而巽中正以觀天下觀去上同盥而不薦有孚顒若下觀平下同而化也觀天之神道而四時不忒聖人以神道設教而天下服矣或謂有孚顒若在也下之人信而仰之以上示法于下曰觀去以下仰法乎上曰觀平彖中二義並見然必有可法于上者而後有仰法于下者則二義實一義也故卦名觀二陽在上是持世大君子尊而居髙可儀可則天下無不景從效法所謂大觀在上此也其德則順而巽順則有坤之承受巽則有風之善入下足以承上上足以風下有自然觀感之妙二陽同德五尤中正中正所在極立而天下自從真足以法則一世所以成觀玩觀之象全不假一毫施為造作德之所在而天下自化感者不知所以感應者不知所以應繫詞曰惟神也故不疾而速不行而至全是一假神行默孚默契故無可擬議但設盥而不薦兩語把一團對越神明精意流通妙境畫出一個不言自孚真象使人讀之感通之妙宛然在目卭首曰顒與神相對之象交神之時方盥而不薦則祼獻之事俱所未有然冥漠間一段精誠感通默與神孚者己見顒若之容矣此無他惟神明之德洋洋在上者實實誠不可掩故人心之誠不期孚而自孚大觀在上華始德曰大觀在上指上九爻有中正之五推尊大德君子在上以成大觀也其中正之德亦實實不可掩則得于觀感者不期化而自化一如顒若之孚故曰下觀而化也上二語引喻下觀而化乃正意觀化者觀中正之德也這都是神之所為自然而化全不假一毫人力故天有神道只是個四時不忒春有和風夏有薰風秋有金風冬有寒風自然天之化無日不流行聖人以天之神道設教只是個中正自然聖人之化亦無日不流行而天下服矣天地之道貞觀者也四時不忒天之貞故天道無為而化成中正以觀天下聖人之貞故聖人亦無為而化成所謂神道無為而已矣象曰風行地上觀先王以省方觀民設教省方以觀民設教以為觀天有八風隨方而異都是天之所以鼓萬物者萬物因風而變化故風行地上有觀象程子曰化天下只是一個風省方觀民以設之教王者之化便無處不到此王者之風行地上也設教非另有設施以立教書曰彰善疸惡樹之風聲只是省方一到風化便已到王者仍是無事天下自靡然鼓動矣此之謂神道設教初六童觀小人無咎君子吝象曰初六童觀小人道也卦以觀示為義據九五為主爻以觀瞻為義皆觀九五也六二窺觀利女貞象曰窺觀女貞亦可醜也六三觀我生進退象曰觀我生進退未失道也六四觀國之光利用賓于王象曰觀國之光尚賓也陽主生隂主成天地間生理只是這點陽氣故在臨稱命在觀稱生民之觀化乎上觀此生理也上之觀示于下亦此生理也巽風正是天地間東南一團生氣巽德正是大觀君子一團生理只要觀得著這假生理便沾得著這假生氣故四隂爻皆以觀二陽為義所觀漸近則漸吉也觀者觀五之中正也初最逺象顓蒙之赤子不過一蚩蚩之氓曰童觀可與同被風化不可語于達觀故君子則吝止可言小人之道二少進有所窺見矣然質柔不能上從五只好守而自持如門內之觀僅得女道之貞亦非君子之事故曰亦可醜也三則漸上觀漸近矣可以言觀生矣進則觀已之生可以為一世之觀法如大觀在上否退則觀已之生可以觀見上之中正以順承君子之生氣否如此審擇方合得聖人設教之神道故曰未失道四則與五同一巽體親炙大君子光輝觀國之光也四雖與下三爻同柔然所處則是風世之位必其可尊可貴者在已足以作賓于王方足以風動在下故利用賓于王稱賓者謂與五酬酢得來此非實以道自尚何能致王者賓禮象中尚字正貼利用字以道自尚之謂也所尚何事我生而已九五觀我生君子無咎象曰觀我生觀民也上九觀其生君子無咎象曰觀其生志未平也四柔所觀者二陽也二陽身司風世之任所以生生者全在二陽故二陽所觀合全卦為觀必羣隂皆得其生斯為陽之得其生也五君位天下人之生皆其生曰我生三云我在下位不過一身一已之我五云我通天下為一人之我天下之衆有一人未得其生者我未得其生故曰觀我生觀民也以天下為身是得位君子事必如此方稱得無咎上與五同德其係天下之觀仰與五同分明是一個師天下大君子曰觀其生蓋所觀者不特民不唐虞引為已責即君不堯舜亦引為已責故變我稱其特以我視天下與五不同其合天下以為生用心則一蓋天生先覺原為斯世而生其責任自當如此何論在位不在位伊尹曰一夫不獲時豫之辜弗俾厥后如堯舜若撻于市正是觀其生之事如此與得位君子原無兩樣故亦曰君子無咎象云志未平者真龍在上自然雲行雨施天下平其天下有未平總之已之責任未盡此上九君子必合天下而觀其生正是合天下而俱欲得其平故曰志未平總見生成一世覆幬乾坤都是陽剛君子司其事天下固不可一日無斯人君子亦不得一日自諉也君子無日不以生天下為心故以大觀在上不曰聽民之觀法而已而必皇皇焉觀生為心一則曰觀民一則曰志未平只為這生理一民遺不得如此方是君子之道總孟子曰得志與民由之不得志獨行其道觀我生進退也我非堯舜之道不敢以陳于王前利用賓于王也思天下之飢溺由已之飢溺觀我生觀民也夫欲平治天下舍我其誰畏天命悲人窮一日不敢忘天下此孔氏家法觀其生志未平也舍此不為童觀之小人即為窺觀之女子然則非有天下為生之心終不得稱君子人可知所用心矣噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分三隂三陽剛柔中半動而明雷電合而章柔得中而上行雖不當位利用獄也首二十卦先屯蒙以坎合震艮從人心入險處考動止起手功夫也終噬嗑賁以離合震艮從人心光明處考動止了手功夫也噬嗑合也要動合明明合動最是一假細密煆煉功夫取義于合者隂陽不合不成和天地不合不成化學問到合方是天理爛熟渾融無迹處所以莫妙是合然其合也豈是容易強合得所以要噬噬者市也交相易交相劑剛柔摩蕩到渾然變化田地方成得合故象曰噬嗑天地間物原人人可得以為養只要自家噬自家嗑各人自去用力噬而嗑方自家受用得所以曰噬嗑食也如食之在人噬與不噬嗑與不嗑無不在我而已象曰頤中有物有物字要玩剛者是仁柔者是義何人不可食只是不肯入口須得到口實實咀嚼一畨方稱得頤中有物有物方稱得噬嗑自然會亨剛柔分至合而章正明所以亨之故也朱子曰分均也曰均便見剛柔相濟為用柔如何少得剛剛如何少得柔所以要合動而明正是震剛與離柔合處合則動必皆明其動益妙明出于動其明益神相得而章故曰雷電合而章雷電合天地之變化未有顯見于此者君子明動之合其章也亦如之所以亨噬嗑明動之合以一假戒謹恐懼之心合于虛而能明之心自無隱不可燭故云利用獄天下所最難得者獄情只有敬謹虛明方可用獄用獄是懲治最細密功夫也人只不知用獄便有蔽明輕動之失若時時曉得利用獄如何敢不明動相須卦中六五一柔與二柔相應却上而居尊位本以震恐之小心進而為離中之虛明以此心用之于克治自足以防間隔去蔽障故曰雖不當位利用獄也不當位者五是離主與震初不相當如屯之九五應得初剛便有建侯能事噬嗑以柔應剛為不相當也然以柔濟剛用以克治却最妙所以利用獄則噬而嗑矣象曰雷電噬嗑先王以明罰勑法雷電相須為用一作並作噬嗑之象君子震威與離明並運明罰明以行其威也勑法威以藏其明也明罰未是用刑只如今之律令一一條例分明乃所以勑正其法也初九屨校滅趾無咎象曰屨校滅趾不行也不進于惡之象六爻噬字之義見于初上故言校全用克治工力嗑字之義見于中四爻故言膚言胏言肉全是得手滋味初與上正用獄工夫中爻皆頤中當有之物也初上兩剛雖原始要終之爻却以逺而不易合初上合自內外無不合矣初動難防在始屨校便是從初下手法所以慎其動而合之于明上明難徹在末路何校便是到底禁制法所以制其明而合之于動然警之于初者補救易施只有一個慎動便得力故可以無咎而象曰不行禁之于末者懲創無及終于不得故凶而象曰聰不明雖然知得何校之凶自然先有震恐心自然入求明之路上未嘗無善反之門也能反即是噬即便嗑六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也六三噬臘肉遇毒小吝無咎象曰遇毒位不當也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也膚鮮肉肉之美者柔中之象臘肉乾而美者近離之象有骨為胏剛爻之象乾肉離柔之象皆天地間美物人所待以生不可不噬者只是其中有害要知所防如膚之美而易噬要防滅鼻鼻人之中正所以辨味之可否者若但知膚美可噬不知中正當止便犯滅鼻之失二乘剛易于過動故有此戒然不過要知止終無大咎六三過中之柔美中有毒凡不當位便有過有過即是毒若但知臘美可噬而不知防亦犯遇毒之失然只是小吝終無大咎兩爻無咎皆承噬字看蓋能噬則有物矣所以可貴然雖無咎皆有失當戒以二柔爻震體防其失于動斯動與明合矣乾胏有骨比膚臘更貴乾肉比胏更美皆當噬然又要得金矢得黃金得者用力以求必得之詞蓋噬雖美物亦不可貪如人貪仁義之美亦即是病所以要得得金矢有剛直之節也又能艱能貞所以吉得黃金有剛中之節也又能貞而厲所以無咎金矢即震初之剛黃金即震中之柔皆相應之爻也蓋離明之照只是虛體必實實動中有得方為真得四得初合五得二合乃實得也此為金矢黃金四五離體明中有得則明與動合矣程子曰天下重擔子要得硬脊梁漢來擔按噬嗑任重道逺當仁不讓乾胏之噬也誠心直道不二不三金矢之得也四為剛爻噬之最可貴故獨言吉用力最不易故言艱貞曰未光則不如五之得中也二三防失要借離明烈火為煆煉之功四五有得要本震雷警懼成鑄造實益皆已精益精入細工夫得金矢已是不屈不撓完乾金剛健之德得黃金則既中又正直底純粹精微之域噬嗑合也豈易言哉上九何校滅耳凶象曰何校滅耳聰不明也義見初爻總噬嗑飲食之道也屨校何校聖人看得無窮危險在此中金矢黃金聖人又看得無窮精妙在此中頤中有物人可一日不知其物哉此義也發于頤再見于鼎飲食鮮知味聖人欲人之必察也如此卦以柔得中而上行為主三既逺初又不應五故曰不當五是柔中離主則曰得當觀此卦二爻知當不當全非隂居陽位之義也妙在相取相感耳周易像象述卷三

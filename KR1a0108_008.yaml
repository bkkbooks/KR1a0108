body:
  text: 周易像象述卷八明吳桂森撰兌亨利貞剛中故說而亨柔外故利于貞蓋說有亨道而其妄說不可以不戒彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉巽柔在初所以配震而成始物之事兌柔在上所以配艮而成終物之事故兌于時為秋正得秋而萬寶成萬物告成于秋兌成之也由此言之巽初一柔是造化所以發舒陽氣之妙用故曰風以散之兊上一柔是造化所以收斂陽氣之妙用故曰兌以說之此在上之柔為天之澤秋至而露降兌澤也露降而華者實頴者栗澤之說萬物也其所以為說者不是說此一柔只為這陽氣完足在內得柔來相感相和陽氣愈加充實凝結所以說是兌之為兌全以剛主柔柔為剛用也只是這柔不如巽之順陽却乘而在上若沒有陽剛在內作主一柔來都是隂消氣肅殺氣如何得成物此為毁為折皆兌也兌有亨道而非利貞則不亨所以最可喜是兌說最可畏亦是兌說兌利貞乾曰利貞者性情也情之最難貞莫如說如何方得貞情而歸性方得貞得貞之說說皆生意不貞之說說皆消機如何方得性其情剛為主而已故彖首提剛中而柔外剛中天理主之于內而柔順之于外則其說也都是天理內自然妙趣安有所謂非道之說何貞如之是以說而利貞則順乎天而應乎人因為這說從天理至當人心真好處流出也所以說之妙直到勞民而忘勞犯難而忘死人情所惡莫如勞與死到勞與死都是說這不是得乎天理之當合乎人心之安如何有此這樣情真是至公至正通乎天下的情故曰說之大民勸矣哉如此之說謂之性情彖中不釋亨順天應人其亨大矣巽柔在下從初要他順剛故曰小亨曰見大人從頭就小順大兊柔在上到底要他從剛故曰柔外曰民勸到頭是大得小其義一般處得上下兩柔則女道盡歸乾道八卦之事始畢象曰麗澤兌君子以朋友講習兩澤相麗互相滋益澤說萬物非一朝一夕之故所以要前後相麗猶風之言隨也君子人資己巳資人朋友相麗也既講之又習之講習相麗也麗方得流通方得浹洽便自然說樂莫樂于朋友朋友之樂莫過于講習故麗澤為說然說以利貞講習而不以貞何說之有初九和兌吉象曰和兌之吉行未疑也九二孚兌吉悔亡剛中為孚象曰孚兌之吉信志也六三來兌凶象曰來兌之凶位不當也九四商兌未寧介疾有喜象曰九四之喜有慶也上承九五之中正下比六三之柔邪故不能决而商度所說未能有定然質本陽剛故能介然守正而疾惡柔邪也九五孚于剝隂能剝陽有厲象曰孚于剝位正當也上六引兌象曰上六引兌未光也兌六爻兩卦相對看方清和與商相應二五以孚應來與引相應所難貞者兩柔能貞之者有孚而已初曰和兌說莫妙于和利物足以和義必其說以義為說才得和人說意初動多是天理所以初為和兌更無第二念夾雜曰行未疑也四應初雖亦外卦始爻却涉應用于說是第二個念頭人情易在此處差所以商兌未寧商者何五音有宫後有商苐二音也聲莫和于宫是初次而有商商以協宫也必商音和宫音方益和然商畢竟不易和以商乃宫之一變也人情初念和第二念未必和商兌也必得商兌和則初為真和然再念畢竟不易和所以未寧謂不定也正要在此處介得分明蓋商者傷也于行屬金極易傷和所以商便是疾于此分别得清只做和宫之商不為乖宫之商所以有喜也本義云商度只為有兩樣所以要商其義亦同介與初之疑相應大扺人說意從外感來者多是商兌兌卦之言宫商猶巽卦之言甲庚所包者廣古祭天地宗廟不用商音二五相孚二信得可說者只有這中正道理故孚兌之吉信志也二之孚孚五而已五居位必合一卦無不孚方見中正之極故于孚于剝何為剝凡說以情動人見為至可說者皆消滅中正之理者也這不是說中有病皆緣剛中之理未足若真是理之至可說即是情之至可說所謂孚于剝也此其得失間不容髮所以有厲只看天地間萬彚或遇兌澤而結實或遇兌澤而摧落何也其摧落者必春夏之生長陽氣先不足故也此受剝者也其結實者則陽氣充實故也此孚于剝者也碩果經霜露則愈甘松柏當凋落則獨秀如五之剛中正位真是愈剝而孚如勞民犯難似乎大妨說意而卒之民勸成天下大說所以利貞之說如此剝或指上六或兼三上俱不必泥三來兌與上引兌相應柔欲其在外三則居于內此內藏之說意也只怕有以來之來者以此說意來作主也如此便有浸淫之勢不滅正不止所以凶不當在內而來之曰位不當也上乃在外之說引者謂其所引動也引動則逐而必流之勢蓋說意難防到底易于滋蔓引之則日長終于失正所以曰未光見得非貞到底終不得光大也來與引非說中本有皆人自生之病利貞者貞此而已總初和全無染著之本心四商當機慎擇之决斷皆得于中者也三來根心當拔之私情上引末路難祛之牽繫皆剝中正者也以此辨說貞不貞了然矣巽發育生長無巽學入手無變化之門兌收斂結實無兌學到頭無歸完之局然生長中有裁成方是真變化此先庚後庚巽之全功也收斂中轉生成方是真歸完此孚于剝兌之全功也六庚完震孚剝完艮成六子全功大有曰元亨兌曰利貞大有大明終始也兌各正性命也却好乾道完成渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也序卦說而後散之人心體以巽風來鼓動何等發越暢快所以散而成渙人心體從兌說流行自然條理凖繩所以止而成節二卦坎了手工夫也首局乾坤既闢六坎為始中局蹇解居後震艮合坎也末局渙莭居後巽兌合坎也一部易始終完此心學坎是心體何以為險只為一㸃乾剛落在形氣中一時透不出所以有險若通得這一剛透險而出此心便是乾坤全體華認菴曰坎中畫透出便是全乾何以通之能通之者巽風也巽東南生氣天地一團仁德和風所以生養萬物都是巽風坎本北方易于寒沍凝結心體一凝滯都是險陷惟有東南和氣一到凝者自化結者自解故東風至則凍開開則散散則離謂不結聚渙然融釋所以為渙人心到凍解氷釋通身生氣流行何等融洽泮渙故渙天下第一樂趣渙曰散險者開散也又曰渙離也險者脫離也都是形容心體流通妙境所以渙自然亨以坎中之剛來而居內為剛而不窮蓋不通則窮便成了險通則不窮便出了險坎剛得巽五通之來而不窮也巽柔在上四既得位五得剛中上又與五同德能以剛通坎中之剛故曰上同二句緊承一氣貫下剛中通得上下所以成渙所以亨也得位者五能以五之中通二者在四故特提柔字大概巽之下行力多在四巽之通坎其默感默通有不期然而自然妙處故舉王假有廟以象之蓋天下感格人心不疾而速者無過假廟之事故王者一行假廟之禮則人自興起孝親之思舉世風動只為這一㸃尊祖敬宗之心原是人心本有中正之王以此風之于上自然默通于下故曰王乃在中其感其應皆在中之感也坎險不通便有險坎險一通便是利濟天下大用坎而遇巽何所不通如大川而濟之以木乘木濟川無所不利故曰乘木有功舟楫之利取諸渙巽乃生木故其利無窮如此曰在中曰有功何利貞如之假廟之事天下人心不期同而自同所以為萃天下人心不期通而自通所以為渙坎在艮山之下蒙為初出之泉在震雷之下解為大注之雨遇兌肅以收斂之則成困遇巽風以開通之則成渙到渙而險者盡化心得其為心矣象曰風行水上渙先王以享于帝立廟東風解凍渙象風行地上無為而民自服所以為觀風行水上無為而下自通所以成渙郊社以享帝立廟以事親正風動人心妙用也木本水源之思人人所自有故享帝立廟取諸渙木本水源之感人人所自喻故先王于渙以之享帝立廟知其義者治國如視諸掌乎初六用拯馬壯吉象曰初六之吉順也九二渙奔其機悔亡象曰渙奔其機得願也六三渙其躬無悔象曰渙其躬志在外也風水相渙坎要承受得風故內三爻以向五為義巽要通徹得坎故外三爻以風下為義坎之通于巽在九二剛中通之者在五之剛中初在下去五逺無由得通必藉二以通所以用拯馬二剛馬壯之象用拯之法只有順二故曰順也二剛來得中坎為輿則二有機象機即軏音兀在車中心鈎衡以駕馬者軏奔則輿行二奔則險出撰震能奔所以悔亡亡險之悔所以得願得通之願也初馬二機語脉相因三坎柔近巽身承巽風通身凝滯之私一經巽風盡從消釋渙躬之象又曰無悔悔而無則險意盡化不特悔亡巳象云志在外人多內見一身所以難得外通志在外方是渾身生氣流通所以成渙躬渙躬方是心體真通透故初與二不言渙到三方言渙凡不有其身而上從者皆曰志在外否初咸初是也六四渙其羣元吉渙有丘匪夷所思能散其小羣以成大羣使所散者聚而若丘則非常人思慮之所及也象曰渙其羣元吉光大也九五渙汗其大號渙王居無咎象曰王居無咎正位也上九渙其血去逖出無咎象曰渙其血逺害也四巽柔主爻行五之令于二者全在四能通上下成渙渙羣之象應初則能通初近三則能通三兩柔爻通則全卦俱通所謂渙小羣成大羣隂小陽大故元吉而云光大也然四所以風下者全以五之中正合天下之人聚而歸五之中正渙有丘也丘髙原之象撰艮為丘渙有丘則坎出無復平昔之險而匪夷所思矣坎心為思夷指初也豐曰夷主四初同柔等夷也初在下則又夷而下者也坎流易下惟從剛則登而上矣出乎坎登乎五謂之有丘有丘則不獨二奔三渙初亦得其拯向下心思盡從解釋而成渙矣匪夷所思也莫難通如初柔以夷而在上之故初渙方成其渙羣故爻中申明此語五為在中之王所以風天下者皆是五之命令故王之渙在汗其大號汗者心之液汗其大號則皆從心中流洽周遍天下更無不與人心流通反汗意不相切又曰渙王居王者通天下為一身一家有一處一人未歸風動終不成廣居惟汗其大號到人人通徹無一毫阻礙方是王居無外氣象八荒我闥之意也如此方正得在中之位曰正位也渙羣之義人只為形骸之見未通便以同乎已者為羣不同乎已者為非羣這羣何勝其小以此身為天下大公之身何同何異這羣何等樣大所以小羣渙便是大羣無兩層意渙羣以一已通天下也行命者之事渙汗通天下為一已也出命者之事兩爻通于一上九與五同德巽到上巽之極致則渙到此渙之極致渙其血對躬言也人一身有凝滯其私易解這病易見身中之血氣有凝滯其私難解這病不易見巽入到上九入之愈深方才這血氣之私亦一掃都盡這些身中之害方才得去而逺逺而出故曰逺害也去逖出三字一步逺一步害盡去方是渙之成功故以要終焉大凡上爻要另一法看總有四樣有進一步為義有出一格為義有反言以盡其變為義有究言以詣其極為義此爻究言其極者也總工夫說到渙心學無餘事矣心不通不活用拯馬借資于人以通之也奔其機用力于已以通之也這要身親實受謂之渙其躬又要得所向往謂之渙有丘夫然則心廣而體胖亦四通而八逹一己之私不期逺而自逺不期去而自去矣此渙血也心而非血氣之心何妙如之看來所謂渙者只是去一己形骸之見而為天下大公之見便是凍解氷釋爻中所云不同不出此兩項從一己起見謂之小羣謂之血氣之私謂之害這都是下流一路所當拯與逺者也從大公起見謂之大羣謂之王居謂之有丘這都是上達一路所謂光與大者也隨爻象命名其實一理在觀者㑹通之節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民天地之氣出而發育為震為離入而收斂為兌為坎此天地之節也所以水澤為節渙自坎而巽心之出機流行發越所以逹心之用節自兌而坎心之入機節制謹凛所以還心之體故渙後受之以節節者天地自然之節奏即人心自然之品則惟節然後知一規一矩皆吾心中故物循規蹈矩都是心體中自然之說夫子之從心所欲不踰矩節也節坎剛上兌柔下上下兩分而得其均平則剛不凌柔柔不蝕剛有截然不相紊者矣而剛得中又正位則截然有辨中有一定之極以為之主宰者此所以為天然之節而其道自亨蓋分而辨則莭之界限了然辨而得中則節之至理確然原無一毫勉强節所以為貞若不是天然之中就是節所當節亦未免過而苦矣苦則難貞何以能久節之窮也說以行險下則提明莭之妙妙于通惟通也然後成節見節原無窮通坎為通兌說在內卦人心最易縱而難防易流而難制者此一㸃說意惟說以行險時時見得險在前則一步不敢肆自成隄防謹凛是節之成成于坎中九五也蓋以此剛中正當位惟其當位分明一個天理極至之則惟其中正這天理極則即是人心自然所以節處正是通處千感萬應界限森嚴却自天機適當則險處仍是至可說處所以節而通也以通字對節說才見得節中正之妙故天地節而四時成不有秋冬收斂必無春夏發生天地之氣以節而通也聖人制度不有名分等級之節必不免傷財害民是聖人之制節以節而通也向非中正如何得節而通則節之所貴一中而已矣說以行險所謂和而節以禮之節也中正以通所謂發而中節之和也坎在震上為盈滿之屯雲在艮上為得止之蹇水在巽上為養而不窮之井泉在兌上為通而不溢之莭水到節之通而水亦無險可言矣象曰澤上有水節君子以制數度議德行澤上有水則水非橫溢之水澤氣斂水澤為通行之澤莭象多寡有數長短有度此有定則而可循者也德行從心而行此不可以定則尋者也惟制數度以議德行此為有節之德行而不窮之數度也制數度坎法之象議德行兌和之象初九不出户庭無咎居節之初未可以行能節而止者也象曰不出户庭知通塞也九二不出門庭凶當可行之時知節而不知通象曰不出門庭凶失時極也六三不莭若則嗟若無咎象曰不節之嗟又誰咎也本義作無所歸咎當變通其說六四安節亨象曰安節之亨承上道也九五甘節吉往有尚象曰甘莭之吉居位中也上六苦節貞凶悔亡象曰苦節貞凶其道窮也六爻每爻中有個自然之節初在下不出初之節也得其節不出就是通故象謂之知通塞二有位能出二之節也不出就失了時極極即中至當處也二之剛中宜不至失以切近三柔又坎在前所以有不出之象六三雖不節知嗟就是知節所以人不得而咎之四安節只是安心順五之中正故曰承上道也九五中正以通所以獨稱甘甘正是中心可說處中節之和也又要尚往蓋往方是不窮而通即坎之行冇尚到甘節全是天理流行無所往不是天理用事入夷狄患難俱自得所謂往有尚也上則過中而苦然時當其過不得不苦故苦亦節也所以雖凶而悔亡苦字正與甘字相較勘苦節貞凶悔亡與過涉滅項凶無咎同例户在門內所以居身於此不出是謹密其身之道故無咎門在户外所以通行于此不出是閉塞其身之道故凶兊口風波莭之最難須從起處謹慎當不出而不出塞所以為通也兌澤說物流通為貴須要人已流行當出而不出宜通而塞失時行之極矣三正是兌口極易不節一失便嗟猶是失中有節可以補過之法也則字來得緊一甘一苦事若相反其道相成位不同也甘則通苦則窮君子不貴窮亦不諱窮故甘可以律已亦可以律人苦不可以律人而猶可以律己人苦其苦我甘其苦雖苦亦甘也所以悔可亡是以時通則通不可無甘節之正時窮則窮亦不可無苦莭之貞古之人如西山之餓朝鮮之行皆苦也即皆甘也即至窮而不食嗟來苦而苦矣然與乞墦壟斷不大相徑庭乎此之為悔亡總六爻界限分明可以觀數度隨時處中則君子之德行也心體到渙百脉皆通心量之廣大無不遍滿得巽風開蕩之力故渙離也心體到節周身矩度心極之自然無不妙合得兌說安止之則故節止也此為心學全功中孚豚魚吉利涉大川利貞二隂在內四陽在外而二五之陽皆得其中以一卦言之為中虗以二體言之為中實皆孚信之象也又下說以應上工巽以順下亦為孚義彖曰中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也中孚巽兌了手工夫中孚二體皆柔其孚也以剛中剛主柔也小過二體皆剛其過也以小有大者以用小而過所當過也亦剛主柔也先天圖巽兌與乾並在上蓋坤上交乾成巽兌故女道所以經天巽者何也即天理中自然一假巽順也兌者何也即天理中自然一假和說也故所巽者巽此天所說者說此天卦有兩體所為天者無兩體剛中一畫天體也巽兌合為孚孚之以剛中故命為中孚中孚者一天之自然相孚所以彖傳中特明應天二字卦以二五得中為孚則孚者剛也然惟兩柔在內但有順從並無間隔所以二五得成其孚柔雖在內所以孚乎兩柔者則得中之剛也故先提柔在內而即曰剛得中文勢重在剛中中者人心之天是也巽以中說以中則全是一團天理用事豈不成孚孚則何所不感通蓋說在內根于中心者也巽在外露于形現者也根心與形外者一中相孚真是自身而家家而國措之天下無不通故曰孚乃化邦也孚字根巽說來孚之所感信在感先孚之所應信在應先豈惟通于有知有覺直通于不知不覺故曰信及豚魚也豚魚江豚無知而有信生于澤而動于風故取以象中孚或謂吉在豚魚或謂吉在信及豚魚者皆非也謂孚之感人如風之感豚魚不速而自信故吉耳利涉大川川兌象乘木巽象舟虛中二柔也巽兌相通全以中虗所以成利濟之功中虛之義甚妙巽而主一巽之見說而主一說之見皆實而非虗惟巽以中說以中則仍無巽說虗了這兩見所以利涉也如此看來巽與說都是天理中性情何有不孚其有未孚只為一巽便有偏于巽而不中失了巽之貞一說便有偏于說而不中失了說之貞中孚而利貞一以剛中孚則孚皆天矣所謂應乎天也以天字明中正是直指人心之天中孚誠也誠者天之道也杜詩江豚吹浪夜還風其出也常在風前風未起豚先出若有以招之然豚何知風則有以感之其感應之際有不知其然而然者最可觀相孚微理象曰澤上有風中孚君子以議獄緩死緩寬也山澤通氣雷風相薄皆以爻位相當而成相與山澤二少震巽二長六爻剛柔皆應爻相當也艮兌西北與東南相對震巽西南與東北相對位相當也風與澤不相當然風以動澤澤以應風有默默自然孚者中孚之象君子以巽生之心行其兌肅所以議獄以兌說之心行其巽風故緩死其議與緩也君子之心孚于下民其獄與死也小民之心必信于君子信及豚魚此也初九虞吉有他不燕能度其可信而信之則吉復冇他焉則失其所以度之之正而不得其所度矣象曰初九虞吉志未變也九二鳴鶴在隂其子和之我有好爵吾與爾靡與縻同之鶴在隂謂九居二好爵謂得中象曰其子和之中心願也中孚之義說不必有意去孚巽得乎二之中則自然孚巽故初與三欲歸二巽不必有意來孚說得乎巽之中則自然孚說故四與上欲歸五吉凶之情于此而分初剛而非中當信從二之中者也曰虞吉虞掌山澤之官有專守者也山有山虞澤有澤虞鳥守澤中名虞故古以之命官初說之始要守其中正之說則得吉然守甚不易說之初易于貞其後最難貞有他不燕之可奪焉不燕不安也惟有他不燕而其守不變方得虞之吉曰志未變也說體易變不燕之端頗多到底要虞故申明以防之與大過四爻有他吝同文二五雖同為中孚之主二在內卦為中心尤一卦之主鶴鳴子和亦是全卦之象巽為禽五尊貴禽中之鶴也兌在下少柔無異鶴之子也鶴鳴則子和兌豈可以不孚巽五二句只說當孚下二句申明之鶴不能不和則我有好爵豈可不同心以縻之縻者相為縻繫謂好之無己也其曰爾則二誥初與三之詞以巽五中正之美合卦皆當孚孚之自二始故云吾與爾也好爵如云天爵中德人心同好之貴德孚巽德人人中心之同願故曰中心願也巽長兌少全兌皆子象在隂者鶴八月露降則鳴以隂氣鳴巽得兌在隂之象本義以子屬五稍未安鶴子之象不必泥玩中心願句惟鶴子之和根于中心故聲自孚人之慕好德如子之于鶴則何有不孚繫詞發揮言行在邇而應在逺正是此意六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也六四月幾望馬匹亡無咎匹謂初與已為匹四乃絶之而上以信於五故為馬匹亡之彖象日馬匹亡絶類上也三四兩柔切近相比似為易孚不知柔不能自孚三而說以中四而巽以中則自然孚若不以剛中只把這些說意巽意求孚如何孚得故以三視四則所得者敵也艮曰上下敵應得敵當得者也既謂之敵三自有三當得道理四自有四當得道理各不相與却各自相得若以三去孚四則無主之說豈有定情所以或動于巽而鼓又或自斂于兌而罷或以憂而泣或以喜而歌泣兌澤象歌巽風象總無常主何以成孚皆以三既非中又不當相應之位也四則為望月望月者何月初生出于西兌月也兊月魄多于光月將望出于東巽月也巽月光多于魄要月之光以得日而光非月能自光則巽之幾望以剛中而望非四能自望所以只宜上而從五不宜下而比兌比兌月就虧之象故又曰馬匹亡三為四之匹指初不若指三于隂類更親切必絶去三之匹專一從五如此方無咎人之巽也以其可說而巽巽何得光絶去說意一味巽所當巽則巽皆中矣同一柔爻三不如四則以三乘剛四順剛不同也三以四為敵四以三為匹九五有孚攣如無咎象曰有孚攣如位正當也上九翰音登于天貞凶象曰翰音登于天何可長也雞非登天物而欲登天信非所信不知變猶是也五以剛中當正位二自然以中孚二孚則一卦成孚曰攣如攣有膠結不解之象又有並凑聨合之象中則又何咎上為過中之巽五可貴為鶴上非鶴也則巽雞而已五以中故子自下和上無下為和則翰音登天之鳴而巳登天髙而不下之象以此為貞其凶可知司晨報曉翰音報午司晨一鳴羣鳴翰音不羣鳴聲之不相孚者故凶上九過躁之巽如翰音過時之鳴何以成孚登天之義正與在隂字相反易中一字不虛下類如此鶴可以登天而鳴在隂故下必孚雞不能登天而上鳴故下不孚也總孚人者主心不定以或來或去之說求孚于人必不孚皆或鼓或罷者也中無實德以聲音笑貌之巽求人之孚亦必不孚皆翰音登天者也翰音身不能髙而聲髙似人之的然炫外者小畜言攣如言幾望中孚再見小畜巽之始事中孚巽之終事故同履曰應乾五曰位正當中孚曰應天五亦曰位正當履兌之始事中孚兌之終事故亦同易中脉絡一線不差可見小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也小過震艮了手工夫小過柔用也所以用之者剛也知柔之用皆剛則震艮二南之變化盡矣過只是有餘二字非以偏勝而謂之過兌巽合四剛兩柔剛大有餘做得大事大過震艮合四柔兩剛柔小有餘做得小事故大者有時當過小者亦有時當過其過也如過于謙小過于遜下皆是柔道當然所以小過而亨如何得亨過而貞則當乎時而亨如何則時雖柔過仍以剛為主便得中而時若只管柔去便不中而非時此所謂貞也然柔不利逺究竟只是小事吉大事非剛不濟不可大事也四柔爻在上兩柔與在下兩柔其情絶不同過而在下以柔居卑猶可言也過而在上以柔乘剛其不可明矣又以卦德言之艮柔止於下止則不過震柔動于上則過而過矣象以飛鳥者鳥質柔而上飛實無大用艮為黔喙震為善鳴故有遺音之象鳥何為宜下不宜上凡上于剛大為上下于剛大為下只以中孚看便見如翰音之登天身在下而聲在上此不宜上而過上也凡聲至而實不至揚詡務外皆上音也不宜孰甚焉如鳴鶴之在隂身可上而鳴于下此宜于下而寧下非過也凡務內不務名實大聲宏者皆下音也宜孰甚焉故大吉宜不宜之分因乘剛不乘剛之分故上則逆下則順也柔而有餘其過未為病也有貞可利有時可行有中可得何害于柔惟夫柔本小也而欲大用之柔宜下也而欲上乘之其有餘者皆病過而過矣此彖分明設可不可宜不宜兩路以待人之决擇細看飛鳥遺之音句不必牽屬上下文宜另看是聖人特擬一象以盡卦意與離之畜牝牛同例蓋凡是柔小之品未有不以聲音笑貌動人赫然炫耀為事者如飛鳥遺之音然若夫大德君子暗然務實聲色不露何遺音之有不宜一句自直闡本卦正義不必粘鳥音如何為不宜上等語而意自在其中看易辭俱要圓脫味爻中兩飛鳥自見象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉雷必發于重隂之下今艮山之上而有雷隂氣過盛之故所以雷山為小過然亦有當動之時動而不失止之道則雖動不為過君子過恭過哀過儉皆不嫌于過則合動止之時者也初六飛鳥以凶象曰飛鳥以凶不可如何也六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也本義進則過三四而遇六五是過陽而反遇隂也如此則不及六五而自得其分是不及君而適遇其臣也皆過而不過守正得中之意中用如此二字似覺牽纒小過只彖辭可小不可大不宜上宜下其義盡之矣六爻總是一意惟二在下得中為得其道餘爻皆不能盡善可見用小未易言非能用大必不能用小必能用小方完得用大小過之時義未嘗不大也四柔爻既有上下之分又有中不中之分初上俱不中其必不能貞可知故直以飛鳥歸之二得中在下盡善在二故小過之義盡發于此爻過其祖九四剛爻上卦祖也二不應四而應五過其祖之象謂過而不得相遇也然祖雖不得遇妣之位在二則正所遇也遇妣之道當何如一意以從剛則妣道得矣此二句教二當從四也二五相應五君位也君道在剛大而六五以柔居之不及其君之象謂不及遇剛中之君也然君雖不及遇臣位在二則正所遇也遇臣之道當何如一意以順從則臣道得矣若遇臣而不得遇之道是過在臣也臣可過乎蓋有過有不及者剛大失位之故然剛大雖不遇而只以柔小之道自盡此小之貞也則何咎之有不及二句教二以與五之道坤曰妻道也臣道也故此爻並舉二項以盡柔小之義四為祖三為父二為母九三弗過防之從或戕之凶象曰從或戕之凶如何也九四無咎弗過遇之往厲必戒勿用句永貞象曰弗過遇之位不當也往厲必戒終不可長也三四兩剛則主四柔者也以剛而用柔柔何患于有餘所以皆為弗過然三之應在上所當防者也若不知防而上從之則必為所戕矣戕自外來曰或春秋傳自外曰戕蓋上本逆而上乘之柔以失位之剛從之不自止而以妄動其害可勝言乎惟其尚可防也曰凶如何初曰不可如何無得而救治也三曰凶如何正在救治時也若當防而不防終亦末如之何而巳四則震主也以剛動柔有合時行所以無咎柔雖弗過在四則當有遇之道無心相值為遇即姤卦遇字義以剛為主而聽柔之應則遇也若不以剛主而動于柔則非以我遇而因彼往也往即從也往則必厲所當戒而勿用也勿用謂勿往勿往則可以永貞此柔矣有餘之柔終不可長所以遇之有道方得永貞以四剛不當尊位之故遇不但遇五也柔在下有遇初柔之道柔在上有遇上六之道總之兩剛貴以大用小不可為小所用此為弗過也六五密雲不雨自我西郊公弋取彼在穴在穴隂物也象曰密雲不雨已上也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也五之位則尊位也然柔而乘剛不能與剛相感應則不可用之柔有密雲不雨之象自我西郊者震艮皆東今過而西矣撰兌之象所以不成雨其病皆已上之故必如何則雨得在下之柔則隂陽應而雨矣公弋取彼在穴正教以取在下之柔也震為公上為飛鳥初為在穴之鳥公之所取不弋在上之飛鳥而弋在穴之鳥則柔不上亢而下順過而弗過矣則不雨者可雨矣五何以弋初四初之應也然則五非從四為主不能得在下之柔矣曰弋曰取有用力煩難之意在中孚四一爻兩象小過五亦一爻兩象要知兩象原一意相承惟馬匹亡然後月真望月惟弋在穴然後雲為雨雲細玩之方得其㫖上六愈上則愈逆雖有正應在三已亢而上所以弗遇過之過而過矣直上飛之鳥也初鳥本在下只是應四而動志在上飛是自家求凶曰以凶自以之凶即大象君子以等以字上鳥則但有上而不知下其身已麗于凶境曰離之凶離者麗也這所麗之凶雖是天災其實飛之自取故謂之災眚凶亦甚矣爻中三言遇要分明四之遇以剛遇柔之道也上之遇柔當遇之剛也二之遇則位不得與剛遇而就所處之時位為遇也俱有精義小畜密雲密則必雨曰尚往小過密雲密而不雨曰已上取義各别中孚小過相通中孚陽鳥而大故鳴則和可以髙飛小過隂鳥而小故鳴不過遺音髙飛則凶總柔道無過一下初在下矣才以向于動便凶人不能下止一念飛揚即凶之端也五得中矣尤必下弋人所處雖髙不知自下終不成雲雨也三四兩剛弗過矣必防必戒防且戒者因柔之上與亢也至于飛鳥之凶不必言矣然則小過之亨豈易言㦲非兢兢乎執婦道執臣道如二未可言亨矣坤上六龍戰之義盡于小過一卦大小二過俱柔原始柔要終惟當本末俱柔而大者常出用事則無時非大矣惟當小者方過而大者不使之過則無用非大矣此兩過同一義也蓋時有當大當小道無大小故聖人大成其大小亦成其大唐虞之地平天成大也茅茨土階小也仲尼之祖述憲章大也學禮問官小也主張世道宜于大克勤細行宜于小然一簣之積即丘山之基涓涓不已即江河之脉安見小之不歸于大㦲故曰小德川流大德敦化小大一致崇而效卑而法參兩能事也易義于此至矣故上下經以二卦終焉畜以積纍為成功故先小後大過以變通為妙用故先大後小既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也既濟未濟坎離互交坎離即後天乾坤也故易終焉乾坤之用惟坎離坎離之用惟交交則濟矣濟水火相濟也水濕火燥水寒火熱兩體不同而其實相濟者莫如水火水非火不行故真水必生于火火非水不養故真火必藏于水真隂在離宫龍火在坎宫水火原自相濟因何而不濟只為一成水性便潤下一成火性便炎上上下不相交所以要濟必須交以炎上者返而處下則潤下者蒸而行上自交而成濟矣人心亦然坎之險心體也離之明心用也原非二物但一落心體其勢下流漸染沉溺愈下而不得上逹一發為心明其勢上騖炫耀驕亢愈上而不肯下照如何得交所以要濟必使離之外見也下而返照坎之內伏也出而上行則交而濟矣此為既濟既盡也水火濟則隂陽和坎離濟則性情方得中和所以濟有亨道然濟之所以成全在離明一來是濟之亨亨于離中柔小故曰小者亨也蓋惟明常內朗則心體自正心體得正則剛柔之用皆得其正何利如之何貞如之故曰利貞剛柔正而位當也由此言之可見濟處全是人心自下自小自以明破暗若一息不明便不成濟即使暫明而不時時明亦終不成濟所以初易吉終易亂蓋惟常濟則常貞而不亂若一或不濟便是亂故曰終止則亂亂則窮矣然則欲其無亂必先無止人非有惺惺不息之明體烏能無止乎以亨小言濟其義至微人皆知心體廣大不知惟心小乃成廣大蓋小至虛至明之體也九五大也六二小也小得其小則大得其大如此剛柔自相濟所以得正得當位這心體何嘗有始易終難只怕人自家有始無終故彖𫝊發明終止則亂不止何亂止與不止顧人之自力何如耳水滅火甚易以火濟水甚難險滅明甚易以明濟險甚難故設終亂之戒雖然明暗無常體也才見以為明則即明成險矣才知其難明則即險成明矣故既濟之功必不可無既濟之見必不可有惟常知有初吉終亂者在此一念也即真明之體而既所以常濟者也象曰水在火上既濟君子以思患而豫防之水在火上則水為升騰變化之水火為抑制降伏之火既濟之象然則使非既濟水火上下違行矣皆患也故君子思患而豫防之既濟之患無形思而後知可患既濟之防未然豫而後為善防故思患則無患豫防則無防不然患至而不可防思亦無如何矣初九曵其輪濡其尾無咎象曰曵其輪義無咎也既濟之初謹戒如是無咎之道坎離相濟然惟以離濟坎也坎濟而離亦濟故爻中取濟水為象用力在內三爻外三爻言濟之候而已初濟之始曵輪涉水之輪也曵者控制之義車之行以輪然非有人力以制馭之則未免有覆轍之虞况當涉險之際惟有曵輪之妙則雖有濡尾之險亦可以濟矣獸之渡必揭尾水逺則濡尾以初視上坎險逺水大故至于濡尾然從初能曵雖逺可濟故濡而無咎文勢一直下味小象文可見離之所貴雖在柔中非麗兩剛亦不能濟初剛故曵輪能事繫于初曵輪之象其㫖最微程子曰人心如翻車輪之義也又曰人須是以心使心方得曵輪之義也心機輾轉無晷刻之停非控制有道馳之騖之惟其所之險何由出所以不可不曵也何以曵之曰天理而已操于當機惟此法持于未然亦惟此法故既未二卦同曰曵輪焉知曵輪方可幾御天妙用六二婦喪其茀勿逐七日得茀婦車之蔽言失其所以行也然中正之道不可終廢時過則行矣故又有勿逐而自得之戒象曰七日得以中道也九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也二柔中當位與五正應有君夫人之象茀夫人車飾詩曰翟茀以朝最可貴者也九三在二前茀象只因坎四在上離明一時未易通故有喪茀之象然中順在二九五自來相通通則喪者得矣故不必逐也七日離七數夫明與暗相通不易剛明亦有時難用象喪茀以中自守將自通以明求通未必通所以勿逐乃得也小亨之道盡于六二三則全以剛用且近坎險以明祛暗三當其任故以髙宗伐鬼方象之鬼方至幽至險之地克之甚不易故曰三年克之憊也正應上六乃濡首小人必不可泥故又戒以勿用蓋暗非到底明徹之盡終不成濟所以必不可用初與三當剛而用剛二當柔而用柔皆得剛柔之正故也六四繻有衣袽終日戒象曰終日戒有所疑也九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也上六濡其首厲象曰濡其首厲何可久也四坎柔未能出險繻衣襟濕衣曰袽以繻作濡衣袽所以塞舟似鑿夫濟險而至于袽其衣可無戒乎終日戒無一息可忘戒也象曰有所疑坎體多疑既疑上險之難出又疑下明之難于濟也惟能戒則何不濟矣五剛中一卦之主至五而水火濟則柔中之用盡歸剛中只以剛中用而已此所謂時也東鄰西鄰離位東以坎視之則東鄰坎位西以離視之則西鄰離以文勝二以柔麗剛無異殺牛離中牝牛以舉盛禮坎以實勝五居中無異禴祭而誠有餘夫祭與其誠不足而禮有餘不若禮不足而誠有餘此東鄰不如西鄰之受福也以剛中受福剛大之吉故曰吉大來先有二之柔中可以濟坎故彖云柔得中然必有五之剛中濟之剛柔才永貞故曰吉大來至于剛大來則不惟初吉而終亦無亂矣以坎五即乾五之天德也本義九五居尊而時已過不如六二之在下而始得時也以六二為時不合大來字且謂五過時亦無據上險之極終不易濟故有濡首之厲濡尾猶可濟濡首則必不能濟矣以既濟之終宜若險可出矣猶有濡首之危者可見險有一步未脫則全身之陷溺無難不曰將濟矣而無妨濡首也故末路難防善後可畏君子戒謹沒身無止法彖曰終止則亂正此之謂也東鄰不如西鄰之時何以謂之時蓋離二以明破險是火候未到之時時未到用力煩難雖費力多而未必能感通故未見其受益坎五剛中得明以濟是火候既到之時時既到不煩費力而自能感無不通故雖舉一念可以享神可以受福然不有用明之難而不能得誠之易東鄰殺牛博學詳說工夫西鄰禴祭反約之妙境也乾上坤下以交而成泰離上坎下以交而成濟濟即泰體也泰二一爻上而九五則為濟矣故泰曰大來既濟之五曰吉大來以此一剛為主總內爻用曵用喪用伐以明去險不遺餘力非百倍之功不濟也外爻用戒用誠返險為明無過敬謹非始終如一不濟也然濡首之厲尤嚴于終爻蓋險無終窮濟後之險無異濟前之險故又繼之以未濟焉中庸自明誠謂教既濟自明而誠之學故至五方得實受其福明至此而誠也全從人力幹旋造化由教以復性也未濟亨小狐汔濟濡其尾無攸利汔幾也彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也離上坎下一南一北此不易之定體水火交而濟濟則水上火下離北坎南通身翻轉俱成變化然離下交矣下者能常在下乎其炎上之體自若也坎上行矣上者能常在上乎其潤下之性自若也是變化之中有不可變者在也則濟之中其未濟者仍在也故既濟之後受之以未濟惟濟之後猶然未濟則所以濟之之道到底無止法明可以照險矣而明之難下降自若險可以明破矣而險之難上出自若易不于未濟之後言濟惟于既濟之後言未然後知心體中變變化化還是不變不化雖不變不化却必要變變化化循環相禪曽無終窮故序卦曰物不可窮也受之以未濟終焉非觀未濟烏知道理無窮工夫亦無窮必常未也然後可以常濟常濟則庶幾乎乾之不息矣此六十四卦終于一未文王不已心法也未濟坎一在下離九在上天地始終之運偹于此卦隂陽互藏之妙見于此卦所以名之為未者只是坎一才有始離九方有終坎險未歷到離明終未成濟所以人生眼界光明易開心體伏根難换終身只在未字局中然雖未濟而天明天誠此體具足故原有亨道蓋就離在上言六五一柔是人心虗中之明本無可加亦無可損得中之柔也豈因既濟而通因未濟而暗所以亨但就坎在下言坎中一剛却陷于下不容易便透得出象小狐然汔幾也可以濟却不敢濟中可以出却未能出這都是起疑端自生畏縮所以濡其尾而無攸利也蓋濟之難難在有終如小狐之不敢前安望有終于後必不能繼之道故曰不續終也非坎之出中真有終之難續也剛而能奮何險不出就是渾身陷入正好透底上出何畏于濡尾特人自怯自懦自成其小狐所以不續終謂之不續可見人自不續也若論坎離二德有何不可濟剛居二柔居五雖不當尊卑之位而却兩相應應則交應則柔來從剛便明得其明剛上應明便險出于險上下交而成濟只在一念展轉間又豈有不續終之患哉聖人于亨中指其續終之難則濟之甚不易于難中又指出剛柔應則濟之原無難分明示人一條善濟之路既濟坎在上曰終止則亂未濟坎在下又曰不續終蓋前路明末路暗終是未明故既濟防其終也若前路暗後來安得明到底是暗故未濟先慮其終于始如何方得有終坎一盡歸離九則全身摩蕩一過自始至終透體通明才是有終此之謂大明終始以離明終則乾道之變化有終坎剛上交離却好完乾象故彖傳不續終非難于續未濟之終要續三百八十四之終也未濟男之窮因坎在下未交于離窮而未通謂之窮三陽失位于義未盡象曰火在水上未濟君子以慎辨物居方水火異物各居其所故君子觀象而審辨之水火不交未濟象慎辨物辨其性也水下火上之性慎居方止其所也離南坎北之方惟辨物知水火之性必不同惟居方知水火之居必不可以不濟挽回未濟全在一慎辨其物性然後得其所以居之方乾坤亦物也天尊地卑亦居方也惟地必上而從天惟水必上而交火方以類聚物以羣分吉凶由此而生烏可以不慎一不慎而未濟者終無以濟矣故君子于未濟知終身戒慎無止法思患豫防君子不以既為既慎辨物居方君子不以未為未二五在中環應無窮尤聖人立象以示人之妙初六濡其尾吝象曰濡其尾亦不知極也九二曵其輪貞吉象曰九二貞吉中以行正也六三未濟征凶利涉大川象曰未濟征凶位不當也既濟未濟原是一體初在下皆尾也既濟之初剛雖濡猶可以濟故無咎未濟之初柔即彖中小狐濡則不能濟故吝蓋既初明體即始可以見終則可以濟未初坎疑從初狐疑將何以濟象曰不知極即極至之極天下事有個至極之理知其極則可以造其域而終濟初之柔暗不足以語此故云不知極也二剛中所以能曵輪既初曵輪將濟而曵已可以不濡未二曵輪則當險中能曵其必出險無疑矣所以貞吉坎以上行為正二曵足以行故曰中以行正曵而不進之說與行正似不合三乘剛之柔險之難出皆在于三故獨言未濟此極不相得之爻曰位未當未濟而征征安得不凶既要濟如何又不可征蓋濟有濟之道不求其道漫然而征所以凶也濟之道何在三之險在內內險未涉如何外征故利涉大川先涉得自家險關自然通行得天下此未濟之濟法也凡易中涉大川皆有涉之具在非空為責難之詞未濟之貴慎正于此爻初以濟二為極而濡則不知極三以涉二為利而征則失其利蓋心德在坎中濟不濟皆在此耳故濟險之道無過曵輪妙法九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也暉者光之散也上九有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知莭也四即既濟之三也柔中所麗用明去暗得力在此爻且居上卦尤得其位故貞吉又悔亡成伐鬼方之功謂之震用者既濟之險在上為暗之首故曰克曰憊見能勝之難未濟之險在初為暗之底非從兜根震動不能徹底光明故曰震用曰三年有賞見成功之難如有虞之格三苖格其心震用也如此險方濟坎中上行故曰志行五得位得中明至此為大明貞吉又無悔無悔則不但悔可亡而已文明之德在上曰君子之光合天下皆在光被中曰有孚象中暉字正釋有孚光之所及為暉君子明其德而天下盡明其德更無一幽險不照徹所謂有孚吉也貞吉吉在君子孚吉吉在一卦上九要終之明明至此有終矣心體中有一絲一線險意未盡不能有此徹首徹尾之明到此所謂誠明合一心之險非險也日用飲食式飲庶幾者也有孚飲酒之象蓋心體光明圓滿已是正性命保太和境界然非曰到此便可以無防也倘一念自生得意自起逸豫即此便是暗端仍復是不續終也如飲酒者至和樂中却有醉可虞一醉濡首之病仍在向之有孚者盡失其是矣故曰飲酒濡首有孚失是明暗原無定體是便明不是便非明到底有一著失其是便到底暗根未拔聖人看來還是沒頭未出此險也危矣象曰不知節以節字闡明是字更覺分明道理至當處天然有節限在略過此便為失是失是則終于未濟而已飲酒濡首其義最可味人未醉時胸中本自了了才一分過量不覺昏瞀莫能自主人心明與暗之界無不皆然才一毫過其當然之度便漸入眩惑無所不至皆由不知節也聖人以此示人何等警切是之一字時也節之一字中也常知是不可失節不可昧這便是真明所以君子要終只見個未乃所以要終成其濟也微矣總未濟彖辭頗危爻辭頗善僅于初爻有吝二曰貞吉三曰利涉四曰貞吉悔亡五曰貞吉無悔上曰有孚無咎皆從一未字中得力來乾坤既列首經六坎未濟還以坎終蓋乾易以知險不知險非乾學故未濟之輪不曵乘龍御天虛談也未濟之光輝不孚大明終始虛談也未濟之飲酒不孚雲行雨施虛談也而末防濡首尤為緊嚴人終身不免濡首一局首出庶物豈可望乎蓋惟坎險無終窮故乾健無止法惕乎其惕懼以終始此為易㫖也易首乾象以龍終未濟象以狐人而不能雲行雨施雖幻化神竒狐而非龍也次坤象以馬小過象以鳥人而不能行地無疆雖髙飛逺翔鳥而非馬也天用莫如龍地用莫如馬皆人參天兩地之用變而為妖狐獝而為飛鳥則人之自取焉耳周易像象𫐠卷八

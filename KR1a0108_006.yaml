body:
  text: 周易像象述卷六眀吳桂森撰損有孚元吉無咎可貞利有攸往損下卦上畫之陽益上卦上畫之隂曷之用二簋可用享言當損時則至薄無害彖曰損損一益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行上經以泰否居中下經以損益居中損益即泰否之第四變一變隨蠱二變噬嗑三變咸恆損卦止在上要終成泰之事益卦震在下從根傾否之事能盡損益之道方得有泰無否故夫子雜卦翻損益于上經翻否泰于下經以人事回氣運非損益其道無由也損益乃以兑巽二女之事完成震艮二男之事蓋從柔道以補剛道先致力其小以求諧其大精細工夫也損者以日減為日增之事益者以善下為善進之事損兑在下要從兑説進步故其妙只在上行二字益巽在上要從巽入得力故其妙只在下下二字損下益下即損內益外也人若肯自家從身尅治自然向外都得通行工夫只要自損便是得益故卦名之以損而曰損德之修也損上益下即損外益內也人要取益于外無如虛受于內內既得益于外原無損故卦名之為益而曰益德之裕也損益二字原不可拆開作兩件看未有損而不得益者又未有得益而猶可謂之損者只是必先有損然後有益故損之為義聖人教人下手求益妙法卦體艮止在上學問到得止天下之益孰大于是只是不上行如何造得能止田地惟有一損便有上行蓋人所以無進路只為見得自家十分有餘一知損便覺不足自然常常求進不到至極不止進則益矣故損下自然益上所謂其道上行也舜之舍己孔之克己舍與克都是損下法一損中有無窮妙境所以既説有孚又説元吉又無咎又可貞又利往而尤可貴在有孚蓋不能損者縱有好善樂取念頭俱作不得實見便隨處有隔礙若實實能損這一點自無自虛之念真如谷虛而衆善自歸何有不孚這一孚便是天下第一件有益美事所以元吉更何過不可補所以無咎真是萬事之幹可以貞之永久所以可貞又何往而不利所以利有攸往皆從有孚得來故彖文下一而字千斤萬兩見不損不成孚孚則衆妙自集則所云益上惟此實心自損而已曷之用二句則又精言損道之妙言只怕不能損不怕不得益只要損得合法不必較量益之有無真能損者即二簋之約亦可成享彖曰二簋應有時時者理之當然處若當損便損適得其時則雖所損者小而所得者已大蓋一念虛而天下莫大之理已在是矣曷之用三字正是自擇時宜之意最有味爻中弗損之益正合時之損損之盡善者也兌本柔艮本剛損下益上乃曰損剛益柔者蓋凡兌巽皆以柔損剛之卦也説以説乎乾剛入以入乎乾剛用柔濟剛也凡艮震皆以剛益柔之卦也止以止二柔動以動二柔用剛濟柔也損以兑要艮止非損剛益柔乎損乾益坤凡盈必須損虛必須益內三爻分明以柔損盈之象外三爻分明以剛益虛之象盈虛損益一自然適當之理時所當然故曰與時偕行不識盈虛之時則不知損益之妙不能損則不能益矣損內體兌説人只虛心説理便是損道自然上行若損民益君之説乃陸宣公對君妙語不可以概損義象曰山下有澤損君子以懲忿窒欲山澤通氣澤氣上蒸則山潤益上之象澤惟虛則氣方上行損下之象懲忿窒欲是日減工夫修內之法故君子以自損朱子曰懲忿如摧山窒欲如傾壑又曰忿者􅍅湧欲者流蕩皆澤之象必是山以鎮其澤即懲窒之象合二義見聖人立象盡意初九已事遄往無咎酌損之象曰已事遄往尚合志也九二利貞征凶弗損益之象曰九二利貞中以為志也損之能益上者二也受益者五也而非三之損無以上行三行然後得止于上而益成矣蓋柔能損而剛能益柔也倒轉是益其爻義亦然初九説體上行之始爻人所以不能損只為認得益不在己若曉得是損就是自益都是一己身上事這損自不容緩亦不容他委故曰已讀紀事遄往自己事自己去盡速往則無咎遄之言蚤也酌損云者斟酌二字原為酌酒用損下益上其説以進之不多不少適當其可如酌酒然則上不期孚而自孚矣其酌酌此時也二簋可用享正妙于一酌如此自然足以合上之志故曰尚合志謂所尚者以誠意上行期心志之相合也二剛中之説以此上行得居下正道自然益上若不守正而行便有征之凶居貞之益于已何嘗有損于上却都是益所謂弗損之益皆因能以中道上行故曰中以為志也與初爻志字同凡真能益上者自無須損故弗損益之方是真損真益六三三人行則損一人一人行則得其友下卦本乾而損上爻以益坤三人行而損一人也一陽上而一隂下一人行而也得其友也兩相與則専三則雜而亂戒占者當致一象曰一人行三則疑也三為一卦主爻行謂上行夫能益上者在初與二兩剛剛本上行阻之于前者三也隂下行所以三損則初上行而與四合二上行而與五合成致一之功矣此三人行損一人也一人行即指六三也九在上能受一卦之益者也三上行則與上合而亦成致一矣此得其友也使非六三一損則三不先行初與二皆不得上交何由益上故曰一人行三則疑也蓋以兌體二剛一柔非是同氣所以同行則疑若純卦有何疑惟三行而從上則四五亦得初與二以從之隂皆從陽是致一也致一則益矣一人行二句緊承上文六四損其疾使遄有喜無咎象曰損其疾亦可喜也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也上九弗損益之無咎貞吉利有攸往得臣無家象曰弗損益之大得志也四與初相應初上行四要能受使己之病未去如何受得益所以要損其疾此損字雖非損下之損而以損為益之義則同四柔又不中這是四之疾凡艮上爻震下爻皆有所不足初曰遄往惟四之疾遄去則初之益遄來故云使遄疾去益來何喜如之故曰亦可喜也六五虛中能受正應二剛中或益之十朋之龜也龜靈物五貝為朋十朋寶之至貴者惟五實能順受謂之弗克違猶云欲違不能也弗克字有味訟卦之弗克訟亦然受善善斯大故曰元吉天下之益無不歸之曰或益皆從上爻得止來故自上祐即自天之祐也上九為艮之止損道上行至此得止得止豈惟上能受益全卦皆受益是下原未嘗損也故曰弗損益之二之弗損已弗損也上之弗損于下無損也益莫妙于弗損故全彖所云無咎也貞也吉也利往也皆于此見之夫以下之損皆歸而益上得臣之象也然上益則合四五成益無家之象也能受天下之益又能使天下皆受其益益有大于此者乎此損道之終也三上行合止則曰得友以上而得三則曰得臣相呼應之詞總損義莫要于一時所以從初便要酌于首爻言之莫妙于弗損之益故兩言之莫大于得臣而無家故以要終焉五得尊位則得臣宜係于五今止言其受益以十朋之龜歸之而得臣則係于上者損道詣極惟聖賢足以當之蓋合天下之善都是得止者之善及至上下有孚則天下人人受益皆得止之益也此何問有位無位哉此義也于夫子可以觀之益利有攸往利涉大川損上卦初畫之陽益下卦初畫之隂彖曰益損上益下民説無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行損益只是一理有損便有益然卦體却不同損要上行損主六三却是隂隂性下而不上所以三損下兩剛方得上行用力在損三故命為損益要下行益主六四亦是隂隂自然下只要初剛應便成了益得力在初之動故命為益亦云損上者承上卦説來損剛之體在上益柔之體在下是損上益下也上體風入下體雷動上之人以巽德風起在下下之人能從上而興動這是心孚意肯而動所以民説無疆到民説田地豈惟民受益皆上之益也故總謂之益損道盡于上行益道盡于下下風行于天雷出于地必上有風行而後下有雷動是自上下下也陽上升難于下惟一下則天道下濟而光明君居上難于下惟一下則君德下通而光明其道大光也其所以下下者五以中正益二二以中正受益中正之道何所不利故利有攸往巽與震皆天地之本德即天地之仁德上以仁風下以仁動一團生氣流通更何阻滯所以利涉大川山澤為損兌艮秋冬收斂之氣日有退風雷為益震巽春夏生長之氣日有進由動而巽正是出震齊巽由春而夏一路進長不已故曰日進無疆此以其德言無不利也自下卦説到上風在上是天之所施雷在下是地之生氣風鼓雷動物物霑被何有限量窮盡故曰其益無方此以其體言無不利也自上卦説到下聖人以上益下與春夏同日進與天地同施生無時不益所謂與時偕行也損下益上非其時不可曰與時偕行時損而損也損上益下無時不可亦曰與時偕行時時有行也損下下自損則可以益上還以益下故損卦言益之益下下受益上亦有益而無損故益卦不復言損象曰風雷益君子以見善則遷有過則改風雷之勢交相助益風雷相益倐忽萬變曽無定迹以撓萬物以鼓萬物但是時候一到風雷便到風雷一到天地間生機便換過一畨故君子以遷善改過為風雷之益山下之澤通氣要漸漸透逹懲忿窒欲工夫亦漸修漸盡風行雷厲其相薄敏速而神遷善改過工夫亦速改速化初九利用為大作元吉無咎象曰元吉無咎下不厚事也益六爻剛柔之義與損同而不同者位故五益下而二受益四為下下之主此與損同者也損三有疑益四無疑隂柔而上行則疑下行則易也益上有凶損初則無咎損剛在初自能上行益剛亢而在上則不能下下所以凶此情之不同者也益者上益下也必四風之初興起而動于下方成益大作是天下第一件作為利用為大作是做天下第一等大事也震初一剛元善故有大作能事稱元吉無咎惟為大作方是天地間第一樣有益下固有益而上亦益矣象曰不厚事者初在下未當位任事然雖未任事却立定根基做天下極大事所以謂之大作而得元吉此一爻伊尹在有莘時似之躬耕而樂堯舜之道是何等樣作為所以有商天下受其益惟未事而為大作者斯任事而可望十朋之益六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也二以中正應五故十朋之益歸之實能承受得來方實受益故亦曰弗克違語氣亦如弗克違只是要永貞蓋貞而不永終是不貞如何得吉損五不言永貞而此言之二以下位受益易失貞也王用享于帝就作永貞之象看最妙夫下之受益于上知其有益而順受之還未見其貞如王之享帝何嘗為邀益于帝而誠敬之心永永不二方是真享上處王以此心事帝臣以此心事君永貞之吉吉以是也如此方無處不是益故曰自外來言莫知其所自來也損二得中故有弗損之益益二得中故有不期益之益皆至精之義龜靈而不食天下之至寶居上者明四目逹四聰民之視聽合而為上之視聽此損五十朋之龜也居下者行而著習而察不為逸居昏昧之民皆為由而能知之民此益二十朋之龜也六三益之用凶事無咎有孚中行告公用圭益用凶事者蓋警戒震動乃所以益之也象曰益用凶事固有之也欲其困心衡慮而固有之也六三與二同是震體皆受益于上者二得中受益易而正三不得中受益難而偏故益之必用凶事何為凶事天之施益有雨露亦有雷霆君之施益有褒崇亦有摧折凡夫警戒創懲皆凶事也皆益也在下者承順受之益益未必得之固受凶事之益益才得之固故曰固有之也有孚二句則又教三以受益之道與二爻永貞吉二句一例言公言圭皆震象震為長為王三雖不能如二之以中應五若能孚五之中則亦受五之益可以完得震之事三為震之終爻用圭而通五矣其孚中行之道何如如二之永貞則有二之中而與五自孚也二曰亨上故三曰用圭圭通信之物告公三告初用圭以告成功于五也震屯豫稱侯解小過稱公三合五撰艮故能孚六四中行告公從利用為依遷國三四皆不得中故皆以中行為戒傳曰周之東遷晉鄭焉依古者遷國以益下必有所依然後能立象曰告公從以益志也六四則正行益之主爻也夫以當位而中正其能益下者原在五四則能以行五之中于下者故曰中行惟四一下則初應之而動矣初動則二三俱動故曰告公從言以五之益皆下而得下之從也既得公從則又利在依之以遷國遷國舉國以從之也震公天下之元善若非真有益下之志如何得其從故曰以益志也然非遷國以從之則雖告公從亦何以受其益利遷國教四之詞也四合二三撰坤四下從初分明遷國之象凡善之所在即稱公即可依不必真有可依之國也盤庚遷殷文王遷豐武王遷鎬無非為益下計也總之從善而已本彖利有攸往中正有慶可見益道之利全在得中三四皆非中故三必孚于中四必以中行三之告公告以受益之道四之告公告以上益下之意也四而下初方大作曰利用為初有作四必以國遷亦曰利用為文正相應九五有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也上九莫益之或擊之立心勿恆凶象曰莫益之偏辭也或擊之自外來也五以中正風下其益下也都是實心實惠故謂之有孚惠心然上之益下只要一片真心不得屑屑計量所益何事所以只宜問諸己心不必問下如何得益蓋一問便有揀擇有臆料都落歡虞小術故勿問元吉勿問之心天施地生其益無方之度也夫上既有實心下自然以實心應所以亦有孚下有孚上之惠方實遍滿皆成實德故曰惠我德如此益之分量十分滿足曰大得志也損到得臣無家益到惠我德才見合上下是同體益則舉世皆益故同曰大得志上居巽終爻巽之究為躁有不能下下之象故曰莫益之蓋上而不下下是無益下之心矣上而不知益下則下必不知益上豈惟莫益究且有傷故繫辭曰莫之與則傷之者至矣雷風相與為益益是恆之倒體風必下行上必下益便是常心上不下益是風不下行雷亦不動常心有失所以凶也中行乃可以益下則莫益之辭為其偏也二以中虛不期益而自益益自外來也上以偏亢不期傷而自傷傷亦自外來也總益三四爻與損三四爻語語相對用凶事即損其疾之義也中行告公即三人行之義也遷國即得友之義也損二之弗損即益五之弗問也兩卦互相發泰上一爻成損似乎自盛而衰然能損則可以常泰是損防衰之始也否下一爻成益原是自衰而盛蓋能益自然可以回否是益致盛之始也故損益為盛衰之始益六爻須倒轉看從上爻看到初爻義便了然自乾坤至噬嗑賁為首局以乾坤為主卦中凡十八見父母之義也自剝復至損益為中局以震艮二男為主卦中凡十四見男以承乾之義也自夬姤至終為末局以兑巽二女為主卦中凡十八見女以承坤之義也坎離二卦見于首局者六坎四離見于中局者六離四坎見于末局者六坎六離為適得其平天地中交之義也孟子士何事曰尚志仁義而已利用為大作之益也書皇建其有極斂時五福用敷錫厥庶民有孚惠心勿問元吉之益也惟時厥庶民于汝也極錫汝保極有孚惠我德之益夬揚于王庭孚號有厲告自邑不利即戎利有攸往三月之卦也彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也夬姤末局十二卦之首全以一柔爻為主夬是要終一柔處得這一爻停當便是乾剛全局姤是原始一柔處得這一爻停當方是剛柔相濟兩卦皆用柔之妙法夬決也決字義要看得分明為流行為斷為破為分别從決者非無決而去之之義卦以五陽在下已是全盛只有一柔在上陽性上行隂道下行這五陽却被一柔在前阻塞了上進之路這一柔煞是利害勿謂其在上是方退之候也以其地則居高得了上乘之勢以其氣則兌肅全是消陽之氣若要去他如何去得所以要決決者以陽剛之道去開通了隂氣使其不成阻塞之害故謂之剛決柔上體本是澤開通了澤𨗳之使行便自然流通無礙這叫做因勢利𨗳之法真是不知不覺有潛移默奪妙用君子處小人只有此一法盡善味決字直是徹底抉通不言去自然去而又無激與潰之患者也決之義本文自明曰健而説決而和不説決去天理在內至剛至健一毫無所荏苒而外面却以柔道行之祇見其和順而説所以君子不見有決之難小人不見有決之傷為決而和蓋為上六一柔非尋常小人可擬其勢力足以把持一世如後世之女主在位與夫定䇿國老這一項人若處之稍不善便把世界都翻轉來極是可畏其決之善道如何只有陽剛合力君子道盛自然他阻遏不得主其任者全在九五一爻既得尊位又與上切近能決在五剛也能和亦在五近也揚于王庭五引衆君子而升於王庭也五象王庭蓋乘剛之柔在上所以要揚剛方得上進也必須同心而孚同聲而號又知其危厲方才君子之道日長其危乃光也乃字有力然莫先于自治告自邑也未有不正己而可以服人者也必不可尚剛求勝不利即戎也蓋君子與小人角未有得勝者也如此衆賢合則陽剛道盛陽剛道盛自然日進日長而有終所謂利有攸往也以此為決豈惟小人不為君子之阻且為君子用但見其通行更無有窒滯所謂剛決柔者若此闔户為坤夬一柔從上闔只以乾道去闢開坤道乾坤便合所謂決而和和之妙不可勝言感于君子而化和也不安其身而自去和也總是自然道路此盛彼自衰全未嘗有嫉之之念亦未嘗用驅之之力若一點不和便自即戎一著即戎未有不反見勝于小人後世犯此戒者屢矣象曰澤上于天夬君子以施祿及下居德則忌澤上于天自是無停注處夬決之象決則澤之施及皆天澤也使天而自居其澤則不成澤矣故君子法澤之下霈以施祿及下法天之無私以不居其德隂主利澤天之美利也利而散之于下則皆天之德利而壅之于上則皆天之忌大學財聚財散其義取于夬施祿及下天地間方無不流通居德則不流通豈不是大忌特係則忌一語警醒壅積可謂痛切初九壯于前趾往不勝為咎前猶進也象曰不勝而往咎也九二惕號暮夜有戎勿恤象曰有戎勿恤得中道也九三壯于頄求龜反有凶君子夬夬獨行遇雨若濡有愠無咎頄顴也是欲決小人而剛壯見于面目也然在衆陽之中獨與上六為應如獨行遇雨至于若濡而為君子所愠然終無所咎也溫嶠之于王敦其事類此象曰君子夬夬終無咎也夬以決柔為事三與上正應五與上切近當決之任者兩爻也能決之事者兩爻也故皆言夬夬惟三與五合力共濟見其夬而又夬餘爻不言夬矣夬亦壯體故初言壯向前而行曰前趾從初用壯豈能善夬之用所以見其不勝任也然曰往咎則不往自無咎二得中有乾之惕應五有兌之號曰惕號決之妙在于一號君子同聲相應何患于柔之不決彖中孚號有厲有厲即惕正二之事也如此雖有戎亦可以勿恤戎曰暮夜小人戈矛中人多伏于幽暗不見之地俗云暗箭難防然中道在君子戎豈能傷雖傷何害故曰得中道也彖不即戎是不自我興戎此君子不先為難端二有戎勿恤是不憂小人之戎此君子不動心于利害九三重剛而不中所以至于壯頄夫壯而見諸顔面豈能善其決故曰有凶必取凶之道也然三是乾惕君子畢竟能夬者在三若不以壯用而以君子乾惕之道用必能夬者也曰夬夬有曲盡夬妙之義論其獨與上應若有違衆而冒天下之疑者所以遇雨而濡濡而可愠一説愠是自家藏怒亦可通然此皆是夬夬中妙用曰終無尤也君子當事任處疑難真有時汙其迹冒其嫌委曲以行其志者正是不露壯頄之色也如狄梁公于唐得此義矣九四臀無膚其行次且牽羊悔亡聞言不信牽羊者當其前則不進縱之使前而隨其後則可以行矣象曰其行次且位不當也聞言不信聰不明也九五莧陸夬夬中行無咎象曰中行無咎中未光也上六無號終有凶象曰無號之凶終不可長也九四與下三爻同是剛德與上六爻又同是兌體所以居不能安行不能進將與上六則三陽進于下臀無膚而不可居也將與陽同進六阻于上次且而不可行也皆以不當位之故既不當五之中正又不如三之應上處四之位只有牽羊妙法羊從前掣之則觸縱其前而自後牽之則行上六兑羊也從後牽便是四之決而和蓋小人之性不可角從其後而徐牽之自是最善之道但四不當位恐不足以語此故曰聞言不信聰不明也九五與上切比有感通之機其感之法只與他自然生理便是故取象于莧陸莧本隂物感陽而生陸高原也即馬齒莧生于高原既不蔓蕪又不荆棘全不礙陽者如此便成夬夬只是這夬也不易所以中行方無咎上六一柔既成莧陸則不惟不能阻陽反依陽而生所謂決而和小人得君子都成生意也必中行乃無咎者只為柔乘之于上中猶未光也蓋莧陸雖極妙之法略不合中便是長惡所以又設中行之戒小人肯順君子便是小人自家生氣自然不礙君子莧陸之義君子小人俱利故為決而和上六正乘剛之柔君子道盛自然無與為徒然君子到底要號若至此而君子元號小人復可以施其伎倆君子小人到底不同類終有妨于君子所以有凶以終不可長也觀不可長一語可見君子危小人當有無窮之深慮舊説小人無號不得易警戒之旨若説小人雖無處可號君子當知其終有凶也則可總夬君子當位衆君子又同道小人必不能為害只是與之以活路還之以生理聽其自若於天地之間不能害而已此莧陸之夬虞帝于三苗武王于頑民皆用此道然不到皆化為君子終非全盛所以説未光又説終不可長小人如何長久留得留在上而不已一轉而下便為姤之壯女矣豈不可畏夬剝之盡變剝五要順于下夬六要順于上夬之莧隂感于陽之上也姤之瓜隂感于陽之下也夬三月卦莧生之時姤五月卦瓜生之時皆實象非懸擬也上六無號就小人説是君子處之盡善直到無處開口亦自不消開口也然而終凶之質猶在則君子必不可以不防姤女壯勿用取女五月之卦彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉幾微之際聖人所謹邵子詩天根月窟間來往三十六宫都是春地逢雷為復此陽來也天根之可貴固宜乾遇巽為姤此隂來也則于月窟義可取焉不知一隂一陽之謂道故隂非陽不生陽非隂不成隂往則陽來陽往則隂來皆是造化自然妙理必不可相無者姤陽中隂來也惟有這一隂來方配合陽剛成生生之化故姤遇也柔來與剛相遇合也家不得女來遇合不成家國不得民來遇合不成國這遇是必不可少的所以邵子云能探月窟方知物是陽得隂來成配也只是這隂却是方壯之女何謂壯巽長女也再進而離再進而兑皆從巽始只可遇不可取蓋遇是柔來遇剛剛作主取是剛去取柔剛為柔所動矣却是柔作主這柔已有方壯之勢若一聽其作主豈不日進日長柔長則剛自日消所以勿用取女為柔不可與長也知其可以遇又知其不可取所以處初柔之道便曉然可覩遇之不同于取只是一個自然而然遇以道理之至當也故天地相遇天生之地成之都是道理天然所以品物生生而自成咸章九五剛居中正這便是道理正當處把九五作了主以巽柔來遇剛這是中正之遇也何往不可行故曰天下大行也若取便是有心去向他有心便有私意可見姤之妙全在一中正方當乎時當乎義這姤便是天地相遇若不當時義這姤便有取女之害所爭只在幾微關係却甚大此始之時義所以大也朱子幾微之際聖人所謹正為姤中得失之辨有毫髮不可差者在四剛合方謂之大壯姤一柔便曰女壯何其剛之長如此難柔之長如此易也此定理也試觀草木發榮滋長積日而成雕落摧殘一朝而悴故陽之充長甚遲隂之充長甚疾陽之勝隂積之甚難隂之勝陽消之甚易故理之分數難充欲之分數易滿此非欲之本來有盛于理也則人之于欲易溺易近也故曰勿用取女自制自防惟人自力聖人教戒一字提醒嚴矣微矣象曰天下有風姤后以施命誥四方卦本巽柔為主象曰天下有風以天為主風不過行天之令耳此柔遇剛之義也施命誥四方正是天下風行之象初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅柅所以止車一隂始生靜正則吉往進則凶象曰繫于金柅柔道牽也九二包有魚無咎不利賔魚隂物二與初遇為包有魚之象象曰包有魚義不及賔也九三臀無膚其行次且厲無大咎象曰其行次且行未牽也彖中言遇爻中言包包之一字盡遇而勿取之義包有善不善則中正不中正之辨也初六方壯之柔難于順陽故須用繫能繫便是陽順之柔不繫便是蝕陽之柔二以剛中居初之前足以繫故象以金柅柅象中剛象金止則貞吉不繫而往則失貞而凶以其柔尚微然已見必凶之勢故曰見凶羸豕小豕初柔之象蹢躅方壯之象豕隂物而躁蹢躅是其本性故謂之孚蹢躅復係此句正見其不可不繫也能繫則柔聽命于剛可以相引而進此為柔道牽也牽與蹢躅正相反二曰包撰乾能包遇隂之妙法盡于一包包者視之如已有只見其可用不見其可憎如此一隂但有魚之可美而必無蹢躅之患矣巽為魚何咎之有若不包便有外之之心如賔客然賔客外相敵體內不能撫之如一視我以賔自視柔亦以賔視我彼此各立豈如包之有魚故曰不利賔也既嫌于過尊又嫌于不親如四之逺初便是賔故謂之無魚月令五月一隂生為㽔賔陽賔于隂也必須包方不成賔故曰義不及賔也以賔自處則分明以主視初故大不利賔字味最深有既不能牽初又不能高遁二義姤之三即夬之四也故亦有不安不行之象一隂方上進故無膚而不能居蹢躅在下上無應與故次且而不可行角在上雖可危然却無取女之咎若曉得繫初而成牽何有不安不行之病故曰行未牽也九四包無魚起凶初六正應已遇于二象曰無魚之凶逺民也九五以杞包瓜含章有隕自天瓜隂物之在下者甘美而善潰杞高大堅實之木也隂陽迭勝時運之常若能含晦章美靜以制之則可以回造化矣有隕自天本無而倐有之象也象曰九五含章中正也有隕自天志不舍命也上九姤其角吝無咎角剛乎上者也象曰姤其角上窮吝也四乾體與初正應本足以包只是乾上行其于初柔有逺而去之象所以不能有初曰無魚惟不能包必致蹢躅謂之起凶以逺之故也凶曰見曰起皆要玩四只是不中正便包不來所以要剛遇中正魚象其從陽也五以中正居尊包之能事五為能盡象高大之杞包瓜于下聽其自生自育皆成美物天地遇而品物章杞包瓜而瓜之美皆在所包中故曰含章一説巽木為杞以杞者五以二也亦通又曰有隕自天蓋此一隂原是從天隕下從夬上轉姤初自天之象其自熟而隕潰決而隕皆聽之天所謂命也因而善處之則以人承天之道也所以必要包必要含若人事既盡而聽天可安曰命人事未盡而安之曰天實然此非命也人也豈可以此委命哉故曰不舍命也凡易中舍字俱作安乾曰時舍上九剛過而亢不能包但以剛拒初使不得蹢躅而已故有姤角之象而謂之上窮窮路也以其無相遇之美故吝亦無取女之失故無咎此遇柔之最末著也有隕自天凡天地間有隂有陽俱是天生定來程子所云皆天理也惟隂原是天隕亦不是可惡之物其至于作害只為不知隂性處之不得其道所以易要盡人事包正善處之道若説這是天生之物人力不可挽回這便是委于氣數不知立命説話所謂舍命者也總姤女壯若以中正遇之即文王之起化閨閫亦不過從女道始若從而取之如後世基禍床笫都從女道始全在人事上得力甚而如唐之武氏豈不是天之所隕然經事先帝寺中載歸廢后册立都是自作之孽豈關天意所以君子言人不言命論君子于小人包之一字似屬調停之法曰非也如己為惡之小人如何包得此為解中狐隼有射之而已姤初小人未蹢躅之豕也有大君子在上終身不露其惡矣此所謂包也調停則取女之道爾虞廷之言曰能哲而惠何憂乎歡兜何畏乎巧言令色孔壬此處夬上一柔定則也庶頑讒説若不在時候以明之撻以記之書用識哉欲並生哉此處姤初一柔定則也夬姤以巽兑二柔為主故不見五陽之可恃而但見一隂之可畏夬柔將退其氣則肅殺故深防末路之難終姤柔生長其勢則方來故深防始幾之不慎蓋一陽主衆隂其為力易而衆陽處一隂其為力難此隂陽大局面之不同學問造理到九分雖一分未到仍是未換之骨根也所以要夬之又夬盡百倍之功恐為山九仞虧于一簣之故去欲到十分或一念忽來仍是方張之伏冦也所以必不容取女防幾微之竇恐萌芽未除斧柯難尋之故萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣萃升是兑巽與坤摩蕩兑為説必從坤順中透説才得千流萬泒滙成一原所以成萃巽為入必巽入乎坤順才得下學上逹日進高逺所以成升乾坤二體至此而盡萃升坤學了手工夫也萃聚也聚是會通來到合一處惟聚才謂之一源才謂之得歸宿所以德必聚斯可久業必聚斯可大乾曰學以聚之聚則自然亨只是聚必有所以聚之故不是道理至極所在天下同心歸往如何得聚卦惟順以説從順中得説九五又剛中得應天下道理不出一剛中所順而説者是此剛中之理而上下應之是理之至極在此不期聚而自然無不聚所以能聚聚而必亨皆此之故也則是聚之主全在九五稱王稱大人皆指九五德足以聚天下也言用大牲利往則示天下當聚于九五也夫所聚者聚于剛中之大人豈不是聚以正豈不是天命當然所謂貞也順天命也皆此也澤地為萃全不由一毫勉強湊泊得來都從真血脈自相灌注而成聚惟主乎聚者精神足以通天下為一然後天下精神自然盡合于一故惟假廟之王可以言此蓋王者假廟一假精誠所以自致其孝享豈是有意為天下觀法然默孚默感天下之人何一不向風于王者故王者有事太廟天下諸侯各以其職來助祭自然風化遍于四海詩曰奏假無言時靡有爭豈不為天下所利見之大人聚天下之道孰貞于此故曰聚以正此上只就聚之道言也然得聚之道須盡聚之事所以要用大牲大牲大順也坤牛之象何為大順竭誠致敬順此中正之理而行也安得不吉又何所往而不利蓋王者假廟雖有默通天下之精神若非有用大牲之盛禮亦無以盡孝享之事萃聚君子雖有流通天下之中德兌説若非有用大牲之坤順亦無以盡聚貞之事蓋此中正之理即天命之本然惟步步盡其順事至于無往不利方是天命流行故曰順天命也由此觀之聚全不假一毫勉強得其道天然有個會合之妙此聚之情實也故曰觀其所聚而天地萬物之情可見矣天地萬物之情只順説二字上可見天地萬物原通于一故聚方是其情也觀盥而不薦萃王假有廟都是一假神之所孚不言自化莫可擬議之妙用假廟之王與乾五聖作物覩同其功用所以為天下利見象曰澤上于地萃君子以除戎器戒不虞除者修而聚之之謂澤乃地中真氣脈澤上于地自然流通會合萃之象君子在上要天下氣脈流通如澤之上地除戎器一作除去一作儲積皆未妥本義修而聚之此語有深味義如除官之除猶云另置在一處也蓋民聚則不虞易生所以戎器要防其用又要不必用妙在除字藏有用于不用也這不是上下精神常得流通如何免得不虞之患故君子以除戎器戒不虞為萃取象全在言外初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也六二引吉無咎孚乃利用禴象曰引吉無咎中未變也六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也一陽居尊位為比萃二陽在上二陽不如一陽之専惟九四一爻合四柔爻而同歸于五則成萃矣故諸爻中每有得失兩路正欲其不分于四而専一萃于五也初坤順之首然正應在四既欲萃而孚五又欲萃而孚四故有不終乃亂之象須要合四以萃五方得成萃曰乃萃其道則若號一握是已若順也三隂同德合而號曰若號順以合四一握之象撰艮手為一握合四為一握則孚五而為笑矣却好順以説故笑也若先慮其不能孚則終不能孚須勿恤而往則無咎謂無志亂之咎也蓋順四以孚五便是萃道萃四而不知孚五便是亂道夬五陽相號以乾體謂之惕號萃三隂相號以坤順謂之若號皆兌口象所以號若號至勿恤往文氣一直下二與五正應也合初與三以萃五者惟二得以引而進之故引吉無咎然二以中應五不患不相孚只要専一以從五故曰孚乃利用禴禴雖薄祭誠一則可上享二之上通中而已矣若不専一分于四則不一是自變其中也故象曰中未變變猶初爻之言亂也三為坤順上爻曰萃如然近四不正又不應五而應上所以嗟如應兌口也無攸利然合五撰成巽能往而上巽則萃于五矣有小吝正明其無大咎也九四大吉無咎象曰大吉無咎位不當也九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也未光謂匪孚上六齎咨涕洟無咎象曰齎咨涕洟未安上也四與五同德能居五之下合而成聚大吉無咎之象然非中非正所以不得萃三隂而但當從五以位不當也此位字從下文萃有位位字來非陽居隂之謂此象先文起義五剛中而正天下當聚之正位在焉曰萃有位然位其位必須位乎德下三爻二以中孚初與三初亂三嗟尚匪孚必有元永貞之德其善真足以長天下也元又久而不息也永元永又貞一而有終也貞如此五合乾坤之德則自然無不孚而悔亡矣若只萃有位而不萃以德猶為未光也上六兑澤主爻所以流通天下全在這點澤意不有一假憂百姓苦心血誠如何得上下流通所以齎咨句又涕洟方無咎咨者為下深心書經多言咨齎咨以手擕物為齎故行者齎糧咨如何齎以憂民之事擔負為己事咨之至而涕而洟有此苦心民有不嚮應而聚者乎此聚道之終也象曰未安上言在上而常存不敢安之心非謂不安于居上也萃上之齎咨涕洟與屯上之泣血同一心事皆所以通一卦之精神也其不為比上之無首者萃上説意比上險終其情之不同也總用大牲吉與二簋用享正可互參損剛中在下苟有益上之精誠雖微物可將細事可進上已益矣故二簋可用享萃柔在下非誠意與物力俱竭不可故必合全坤上萃方成大順故用大牲吉彖中所言中正在上大順在下則不期萃而自萃此言萃之理也爻中所言上不獨以位萃也必萃以德至于齎咨至于涕洟下不獨以中應也必盡其誠至于勿恤而往雖嗟亦往必期于萃而後已此言所以盡萃之道也皆萃之情也人天地萬物之聚錢師語王者人之聚孝者德之聚中者理之聚故萃稱王假有廟利見大人學問中以立本順以應事何患不萃乎易貴剛中而于兑中爻多有危辭以柔爻逼近之故萃五曰萃有位志未光也夬五曰中行無咎中未光也臨二曰吉無不利未順命也咸五曰志末也爻辭皆吉而小象難曉看來皆為悅之易于失中故防之都是一意如困之劓刖節之不出門庭則爻辭先危至于履之坦坦猶云中不亂暌之遇巷猶云未失道與辭中亦深寓可危之意焉升元亨用見大人勿恤南征吉南征前進也彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也序卦曰聚而上者謂之升升是進進不已妙境只是如何方得升却不緣一毫躋攀之力天機發處欲罷不能有升于不自知亦不能自己者故取象于坤巽地中生木為升妙處全在一生巽為東南之木方生之氣得了坤順這點生氣發動自然日進日長時時是生則時時是升孟子曰生則惡可已所謂時升也坤巽皆柔而所以升皆因得了二剛生長之氣是其升也時升而升故曰柔以時升時云者謂其適中乎得升之理也蓋九二一剛既得中而又上下應之卦體巽以順所巽入而順從者惟此剛中至理中而應則合卦盡是生氣以此而升純是天理自然上逹是以大亨也是以字有力巽在坤上則為觀爻中三曰觀生聖人所貴于巽者貴此生氣耳用見大人下則極言升之義如此大也乾九二曰見龍在田君德也升二即乾二雖位于二實有君德可為天下之利見蓋德日進于高明便是明明德于天下體假特未進而居五位耳以其未升五位而有其德故不曰利見曰用見蓋雖無美利可言而其可用為天下共覩則一故謂之用見也乾二曰利見者則有利可言矣以此其德已何憂不日進于廣大高明天下何憂不共登于大猷至治故可以勿恤而曰有慶也由此以征乃謂之南征蓋乾南坤北柔以時升是柔皆向剛而行坤皆向了乾如此以征何吉如之故曰志行也凡坤柔皆當南征南征則坤而歸于乾矣坤終于此卦故特言之或以南征指離言其義亦同離位即乾位萃以剛中聚升以剛中升升是天德萃是王道故皆稱大人萃五得位假廟之王也升二未得位亨岐之王也象曰地中生木升君子以順德積小以高大以順作慎不必地中之木一生則息息是生升之象生性在木雖無時不生必得坤以順之然後曰成其高大生理在人心亦無時不生必有順德以積之則亦日進于高大生生之道然也惟巽故生惟順故積高大巽象初六允升大吉象曰允升大吉上合志也九二孚乃利用禴無咎象曰九二之孚有喜也九三升虛邑象曰升虛邑無所疑也升巽在內為升之主坤三爻則所升之境也初爻允升允信從也柔從二陽以升故象曰合志大吉正從合志來九二剛中全坤之所應者此爻也故稱孚孚則可以相通故利用禴升之用禴謂以真心直通徹而逹于上也初之允是發端以一信二之禴是中心以一誠學問如此何患不日進九三亦巽剛也視二又進一步升以漸高為義初不過發念二是中心升而三則已入于境詣前是坤順升虛邑之象升虛邑則境地空明廣大自然日進不已矣象曰無所疑可見境雖虛自生疑二則亦不能升于虛也以木言之三是發生而條逹之際非入坤順則生者礙矣虛邑雖實象亦寓教戒意六四王用亨于岐山吉無咎象曰王用亨于岐山順事也隨亨于西山専指大王言邠梁岐皆西山也升亨于岐山指周家王業言世業起于岐也六五貞吉升階象曰貞吉升階大得志也上六冥升利于不息之貞象曰冥升在上消不富也四坤順首爻以順德積小成高大無如周家王業故取以象之詩云天作高山大王荒之彼作矣文王康之彼徂矣岐有夷之行爻辭正取之此看周家王道皆積順所致故曰順事也五得中正應二所以貞而吉貞吉之升一級歷一級都是升堂得止造詣故謂之升階而曰大得志也上六居坤之極以地則北而非南如時之自晝而夕有冥之象然君子之升豈有時可已故冥有冥升蓋日有升冥而不升便非朝乾夕惕之學冥升之道却以不息為貞夫息之義養也生也息則升不息何以為升象曰消不富也此有妙義蓋日積日纍得一分進一分此以知進知得為升息而不消之貞也積而能化有而能亡進一步化一步此以知退知喪為升消而不息之貞也升而至上正要消得去從前所造所得都歸渾化這方是到頭學問懸崖撒手升于不可見不可名之境故謂之冥升孔曰無能顔曰末由朱子曰非全放下終難湊泊皆是此著隂言不富謙泰皆然隨曰君子以嚮晦入宴息宴息工夫就是冥升工夫非乾健力量不能消而息息而消也六四之亨于岐山日益之升六五之升階得止之升上六之冥則超然化境不可用力之升也故升以此終舊以昏昧為冥則何以為冥升總升六爻無不吉之辭只為南征之故雜卦曰升不來惟其二剛上升衆柔從之而升與他卦隂陽此往彼來之義不同故曰不來也萃升二爻皆曰利用禴萃之禴聚己之精神以順五也所主在五取合散為一之義升之禴用一己之精神以漸通也所主在二取自下逹上之義須有辨萃升臨觀之倒體四卦命名皆以二剛作主陽在下曰臨進位則曰升陽在上曰萃再進一位則曰大觀澤在下為臨上則萃矣風在下為升上則觀矣其分于上下絰則原始要終有剛柔之不同夬姤剝復之盡變也萃升無妄大畜之盡變也中局末局首四卦劈對困亨貞大人吉無咎有言不信坎剛為兑柔所掩九二為二隂所掩四五為上六所掩所以為困彖曰困剛掩也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也坎本源泉遇兑收斂之候則日涸縮所以為困遇巽發動之候則日流通所以為井困剛掩以坎剛為兑柔所掩全為六居上也坎是陽水陽卦兌是隂澤坎中一陽源頭之水欲其出而上行遇兑收斂有不得行之勢所以剛掩若為物所掩也然見掩者一時之相遇不改者流行之本體得其流行之體何畏乎掩故困自有亨道坎是心體人心中一脈源泉無時不流行然不能必其無難通之遇有時窒而見掩即謂之困然困者遇也心體何有困君子不以困為窮止欲于困中得通故曰困窮而通蓋德慧術智生乎疢疾困窮而通乃真通也其所以得通之故只為吾心有個必不搖奪之定宅在是乃心之所也書曰王敬作所又曰所其無逸這所至危而安至變而常只怕人自失其所則困而困矣若曉得險以説既見得此心有至險可危者又見得險中有至安可説者從險得説便困而不失其所不失其所困而亨矣這不是陽剛君子如何有此故曰其惟君子乎指九二也凡處困非以忽略而不知險則為困厄而不説非心中得天理自然之安何能困而亨故險以説斯為不失所也不失其所非另有一個理即是困中恰好正當處故不失其所方是貞貞得困即是身正而天下歸道理是為大人吉無咎由此觀之君子所以困而能通者全是自心中有得而通若不由心通而欲感通于言語之間則己先無以自信何以信人徒尚口舌必窮而不通者也不失其所是由坎以通兌尚口是用兑來掩坎故必窮困窮而通窮則不通大人指九五言以其不失在一己正言君子以其能通于天下謂之大人君子大人元同是一人九五九二亦元同一剛中因位而分言困在世情中看是個窮途由君子處之更成益境只為困正是動心忍性最好下手處若得困處通何處不通又最好得手處故困德之辨也程子曰困便是處困之道是用力字自古聖賢豪傑何不從困中來只是先要識己之所困者何事故曰困貞大人吉象曰澤無水困君子以致命遂志澤無水無字之義與澤滅木滅字同即彖之云掩也八月白露降而水縮九月霜降而水涸皆兌氣所致澤盛則水消日向于無有無水之象此是自然之天道君子曰時窮而窮困就是正命盡處困之道就是至命致者用力以求至命也命之所在順之則心安不順則心不安故遂得心志所以致命也力在遂志不失其所便遂得已志此是處困真欛柄能險而後可言致命能説而後可言遂志致作授命未足盡義初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也九二困于酒食朱紱方來利用亨讀作享祀征凶無咎朱紱方來上應之也象曰困于酒食中有慶也六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也外來之遇不足言困自家無所以貞遇之道方是困道即困之所也三柔爻失其所三剛爻不失其所故得失自分兩途初柔在下不能上進者也便坐住了困象臀困于株木坎為堅木下爻象株株木朽而無生氣者不覿覿五也此皆因不明所以愈入于下謂之幽谷又久而不能上出也可見人困而求明便不至于如此所以要困而學九二坎中之剛足以飲天下足以食天下特在剛掩之時象困于酒食謂未得為天下用也然與五同德相應酒食在二乃上所必需朱紱方來之象方者將然而必來之辭惟在二一誠以應之曰利用享祀謂進其酒食于五也若五未來而先往則有征之凶然二有中德自無此咎如二者德在己應在五困而必亨故曰中有慶特著征凶二字見雖有必應之朱紱又不可以膏粱文繡而動其心如此方不失困之所也三既質柔又處非其地故極言困之凶宫坎象妻少女象注石指四蒺藜指二宫謂三而妻則六也九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九五劓刖困于赤紱乃徐有説利用祭祀劓刖者傷于上下然剛中而説體故能遲久而有説也象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也九四與二同德二本得所之君子也四能來而下二得所與矣四在高位乘車之人下求二之賢以共載如可貴之金車矣坎輪在下車之象剛爻兌體金車之象但以時方剛掩與二皆無所往所以徐徐而困于金車也有吝矣然有同德相與何患困之不通所以有終也不居五與二中不應故謂之不當位九五剛中得位與二正應困之得通全在二五合二得五方成説五得二方險得其貞只是方在困時有六掩于上劓之不易也有初困于下刖之不易也所以二五皆未得志而困于赤紱也赤紱指二紱以蔽膝在下體又坎為赤其為二無疑不言五困而言二困者君道無困臣受困即君之困也且就全卦之體言受困者原在坎剛然二五同是中正徐以待之則自相得乃徐有説險自能説也彖險以説又曰利用祭祀其道只在積誠則可以無為而自通祭祀者只自盡其心則不求所以福而福將自至處困者只自盡其道不求所以亨而亨自至故曰受福也困之不失所妙盡于祭祀一語大人貞吉惟五當之天子朱紱諸侯黃朱士大夫皆赤紱以五視二則稱赤以二視五則稱朱定位然也五稱祭祀位在主祭也二稱享祀以物供上之祭曰享助祭者也書經惟恭奉幣用供王祈天永命四曰徐徐五曰徐説急于出困便不善處困故徐方得説上六困于葛藟于臲卼臲五結反卼五骨反曰動悔有悔征吉以隂柔處困極曰動悔之象然物窮則變若能有悔則可以征而吉矣象曰困于葛藟未當也動悔有悔吉行也上六本柔所應者三兩柔牽附葛藟之象乘剛臲卼之象未當謂困所不當困也若能自醒曰如此則動有悔矣于是而實能有悔則往無不吉矣此為征吉上六象最不善何以得征吉總妙于一悔悔則掩剛之柔改為説險尚口之窮改為誠心剛中至此方無不通行故曰吉行也可見困原非窮路一念轉移便和身翻換故曰困窮而通妙矣征吉是全卦之吉總困字粗看是境就境上用力即是功夫即是德卦中凡困字皆兼此義困一也人有用心于不當用置力于不當置這是坐了株木又有拂世違俗必為人所不可為這是據了石與蒺藜又有膠纒意見迷惑終身這是入了葛藟此等困如何可有若有酒食自然有朱紱有金車自然有相與有中直自然有徐説能祭祀自然受福此等困何妨于有然株木蒺藜葛藟何關性生酒食金車赤紱非緣天賦顧人自處何如知此可以言困矣井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶繘音橘汔許訖反羸律悲反彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也坎德在人心萬感之所不能搖但患己無所以貞之故困言不失其所又萬感之所不能窮但患己無所以通之故井言養而不窮井之為用無一人不待養亦無一日不為人養人心之用亦然故取以為象其妙全在巽之一下泉脈在地坤中一剛不有以通之如何成井惟巽善入能通之者巽也井泉在下不在乎井如何有有用惟巽為高能上水者亦巽也聖人以木掘井以繩出水皆取諸巽故曰巽乎水而上水井既成井則其出也為不匱之源其用也為不竭之府盡成天下利養所謂井養而不窮也聖人取象于井全為養而不窮一句鼎卦烹飪也一句同下文皆言所以養之妙井養而不窮只為有個活水源頭無處不同者在只看井雖因邑而有然邑有時而改井何嘗改古人相地居民觀源泉以為邑故邑有改然此邑之水與彼邑之水何異不改井也可見井之體一定有萬變不移者惟其一定所以終日汲不因之減一分終日不汲不因之增一分無喪無得也水上出而往其往無窮是此井水從源而來其來無窮亦是此井有體有用相禪不窮往來井井也所以能然只為剛中之德在這剛中天理原是萬化而不變遷所以增減不得所以來往無窮故曰乃以剛中也剛中句合上三句釋之無喪無得句原根上句來本義分明但井體雖一定用之在人却有得有不得巽水必要及泉得泉必要上水若中道自止半途自廢如汔至之井繘未及水或及水而羸其瓶豈成井井之用是以凶也未繘井則水源未通羸其瓶則水未得上孟子曰掘井而不及泉猶為棄井未及而羸瓶亦為棄水總不成養所以凶彖井之義于人心最警切汔乾也水雖無改却有時乾音干瓶坎為缶也繘巽為繩也汔撰離之象羸撰兌之象井其心學之淵源乎境有變遷地有移易而一源者自如也不以聖而增不以愚而亡叩之則通取之則盡可為井井不竭矣苐恐義理有一時之未逹必無以汔而生畏功夫雖一線未到必無以繘而自止即或中道之毁缺可虞必致謹于羸之當戒則渾然中德本來自完而養一身養一邑養天下以之矣所謂養而不窮也陸象山云南海北海東海西海聖人出焉此心此理同也千百世之下千百世之上聖人出焉此心此理同也是為改邑不改井象曰木上有水井君子以勞民勸相勞民者以君養民勸相者使民相養皆取井養之義井只是個養水本足以養萬物得了巽生之氣是水在春夏當發動氣候益見養之無窮有井象取義在木上有水勞民謂上人慰勞之故為君養民之道勸相為勸勉其相資相濟故為使民相養之道坎以勞之巽以風之也初六井泥乃計反不食舊井無禽象曰井泥不食下也舊井無禽時舍也井以陽剛為泉上出為功初六以隂居下故為此象九二井谷射鮒音附甕敝漏九二剛中然功不上行故其象如此象曰井谷射鮒無與也九三井泄息列反不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也泄不停汚也井以陽剛為泉陽主生泉以上出為功故漸上漸吉初最下巽木方入坎水未通故泥而不食是井未有來之源也井取新泉泥則未新故為舊井非廢棄舊井猶人之舊習氣未去也禽取水之轆轤坎輪在上之象以其未可汲故無禽是井未有往之用也來不成井宜下入不宜上出故曰下也往不成用宜安以俟之徐以澄之故曰時舍也舍是安靜以養其清其義最妙棄去之説不穩乾初九曰下也九二曰時舍也與此同義九二雖有泉未能上出井谷之象谷如溪谷初為巽魚二近之射鮒之象下注為射甕甃井之具撰兑為甕敝漏井泉不以養人而以之養鮒失其養矣曰無與言無所用也九三應上泉已泄而可食矣可食而未有食之者所以可惻也有養天下之德而不獲為天下用此至可惻之事然可汲之用已在只王而明天下並蒙其養矣故曰受福也象中下求字更妙蓋源泉欲為天下食當先為王者食求王明求王心之明也正是啓心沃心之法故左傳曰王明並受其福王之不明何福之有非王心先明必無以使天下之明則井泄終于不食矣三與五位不相當故必須求曰明撰離之象困井俱曰受福遇困而盡誠者惟祭祀則反本窮源之思也有泉而所求者惟王明則正本澄源之思也天下之福莫大于此六四井甃側舊反無咎象曰井甃無咎修井也九五井冽寒泉食象曰寒泉之食中正也上六井收勿幕有孚元吉收轆轤收繘者也象曰元吉在上大成也四曰井甃惟甃方可以常泄而不泥亦可以常汲而不漏故無咎象曰修井味修之一字見井之得泉與得用皆人工所致也五則中正故冽清之極井之用成矣又曰寒泉食井當春夏則寒正是巽令其用于時尤切也上六以坎輪轉巽繩井收而水上出矣又勿幕上六隂虛之象則汲之無禁以不窮之養公為無窮之用所以有孚而稱元吉如此更無繘井羸瓶之患矣故曰大成也總初言泥則三言泄五言冽二言漏則四言修上言收六爻語脈相承人能濯去舊見以來新見則必不泥而無禽矣能由下學以至上逹則必不谷而成漏矣常使泄者之可汲豈憂無王明之可求常令修之而無咎何患無有孚之元吉井德之地也于此見之困不失所是正已無求學問故困以寡怨井養不窮是淵泉時出學問故井以辨義周易像象述卷六

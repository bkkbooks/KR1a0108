body:
  text: 周易像象述卷九明吳桂森撰繫辭上傳天尊地卑乾坤定矣卑髙以陳貴賤位矣動静有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣方謂事情所向象者日月星辰之屬形者山川動植之屬首章直闡易道之源天地人三才總是一件所謂易者如此乾坤易之門故只提乾坤作主吉凶變化二句要另㸔有貴賤剛柔自然有吉凶然吉凶雖不同却各各成一箇道理此所謂變化變化言其多也六十四卦三百八十四爻所言者皆吉凶變化而已歸重在此四字易只是乾坤天地便是乾坤大法象天地者乾坤之郛廓乾坤者天地之徳性天地之體有兩天地之用則一是之謂易故就其分而兩者言之天尊地卑尊則貴卑則賤其位不同天動地靜動為剛靜為柔其行不同惟其不同所以髙與貴動與剛自為類卑與賤静與柔自為類以類聚也然貴不可混賤剛不可同柔以羣分也類聚羣分則吉凶自此而生何以故若貴賤當其位剛柔合其宜則得而吉矣或貴賤易位剛柔錯行則失而凶矣後繫剛柔雜居而吉凶可見矣蓋有類有物自然便有吉凶此吉凶是氣化不齊生成之吉凶吉凶之等千萬不同却各各成一箇生性便各各具一箇道理如在天成象象中有吉有凶彗孛羅計象之凶在地成形形中有吉有凶虎狼蛇虺梟獍等形之凶都是天地二氣變化所出故變化見矣此變化是萬有不測生物之變化然變變化化雖千萬无窮算来不出乾坤兩者故下文説剛柔相摩至成男成女一段乾坤兩者又合之是一理故又説乾知坤作至末段其一者所謂易簡之理而天地人三才一源者也是故二字𦂳承吉凶變化可見者也所以處吉凶成變化之道不可見者也所謂易也如何是處吉凶之道如當趨避則趨吉避凶道也當順受則吉凶順受道也如何是成變化之道如貴賤不妨易位而貴常主乎賤賤常承乎貴剛柔不妨迭用而剛常先乎柔柔常後乎剛變變化化不窮之道也位以其有常而一定言斷以其截然而分辨言二字一例㸔非六位之位位根定字説斷根常字説成象成形可分屬㸔亦可合一㸔凡物先有象成于天後有形成于地故曰成象之謂乾效法之謂坤天官書凡世間有此物无不天上先有此宿者方謂方所凡貴賤剛柔之類各有一定之方所在是故剛柔相摩八卦相盪鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物知猶主也大抵陽先隂後陽施隂受陽之輕清未形而隂之重濁有跡也乾以易知坤以簡能易則易知簡則易従易知則有親易従則有功有親則可久有功則可大可久則賢人之徳可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣易知則與之同心者多故有親易従則與之協力者衆故有功有親則一于内故可久有功則兼于外故可大剛柔相摩乾坤變化而有六子也八卦相盪八卦變化而有六十四也剛摩柔而成震艮則有雷霆柔摩剛而成巽兊則有風雨剛柔中交而成坎離則有日月寒暑一摩一盪乾道變化而成三男坤道變化而成三女男道女道又相摩盪而千變萬化至于不可紀極然要其本只是乾與坤兩者之往来乾道坤道又豈是截然兩物乾便資始坤便資生乾是始萬物底大主宰坤是去做成萬物底所以一感一應此唱彼和變變化化生生而不窮然其所以變化者都是自然而然何嘗假一毫造作添一毫氣力其知是自然之知曰易知其能是自然之能曰簡能本来至易至簡所以易知易従所以有親有功所以可久可大所以成賢人徳業天下道理更有出于此者否故曰易簡而天下之理得矣得了易簡方成變化成變化方是乾坤各得其道這等天地人纔成天地人故曰成位乎其中矣朱子曰摩是那兩筒物事相摩戞盪是團旋圓轉推盪將出来成男震坎艮三男也成女巽離兌三女也人一身備男道女道要時時摩盪便成變化何為成位若無聖人天地只是虚設有盡人道底人天方成天道地方成地道三才方纔位故曰成位譬如一所大厦無了主人只是虚設必有人焉主之方成箇宅子故曰成位乎其中以人者天地之心也所以有人方成天地孫聞斯先生曰天尊地卑乾坤定矣起首提出綱常大分文王作周易專為綱常以服事殷到底是天尊地卑如此方得天地位故曰乾坤毁則无以見易易不可見則乾坤或㡬乎息矣毁與息正是尊卑倒置也若只是說易中乾坤卦位定此語㡬贅矣右第一章此章以造化之實明作經之理又言乾坤之理分見于天地而人兼體之也首章只重吉凶變化二句故下章𦂳接曰明吉凶曰生變化十二章文氣原一貫聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也吉凶相對而悔吝居其中間悔自凶而趨吉吝自吉而向凶也變化者進退之象也剛柔者晝夜之象也柔變而趨于剛者退極而進也剛化而趨于柔者進極而退也六爻之動三極之道也三極天地人之至理承上章推類聚羣分而吉凶生故伏羲設卦文周觀象見得剛柔雜居其情有愛有惡有相得不相得後之愛惡相攻而吉凶生一一繫之辭焉而吉凶于此明矣惟成象成形而變化見故聖人知得剛柔兩者迭運乗除有无窮妙用只在推移間而變化于此生矣何為相推剛纔過就推出柔来為用柔纔過就推出剛来為用即盪字之意也是故辭中所言吉凶是剛柔大相懸絶得與失全分之象所言悔吝是自吉趨凶自凶趨吉得失介于㡬㣲教人知憂虞之象憂虞言憂而虞之二字一意所謂變化不過是一進一退之象進而剛少不得要退退而柔少不得要進所謂剛柔便是晝夜之象晝即夜之明夜即晝之暗剛必因柔柔必因剛原无兩截即晝夜之代乗也這些吉凶悔吝進退推移之理皆具在卦爻中一定而不動者也而適當時位所值何爻所行何事此所謂六爻之動也吉凶悔吝生乎動正要在此處定吉凶此處成變化此一動也適合乎天道之當然地道之當然人道之當然這是易之動故曰三極之道也蓋動而適當其時則剛柔俱妙進退俱宜此天地人合一處道理至極處故謂之三極云凡三百八十四爻俱有三極之道只要人適當其動而動爾吉凶已分為得失將分為悔吝爻象中不惟言吉凶且併悔吝言之明明示人轉移之路故下章云憂悔吝者存乎介此觀象玩辭之法也剛柔進退雖若兩端要知晝夜相因原是一理惟知到合一處方纔進退无不合時故後章云通乎晝夜之道而知此觀變玩占之法也下文相承説去是故君子所居而安者易之序也所樂而玩者爻之辭也易之序謂卦爻所著事理當然之次第是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利易明吉凶生變化故君子安身立命惟易之序是安君子悅心研慮惟易之辭是玩静而居則觀象玩辭吉凶悔吝之故使了然无不明動而變則觀變玩占剛柔相推之妙惟因時為變化如此以動動皆三極之道自天祐之吉无不利矣何為自天祐之成位乎中則人之動即天也易之序曰事理當然如乾先坤後有序男唱女隨有序大小貴賤有序觀其變觀其相推之介也易言天下之動而不可亂須要介得分明玩其占研求吉凶由来之故也凡易中占字皆占其所由来非預占禍福之謂居而安是心之所安居則觀象是平居无事時二居字有辨右第二章言聖人作易君子學易之事重在六爻之動一句彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辯吉凶者存乎辭齊猶定也小謂隂大謂陽憂悔吝者存乎介震无咎者存乎悔介謂辨别之端盖善惡已動而未形之時也震動也是故卦有小大辭有險易辭也者各指其所之承上章来要觀象玩辭只觀彖辭彖者言乎象者也要觀變玩占只觀爻辭爻者言乎變者也如彖爻中吉凶以言得失悔吝以言小疵无咎以善人之補過然聖人言吉凶言悔吝又總為示人補過之道盖吉凶不可避悔吝不可免吉凶處得其道則雖凶而无咎如過渉滅頂悔吝處得其道則俱可自凶趨吉如下文震无咎是故就象中論之貴賤有等貴宜居髙賤宜居卑其位分明列開大小有分大宜統小小宜承大卦理原自齊一其吉凶之數大約凶中有吉吉中有凶必得聖人之辭一一指明故吉凶非辭莫辨也夫吉凶之辨雖有分途而其趨繫于悔吝悔吝之機雖若分趨而其端始于一介介者㡬㣲之際將動未動之時于此致其憂則但有自凶趨吉必无自吉趨凶所謂補過之道正在此將動時補此所以憂悔吝者存乎介震无咎者存乎悔也由辨辭而知憂由知憂而能悔由悔而善補如此以動動皆自天祐之矣故知彖爻之辭不同聖人无非指人一條有吉无凶吉凶盡其道則俱謂之吉之路故曰各指其所之辭有險易者大凡吉是易路其辭易使人趨于平易凶是險路其辭險使人知其險阻憂與悔正従知險中来也聖人従吉凶上推出介字推出憂字悔字又推出震字愈宻愈精人所難者是天理念頭震動此念一震自然恐懼修省方纔有醒頭而知悔知悔方可以審介而補過故知爻象中所繫之辭无非聳動人這㸃天理念頭故曰鼔天下之動者存乎辭又曰懼以終始其要无咎此之謂易之道也右第三章釋卦爻辭之通例通上三章一意相承首章言易道之大變化无窮次章言變化之道在動時此章言善動之道只在无咎而歸于一憂然則吉凶之故原在一念轉移間此所謂易簡之理也易與天地凖故能彌綸天地之道彌如彌縫之彌有終竟聯合之意綸有選擇條理之意仰以觀于天文俯以察于地理天文則有晝夜上丅地理則有南北髙深是故知幽明之故原始反終故知死生之說精氣為物游魂為變是故知鬼神之情狀此窮理之事前言吉凶變化皆言兩故化此章言其變化有箇所以然者所謂一故神惟知其一則兩在不測而神通章以知幽明句為主何謂幽明之故剛柔者晝夜之象也晝明夜幽凡物自无向有皆晝而出明之道自有向无皆夜而入幽之道大而天地小而一物无不然此豈物自為幽明其主之者有故知其故方通晝夜為一一則神首章曰易簡之理得而成位乎其中如何天地以人而成位只為易道與天地凖凖則也卦爻未畫理在天地卦爻既畫天地之理具在卦爻中原是一箇準則一線不差故曰易與天地準惟是一箇理所以易便能彌綸天地之道彌者彌縫之无有罅隙大无不包也綸者條理之極其分明細无不析也何以能彌縫天地之道凡在天成象皆天之文如風雨雷霆日月寒暑是在地成形皆地之理如百昌萬物生長收藏是這都是天道地道其大无外其小无内惟把易理一㸔便見得這天道之一徃一来地道之一出一入忽然自无向有而為明又忽焉自有向无而為幽都有箇自然之主宰在焉此幽明之故可知也知得幽明之故重故字則知物之造端而托始者在此其歸根而復命者在此原其始之自来反其終之由往則生生死死皆有箇来厯而死生之説可知矣知得幽明之故則知精氣為物不能自物有為之来而伸者游魂為變不能自變有為之反而歸者其物而變變而又物皆一段實理屈伸而鬼神之情狀可知矣㸔来天地之化育便是這幽明之故知幽明之故豈不能彌綸天地之道乎精氣隂陽二物也游魂隂陽之變也然精氣豈是妄合游魂豈是幻變究到所以然都有箇實理不可揜處如此方知鬼神之情狀知死生也知鬼神也俱在知幽明中所以又說二項只為彌綸天地之道須在曲成萬物上見故非知死生知鬼神不足以盡人物之性也人生氣聚而為物魂往而為變然其聚也只是氣聚不過一塊然之物其往也只是冥往謂之不靈之魂惟知得幽明之故其為物也方是成始成終之物故云精氣精氣則非形骸之氣也其為魂也方是知變知化之魂故曰游魂游魂則非冥行之魂也不知至此終知不得鬼神情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛此聖人盡性之事也範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體此聖人至命之事也天地之化无窮而聖人為之範圍不使過于中道所謂裁成者也通猶兼也易與天地不是兩箇易是不可見之天地天地是可見之易却好一様謂之相似惟易是一定之理斯天地之化育自不能違此句申明易與天地準也知周乎萬物至不流申明彌綸天地之道也惟能參贊化育而萬物得所見其彌綸天地葢知得幽明之故則其知足以周遍萬物而知之无不明其道足以利濟天下而處之无不當舉天下之大无一物出其外而過者是其大无不包此所謂彌也其周知博濟處又曲暢旁通物物各當其則无有一處旁溢而至于流者是其細无不該此所謂綸也盖天道地道不過一幽明之故通徹至此所以覆物則如天有樂天之度量而消息盈虚自然之天命无不照徹豈有一物不在光照中者所以不憂也樂天即孟子樂天保天下之謂知命即中庸知化育之知知足以成物故不憂非就一已能安天命則无憂懼之謂所以載物則如地得隨地之安居而含𢎞光大无不孕育豈有一物不在利濟中者所以能愛也如此其髙明配天博厚配地天地之化必待若人裁成有以範圍之而不過其髙明覆物博厚載物萬有之物必待若人而育有以曲成之而不遺所以能如此只是一箇通乎晝夜之道而知所以能始萬物而終萬物所以能成變化而行鬼神兩在不測不見有方所可迹而妙于不可知一理循環不見有形體可名而禪于不自已此之謂神此之謂易故曰神无方而易无體人到真知常不昧真是兩儀在手萬化生心與造化為徒神无方易无體是倒句猶言无方而神无體而易也知幽明之故與通晝夜而知正相首尾一篇命脈在二句天地不能于幽明之外起化故能範圍定了天地之化而不至于過與道濟天下而不過有别謂天地无過化也知不能周道不能濟如何同得天地惟聖人與天地相似所以不至于過也通晝夜而知則凡始終生死屈伸往来俱通于一通于一故兩在不測而神隂陽不測之謂神一部易只是這一句右第四章言易道之大聖人用之如此言聖人成位乎中之事一隂一陽之謂道隂陽迭運者氣也其理則所謂道繼之者善也成之者性也繼言其發也善謂化育之功成言其具也性謂物之所受仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣上言通晝夜之道而知所謂道者何在故此章𦂳承說一隂一陽之謂道一部易只此一句便說盡隂陽兩件有方其一處无方識得其所以一者相禪不已是一善也是他性也是他仁智也是他特在人知與不知耳日用不知正與通晝夜而知兩知字相應造化无過是隂陽這箇隂了又陽陽了又隂中間不息處互根互藏相禪相代者是何物有不變不滅者在也只㸔古今之往来天地之闔闢以至近而一事一物曽出得這理否所以謂之道說善原不出這箇其相繼處便是善也説性原不出這箇其一成處便是性也何以言之這一隂一陽都是一團天機沽潑物自生自萌所以循環不已是其相繼處正萬化従出之源所謂元者善之長不謂之善而何這一隂一陽萬有所由受成成一物便具一物之理是其成之者真萬殊而各有分定所謂物物各具之理是也不謂之性而何言善于性之前者善是天地生機屬元屬顯仁人物生生之本性是人物所受之生理屬貞屬藏用稟賦一定之命㸔到此方知性善根源无善不成性善者統體之太極性者物物之太極一也若論繼善豈惟人得之而本善物得之而亦善若論成性有剛柔氣稟直是萬品不齊然雖稟不一而性則一得其純者為中和固是定理得其偏者為駁雜亦有定理不害其善也所貴于人者在知得此善此性故仁者于行處得力便知這道安身立命利濟天下之本所以見之而謂之仁智者于明處得力便知這道公溥並照固知萬物之用所以見之而謂之智開了仁智兩見便知道原須臾不離一日不知便是顓蒙无覺之百姓自家昧了善迷了性所以曰君子之道鮮矣成之者句要分明即成象成形成字就他相繼處說這一隂一陽是發育端倪便是善就已成物處說這一隂一陽是賦畀定理便是性善言一隂一陽即是性非謂性由一隂一陽而成中庸維天之命於穆不已發明繼之者善也誠者自成不誠无物發明誠之者性也成已仁也成物知也性之徳也發明仁知二見也薛文清曰繼成皆以氣言貼隂陽說善性皆以理言貼道字說顯諸仁藏諸用顯自内而外也仁謂造化之功藏自外而内也用謂機緘之妙鼓萬物而不與聖人同憂盛徳大業至矣哉程子曰天地无心而成化聖人有心而无為富有之謂大業日新之謂盛徳論此隂陽妙道正是非兩非一變化无端只㸔天地間這些形形色色當其發育流行時何等顯而散見然顯者即是一元生理原自渾淪无二顯諸仁也當其收斂歸伏時何等藏而不見然藏中都含无窮變化其實萬有具足藏諸用也顯即顯其藏之仁藏即藏其顯之用這道理現前充滿人人可知惟有日用不知之百姓于是聖人不得不假象爻以參贊造化設卦繫辭爻爻象象把元善至理一一呈露出来是聖人底顯諸仁一象一爻之中具有千變萬化无窮妙用俱含藏在内是聖人底藏諸用此皆聖人一段憂百姓之心所為也如此㸔来造化之顯而可見者只鼓得萬物之出機必有聖人之發育萬物者然後實實顯者皆仁造化之藏而不見者只鼓得萬物之入機必有聖人之歸根性命者然後實實藏者皆用是造化之鼓萬物其功用猶不得與聖人同憂則聖人之徳業豈不至盛至大矣乎何者日用不知之百姓造化无如之何惟有聖人之鼓動而人人得以繼善成性此聖人之徳所以日新而業所以日富也孫聞斯先生曰鼓萬物而不與聖人同憂先賛天地以極賛聖人也如時以盛徳大業歸造化終未安按聖人所以裁成輔相天地者全為這段憂世之心不能已此天地非聖人不能成位也中庸費而隠章㣲之顯章正發明顯仁藏用之義生生之謂易成象之謂乾效法之謂坤效呈也法謂造化之詳宻而可見者極數知来之謂占通變之謂事隂陽不測之謂神張子曰兩在故不測所謂一隂一陽只在生生而已但說一隂一陽只見相禪的意思惟說生生見得隂陽往来處都是於穆不已天命流行易而不易其妙无窮玩生生二字纔與善字性字親切分明所以乾坤之名亦非另設只因他生生不窮處見得无象之中忽然成起象来此是何也乃知其中有箇主太始者故名曰乾又因他生生不窮處纔有象便自有承順底呈效許多法出来此是何也就主法乾說意亦同乃知有箇做成物者故名曰坤有乾坤便有竒耦隂陽之數數中俱有所以然至理直究極其數參伍錯綜一一知其由来這叫做占有乾坤便有往来變化直通其變成象成爻一一措之事業這叫做事知占通變則顯而藏藏而顯无非隂陽未嘗倚于隂陽生生不測此所謂神也不測即中庸之生物不測惟其兩在无方自然生生不已下文廣生大生正不測之謂天地間一有始便有象已後變化盡在成象中如草木之枝葉花果皆在一粒種中人事作為結束皆在一念發端中已後許多作用皆依象中呈效出来此成象效法之謂也易盡于一隂一陽句一隂一陽盡于生生二字味繼善成性纔識生生之㫖易道隂陽簡冊卜筮云乎㢤右第五章言道之體用不外隂陽其所以然者未嘗倚于隂陽也合上章是一篇易彌綸天地只是一生生生生便神夫易廣矣大矣以言乎逺則不禦以言乎邇則静而正以言乎天地之間則備矣不禦言无盡静而正言即物而理存備言无所不有首章言乾坤易簡其徳業可久可大故此章發明易之廣大原来只是易簡盖易之隂陽不測而其為物不貳故也不貳故生物不測而廣生大生焉就其生之發動流行處言謂之逺逺則愈出愈有而至于不可窮逺不禦也就其生生之當體而存處言謂之邇邇則物物皆具有箇寂然不動者一定而未嘗移静而正也這箇生生之理不但上際天下蟠地天地中間无一處无一物不具足故曰以言乎天地之間則備矣朱子曰静而正謂觸處皆見有此道不待安排措置隨處皆各足无所欠闕只觀之人身便見按静是變化之本原只不動正是變化无窮各自端正薛文清曰以言乎逺則不禦六畫之上生生而不窮以言乎邇則静而正六畫之中當體而理无不具夫乾其静也專其動也直是以大生焉夫坤其静也翕其動也闢是以廣生焉乾坤各有動静于其四徳見之静體而動用静别而動交也乾一而實故以質言而曰大坤二而虚故以量言而曰廣廣大配天地變通配四時隂陽之義配日月易簡之善配至徳乾極其大生只是一箇静專動直不出一隂一陽所以為易坤極其廣生只是一箇静翕動闢不出一隂一陽所以為簡乾竒而獨故静則專一動則直遂坤耦而兩故静則翕籠動則闢開乾動坤静又各兼言之者乾坤交是動不交是静也乾大生物无不覆坤廣生物无不載故配天地一動一静自相推遷成化故配四時此流行之用也其動静相因處自然幽明代謝故配日月此對待之體也然天地有所以大四時有所以行日月有所以明都有箇至極之理在謂之至徳得了易簡便是得了至善此所以配至徳配至徳所謂與天地合徳與四時合序與日月合明也此為成位乎中至徳即一極字易簡而曰善正見得一隂一陽有箇天然妙處此所云繼之者善也人无時不廣生大生真知發處是乾良能去做是坤兩者相流行是四時知能並列是日月中間却有箇至當不動的是至徳也歸重末句右第六章明乾坤生生之功本于易簡子曰易其至矣乎夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地窮理則知崇如天而徳崇循理則禮卑如地而業廣天地設位而易行乎其中矣成性存存道義之門存存謂存而又存不已之意也承上章至徳二字故曰易其至矣乎天尊地卑而乾坤定聖人知則效天不厭其崇方極得髙明而有了天道禮則法地不厭其卑方成得博厚而有了地道崇效卑法天地方成位就聖人身上説天地天地位方有易可行盖天地尊卑之理不設易何從起所以有崇有卑方易行乎其中這知崇禮卑道理原是性中天成生来便存只是人自虧自歉了便不能存其存惟崇效卑法方得存其存存存則自成妙用千變萬化俱従性而出所謂道義之門也中庸時措之宜窮理則知崇不出一易知惟易知是无上之知故徳以之崇循理則禮卑不出一簡能惟簡能是曲當之禮故業以之廣朱子曰禮卑便㑹廣髙則狭了又曰地卑是兩脚踏地従貼底謹細處做將去此語最有味離卑法言崇效是无了貼地工夫雖欲效天天地安得設位便是乾坤息也乾坤毁安得成性惟有崇有卑便成性存存上章明善字此章明性字中庸温故知新是崇效天敦厚崇禮是卑法地右第七章合上章一篇道義之門即是大生廣生聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻㑹謂理之所聚而不可遺處通謂理之可行而无所礙處如庖丁解牛㑹則其族而通則其虚也言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化易中爻象都是天地間自然變化有一様變化有一様義所謂物宜也聖人惟見得天下之賾所以形容得物宜真故雖賾而不可厭惡也變化雖多有箇一定不可易之典禮在即書經五典五禮也聖人惟見得天下之動所以㑹得大通之道行得典禮其辨吉凶處最分明故雖言其動而不可雜亂也人不成爻象只為不成變化要成變化必須擬言議動要擬言議動无如觀象玩辭觀變玩占而已下七爻其法也擬言議動易所謂占言動成變化易所謂變従首章說變化字到此方結明朱子曰㑹是衆理聚處雖覺得有許多難易窒礙必于其中却得箇通底道理方可行耳鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎中孚九二同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭斷金如蘭言物莫能間而其言有味也同人九五初六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣大過初六勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也謙九三亢龍有悔子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也乾上九不出戸庭无咎子曰亂之所生也則言語以為階君不宻則失臣臣不宻則失身㡬事不宻則害成是以君子慎宻而不出也節初九子曰作易者其知盜乎易曰負且乗致宼至負也者小人之事也乗也者君子之器也小人而乗君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乗致宼至盜之招也解六三引七爻以為擬議之例雖各舉一事意則相貫中孚言行之感通同人貴言行之同心大過教之以慎謙教之以虚乾上則不能下之反不節則不能慎之反解之致宼則不相應不相同之反皆擬議要訣擬議首中孚者鳴鶴爻辭全在一中孚中則自孚自應君子擬議正要審中也合得中方是至善而天下應之矣解爻上慢下暴全失了擬議之道便一歩不能通與首段正相反負者物貴而我賤故為小人之事乗者我貴而物賤故為君子之事觀慢藏誨盜一語則知言動間深衷隠匿都无所用其巧觀冶容誨淫一語則知言動間文致粉飾都无所藏其偽右第八章言卦爻之用言易中爻象皆示人變化之門天一地二天三地四天五地六天七地八天九地十本在第十章之首天數五地數五五位相得而各有合相得謂一與二三與四五與六七與八九與十各以竒耦為類而自相得有合謂一與六二與七三與八四與九五與十皆兩相合也天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也鬼神謂凡竒耦生成之屈伸往来者本在大衍之後依程子曰宜在此四按五位相得就一六位北二七位南三八位東九位西五十位中上㸔更分明上章言擬議以成變化然則従何擬議聖人揲蓍求卦正是要人占象占爻以知所擬議也故結之曰知變化之道者其知神之所為乎天地變化只是二氣五行如一陽水六隂水餘倣此其數則見于河圖故天地之數皆五而總于五十有五河圖之五十五數之體也而用寓于其中矣故變化于此而成鬼神于此而行无不具足此數之中其神而明之則存乎其人焉耳下文正教人成變化行鬼神之事五位相得而各有合一句該河圖无窮妙理一六水二七火等就是天之十干水北火南等就是地之十二支如此一往来交錯天地間生生化化何者不従此出故曰成變化天地間吉凶禍福何者不従此起故曰行鬼神盖有相得與合便有不相得與不合下繫說逺近相取又說不相得則凶即指此也大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閠故再扐而後掛大衍之數五十數之用也所謂變化之門神而明之之事也五十之中又以四十九為用一為體體藏于用也其用四十有九是天然定數盖卦體方數用少隂是八故八八六十四卦蓍體圓數用少陽是七故七七四十九䇿又不特此也太極生兩儀兩儀生四象四象生八卦太極是一兩儀一竒二耦是三四象太陽一少陽二少隂三太隂四是十八卦乾一兊二離三至坤八是三十六共合来恰好是四十九數也横来直去无非四十九乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易分二掛一揲四歸竒十有八變而成卦三變成爻十八變成六爻八卦而小成謂九變而成三畫卦引而伸之觸類而長之天下之能事畢矣一卦可變為六十四卦凡四千九十六卦也顯道神徳行是故可與酬酢可與祐神矣道因辭顯行以數神酬酢謂應對祐神謂助神化之功子曰知變化之道者其知神之所為乎何為大衍衍而三十六則為乾䇿衍而二十四則為坤䇿衍而二百十六則為乾卦衍而一百四十四則為坤卦以至衍而萬有一千五百二十則六十四卦全皆衍也天地之數五十五何以止衍五十盖五者數之中一二三四六七八九皆有方位便各一其性各一其用五无方位无所不含无所不成故惟五可衍兩其五則為十十其五則為五十論語五十以學易正是大衍之學以之成變化行鬼神故可以无大過知大衍之學則四營十八變皆吾自然之營與變也三百有六十萬有一千五百二十皆吾自具之䇿數也人只當身自驗貌言視聴思五事也日夜運用何時不可營肅乂哲謀聖五徳也隨人具足何處不成變周身中萬其毛竅一晝夜萬其呼吸何數不完具只是人不知衍耳于此引伸觸類而長天地之體即吾體天地之用即吾用變化自成鬼神自行故曰天下之能事畢矣成變化故道于此顯行鬼神故徳行于此神可以應萬感而无不通故可與酬酢可以賛化育而通神明故可與祐神此皆大衍之變化故曰知變化之道者其知神之所為乎伏羲神明作用不但見于畫卦尤妙于揲蓍不觀四營十八變安知成變化行鬼神能事成變化便與造化做得賔主故云酬酢行鬼神便與造化助得功用故云祐神當期之日則四時運行之理无不備當萬物之數則萬物並育之理无不備四營十八變皆參求此理之妙法得其理道自顯徳行自神矣引伸謂舒展只管引而展開去也觸類謂以類相觸而通如乾為君為父為金以類推開去也學易全要引伸觸類何為神之所為朱子曰徳行是人做的事因數推出来方知得這不是人硬恁他做都是神之所為也須知得是天理合如此孫聞斯曰八卦而小成只是八卦引伸觸類便是六十四卦不必推廣到四千九十六卦其曰十八變凡九變分而為二便是兩變也按六十四卦又推而三百八十四爻道理自无窮右第九章言天地大衍之數揲蓍求卦之法言聖人用易之法下三章賛易之妙易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占四者皆變化之道神之所為者也是以君子將有為也將有行也問焉而以言其受命也如嚮无有逺近幽深遂知来物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與于此參者三數之也伍者五數之也錯者交而互之一左一右之謂也綜者總而挈之一低一昻之謂也此皆謂揲蓍求卦之事易无思也无為也寂然不動感而遂通天下之故非天下之至神其孰能與于此惟象變辭占俱是至道所以不可不尚尚則得聖人之變化故曰有聖人之道四焉爻象中之辭都是示人吉凶悔吝之門人一出言便尚這箇轉移禍福至理纔與世道人心有用所以聖人之言可畏惟其言皆闗進退存亡大窽繫以此而言謂之尚辭這便是擬而言六爻變動不是用意可變到那時位自然一様道理出来不期變而變人有動待動而成過方纔思改便不成變化惟到那時節便見得道理已改換只循理自然成變此謂尚易之變這便是議而動凡成一件事有形可見者皆曰器易中先有至極之理見而成象成象為乾方有這件用形而成器人有一事成用必先象其至理此之謂尚象卜筮不必揲蓍灼龜然後為占有一疑未决一理未明只把易中吉凶悔吝之理一占一度便自分明此之謂尚占所以君子有心占卜筮之占聖人為凡民設非君子所尚遂知来物非術數家知未来之謂吉凶之感俱有由来之故惟問之于易可以知其所由来之物這是理之極精㣲處故為天下之至精通其變従一剛一柔交錯而變遂成六十四様文章極其數以乾九坤六之數四營十八變遂定六十四様物宜之象這是理之極變化處故為天下之至變无思无為寂然不動而所以應乎感者未嘗不具感而遂通天下之故而所以不動者未嘗不寂這是理之極神妙處故為天下之至神只通得天下之感未足言神惟通天下之故従源頭透徹自然變化不禦所以為至神參伍以變朱子言之極詳參參天也伍參天又兩地也凡變无不従三五先天乾後天居西北進三退五也先天坤後天居西南進五退三也這是自然定理所以十五日節氣一換月以十五而盈虧皆三五也錯是一横一直如絲之有經有緯綜是一上一下即簆之時上時下參伍錯綜是所謂大衍之法聖人神明妙用全在于此按朱子參三數之伍五數之俱就揲蓍說㸔来是畫卦之變錯綜則揲蓍數法也夫易聖人之所以極深而研㡬也惟深也故能通天下之志惟㡬也故能成天下之務惟神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也惟天下之至精則逺近幽深一一知所由来這是究極到至深處正是人心寂然不動根宗所以通得天下之志惟天下之至變于萬感萬應之理一一研求出㡬来這是識了動中之時宜所以成得天下之務惟天下之至神則寂感之間有箇不測妙用使天下利用出入无所不通故不疾而速不行而至這都是聖人之能事俱従象變辭占中来故申之曰易有聖人之道四焉右第十章承上章之意言易之用有此四者賛易道之神子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑従首章說到上章易成變化行鬼神不出深也㡬也神也而所為神者却有一箇寂然不動之主説到此處天下之理至矣盡矣此外更无餘矣易之開物成務冒天下之道也只是這些子故曰如斯而已者也斯字全指寂然不動之理說即下文太極是也聖人之心惟其寂然不動故謂之洗心洗者潔浄精㣲之極通篇以此句為主蓍卦爻皆本諸此乾坤法象變化妙用立成器利出入无非此也聖人不過因蓍龜以顯出此理耳寂然之理即是易簡開物即理字是開通了人心吉凶之實理成務是成就了天下轉凶為吉之事開物成務便該盡了天下之道三句見易道如此其大然總不出一箇至極之理聖人得此理故能通天下之志即開物也能定天下之業即成務也通志則志不惑成務則事不惑故能斷天下之疑合三句見其冒天下之道是故蓍之徳圓而神卦之徳方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知来知以藏往其孰能與于此哉古之聰明睿知神武而不殺者夫聖人體具三者之徳而无一塵之累无事則其心寂然人莫能窺有事則神知之用隨感而應所謂无卜筮而知吉凶也神武不殺得其理而不假其物之謂承上易總不出斯理所以易有蓍極圓而神就是此理之圓融流轉處易有卦極方以知就是此理之畫一有定處易有爻其義變易以貢就是此理之變動而顯明處此理渾然全具于人心只不明易便不明吉凶未免憧憧往来故聖人以此洗心退而藏藏而密宛乎寂然不動之本體故能吉凶與民同患感而遂通天下之故其神而无不通者只以知故之由来所謂蓍之圓而神此也其知之有定在者足以藏其用之徃所謂卦之方以知此也若非聰明睿知神武不殺其孰能與于此㢤通志定業見其聰明睿知斷天下之疑見其神武不殺也洗心本義以見成說退藏謂退而深藏密者不睹不聞之地總是狀聖人心體寂然處洗心二字玩之極有深味知来者吉凶由来之故藏往則千變萬化之用皆于此藏蓋来者言本来往者言應用此易中往来通義也是以明于天之道而察于民之故是興神物明于天道以前民用察于民故聖人以此齋戒以神明其徳夫是故闔户謂之坤闢户謂之乾一闔一闢謂之變往来不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神聖人明得此理已是通徹了三才一致之極是以天道變化聖人能明之民生吉凶之故聖人能察之此理原人人可知但天下多日用不知之百姓所以聖人不得不興神物以前民用何為前民用民昩于吉凶之故便不知利用之道故假蓍龜以先之蓋非蓍龜无以通造化而顯神明之用則无以起天下齋戒之誠故聖人興神物正以此齋戒以神明其徳也吉凶之故原在人心只昏蔽便自昩了一知敬懼便自開明故聖人以神物生其齋戒這是聖人鼔舞天下之妙用其實此理何嘗一人可離又何人一日不相出入故說闔戸一段見得最切最近開眼便見舉足便履聖人與凡民一毫无二也乾坤便是戸闔闢便是變往来便是通可見便是象有形便是器聖人修而制之便為法百姓共而由之便是神極其變化極其神妙原来不出這些理所謂如斯而已是也人心一齋戒便清明而通得鬼神聖人興神物全為通人這些清明之氣也書曰夙夜惟寅直哉惟清未形而有見謂之象因象而成形謂之器以日用不知之百姓而亦能利用出入所以見其神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業可見圓神方知易貢者有象之易也有箇所以然者无象之易也无象之易斯理是也寂然不動者也所謂太極也无此理便无所謂易有太極便有易自然變化自然生生凡夫儀也象也卦也吉凶大業也一有俱有而開物成務无非此而已是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隠鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜亹亹猶勉勉也疑則怠决故勉是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也說到太極天地間更无他道只是這箇理天地便是此理大法象四時之變通此理之變通日月之縣象著明此理之著明此理得之于已則為日新之徳而至可貴在是此理措之于事則為富有之業而至可富在是天下之崇髙孰加于此故莫大乎富貴全具此理者聖人故聖以之為天下利全顯此理者蓍龜神物故能定吉凶成亹亹蓋合徳天地合序四時合明曰月而備富貴之全者在聖人乃聖人所為與民同患以參兩天地節宣四時運行日月備極其崇髙之徳業者尤在于蓍龜故聖人之大大于蓍龜之用也是故易非聖人有所作為于其間也不過因天地而則之效之象之聖人特因其自然示以象繫以辭定以吉凶焉爾由此觀之易之開物成務冒天下之道太極之外更何事哉故曰如斯而已者也圓神方知易以貢故能探賾索隠鈎深致逺即極深研㡬之謂也闔闢變通出入利用故能成天下之亹亹即感而遂通天下之故也亹亹者吉凶明則趨向自不能已所謂鼔之舞之是也通篇大㫖言易開物成務總自聖心出易之圓神方知即聖心之神知也若此者易不過一太極聖心即太極故天地四時日月富貴之理无不備于聖人而聖人妙用盡在于蓍龜所以有示有告有斷皆聖人效法天地而為之此易所以冒天下之道也右第十一章此章專言卜筮此章推明易之本源易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也上章說聖人制易之原此章則說人當體易能體易則人而天矣所謂自天祐之也大有以離明順天理故自天祐之繫于終爻盖離中一柔又虚又明所以為順為信順便得天助信便得人助人到虚明之極自然歩步都務實踐只向真誠行故謂之履信自然念念都従天理只依小心去故謂之思乎順這㸃虚明原是極可尊可貴底能以虚明為尚故曰又以尚賢如此有不自天祐之者乎易明吉凶天道本来无不吉履信思順尚賢純走了吉路便全是天道故自天祐之然非大有之剛健文明何以得此故易必待其人人必待徳行下文則正言其人也中庸曰自誠明自明誠天道本誠而明人道所以合天只有自明而求誠一路此大有自天祐之為入易之門明在天上也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼔之舞之以盡神說到自天祐方謂之真易這纔是得聖人之意故以書言觀易則聖人之意㡬于不可見不知聖人之意即在卦象爻辭之中聖人之象辭即盡變通鼔舞之道其能得與不得是在人焉爾得之則書言即意也不得之則聖人之意終不盡于書言也情偽即當不當也六十四卦鋪設便有相得不相得吉凶悔吝全于此分聖人示人之意即于此可見乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或㡬乎息矣緼所包蓄者猶衣之著也乾坤毁謂卦畫不立乾坤息謂變化不行是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業卦爻隂陽皆形而下者其理則道也書之所言盡于乾坤乾坤便是易之精藴乾坤成列易就立于其中假使无乾坤如何有易假使非易乾坤之不毁者何故故乾坤亦㡬乎息矣然則乾坤即可見可象之易易即不可見不可象之乾坤以其形而上謂之道以其形而下謂之器其實道即器器即道原无兩件化裁之變變于此推行之通通于此措之事業事業定于此形上不離形下形下即是形上書言未嘗非意意未嘗非書言也乾坤成列易立乎其中要見得易的即是乾坤形上形下𦂳根此句說與天地設位易行乎其中語意不同是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎徳行是故聖人立象設卦足以極天下之賾然是象焉而已聖人因爻繫辭足以鼓天下之動然是言焉而已其化裁之變推行之通所謂意者未嘗不寓于象爻也神而明之必待乎其人所謂其人必待乎黙成之徳行盖徳行黙成則動即成變通身即成象爻又何聖人之意不可盡見乎其徳行何如履信思順尚賢是已先曰謂之變謂之通言變通之道爻象中所自有又曰存乎變存乎通則必得其人為之變通云爾前第二章說觀象玩辭方得自天祐之此章說自天祐之方謂之神明易道語意正相首尾十二章原一貫右第十二章上言易本于太極此言有其徳行方是易惟以徳行論易易不可一日離已三章一意周易像象述卷九

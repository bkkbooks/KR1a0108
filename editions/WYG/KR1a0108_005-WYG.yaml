body:
  text: 周易像象述卷五明吴桂森撰咸亨利貞取女吉咸交感也感有必通之理然不以貞則失其亨而所為皆凶矣彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣上經首乾坤天地大男女也下經首咸恒男女小天地也天地交而有男女男女交而化化生生者不可窮所謂交感應而已咸少男少女之交故咸感也天地有生來无有不感不應之物人有生來亦无不感不應之時故程子曰天地間只有一箇感與應而已這箇感應是氣機自然相與全不由一毫意思感者不知所以感應者不知所以應咸之義為皆感者應者兩相湊合一動皆動一通皆通都是黙黙然天機自到故咸感也乃无心之感也卦體澤在上山在下山澤之氣无時不通山何嘗有意感澤澤何嘗有意應山一氣機之自相往來所以成咸也咸之所以成咸全在艮剛一下有艮感斯有兊應惟艮止有寂而能感之體惟能下又有卑而能受之虚所以艮下則兊柔得以上行二氣便感應而成相與此咸之所以亨也其徳止而說止常為主而感乎說也男下女男常為先而感乎女也止感說應則止貞而自无不貞之説男先女應則男貞而自无不貞之女所以利貞所以取女吉也取女感之最易失正者故特言之艮剛男道在下天感地之象兊柔女道在上地應天之象聖人之心常止常定感以天之象人之於聖人說而能従應乎天之象天地感而萬物化生天地原无心聖人感人心而天下和平聖人原无心可見天地萬物此感彼應自有一箇天然之情天然相與之情纔是情之真故曰觀其所感而天地萬物之情可見矣情字情實之情乾彖曰利貞者性情也人生而静性也感于物而動情也惟止而說則感而忘感動而常静所謂性其情也此實情也夫人所以日逐日流只為情其性都非情實若感與應盡是實情則聖人之能事畢矣恒大壮萃情同故乾言聖人咸亦言聖人咸云天下和平直與乾之雲行雨施天下平同一分量下經首咸以此咸主只是一感感只是一止止者一定之理即至極之理也故止以說則貞歸妹動于說則非貞矣不特夫婦之相感然也君止仁則臣以忠應矣臣止敬則君以禮應矣父子兄弟朋友之相與無不然故止者同歸一致此也窮神知化亦即此也象曰山上有澤咸君子以虚受人山之氣上蒸而為澤澤之􅂔下潤而滋山故山上有澤二氣感應以相與之象山體篤實何以為虚山不動而澤自通則非至虚不能也君子亦然主常定寂而感无不通則非至虚不能也故程子曰有主則虚斯為咸之以虚受人君子惟能下所以能虚人不卑躬下志以來天下之善安得天下嚮應故艮山一下萬感皆通矣虚以受人君子之咸也初六咸其拇象曰咸其拇志在外也六二咸其腓凶居吉腓足肚也欲行則先自動躁妄而不能固守也象曰雖凶居吉順不害也九三咸其股執其随往吝象曰咸其股亦不處也志在随人所執下也人到止而說如此感應是渾身皆成感應自足至口随舉一體觸無不通真是無胫而走不言而喻故六爻就身取象如拇如腓如股如脢如輔如頰如舌件件皆靈然初不言趾賁大壮艮初皆言趾而言拇五不言背而言脢上不言口而言輔言頰輔乃口輔頰乃兩頰都有意這㡬件雖欲强之動亦不動直到天機相感則自動却又一毫阻抑不得惟三是止之主故象以股動止得以自由者也然此衆體皆聴于心心得其貞則五者可以通天下之志而原非以五者感也心不得其貞則五者之感皆非貞矣四心位故貞吉獨繫于四若心不止于理則又有意之心不得為貞故小象中志字皆不取人之感應相與必自淺入深人一身自下而上有自淺而入深之象拇􅇰下動最微不過相感之初然動雖微其志則已動乎外人脚纔動中心已是向了人故曰志在外不係吉凶以初動原有此二路二腓在足之上相感而到腓動便全身要動聖人又設吉凶兩途以教之雖凶只一能居便有吉路居者安居不動止體以從心為主自然不至感于害故曰順不害人有時一念有感要動真若兩足不由人作主便入畏途若少定便不至此也三是艮止主爻從初及二感至三已有不能止之勢所以象曰亦不處言與初二俱感也然三正要在此際作得主定如何執其随執随執下人之道也随卦剛來下柔即彖所謂男下女能下未嘗不可以感人但謂之執則有意之下而非无心之感所以曰志在随人而往必吝也若随所當随便是咸股之貞也内三爻俱有貞不貞兩途未定之詞九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也四心象咸之主也心之感物當正而固乃得其理若憧憧往來不能正固而累于私感則但以朋類從之不復能及逺矣四心位一身之感皆在心故不言所咸却有貞不貞之兩路以聴心之所感如得其貞則吉而悔亡不貞則不一便為憧憧往來而已天下感應雖殊只一個理是理同歸一致便是貞何必憧憧往來不是理之一便未免憧憧于往來童心為憧憧見識不定之謂這都是害未感害貞之所以吉也若一憧憧往來心先作主不定衆體如何得定如拇如腓等皆従心而不定此為朋従如此何由感得人心故曰未光大或以四為咸卦主爻非也主爻自在二主感貞言于四者其位則心其爻則説之始其介則上下感應之交貞與不貞正在四辨是殊途百慮往來路口也九五咸其脢无悔脢背肉在心上而相背不能感物而无私係象曰咸其脢志末也上六咸其輔頰舌象曰咸其輔頰舌滕口説也説作悦五居上卦之中脢亦居人身之中取象背肉者正以其寂然不可動而能關係衆動也咸而至五已是透體皆感感至背肉乃是透體皆通故徳盛者盎于背有愧于心者必汗浹於背背之咸一毫不容思議又无一體不通逹者也咸其脢又何悔之有象曰志末如脢之感全不假一毫舉心動念乃知用心感人者悉有意之私非自然之感皆末也非本也志不可謂之末惟感貴无心故以有心為末以其志乃憧憧往來之志也咸脢即是艮背之象上曰輔頰舌脢雖居中猶隠而不形咸至於上則發而形於可見曰輔曰頰曰舌則笑貌聲音无不是也盖通内外皆是説意湧出故曰滕口説水上出為滕都是中心和説溢出如此方是咸之極致總聖人感人心而天下和平和平天地萬物之情也聖人之心先自和平則其自拇至輔頰純是和氣感召如何不過化存神若心先不貞這些衆體可容你矯飾一分隠匿一分終日感人都在憧憧往來中如何得人心嚮應作徳日休于咸可見論感以无心真有神行其間何消得你動脚只志向在此人心自應如范滂攬轡登車貪墨吏自去這叫做咸拇咸腓若説自下一念真是感人尤速如藺相如與㢘頗不消得有意去感他只這􅂻一下他那􅂻自服這叫做咸其股執其随又有一等感人者自家也不知人已自應了心思不到耳目未加之地黙黙心喻心化如偷児之畏王彦方知如洛中父兄曰毋為不善恐司馬端眀邵先生知這叫做咸脢至于感通之極並不用動容開口只目擊便神孚如朱公掞見明道曰某在春風中坐了一個月這是咸其輔頰舌詩之聲色不大也咸速也感通之妙直是不疾自速神哉恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔相應恒恒亨无咎利貞久于其道也恒必利正乃為久于其道不正則久非其道矣天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而而天下化成觀其所恒而天地萬物之情可見矣咸以艮止為主恒則以震動為主人但知倐而感倐而應莫知其然者為咸不知惟有一定者為之主所以成感應也人但知至有常至可久一定不可移者為恒不知惟于變動中不失常道所以為可久也只看山與澤是天地間形之有定的却无一息不通氣故象之以咸雷與風是天地間氣之最无定的其相薄者却千萬世不改故象之以恒其千萬世如一者何也不易之理也是乃久之道恒之貞也恒徳之固也取専一為恒恒字訓久盖惟専一也乃能久天下之定理方是天下之常理故聖人不于无變无動一而有常處言恒乃于千變萬化不失其常處言恒所謂久于其道也剛上四句皆言恒道而主在雷風相與一句凡剛上行柔下行宜不成相與惟震剛上巽柔下適成相與盖震主出巽主入出者奮而在上入者順而在下長男出而動乎外長女入而巽于内豈不成相與之妙故先天方圖震巽居中為隂陽相交之始即復姤相與之際天地之至妙者也巽而動二句則皆言其相與妙處只有巽入无震出巽為无用若不先巽而後出動為妄動故動不以巽疾雷也巽而无震厲風也秋冬之風无震出為殺物之風惟雷風相與所以巽而動適得動之妙震剛得巽柔為之應巽柔得應乎震剛剛柔相劑而成妙用此剛柔皆應也其當上而上當巽動而巽動當應而得應皆是天然不易至理不易至理恒道也所以亨所以无咎利貞相與故能亨動巽皆當剛柔應故无咎又得貞相與二句即咸之二􅂔感應句巽動二句即咸止而説男下女二句正相對咸之義妙在剛下恒之義妙在剛上論久而不已无如天地然天地有開闢有混沌亦未可見恒其所以一闔一闢闔闢相禪于无窮只為道在是天地之久久于道也久于道故始而終終而復始始終往來何有窮盡所謂利有攸往終則有始也天之為天是這不已之道日月有中昃盈虧不常所以久照只為得此之道四時變化往來不常所以久成只為得此不已之道成者成其嵗功也聖人不是這久道如何能窮而變變而通以化成天下可見天地萬物形氣萬殊俱有不可易之道在不可易者情之正也故曰觀其所恒而天地萬物之情可見矣象曰雷風恒君子以立不易方風行雷動天地間至无常的風必入而行下雷必動而上行是天地間至有常的恒象有常者此一定之方也如乾上坤下坎離南北震東兊西皆有定方方以類聚君子今日處于此明日往于彼此不能不易者也无常者所立之方也随方而宜君子宜于此方之道即冝于彼方之道雖易而實不易者也此為立不易方謂不因方而易恒之道也初六浚恒貞凶无攸利象曰浚恒之凶始求深也隂居巽下為巽主性務入故深以常理求之象浚恒九二悔亡象曰九二悔亡能久中也九三不恒其徳或承之羞貞吝承奉也言人皆奉而進之不知其所自來也象曰不恒其徳无所容也恒六爻巽在内卦是柔來用事也最難得盡善故初凶三吝二僅可以悔亡初曰浚者巽善入從初就入有深求不已之意所求者求可恒也夫初以其位下而質柔則婦道也子道弟道也以下深求于上曰夫子當何如父兄當何如可乎以其時則事始也始事便求如何永得可乎所求雖正必凶之道故曰始求深也二曰悔亡随事擇中庶㡬可久之道巽本柔順三以究而躁不恒之象人而无恒何處非􅂑羞之道這羞吝不知其然而來的曰或都是自取當受的曰或承又是正理中亦不免的曰貞吝所以然只為人失恒心自一處去不得故曰无所容也恒之三即咸之四咸四貞恒三吝盖兊巽皆婦道婦而為應則正也婦以不恒主于内豈不羞吝此卦中之情偽也九四田无禽象曰久非其位安得禽也六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也上六振恒凶象曰振恒在上大无功也居恒之極處震之終恒極則不常震終則過動故象振恒九四震主動而上非不當動也只是不得中正之位田无禽之象田者獵也禽害苗之禽得禽田功方可成㢲初有浚之病如禽然㢲為黔喙四動不以中正如何去得這病故謂之无禽言不能獲此禽也象曰久非其位只是惜其動不盡善亦未嘗有悔吝之辭五則動而中矣只是柔中所以雖有恒徳又能貞却只是婦道非夫道盖五之應在二他卦以柔中應剛无不吉者惟恒之二㢲體也婦也五乃震體也夫也五反以柔道去従二之剛是從婦之貞也以婦道為夫道非制義之夫矣所以凶也此卦中相感之不同貴道不貴恒之義于五益可見制義是道上六振恒振者振動其恒恒以可久為道上處震終不覺到此振動起來這是厭常喜更改于恒道正相悖舉前念盡失之矣故曰大无功也總恒六爻无定主亦无一爻稱吉亨盖惟變化无常乃為恒道若有一時一位可以為恒不必言道矣恒常也不過一平常從初一念少不平常便是喜穿鑿穿鑿豈可久謂之浚恒若到頭一念不安平常便是喜變更變更豈可久謂之振恒浚恒无始振恒无終凶三之不恒自不必言五謂之恒其徳矣因才不稱位只做得婦四才是有為矣因位不副才亦終无功可見于道上稍有未合皆非可恒惟二得中随處審中差為可久然不過悔亡而已詳舉不恒之故則恒之有定理无定在昭然可眀是所謂不易之道也二少二長乾坤錯綜之交咸恒乃二少二長之交居下經首與上經截然有別上經非剛爻為主則剛爻原始反終皆陽剛用事咸恒柔原始柔要終皆隂爻用事陽用事直頭无不盡善隂用事須有許多委曲幹旋方得盡善觀兩卦爻辭聖人于此另有一畨作用換過一畨局面所謂旁行不流盖謂此也故自此而後如遯如眀夷如睽如蹇如損等卦皆另有一様變通作用皆因柔爻當事故也此經之大關節咸就是剥夬合體恒就是復姤合體所以居中局十二卦之中為政以徳譬如北辰居其所而衆星共之聖人之感人心也天何言哉四時行焉百物生焉聖人之久于其道也咸速也恒久也其義如此遯亨小利貞遯退避也二隂浸長陽當退避故為遯六月之卦也彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉男女交則陽道當退處故咸後有遯男女正則陽道當制動故恒後有大壮先天乾後天在西北居艮位是乾父不用事之象故乾艮之合為遯雜卦曰遯則退也陽剛有進必有退乃消息往來自然之運所以四時之序成功者退春夏陽之長秋冬陽之退艮時之冬也陽􅂔正當退蔵惟有一退乃所以收斂元和而聫属春生之氣故遯者君子所以運旋造化闔闢隂陽大手段非遯不足以成變化利出入善觀遯者遯處即是生生之妙故遯則亨不遯則不亨其義與畏避而去逺引為髙徒為退步一著者絶不相侔故遯正是與時行也時行之妙全在剛正當位柔正順應夫以剛而得位柔而應從若不必遯不知己當遯之􅂔候君子正當此時遯方當乎天理之正當位合乎人心之安柔應乃時行而行此遯所以亨小利貞者二柔當浸長之時若不知順從剛大便是不貞如何得小貞所以使之貞者全在剛大之一退也盖大為小之主大者處之不盡道小必失其順從之常大者盡其大之事小者自安其小之正利貞之義也由此言之以遯之時盡遯之義直與造化同卷舒時義豈不大哉卦象柔小進剛大退所以成遯然遂以為小人遯君子君子避小人之象則未足盡遯之義禮大夫七十致政遯也非必有所避也娶婦饗以一獻之禮舅姑降自賔階遯也非柔小迫之也故精言其義人皆有遯又時時有遯因時盡義方見遯之大義乾初曰遯世濳龍是遯之一脈乾六爻由濳而飛聖人時出之變化由飛而還濳聖人時入之變化故究極其道必如堯舜之禪方完得遯學一遯則大既貞小亦貞方為各正性命仍是純乾作用故五曰嘉上曰肥嘉肥能事非大聖人未易語此象曰天下有山遯君子以逺小人不惡而嚴天自上運山自下止但見天之有乎山未見山之碍乎天遯之象上運天自逺山自不能及下止山自安天自常覆被君子之于小人亦然天下有山天至近而逺君子與小人亦至近而逺終日同處隔絶若千里也不惡原未嘗隔絶小人天包山之度也不惡而嚴又未嘗下同于小人剛健中正之體也初六遯尾厲勿用有攸往遯而在後尾之象危之道不可以有所往但晦處静俟可免災耳象曰遯尾之厲不往何災也六二執之用黄牛之革莫之勝説象曰執用黄牛固志也以中順自守必遯之志也九三係遯有疾厲畜臣妾吉下比二隂當遯而有所係之象象曰係遯之厲有疾憊也畜臣妾吉不可大事也遯之取象在隂陽進退間至于六爻同為處遯之人凡卦皆然但内三爻艮止其所見卑而近外三爻乾健其所見髙而逺所以有失得不同不可泥剛柔之分便謂二柔乃逐君子之小人也觀本義自見分明遯之義全在識之髙逺行之果決所以能與時行初以隂柔居下豈有此等力量遯本非其能事只好以柔從剛随君子而遯遯尾之象夫遯惟其先㡬逺去所以為髙若為尾豈能逺脱世網悔尤随之矣所以尾有厲又曰勿用有攸往易中攸往皆有所作為之意遯世大君子原有事當為但有為于遯世更難初非其人故不往乃免災咎也二得艮之柔中雖不能與剛同遯却最得順剛之道者故稱用黄牛黄牛既中且順革者随時變革之革一随陽剛為行止也二得柔道之用但須要守得定所以稱執莫之勝説則所執之固也其不言遯者只貴順剛不必同去乃為遯也三是陽剛能遯者也以與二柔同體有係之象夫係之一念于遯最為害事母論係禄係名為不可即係于私恩係于姑息皆柔情用事而有累剛大故有疾有厲至于憊也憊疲倦意係之為道用以畜臣妾則吉豈有當進退大關節而可係者乎言小吉正眀其大之疾故曰不可大事也九四好遯君子吉小人否象曰君子好遯小人否也九五嘉遯貞吉象曰嘉遯貞吉以正志也上九肥遯无不利象曰肥遯无不利无所疑也遯之各得其妙在上三爻九四乾體當行止之介時可遯即遯最是天理之適好處曰好遯惟君子適當其好何吉如之小人如何識得此于這條路是閉塞的一般故曰小人否不通也盖君子循理小人只知私意于逺遯髙義如何得通所以否也五二以中相應五以中行則二以中順都是天地間至佳道理得嘉美之會曰嘉遯遯合時宜真是衆美俱集剛大柔小皆得其正曰正志也上九居天位得乾之終獨立于至髙至逺在天壤間綽綽有餘地超然自得而寛裕自如曰肥遯肥之義如碩道徳則廣身名則大行径則裕是為肥也上是優㳺世外人彼固无所係于世世亦不得而係累之故曰无所疑也无所疑又何不利之有總遯之亨亨于剛當位五之嘉是也其遯也卷舒一随乎時進退惟義所適逹而堯舜之揖譲伊尹之復政窮而孔孟之无悶天下之至美在焉所謂嘉也上則逈然出世中正之外更有髙蹈名位之上別有廣居碩大而无可與羣所謂肥也意巢許其人乎後世桐江之釣庶㡬近之惟四當機能決時至即行其遯也關世道升降之機繫國家泰否之運若四皓之隠見二疏之先知栗里之深濳各伸其志可謂得遯之好者矣若夫其人非不能遯者也以不能早決而失先機之眀則謂之係其時必當遯者也以剛果不足而不能善逺去之跡則謂之尾如東漢之末李范諸賢造非不髙見非不卓而栖栖于時事卒斃身名此犯係疾之憊也太學諸生才非撥亂徳非濟時又不能緘黙自静徒以意氣附諸賢之後而遺禍天下此犯尾往之災也此其失得不同悔吝亦異而皆有禆世道不愧貞風故均可以遯稱也至如以下流之品託髙山之迹移北山而靦顔借終南為捷徑則假遯名邀遯利斯其人之不足道无論已即有錮疾烟霞耽情泉石以逃虚匿影為事而于世了无用者曰我遯世也其于當位而應時行之義似乎哉甚矣遯難言矣大壯利貞二月之卦也彖曰大壮大者壮也剛以動故壮大壮利貞大者正也正大而天地之情可見矣物方長曰壮四剛同聚于下方當進長如人之少壮曰大壮方盛之勢也然雜卦乃曰大壮則止又本彖无吉亨之辭何也壮之二柔與遯柔所處不同剛固進長柔亦正在當事時有盤據難移之勢是以在下之陽剛能終其壮甚難消磨其壮甚易故聖人不以其機之方進者為可恃而深以末之難繼者為可虞所深畏致謹正在一壮字所以不係他辭而獨揭利貞為戒甚嚴之也卦體乾剛在内震剛在外以剛而動如何不壮只是天地間道理得以直前奮迅固是這剛動至于取蹶取僨亦是這剛動其間有貞不貞之分所謂貞者天理至當處也惟其貞剛是天徳動是天行如此剛動纔是正大既正且大天地間有何處不可行這壮便是不可少的若不是正大只把壮去行剛動須有時行不得這壮却是不可有的所以論剛動无如天地坤曰至柔而動也剛天地却只是正大剛不凌柔陽不侵隂所以生生化化不已此天地之情人若以天地之情為情剛大都是開通柔小柔小都來順助剛大這壮便到底有用若不以天地之情為情其始也或恃剛大而忽柔小又或逞剛大而凌柔小其究也彊陽難繼太剛易挫必且以剛大而荏于柔小以柔小而累乎剛大于壮之義何居壮而曰大若有可喜然聖人所最不取是壮盖氣有壮理无壮理則貞是也􅂔得了理便是正􅂔剛大可以塞天地配道義此􅂔也不然只是客􅂔客􅂔鋭于前必衰于後求其伸必致其屈故爻中以用壮歸于小人彖中不曰健以動曰剛以動正是一字之辨彖曰雷在天上大壮君子以非禮弗履自勝者强雷曰在天上非時震而震不得稱在必四陽之月純乾氣候此時之雷乃為在天之雷動以正者也若非此時過壮則皆疾雷矣故君子之動非當時而正不動非禮勿履何正如之此君子之壮也雷在天上人不敢萌非禮之念君子非禮勿履時時雷在天上矣故曰對青天而不愧聞雷霆而不驚君子正大之情如此初九壮于趾征凶有孚象曰壮于趾其孚窮也九二貞吉象曰九二貞吉以中也九三小人用壮君子用罔貞厲羝羊觸藩羸其角罔无也視有如无君子之過于勇也雖正亦危矣象曰小人用壮君子罔也易中君子小人並舉如觀如剥如遯皆以相反為義小象意亦然大壮之所貴只是一貞九二剛而得中此剛而貞者也稱貞吉九四亦剛體與乾剛同徳其動也壮于内之實徳非壮于外以凌物此動而貞者也亦稱貞吉餘爻无言貞者矣四合二撰乾能近而相取初曰壮趾初乃事之始人脚下起步最要謹慎時節從初先壮一路去只知用壮如此而征无不凶自初至四俱是同徳相孚甚易惟其有孚初既壮四必以壮動天下事豈容一味壮乃必窮之道故曰其孚窮也九二于壮時一審中便必不窮所以貞吉九三重剛而不中剛而過者也剛豈過任得如此用壮便是小人之壮君子于此却有道非不用壮也能以不用為用不用為用以不壮為壮也如中庸南方之强以寛柔不報勝人稱為君子是不强之强也如此全无一毫壮􅂔故曰用罔罔无也只是用壮用罔全在㡬微之辨此際之用最難所以雖貞而危若涉用壮便是羝羊觸藩不至傷其剛不已羸角之象君子小人只差這些故小象申眀之如何是君子之用只任理便都不是壮也何嘗不剛九四貞吉悔亡藩決不羸壮于大輿之輹象曰藩決不羸尚往也六五䘮羊于易无悔易容易之易言忽然不覺其亡也象曰䘮羊于易位不當也上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也九四震體大壮主爻四動則二柔自動豈復能阻四之進藩決之象乾剛在内上行四因而動此其壮壮于在已者也壮在已自无不通行故為壮于大輿之輹輹在輿中内壮之象羊可藩輿不可藩羊壮則觸輿壮則行象曰尚往言得利往之道也六五則柔體剛壮之氣到此全變換了䘮羊之象于易言䘮于平易之中也羊䘮則自无壮趾觸藩等悔象曰位不當者夫五尊位用事而以柔居之徳不足以當位故至于䘮然知壮之不可用而寧䘮其壮則猶可免悔以六五柔中故有此象雖非正大之壮庶不至犯壮之失者至于上六其壮全无可用了所以遂為入藩之羊三是方觸而羸上則入而不能出矣其退既不能進而遂又不能皆是不能詳審于前之故若知詳審則知艱難艱則自无咎矣曰詳正與壮趾征凶相對救曰艱正與䘮羊于易相對救以詳艱二字要壮之終指示切矣總大壮所不足只為五上是柔爻到底難得結局不能有終若思量善終之難安得不致慎于方壮之始慎之有道不要慿了這些氣所以爻中厯厯詳言壮趾不可用壮不可䘮羊不可觸藩不可發始壮要受累到厎壮還受累直歸到一個中字方許其貞以此動叫做自壮之强以此防叫做知難之法直把這些剛心壮氣都消歸中正天理方完得正大兩字壮之不足尚也如此震為蕃鮮三至五雜撰兊羊羝羊之象乾本龍震為龍龍徳知得䘮知進退惟其羊也所以䘮而不知得中道則䘮失矣所以進而不知退終凶且難挽矣盡失乾震之用是以人生始而陽眀易終不入于隂暗難始而剛健易終不荏于柔軟難語曰昔為百錬鋼化作繞指柔皆不知正大之壮故也晉康侯用錫馬蕃庶晝日三接彖曰晉進也眀出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉明夷離合坤全用柔道而晉尤為盡美以五柔上麗兩剛下三柔上麗眀得柔道之盡善也柔之所貴者進以從剛而已晉進也日進于髙明之義柔進從剛以上體言離明出地是方昇之日漸進漸光輝故曰晉晝也正是自寅向午之日當陽之照豈不普天同朗以下體言順而麗乎明順則能承受離明麗乎大明則全體俱在光明中以全坤當旭日豈不徧地通明所以其明日進日顯這都從六五一柔進而上行所以如此妙盖五柔上進得了大眀之體所以下三柔上進得了麗眀之順離眀得居天位坤順得安地位這是天地間極光眀全盛時候故以眀君良臣相遇象之人所難者是眀而出得坤隂更難者是坤隂全順離眀離眀出得地終日間常有個當空之照在坤隂順了眀終日間步步依着天眀去何得不日進髙眀這都從一㸃虚衷上進來故曰晉進也六五居尊與下三柔同徳分眀一個虚已眀君下三柔分眀是個順上賢侯康侯者安民之侯坤為民象用錫者用馬與蕃庶之儀錫而獻于上也書經師錫帝曰禹貢禹錫𤣥圭俱以下獻上為錫卦體柔進而上行故以進上為象此順麗眀之象晝日三接則眀王遇下之隆禮也此離出地之象三數與晝日皆離象三接覲禮延什一接也覲畢致享致命二接也享畢王勞之升成拜三接也乾彖曰大眀終始大眀之繫獨見于晉者餘卦皆文眀同人大有從乾上摩盪過只是眀之始事至晉直從坤上摩盪過方是眀之終事眀之難于終始正難在坤之順耳象曰眀出地上晉君子以自昭眀徳眀出地上天眀透出坤隂自昭眀徳心眀透出形氣此非己之自昭誰為昭之晉之自昭猶乾之言自强初六晉如摧如貞吉罔孚裕无咎設不為人所信亦當處以寛裕則无咎也象曰晉如摧如獨行正也裕无咎未受命也未有官守之命六二晉如愁如貞吉受兹介福于其王母指六五象曰受兹介福以中正也六三衆允悔亡象曰衆允之志上行也晉以五為主中天之眀初與二皆順體進于眀者也同稱晉如但初不應五而應四越四而從五難勢必有阻隔若摧之者然曰摧如撰艮止有摧象初能以一順為貞則吉所謂獨行正也大凡眀之難進必見摧阻亦勢所必然貴在一貞耳初既未能從五五亦豈遽孚初所以罔乎初當此時只有從容寛裕以俟方是无咎之道盖求眀以漸裕最妙之法五本得中之眀在君則為寵命在人即為眀命初逺尚未承受得來曰未受命也如二之受福則受命矣二晉如又曰愁如愁與摧不同愁正是一段憂盛危眀之至誠康侯所不能自己者惟下有愁如之良臣故上有勿恤之眀君所以為貞而吉又能受福也父之妣曰王母不言君而言王母所受者柔順之福也二五皆柔只説受福如乾之二五則説利見此剛柔分量之別三處坤之上與五近下二柔所従衆允之象志上行得以上進也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也六五悔亡失得勿恤往吉无不利以大眀在上而下皆順從故悔亡又一切去其計功謀利之心則往吉无不利也象曰失得勿恤往有慶也上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也四乃五之所麗同是眀體稱晉如只是剛質晉以柔為主眀以剛用便是上伺下凌等情弊五是明君坤是康侯四處其間獨以不中正之眀自專自用以此居近地分眀有窺覘貪竊之象故目以鼫鼠危以貞中之厲而斷其不當位也鼫鼠所謂社鼠貪而且黠以四剛眀之材似非其類特以居近位最宜首順而少自用其眀則眀皆入于邪僻私竇所以至同于鼫鼠盖深儆戒之辭欲其知順五柔而已故不繫以凶悔也六五大君之眀出地昇天之日更无晦翳悔亡也此時眀體已全只有計得失心未亡便非虚衷大度大眀􅂔象故戒以勿恤有順乎眀者如康侯有不順乎眀者鼫䑕一切置之度外以此而往眀之又眀吉无不利曰有慶也爻辭言吉莫詳于此者大眀之體故也上九眀極過剛眀以剛晋其晉也為觸物之眀晉角之象但用此眀以自治則可維者與五以剛柔相維也邑者已邑謂四也眀不用以觸物反而用以克己何嫌于過剛故雖危亦吉而无咎只是外燭之眀終非可恃故又戒以雖貞亦吝而曰未光也總人能順乎眀只管進豈不是日新上逹路若一念有自用之眀便不是順這眀就入于僻小了若一念或發露其眀便不能順這眀就鋒鋩太鋭了小則鼠鋭則角都是眀中易犯之病所以兩剛爻反不若四柔爻為吉以陽道多専隂道能從故也今人用眀不好行其小慧則但眀以察人忘了自家一個順道求日進之眀難矣凡自明非明順明為明故舜大知只是用民之中眀夷利艱貞彖曰眀入地中眀夷内文眀而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之眀夷與晋正相反眀出地自寅向午時之極盛大眀之象眀入地自未向戌時之極暗大難之象舉一世俱入幽暗中豈不是大難夷者平也明不能出地而至夷于地是全為坤土所蔽故有見傷之象然雖見傷而明體終无虧損則因夷而夷又未嘗不成妙用故眀夷者聖人因暗時善處暗之道非明之極至不可以語明夷晉日之出于扶桑明夷日之浴于咸池其明體原未嘗有二聖人之明時出而晉時入而夷其眀體亦未嘗有二但所處之時則截然不同全明于暗之時視明于晉之時其難易何啻天淵故利在艱貞也艱貞二字聨讀言艱難之貞晋明王居五位明在上眀夷明臣正位于二明在下其與二同心者五也故以在髙位之親賢當五直以上六為暗主主不係于五可見獨夫暗極位非其位矣所謂髙而无位上六是也二内則文明外則柔順故不為暗主所傷此文王之事蒙大難蒙字要玩即蒙卦䝉字将明未明之意盖紂惡在上舉世幽暗非文王一身之難乃通天下之大難文王以日月之明漸開漸通之而又不露其明如䝉養然故謂之䝉大難當時无文王則一世盡成闇沕矣此文王之善用其明也若箕子則身為宗臣文王之事亦不可為矣文王有國箕子與紂同國故與文王不同其所處更難只有韜晦其明以存一㸃為國貞心故曰内難而能正志其正倍為艱難所謂艱貞此箕子之善用其明也按商之末造主持當世者箕文二聖也文王為西伯于國難猶在外故紂自暗文王自明但盡其柔順以服事殷而已雖有羑里之囚終不為暗主所傷文王之位然也箕子為父師于國難為内故欲正其志不得不晦其明所謂晦明不待為奴之日也觀其諌象筯􅁔麥秀凡所以委曲維持兾留商祚者其志益不勝艱苦矣皆箕子晦明之作用也故文王一日在藩箕子一日在朝紂一日未亡必西伯䘮父師囚而獨夫之位乃旦夕不能留此二聖人心一道同曲盡明夷之貞也象曰眀入地中眀夷君子以莅衆用晦而明出于地上之眀其明之燭者逺入于地中之明其明之徹者微故用晦之明與晦其明微異更難于自昭之明有明而晦用之然後可以徹于耳目不見之地運于悠久不息之境此明之至也彖曰晦其明猶因時之艱也象曰莅衆則不必處患難凡臨民君子必不可无晦明之用者盖日進之明用以自昭沈㡬之明用以莅衆此君子用明之別初九眀夷于飛垂其翼君子于行三日不食有攸往主人有言飛而垂翼見傷之象行而不食所如不合時義當然不得而避也象曰君子于行義不食也明夷上六為暗主内三爻離眀皆見夷于上者故同曰眀夷初以剛居下此眀徳之士宜進而上者也因在暗時絶無上進之路故有往飛垂翼之象垂翼見進則无可效其用也于行則三日不食所往則主人有言見行則又不能得其遇也盖極言明哲不容于暗世其見夷至于如此垂翼正與晉之錫馬反不食有言正與晉之三接反看初是播棄之諸賢遯海之黎老也六二眀夷夷于左股用拯馬壮吉象曰六二之吉順以則也九三眀夷于南狩得其大首不可疾貞象曰南狩之志乃大得也六二文眀之主文王是也雖日從左而震則升天従右而兌則入地明夷入地無従上升故有左股見夷之象然二剛相麗豈終于受傷有拯馬壮之象三剛撰坎則為股之傷撰震則為馬之壮夫以二之文眀何至左股之傷何待拯馬之壮其當夷則順受而夷可拯則盡力而拯皆人臣柔順之極則故曰順以則也看來文王一吁而囚羑里是左股之夷盖格君致治雖文王無所用其力矣與十亂同心救世是拯馬之壮盖用賢維持則文王猶得盡其心也拯有拯已拯天下二義拯已亦所以拯天下也三居離之上爻眀徳全體雖在地下光輝漸逹有出坤暗而向乾南之勢故云于南狩于往也狩兵戈之象大首是暗之極者得大首去其元惡如離云折首也時方暗極三以明去暗宜見疾于時然三之狩乃正已而物正原是徳威之眀自不得而疾之如以為不可欲速覺味淺書曰大邦畏其力小邦懐其徳此南狩之象大首如伐密伐崇是也卒之不見惡于暗主反賜西伯得専征伐此為不可疾之貞其時已為化行南國之文王故曰南狩之志乃大得也以大首為紂非明夷之義六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也六五箕子之明夷利貞象曰箕子之貞明不可息也離體為至明之徳坤體為至暗之地下三爻明在暗外故随其逺近髙下而處之不同六四以柔正居暗地尚淺故猶可得意于逺去五以柔中居暗地已迫故為内難正志以晦其明之象上一爻為暗君也四五坤體同近暗主同在暗國同以正為志者也箕子親則叔父尊則太師徳則聖人商家一脉身之所任故于五直云箕子之明夷五主位也其次親而尊而賢无如微子故四有像于微子爻中雖不言微子如四之時位微子適合其道入于左腹入則與五同一心也于出門庭出則自有四當行之道也所云獲心意即利貞之心同以存明明道在已為正也存明所以存商也謂之左腹者腹坤象左為生道微子之去以生道獲箕子之心者也右為死道若比干之諌則以右腹獲箕子之心者也故三仁一心也無非知紂為入地之晦故箕子居尊則以不去為正微子左而次則以存祀為正一去一留委曲留己之明使少延一日則商家之脈尚未息一日故曰明不可息也至不得已而存其明為洪範之𫝊則箕子之心滋戚矣于出門庭其義最妙凡國家多難有主其事于中者必有出而分其事于外者然後國事庶㡬有濟微子之去正有深意故嘗論之使紂惡既稔而自斃武庚念亂以圖存亦事之不可知者也則箕子輔于内微子返于外六百之明何至遽息此則微箕之正志也若朝鮮之封抱器之歸豈其志哉或曰詔王子出迪我不顧行遯盖知紂之必亡審矣曰知必亡者聖賢之志也明不息者聖賢之仁也如此然後可以語明夷孟子曰其故家遺俗流風善政猶有存者又有微子微仲王子比干箕子膠鬲皆賢人也相與輔相之故久而後失之也可見三仁不晦明以自存則紂之亡久矣上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也照四國以位言上則暗之極明于是息矣謂之不眀豈其初本來便如此初之眀未嘗不可登天未嘗不照四國只是後來日昬日墜盡失其天然之則二是臣則上是君則乃自失也在上之明既入于地在下之明自将出而登天則暗者見為夷人之眀究竟適自夷其明而已明者見為自晦其眀究竟適愈成其眀而已總出地入地是世道大翻覆自昭自晦是君子随時之大變化雜卦曰晉畫也則眀夷夜也可見君子所以通晝夜只是一㸃離眀又曰眀夷誅也則晉賞也可見君子所以裁成民物只是一㸃離眀家人利女貞先正乎内也彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣上父初子五三夫四二婦五兄三弟以卦畫推之又有此象上經乾坤後就是六坎三男首合下經遯壮後四離至此而三女纔合男先女後之義㢲上離下二女同居象居室之内曰家人家者天下國之本故化行一國易化行一家難化行于家之父子兄弟易化行于閨門之家人難是以利女貞女正而一家之人皆正矣卦體剛居五柔居二得男正位乎外女正位乎内凡一家之中必男先正位乎外斯得女正位乎内然必女正位乎内方可謂之男正位乎外盖女有不正即男之不正也男正便是得天道女正便是得地道所以造端夫婦便察乎天地男女正天地之大義也要其所以正不過一個従男卦中以九居五所以為一家主者先得其正故一家從之則皆正分眀得了君道故曰家有嚴君焉父母正則子婦兄弟無不正家齊而國治天下平一齊俱正故曰正家而天下定矣女人于一家中為卑為小然未有女不貞而成家道者故堯試舜曰刑于二女詩稱文王曰刑于寡妻盖女之貞不貞皆家主一身之事也貞得女方正得家故特以嚴君歸父母見一家之本在此也象曰風自火出家人君子以言有物而行有恒風自火出是南方長養萬物之風君子之風自明徳出是一家温和之風中庸知風之自惟風自火出故君子患无離明之火不患无㢲行之風言行者發乎邇見乎逺有物有恒正修之于居室之内而風之于千里之外火出之風也離火言象書曰言揚火也言防其空虚有物則實巽股行象行防其不果有恒則常初九閑有家悔亡象曰閑有家志未變也六二无攸遂在中饋貞吉象曰六二之吉順以巽也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也家人以二女言則主在二四以一卦之主位言則主在五初九以位則在下以事則家之始語曰教子初孩教婦初來故閑當有之于初閑者内外有閑尊卑有閑有閑方得為有家閑于初正是先事之防故悔亡故志未變若有悔而圖則志變志變則雖閑无及矣六二正位乎内者也成事為遂无攸遂婦不主成事也進食于尊者曰饋在中饋惟以養親為事也婦人之事不貴能其所不能而在能其所當能在中饋所謂惟酒食是議如此方是婦人之貞㢲順之極故曰順以㢲也九三居上下内外之間近比二四界限正要在三分眀故言節節即閑也嗃嗃未免嚴于節所以悔厲然不失家節吉若嘻嘻離反坎憂為喜故有嘻嘻之象便必至于失節所以終吝也或曰嘻嘻歎聲謂嚴而過也然家道以過嚴失者十一以宴樂失者十九不若作嘻笑為更切人情六四富家大吉象曰富家大吉順在外也九五王假有家勿恤吉象曰王假有家交相愛也上九有孚威如終吉象曰威如之吉反身之謂也四位五下四能順合一家成順家所以富順五故也記曰父子篤兄弟睦夫婦和家之肥也惟肥可以言富家四以婦言之則家之主母係一家觀法者總以順五為貞故曰順在位九五正位乎外五正而宜家人宜兄弟父子兄弟足法如此不惟一家之人通為一身且天下之人通為一家故謂之假有家假即格至也纔到得有家也教家即所以教國家道成即是君道成故稱王假又曰勿恤恤者姑息之意家人最難祛者是姑息一念豈知勿恤之愛方是真愛故曰交相愛也上九有家之終一家之父子兄弟夫婦無不心心相信曰有孚這都是從上之人有威可畏有儀可象家之人无不畏而愛之則而象之故曰威如吉然其所謂威如者實實是以身帥先所以家人不令自從如閑也節也則也原非嚴以律人只是嚴于律己都是従反身自修來故象曰反身之謂大學有諸已而後求无諸已而後非藏身之恕正是反身之義總家人以順歸二四則婦正之義可知矣以閑歸初九以節歸九三以威歸上九則男正之義可知矣然閑與節與威則主嚴究五之所以格家又只是一愛盖惟閑也節也威也乃所以成愛舍此言愛則愛亦嘻嘻而已總之歸于一身其身正不令而行故言有物行有恒又正身正家正天下之本也此謂風之自楊誠齋曰正者非正也盖有正之者孰正之男也正女以男正男以父父正以身身正以嚴又曰以文王為君以太姒為妃以王季太妊為父母以武王為子以邑姜為婦以周公為兄弟其不交相愛乎睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行釋卦名義説而麗乎眀柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也暌之時用大矣哉家人二女同居風火相生㢲離東南一氣其行同睽二女同居火澤殊性離兊南與西相隔坤在中間其行不同睽之象人有稟氣自然有不同不同處便是睽須要識其所以暌方可以反異而為同語曰識性可與同居此睽之時用也火澤之所以睽在動處見二女之睽在志不同行上見惟其居雖同有各行之志所以成睽惟其不同行未嘗无相成之用所以睽中有吉説麗明三句正明致吉之道火澤一上一下所以睽説而麗乎明暌者便可以合妙全在兊柔與離柔其道原同以兊去合離柔進而上行也則説不與明睽矣以離來合兑離柔得中而應二剛則明不與説睽矣是都従柔進得力故云小事吉謂從柔小處盡道其事所以吉也人心明易向上説易下流中心之説常依本心之眀便是説而麗明然其道无過一個虚心順志皆小事也故小之為用用于睽則其用便大試看天地合而生生其事同也然天地之體自睽男女合而居室其志通也然夫婦未嘗不睽萬物並生並育其事類也然形體未嘗不睽只是睽處有合之用此睽之時用所以大也天地間隂陽豈可相睽然不識陽尊隂卑之分如何合得陰陽剛柔豈可相睽然不識剛克柔克之義如何劑得剛柔故不睽不成合不睽不成妙用其得合處无過一個以隂従陽以柔順剛而已所謂小事也夫子舉直錯枉便是暌究竟使枉者直適見暌之用大欲成家人之合爱必不可无暌之審異故家人之後受之以睽睽多從小事起還從小事修故吉象曰上火下澤睽君子以同而異上火下澤天所分定原是異而不同的然火何嘗不可為澤用澤何嘗不可為火用君子于異處不能强而同于同處却能合其異所謂同而異彖中曰睽而其事同象又曰同而異互文言之正見異不妨同同不妨異也同人曰辨物同非苟同同中有異也睽曰同而異異非立異異中有同也正可參觀初九悔亡䘮馬勿逐自復見惡人无咎居睽之時同徳相應其悔亡矣象曰見惡人以辟咎也九二遇主于巷无咎象曰遇主于巷未失道也六三見輿曵其牛掣其人天且劓无初有終象曰見輿曵位不當也无初有終遇剛也睽以二體不同相睽故六爻各以位相對説初與四相睽當暌宜有悔然同徳也且睽于初多易合于後所以悔亡䘮馬難于上進之象勿逐自復不久可合之象其要只在能見初與四同是剛徳可疑處只為四陷于兩柔雜成坎體所以可疑見得病在兩柔自知同徳可與故見其惡則咎可辟也如云畏惡人之禍而見之恐未然二與五相睽然五本以柔中應剛自能下求于二只要二有遇之道巷里中道古制一里八十戸八家共一巷九二自處于巷先立于大通之地自然六五來合此遇主之道也故曰未失道易中言主如夷主配主豐只是一卦主爻不必言君所謂巷只是通行之路亦不必添出委曲其道等字大概二剛中可以坐待五之合只要自己麗明不為六三所蔽便是九二之巷也三與上相睽初是事始二得中其睽易合三正下行之爻隂性下又睽之已深所以自生起妄見來見輿之曵我也四雜坎輪為輿見牛之掣我也五為離中牝牛其人正指上九既見其髠孤于上之象又見其劓傷于坎之象无非可惡之狀然此皆未合之初也三上剛柔相應久久相得遇相遇則終相合矣所謂无初有終遇剛也二五剛在下柔在上易得交三上柔在下剛在上故久方交九四睽孤遇元夫初九交孚厲无咎象曰交孚无咎志行也六五悔亡厥宗噬膚往何咎厥宗指九二噬膚言易合象曰厥宗噬膚往有慶也上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾往遇雨則吉上與三先睽後合故象占如此象曰遇雨之吉羣疑亡也上三爻皆當與下遇者四當遇者初也論其以九居兩柔之間近不相得有孤立之象若與初相遇初能見則四可遇則自交而成孚雖厲何咎初九同剛徳故稱元夫二女患其志不同行遇則同行矣故曰志行六五正是上進得中之柔所以通一卦之睽者全在五故悔自亡其與九二剛柔自相應與无異同宗之相親故曰厥宗即同人之同人于宗其柔道之美用之无往不宜无異噬膚之易合即噬嗑之膚人人可食也以此而往自與二成巷中之遇曰往有慶也上九之眀亢而居髙有睽孤之象三先疑上故上亦疑三三見上之可惡故上亦見三之可惡三以柔見剛故見其凶狠上以剛見柔故見其暗昧豕而塗鬼而載所以先張弧後説弧皆妄見也豈知三匪冦原是婚媾能與之相遇自然和而成雨雨則吉矣往字則字相呼象曰羣疑亡疑則生出許多惡見遇則所見者反成和洽可見總是疑心所成睽之吉不吉在疑不疑之間而已總火澤本體既不同行以雜撰言之雜坎既疑于傷離之眀雜離又疑于傷兊之説所以益易成睽是以爻中多言見言遇見者謂不二不三之真見既見其所以可睽之端又見其睽中有不睽之體若此見不透只見其可疑可睽而已如隣人竊斧之見是也遇者謂天然自合之正道必于乖睽不同之中尋其所以原同之義使睽者終不睽也所以六爻皆有先睽後合之妙家人明在内㢲在外以有分有別之見行之以巽順此恩以聯属之道其明藏于内故曰家人内也睽説在内明在外以審同審異之見本之以兊肅此義以裁制之道其明顯于外故曰睽外也如時說云家人言父子夫婦兄弟為内睽言君臣朋友為外則不可盖君子一身原通天下為家无得分内外家人之中无處可少睽之時用故曰男女睽而志通也兩卦合觀方得蹇利西南不利東北利見大人貞吉蹇難也足不能進行之難也西南平易東北險阻眀蹇利西南利得朋也不利東北不利䘮朋也坤卦有證解不言東北不如坤之利䘮朋亦不如蹇之不利也觀兩卦爻中皆有朋字可見彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉家人内也暌外也内外皆明然後艱險之途亨通之會皆可以平觀而險夷一致故受之以蹇解蹇難也乾至健其徳行恒易以知險坤至順其徳行恒簡以知阻知險知阻无過一難字蹇正是知險知阻學問所以程子曰蹇之為難如乾之為健盖人操一難心便是无限戒謹操一易心便有无限縱肆蹇者一步不輕之謂人一動足都是其難其慎之心何患于險阻所以蹇之徳為難詩云戰戰兢兢如臨深淵如履薄氷此可觀蹇難之義彖曰險在前人生當前之境原是措足有險但不知坎徳者不能見險不知艮徳者險在前又不知己有當止之處惟外常見險内常得止以定静不搖之衷操知危知險之見屹然如山之常定而静照險機之在前既能見又能止所以知險知阻者孰智于此故曰智矣哉原非是見事勢艱難有所畏避可以言蹇亦非是不敢措足止而不前可以言能止也見險則萬變常在目前能止則此中常自一定故一個難字是聖賢動心忍性實際工夫常存得個難心雖千險萬險自有一條平易路可往此為西南之利若不知得難便坐在險中不知所往此為東北之不利曰往得中者坎艮原在東北坤在西南自艮坎往坤便是東北西南周天全體不落偏曲之見此為得中如以隂陽之位言東非俱男道往西南従女道適得陰陽之中也若仍在東北則有止无往无往便不能通故曰其道窮也蹇之所以難難在得中這個中正之理原在人心即坎中九五爻只怕不能見若見此中正何往不利所謂利見大人往有功也若人能以難之心貞中正之理以此居天下之位真是正天下而有餘堯舜兢業大禹克艱不過此道故曰以正邦也蹇之時用豈不大矣哉一曰往得中再曰往有功盖險无中止之法所以要往惟有往乃有來有往來方得通中庸曰无入不自得有入方有得入即往也爻中往來即此往字象曰山上有水蹇君子以反身修徳山上有水水雖險所以行其險者在山而不在水故君子觀蹇象知境雖險所以行其險者在身而不在境反身修徳重一反字初六往蹇來譽象曰往蹇來譽宜待也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也九三往蹇來反象曰往蹇來反内喜之也爻中皆言往來往者從險中進步去也來者從性中得力來也往來是活字着力在一蹇字惟其向前去步步知難則一步一步自然有得手成就一來一往便不窮而通便都是西南平易路故蹇之妙妙于往來而已看蹇之往只是要往而向中正所謂西南之往也初蹇之方始從初便慎步久自光輝艮體光眀來譽之象只是從初之往往要從容不可便覬其來故象曰宜待待者只是待其自通也非待譽之謂二五正應王臣之象蹇蹇者畢志盡力愈蹇愈前全不知有身故曰匪躬如此方于臣子之事无愧終无尤也九三艮之主爻反身修徳三之能事又内體已完正當往而應用之介要反必在此處反故曰來反盖不能反必不能止然非中心實見得險之本在我有一段求自得之意何以來反故曰内喜之也本義反就二隂盖以陰在内也恐于蹇義未安六四往蹇來連象曰往蹇來連當位實也九五大蹇朋來象曰大蹇朋來以中節也上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也六四一爻上是五下是三皆剛爻卦主入險在四難過正在此處厯得四險則五與三來連連者中正得其中正止得其止通而為一也只在四之往耳陽當位故曰實九五居位得中天下遺大投艱惟五任之肩鴻任鉅亦惟五能之謂之大蹇大蹇則克艱之道已盡合一卦之衆來共其艱故曰朋來即當位貞吉以正邦也妙在得中天下无得過无得不及所以朋來取正以中節也上六要終不忘往蹇則其修之内者自然日積月累而徳成碩大故曰來碩結成碩果也這皆從反身自修來故曰志在内上乘于五到厎從五方是到厎知險故又申以利見大人象曰從貴從中正之道而已本義來連只指九三看當住實一語還在九五彖曰見險不但見險之可危正要見險中定有中正之則在焉能見險即是見大人也始而見見而從斯謂之往蹇故上爻又以利見大人終之總二五不言往一則曰蹇蹇一則曰大蹇通天下為一身之蹇曰大蹇以一身任天下之蹇曰蹇蹇餘皆言往各以位別初從始而難究竟得易可以得譽是未然語三将應用正要在自身上着力故云來反是到手語四正入險往中正在此時得止中正亦在此時來連是成功語上功夫到厎方許吉字是无窮語要得譽必須反反方得連連方得碩一串事也解利西南无所往其來復吉有攸往夙吉解難之散彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉解屯之倒體水雷屯雷水解解字之義正從屯字來屯曰動乎險中貴在險中能動其動難所以要不寜解曰險以動貴在動而透出險中出險處難所以要免乎險盖屯是始交之動尚在鬱結充塞時候所以屯之義為盈既有這一畨結塞必有一畨通暢使塞者能開結者能舒這坎中一陽方得流行所以要解惟險而有動動能透險使險者盡通暢而為生機方是免乎險此之謂解解者時至而動君子當機時出一段真生意也利西南者東北男位主發生西南母位主成育不有成育不足以承受發生之􅂔君子有設施必有歸藏不有歸藏不足完成設施之用故坎北震東之雷雨必須往西南之坤位方得周天沾被方得實落有生成功化這纔得人人䝉澤故曰往得衆坤為衆也來復吉夙吉則指九二九四言也兩剛爻皆主而二尤為解之主二坎主四震主盖坎中一陽萬物之所孕藏必先有此一腔生意藴含于中然後有震動可出故无所往則須來復无所往謂未有所往也未有往而能復此坎中一陽自然可以善震之出于不窮故來復則吉能得此中也有坎之復必須有震之出故及其有攸往必大有作為而後難破險出生機纔无處不發育所以夙則吉夙早也敬也此時間不可失須及時敬謹故往有功也震體恐懼故云夙盖有坎之復斯有震之出雨之藴釀者厚則雷之奮發者神此來復之吉也惟有震之動斯得成坎之解必雷為轟雷則雨為澍雨有攸往之吉也蹇之剛中在上故惟有往而利見乃有來而譽而反而連而碩解之剛中在内故惟有无往之來復乃有攸往之夙吉往與來之間易之所以為主者坎中一剛而已此所謂天心也爻中得黄矢即來復也一卦以此句為根本天地不解不成造化天地一解而雷雨作百果草木皆甲拆這坎中一陽破胎出卵都成化育流行屯中盈滿之雲雷至此盡為普徧全坤西南之化雨始之難生者到此生生化化解之時所以大也蹇險中能止一步一步有戒謹恐懼之心故蹇難也自是一段謹凜收斂􅂔象解險中有動一步一步有活潑開通之妙故解緩也自是一段舒徐寛裕􅂔象見險是擇地而蹈故西南東北有利有不利動而免乎險則随地可通故西南既利東北亦未嘗不利但必須従東北而西南解之分量斯滿耳无險不解謂之得衆象曰雷雨作解君子以赦過宥罪屯之雲雷只是氤氲之􅂔畢竟雷要奮發雨要滂沱故雷雨非大作一畨不成天地之解雷天之威雨天之澤君子非有一畨恩威並施作用不成解故以赦過宥罪過小則直赦之罪大則従輕而宥之初六无咎象曰剛柔之際義无咎也以柔在下上有正應何咎之有九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也六三負且乘致冦至貞吝象曰負且乘亦可醜也自我致戎又誰咎也解之義取其去險故爻中曰獲狐曰解拇曰獲隼皆去險也六三既乘二又不應四言險无如此爻故二四爻所獲所解皆以三當之本義以三隂爻為三狐初為拇時説以上爻為隼皆有理搃之活看方通初六雖是險體而能應四剛柔相與之際其險易解故義无咎二正是剛中所以能有獲謂獲三也能有得得中直也貞而吉三負四近而不相得四上動三下陷却又乘二處非其地所以致戎其取羞吝正理也九四解而拇朋至斯孚象曰解而拇未當位也六五君子維有解吉有孚于小人象曰君子有解小人退也上六公用射隼于髙墉之上獲之无不利象曰公用射隼以解悖也公指四能解險者必剛也四為動之主爻以其近三如拇之有繫震為足三在下繫拇之象故必解而去之斯衆隂皆朋至初柔得應五上同體而相孚矣以九四之才可以動而无不獲只為其位與三比撰坎與二之中又不相應所以尚有拇當解一卦解字在此爻以剛不當五位也六五居正位必聫合君子之交相為維繫以共解乎險斯可以得小人之信従而无不退聴矣盖君子之交合則小人之羣自散有不覺其解而无不解者故曰小人退也五雖得位必藉九四以動險故妙在一維惟四有朋至之孚斯五有小人之孚也上則解之終險于是可免矣小人之難去至此可必去矣獲隼之象隼指上言在五之上曰髙墉隼獲而全卦之柔更无悖而不順者故曰以解悖也解五爻皆陰陽不當位惟上六當位故以動之時歸之震之究為健故以有獲歸之凡震居上六多不全美此獨為全美惟其有二之得矢矣然後有上之射隼此先有來復之吉後有往夙吉之義也總天地解而雷雨作解是通結塞去繫累期于盡善盡美學問于世道是開泰致治時候然爻中所言獲言解言射又若兢兢乎去之甚難者則以世有小人其險之去甚非易也故觀言狐可以極其媚惑之状觀言負言乗可以極其凌與傲之狀觀言拇可以極其依附難割之狀觀言隼可以極其鷙悍之状而君子所以去之之法只有一孚孚則心悦誠服不期退而自退矣可見小人雖極險君子處之原極平易所謂西南之利如此至于小人孚則又皆為西南之朋此解之極致也小人之險皆小人藏伏之險故須解蹇言反身不知反雖見險不能知難也解言來復不知復雖有動不能免險也蹇言往是従心體難處厯過方有真止可得解言來來復吉是従心中險體復來方有真動可出故處蹇要在難中求易曰利西南處解要在易中免難亦曰利西南乃其所以為難為易无非于已求之而已爻中厯厯言險情狐之幽隠負乗之蟠據拇之牽繫隼之悍悖一步一步要解則一步一步有動之時在時不可先不可後所以夙則吉也周易像象述卷五

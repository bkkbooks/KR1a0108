body:
  text: 周易像象述卷四明吳桂森撰賁亨小利有攸往賁飾也以其柔來文剛陽得隂助離明于內故為亨以其剛上文柔艮止于外故小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下噬嗑動而明剛克柔克到適相合處所以合而章賁明以止剛柔相濟到各中其則處所以成文而賁故曰賁飾也至美所以成飾然都是天然之文不曽加得些增飾至文還是無文故曰賁無色也觀致飾與無色二義可見賁之為賁內離外艮文明則藏于內有暗然在中之文篤實則止于外有敦厚輝光之文所以亨而又利往亨舉全體言利往指三柔爻言以二乃卦主五居尊位皆柔也故特言之離本柔居內卦是柔來文艮剛以柔文剛剛常為主所以亨大者亨小者亦因之而亨也分字即噬嗑分字剛柔均平剛得柔來成文則柔亦得剛成文是艮剛亦上上對來字看而文離柔所以小利有攸往是小因大而得利往也剛柔相濟一來一往皆是天然條理故曰天文文明以止謂以文明之德止于至當不易之地如柔來文剛則實實有文明內藴之德剛上文柔則實實有篤厚輝光之德人道之美何以尚此故曰人文觀乎天文則知柔濟剛剛濟柔其低昻變化隨時為用必無可偏廢之理只在合乎時宜故可以察時變觀乎人文則知人日用間一秩一序其燦然分明處都有一定之則在人人文明以止便是天下文明氣象故可以化成天下察時變如周公之慎始君陳之和中畢公之成終剛柔以時變所謂天文也化成天下如堯之欽明文思安安自然天下觀化故曰煥乎其有文章所謂人文也二句相承看噬嗑以初剛為主爻有物初有之合明初合之也賁以上九為主爻柔來文者文此剛上而文柔亦此剛也噬嗑動必合明人腳下一步不昭明皆冥行之動而已賁明必要止人胸中一念不安止皆的然之明而已剛柔有兩用無兩事故文剛文柔須知一得俱得象曰山下有火賁君子以明庶政無敢折獄山下有火賁書曰賁若草木草木地之文山下草木即離中文明實中有文之象君子知山下有火則思明可內藴不可外眩明庶政內極其明也無敢折獄明不外露也無敢二字只是狀其敬慎之心不事察察之意初九賁其趾舍車而徒象曰舍車而徒義弗乘也六二賁其須象曰賁其須與上興也初賁趾只明得素位而行之義便成居身的文章妙在舍之一字見得非義所在寧舍其可願可羡者而取分之所安者一步不越禮所以成賁二乃柔來文剛之主柔來文剛則剛上文柔原自相須究竟二之文亦上之文也剛柔成文斯足興起文明之化然全在二之一來便相須成賁故曰與上興也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也六四賁如皤如白馬翰如匪冦婚媾象曰六四當位疑也匪冦婚媾終無尤也三離之上爻文明之德已盛將見于用故曰賁如又曰濡如者其光輝所及足以潤澤斯世者此文其或以文滅質溺而忘返者亦此文蓋三或過露其明少失離柔之貞則其賁如者皆炫外之文久必陵奪故戒以永貞則吉而曰終莫之陵也四乃艮體有斂華就實以質勝不以文勝之象故曰賁如皤如白髮為皤老成篤實之稱又曰白馬翰如乘馬亦白見其一以朴素為尚也初位在下故舍車四位在上乘車之人兩馬駕車見其翰如總是尚質之象文明之德在下四以質勝居上似有不相得者故象曰當位指四疑然文非冦也即是四之婚媾以文配質則相濟而成賁矣三是離文明之體四是艮篤實之體皆不得中故三以文勝者也文勝必弊故有陵奪之患曰濡如有溺文之象文能以質為之主則得其正矣曰永貞見文必本于質也四以質勝者也質勝直欲去文則有以虎豹之鞟同于犬羊之鞟者能以文為配合則無太質之病矣曰婚媾見質必合于文也兩爻正見相須為賁之義六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也上九白賁無咎象曰白賁無咎上得志也五以柔居中正與離中一柔相應篤實中文明所謂美在其中也質有其文者也賁于丘園之象丘大也曰園則青黃碧緑不但美觀皆有實用此句狀其質之妙非無文之質也又有束帛戔戔之象戔戔顯見貌曰束帛則玄黃黼黻有文彩而又不外露所謂暗然之文美之至也此句狀其文之妙皆質中之文也丘而曰園帛而曰束尚未離朴野狹小氣象若見可吝然丘園之藴蓄皆天施地生之藴蓄束帛之文章皆上衣下裳之文章所以終吉而有喜也上九則無文之文乃為至文太始太素之體天下之美無以加焉化成天下非此莫與故曰得志造詣如賁五真有明體適用席珍待聘能事故以求賢之事擬之則可若説賢人在丘園五以束帛禮聘非象意也六五柔中為賁之主敦本尚實得賁之道故有丘園之象然隂性吝嗇故有束帛戔戔之象雖可羞吝然禮奢寧儉故得終吉總初守身獨善潛龍勿見之文二人已兼美天下文明之文三則文而必輔乎質四則質而必配乎文此為彬彬之文五丘園之文自然得乎天文也束帛之文盡善得乎人文也為觀時變化成天下之文居其位當其時盡其道則皆謂之無色之文白賁之賁也噬嗑五賁五即坤五也所云得黃金即黃中通理所云賁于丘園即美在其中暢于四肢發于事業故噬嗑乾坤合也賁文即玄黃之文也二卦所以居首局之終剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也邵子曰乾坤大父母復姤小父母故以復統中十二卦姤統後十二卦然有艮之成終成始斯有震之出故剝在復先連山首艮歸藏首坤剝兼艮坤居中局之首此周易兼夏商之易也剝剝也剝之義為裂為落為削為傷害卦以一陽在上當其往而衰五隂在下當其來而盛一假陽明生長之氣都要變成隂闔閉殺之氣所以成剝以柔變剛之故也然陽主生隂主成隂原不是剝陽底陽為主隂為從陽原不是隂所剝得底其所爭只在從陽不從陽之分若隂知從陽便接得這陽生之氣來隨爾經一畨摧落銷隕這隂原輔陽底原是有用底若不知從陽便接不得這陽生之氣來這隂便自消自潰自摧殘自凋落豈不成剝故曰剝爛也如物之隂氣多而潰爛也若陽何患于剝隨你隂氣剝落陽生之氣自若隂愈銷毁則陽愈完足隂愈凝沍則陽愈結實若因剝之時反足以完其一元生意者如果之熟而爛才得元氣固足成仁則又莫妙于剝也故造化非剝不見消中有息學問非剝不見減中有增至哉剝之義也不利有攸往正是君子處剝之妙用蓋當此時純是隂柔變剛世界陽剛直無存劄之地豈有前步可往已在必不可有為時節故不利有攸往言不利攸往正明必無為乃君子之利何也以小人方長也其處之之道何如只有順而止之順者時不利往則順而不往止者當不往而不往便是得其所止蓋闔户為坤君子以坤之閉藏為道不動為艮君子以艮之靜止為道當此時便做此事故曰順而止之然却留得這種陽氣在天地間屹然不可移動小人自剝君子不為之剝世道自變君子不為之變為天下立極為生民立命真是大觀在上而民之儀表在此故曰觀象也即大觀在上之象也蓋消息盈虛天行之數剝之時處其消處其虛惟君子有順止之道能于消中善其息于虛中養其盈不隨氣數為消息盈虛而有所以主持乎氣數者以此為尚真是先天不違後天奉時行事是乃所謂天行也陽剛在一處有一處生長發育之功如比如豫等皆五隂一陽而生育無不遍惟剝一剛却居于不用之地陽生氣運到此變了故謂之變剛然氣運雖變陽剛只是以生生為心觀之五上俱曰觀生總是這團生氣剝羣隂俱變獨存一陽在上如天之無不遍覆無不生育故謂之觀象象曰山附于地剝上以厚下安宅卦以一君統五民主爻獨在上故大象不取隂剝陽為義而取陽覆隂為義曰山附于地剝山附地地厚則山安上附民民厚則上安故雖當隂盛剝陽之時陽只是施只是生厚下安宅之義也初六剝牀以足蔑貞凶象曰剝牀以足以滅下也六二剝牀以辨蔑貞凶象曰剝牀以辨牀幹未有與也六三剝之無咎象曰剝之無咎失上下也上下謂四隂衆隂方剝陽而已獨應之無咎之道也六四剝牀以膚凶象曰剝牀以膚切近災也牀近人而氣不相通故凶爻皆取象剝牀擬議精矣六五貫魚以宫人寵無不利象曰以宫人寵終無尤也當衆隂之長率其類受制于陽故有此象五隂在下只有一個從陽便是隂之貞五近上三應上是承得陽生來底初二四俱不能也所以皆凶不能從陽便是蔑了自家生理所以初與二同曰蔑貞足最下直從下滅起曰以滅下也二辨牀之辨處雖視初稍上然接得陽氣來安得君子之身方隂陽成相與二上不相當故曰未有與三却應得上來雖同一剝然生氣不滅自可無咎蓋有發榮有剝落氣運之必然而物之受剝不同試以草木觀之風霜氷雪有經一番摧剝而遂湮滅無存者生氣不存者也有經一畨摧剝而依舊發榮者生氣不蔑者也愈剝愈新剝之何害四與二上下皆蔑貞三獨不蔑貞故曰失上下杜詩輕風扶栁絮淡月失梨花得失字意四是艮體亦不知從陽豈不是自剝了膚膚席也與牀字不粘象曰切近災四位與上近最易承陽亦至剝膚天下事將盡壞故其災尤為切近五直近上五一順全卦俱順有貫魚之象衆隂順從皆五之力又有以宫人之象所以無不利又曰終無尤上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也上九元陽一點天地不息之心于此而存故象碩果萬物消靡宛然生意孕藏正于剝爛中顯仁不為風霜所摧不為隂凝所蝕不食之謂也君子亦然碩人在上天地命脈所係隨你小人剝削愈成君子之大得輿之象若小人不知此也君子日生成之彼不侵蝕而盡蔑之不止何異自撤其廬者哉可見君子之生氣自若小人固無如君子何小人之消滅自若君子亦無如小人何故象曰終不可用見小人之終難改換也總剝為君子最難處之時于不可有為之中獨有所保合以成大有為之用這個消息盈虛方才回得天運非碩大之德烏足語此惟其有剝中之碩果方有復來之剛反人但知復中見天地之心不知剝中亦足見天地之心也春秋有仲尼萬世有碩果復亨出入無疾朋來無咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎天地間只有這點陽生是造化主宰一動則漸長盛長盛則漸消落消落又復萌動一來一往循環無已其一動處則是根抵命脈也其由動而長盛是發而向外曰往由消落而又動是復而向內曰來使造化有發而無復有往而無來則生機斷絶久矣故天地之妙無過于一復剝柔變剛陽生氣候都要變做隂消世界復則隂消氣候仍舊盡轉做陽生世界故曰剝窮上反下有這一反天地元陽之運通身翻換過來四時之氣便從此轉收藏為發育動植之物便從此轉凋落為萌生此復之所為亨也復剛反反是天地最妙機緘惟造化必反故萬古生機常在人之難在此一反能反便與造化同復復則自然亨出入以下俱極言其亨地雷十一月之雷有出機無出聲以其時則有入而未有出然而出之機已動故出無疾以其機有出而非復有入然而入之體未離故入無疾雷以二月出地凡百八十三日以八月入地凡百八十三日出入之用俱從復雷發端從此出入盡是生機故無疾剝上窮之陽五隂皆剝陽之人復剛一反豈惟一剛為生五隂皆反為生機盡是一陽之朋以隂皆來而從陽見其朋來蓋一剛來反從下震動羣隂俱動坤順之爻皆震剛為主之爻都是帝出乎震陽生全局故曰動而以順行是以出入無疾朋來無咎也乾三曰終日乾乾反復道也蓋天行健故無往不反無反不復復之剛反正乾道也一反乾道則五隂皆是陽剛之道隂之用六一反則六皆成七故曰七日來復七者少陽之數言全卦通身俱復了剛健也如此動以順行即是終日乾乾之天行故曰天行也剝以小人長不利有攸往復以剛長則利有攸往可見復患其不反無患其不來患其不來無患其不長來是真機反是實力反之義大矣人只曉得大生廣生是天地之心却不知子中一陽乃是生生造端托始之地故于造化發育流行處未足見天地之心惟其隂中陽轉才見生機無一息之停方消于上已生于下故于復見天地之心繫辭曰復小而辨于物又曰復以自知人止要在端倪發見處自知自辨方是自見天地之心地中雷體人人所具但反則來不反則不來一反而驚天動地者在此寂天寞地者在此出入無疾也一反而百體從令萬念歸根者在此朋來無咎也只愁不反何愁不來一反則日日見天心時時皆天行七日來復也動以天順以天利有攸往也人受天地之中以生只有這點是真機緘故可以見天地之心象曰雷在地中復先王以至日閉關商旅不行后不省方入而收聲之雷不得言在出而奮地之雷亦不可言在惟半夜雷藴藏于大地之中而有回陽大地力量所謂動而以順行者在是故雷在地中有復象坤為母震為男所以母孕長男為復先王極存養功夫正是保妊之法閉關以歸根復命功夫詔天下也閉關就是退藏于密之義斷商旅是防外之引誘不省方是戒內之馳逐只為這雷輕忽不得有時時存養功夫方是時時常在地中初九不遠復無袛悔元吉象曰不遠之復以修身也六二休復吉象曰休復之吉以下仁也六三頻復厲無咎象曰頻復之厲義無咎也六四中行獨復象曰中行獨復以從道也六五敦復無悔象曰敦復無悔中以自考也考成也復初一剛邵子所謂天根也這便是天地之心人生來只有這點天地之心是真命脈從此反復是從根復故謂之足躡天根不遠者即所云不違仁從初一步不離方是不遠之復這是須臾不離功夫有此復便時時見得本心悔吝之門無從説起故曰無袛悔謂無由適于悔也有不善未嘗不知知之未嘗復行悔何由來此是一了百當全身歸本乾道形骸都是天理故曰以修身也下文言仁言義言道言中言君無非指此一剛而言二與初最近中心安仁者也休字心逸日休之休蓋其心心念念惟専注此仁曰下仁也三去初又差一步頻則有汲汲皇皇之念厲則有戰兢惕厲之功得力行勇往之義曰義無咎看三是能利仁者也四却正與初應不偏不倚適與初剛合謂之中行有獨知有獨見故二三不搖多岐不眩謂之中行獨復此直以見道既真得所適從曰以從道也五得坤之中順之至者敦敦厚之敦到底念念在復時時以中自考不如初之無袛悔不已故究亦可以無悔也二之用力自然三之用力勞苦四有獨得之契五有敦篤之功雖所得淺深難易不同其反復一也內卦體也休字頻字宜在心上體認外卦用也中行字敦字宜在用上體勘四非中位而以應初為中乃知中之義符合本心而已上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也上去初最遠所以不能反復而成迷蓋二能下上不能下四能從上不能從五得中上不能中所以步步是迷迷者非謂其迷而不復也正以其復而猶迷行不著習不察縱有時天心發現都做了電光石火隨起隨滅終日間只是冥行冥動所以有災有眚兩目昏眩人非人責鬼責天災也所以不可用師不知正已而但知責人人必不可正也把一個天君主宰逐而不知反以其國君凶也迷之凶如此只為忘了反復真主人不曽落得根故曰反君道也陽剛一點天地之心生民之命百體之主宰萬化之根源所以謂之君道乾以君之是這君字復是天道其不遠也休也頻也獨也敦也則是人事無此工夫便是迷總天地之心人生固有但一受生以來都是動而向外所以不成來復若要復工夫無過一反反便歸根便復命故此卦切切提醒如修身下仁頻厲從道自考皆步步反已工夫一不反便是迷惟迷乃謂之不反不反謂之反君道則所云反者無過一惺而已故曰復以自知知不知之間反不反之分即來不來之分也復初即剝果也剝果下地反之象碩果發生來之象來是天機反是人力邵子詩曰冬至子之半天心無改移一陽初動處萬物未生時玄酒味方淡太音聲正希此言如不信更請問庖犧至哉言也學者宜盡心焉無妄元亨利貞其匪正有眚不利有攸往彖曰無妄剛自外來而為主于內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉序卦曰復則不妄無妄初剛即復初之一剛復地中之雷靜翕中之動動而未發無妄天下雷行動直中之動發皆未發動直則必不妄妄則必非直動夫乾其動也直動而以天動何妄之有故命之為無妄誠者天道天自無妄誠之者人道妄而無則人而天者也初剛無妄之主曰自外來者明初剛自乾剛來也論乾體何得言外只是人當寂然不動時所為天者亦杳然不可見惟當天理忽然爆動不知從何迸出這不是先有一念藏伏在內至此而出者直是從空落下有個使之動者此所謂降之皇畀之帝來為我作主而我不自主者故曰剛自外來而為主于內惟其乾剛來為主原不曾落一毫思維假一毫停待所以妄無所容人只從自心體勘當天心陡然動處真是不知所從來通身震動如孺子入井之隱蹴呼之羞何嘗著一毫經營之念直像有個天來替我主之者於此觀無妄其脈最真切以此而動直透天體故動而健此其為動豈不與天理至當處自然符合故剛中而應所以大亨所以得正天之命然也他卦大亨貞言天道此言天命者可見天無所命于人只此一個戒謹恐懼之震體是乃天之命也無妄聖人直指天命以示人故下再言天命二字其非正有眚者天本無妄何有不正妄皆人造如月中自起之眚眚則俱妄故不利有攸往夫子彖傳則分正不正兩項以發明之其順天命者則皆正也不順天命者則非正也所謂無妄之往以天往也人終日是天命雖欲離不可得而離曰何之矣謂更無去處也若一步不以天動便非天命非天命則天必不祐順矣如此豈有可行者故曰行矣哉以此行皆人為之妄匪正之眚也以往行二字分正不正所謂往即初之往吉凡動以正皆天往非人行也所謂行即上之行有眚凡不以正皆人之行非天行也爻詞中截然有辨象曰天下雷行物與無妄先王以茂對時育萬物震動一轟百妄悉屏天雷無妄自是實象天雷驚蟄苐一聲雷雷聲一動而含生萬有之天有不自動者乎使天物物而動之必有不能遍天下而動者矣一動而物物與動也動以誠也此雷行物與無妄之象天雷一動有情無情物物萌生故四時行百物生聖人之天雷一動有知無知物物知所以生故能對時育物人無物與天雷何能與時行不能以時行何能使萬物育然造化之天雷其動有時聖人之天雷無時不然造化之天雷動以形氣聖人之天雷動以心性是造化之雷得聖人而後有全功聖人之雷功豈不盛矣哉故不特曰對時而曰茂對茂者言極盛也程子曰聖人于天下事自不合與只順他天理茂對時育萬物按聖人不與事正動以天也一味與時行初九無妄往吉象曰無妄之往得志也六二不耕穫不災畬則利有攸往象曰不耕穫未富也六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也無妄無可名初爻是其本體也上五爻俱以入妄之門指出示之初剛來為主純是天動稱無妄以此往皆順天而往吉此天命所必祐也所以得志二柔而非剛便未免有係念耕穫謂計所得之多少是程後效而有所為于前也災畬謂計用力之難易是畏前功而有所兾于後也二者皆為富心也去此二心方利有攸往則字可味前無所為後無所兾一味自盡其事全未嘗為利謀所謂未富也三非剛而過動或有不期然之災顧災曰無妄原非自致之災有個順之之道在便是或繫之牛也能為行人便得了這牛何為行人不問災與不災只依著我之理而行此正是順天命大道理所以得牛也若不為行人而為邑人便成了災何為邑人見災而避只揀安穩處坐此于順受道理已失所以為災大抵虛已以遊聽之以無心行人也擇地而蹈留之以私意邑人也無心則即災而有得有心則逺災而反災此得失之定理也二是趨利心三是避害心人有生便有此兩念為妄根故于兩柔爻言之九四可貞無咎象曰可貞無咎固有之也九五無妄之疾勿藥有喜象曰無妄之藥不可試也上九無妄行有眚無攸利象曰無妄之行窮之災也四是乾體乾體何嘗有一毫匪正只是天理有個當可處適合其可方為得貞故謂之可貞這乾貞人人自有只要知之明守之固方實實有諸己故曰固有之也五剛中得正有樂天知命能事故能疾而勿藥勿藥是視生死猶旦暮全不曽一毫入念略不知有藥可瘳姑且去調治一番者故曰不可試稍有試藥之念便非全然順受之心惟不試方是存順沒寧疾不能為之纍也此之謂有喜論五剛中非致疾者特言疾言藥以見順受之極則上亦乾體本非有妄但時當其窮則勿往為正于此有行却是自生之眚故曰窮之災也匪正有眚正指此爻言之無妄之疾究極言之如堯舜有朱均此疾之不當有者也使堯舜盡力維持未便如桀紂之不可救治此可試之藥也從堯舜視之便知天命不如此一有曲為之心便是妄只與賢方是順命總無妄只是一箇誠字人至誠而無妄是從初一念故吉而得志少離初念便未免有計較心有得失心皆入妄之關殊不知忘獲才有獲忘利才是利無心期得反未嘗不得有心免失反足以致失兩者總不可以人為參也四則行止動靜守其正五則生死存亡化于一此之謂天命此之謂正匪此盡屬人妄彖曰天命不祐爻曰行有眚皆謂是也大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也乾天下之至健也無妄雷從下動要以天動大畜艮從上止要健得其止乾而得止此是真涵養所謂大畜乾以巽畜曰小畜精細工夫乾以艮畜曰大畜全副力量大畜諸極之學也無妄初剛即乾剛之來大畜艮剛即乾剛之上以剛健乾體充積而篤實積盛而輝光自然可久可大而其德日新日盛此畜之所以大也利貞云者艮剛在上乾剛却居于下乾不首出不以健自尚而以得所止為尚故曰剛上而尚賢就乾在艮下言也能止健是能止于天理之當止就艮在乾上言也夫健而尚賢方是健之至處能止健方是止之至處所謂利貞者此故曰大正也然這個大涵養豈是止以成已不以成物必以已之養養天下養已以養賢養賢以及萬民方成大業故不家食吉養賢也試看如此盛德大業不是全副精神剛健到底如何做得來故必須有利涉大川之勇方應得乾行故曰應乎天也剛上而尚賢止與無妄剛自外來句對無妄之動乾為主也大畜之止亦乾為主也惟其止也乾自止畜也乾自畜謂之尚賢正從其自止自畜處看出大有尚賢尚離之明此之尚賢尚艮之止二義一例日新其德明明德也不家食吉親民也明德親民方是止至善此之謂大學孟子曰以善養人此不家食養賢之義象曰天在山中大畜君子以多識前言往行以畜其德天在山中要識以天為主山之大豈能畜天然山中而有天在則天之無乎不在也此天之所以見其大也前言往行豈能該君子之德然言行多識則言行無非是德德之無乎不在也此畜之所以大也陳瑩中説天在山中便如芥子納須彌之義程子曰須彌無體芥子無量觀程子之言欲識大畜先要識無體之天無量之山初九有厲利已象曰有厲利已不犯災也九二輿説輹象曰輿説輹中無尤也九三良馬逐利艱貞曰間輿衛利有攸往象曰利有攸往上合志也大畜內三爻是乾體剛爻都從察識上説工夫四五是艮體柔爻都從剋制上説工夫上則涵養之成功也初言有厲初是涵養起手全未説到事為上只要認清路頭有厲則乾之知險是也此處一犯手到底無結局所以利已象曰犯災稍不合天理之正都是災咎路從初要不犯這災便是復之無袛悔脈路也二曰説輹輹名伏兔與軸相承之物輹上承輿下屬軸輿以載物軸以運旋輹駕則輿已行矣故車而尚未行必須脫輹車行而欲止亦必脫輹是輹之脫不脫正行止之介也故取以象發而未發之之機審中之妙正在此時故曰中無尤得中方無尤也三曰良馬逐則已發之象故利于艱貞又戒之以間輿衛間者即範我馳驅蓋天然之則一步不可踰者加一曰字乃詔告御者之辭亦警戒之深意輿衛間則何往不利如此以往方得其所止可與艮之上爻合故曰上合志二脫審于將動之先三間謹于方動之際如此時行而行時止而止無非天理之流行此之為大涵養六四童牛之牿元吉象曰六四元吉有喜也六五豶豕之牙吉象曰六五之吉有慶也上九何天之衢亨象曰何天之衢道大行也四五是止體不合天體不稱能止所以工夫不厭密之又密牛本順物牛而童全無不順之端已從而牿之橫木於體以防其觸制于未然之防如此其預所以元吉而稱有喜豕雖躁物豕而豶已經剋制之後又從而牙之去勢為豶牙豕杙也防于既制之後如此其密所以吉而稱有慶兩柔爻分明是形氣有所以禁于先有所以防于後正為變化氣質工夫不易至上九而得所止矣能止乎乾至善之止也天理到此底定此身終日在天理上安居終日在天理上遊行故曰何天之衢言無適而非天也胡雲峰曰何字讃之之辭蓋云是何通逹之甚也看來涵養到此真是升于髙明達于大通與天為徒境界坦坦蕩蕩更無一毫拘礙在故曰道大行總大畜説工夫最細二之説中心之安一天也三之間日用之謹一天也四五形氣盡歸天理人無不復于天也終直以天字結之無妄從復中天地心萌芽出如此人事無非天道一切禍福得喪方可聽于氣數故曰無妄災也大畜從剝後碩果藴結成如此天道盡合人事一切功成結果都是時到自熟故曰大畜時也頥貞吉觀頥自求口實彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉頥二陽包四隂有口象上靜下動有食象固也然更有義在卦從出震要于艮成是八卦始終全體人自有生至于歸根也有始終全體人但知自始至終有生可貴則不可一日無飲食之養却不知自始至終有個生生者可貴尤不可無所以養所以養者何中庸曰人莫不飲食也鮮能知味頥中提出一貞字正是示人知味處爻中兩陽大也分明大體之象四隂小也分明小體之象大體不逐于小體為貞小體能從大體便亦是貞故頥之義以觀為先以求為要能觀能求斯皆知味之養矣養之所當得者即是貞如勞心者食于人勞力者自食皆有當得之養在則皆正也得其正飲食之道即是性命之養不得其正口腹之養盡是飲食之人故養正則吉試思人生一日雖一餐半粒必不可以無事而食致虛此食必不可以無因而食致苟此食所謂養大體者孰如之不然芻豢之悅口而已與禽獸之豢何異其害大又何如故飬口腹養性命不分兩事只在人自審于正不正之間觀頥者先觀頥道如何為正如何為不正如孟子所云擇術故曰觀其所養自求口實則自審所以不愧此食者何如無愧則得正有愧則非正如孟子所云不素餐故曰觀其自養觀頥是大假泛觀自求方是切已之觀二觀是一意一個理天地養萬物原物物有個當得之養聖人養萬民若只為之制田里教樹畜亦可以養其生只是逸居無教便近于禽獸故須養賢以及萬民使人知有禮義倫常不但遂其生而又復其性乃所謂養之正也天地養物無過一個時聖人養民亦無過一個時時者宜也即當然處也天地有生長收藏之時然後物物得養聖人有樽節愛養與民冝之之時然後萬民得養之貞故頥之時為大象曰山下有雷頥君子以慎言語節飲食山下有雷十二月冬底之雷這雷動而常止是生氣常存之雷小過乃疾雷破山之雷君子言語飲食無一時不動然動而有個常止之則在一慎一節正于動中見止體君子之山雷也初九舍爾靈龜觀我朵頥凶象曰觀我朵頥亦不足貴也六二顛頥拂經于丘頥征凶象曰六二征凶行失類也六三拂頥貞凶十年勿用無攸利象曰十年勿用道大悖也六四顛頥吉虎視耽耽其欲逐逐無咎象曰顛頥之吉上施光也六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也上九由頥厲吉利涉大川象曰由頥厲吉大有慶也頥主在初上兩爻人從初要在大體上立基要終要在大體上歸宿然從初不貞而能要終得貞者未之有故觀字揭于初爻貞不貞正從此審察耳震動初剛轉而上即是艮止之剛人能動之心即是能止之心此至貴之大體也求養之貞者從始動時便求合止體此吾之至寶也不養口腹而能生者在是故謂之靈龜龜象其不食而生靈象其有先知是當求而不可舍者也若動時只因小體而動便如朵頥之動于食而已養之可賤者在是此必不可求者也舍靈龜而觀朵頥其觀也豈不失貞之甚乎故曰不足貴初與上逺難于合止故謂之舍謂之爾正應六四易動在已故謂之我觀頥之法其辨正在于初也四隂爻皆待養于二陽者也以其不知自求養故不謂之顛即謂之拂顛以位言以上求下謂之顛拂以應與言非其所與謂之拂二位于初上却待養于初又非應與故既曰顛又曰拂拂經猶云失其常也然待養于下雖顛與拂猶可言也若求養于上則以下干上賤求貴不可甚矣故至于凶上艮體處髙有丘之象人一有上求之心必有望外無厭之想故必至征而凶象曰失類者位上位下各自有類人豈可不自知其類冒焉求養于人乎此所以凶也六三逺初應上全不知其類而惟知求養于上者為拂頥貞夫但曰拂經雖失常道若待養者得其賢未甚失也若一意求上則全失正理故謂之大悖而至于十年勿用言十年到底終無可用時也三與上正應而頥之失貞以三為甚上之不可求也如此四亦待養于初者然正應也故顛頥吉只是要一意而求如虎之視而耽耽求而不已如虎之欲而逐逐不肯放意方得無咎蓋虎之求食也欲得則視之専傍無所見既得則他無冉見其歸一如此四能以専一心求下之賢者以自養吉而何咎四為有位之人乃求養于下若無光彩殊不知初之得進益于上皆因上之能求則皆四之施四之光也故曰上施光初為動之始觀頥之道嚴于初故取象靈龜觀頥者無欲為明也四為止之始自求口實之道嚴于四故取象于虎自求者能得為貴也六五待養于上亦非應與為拂經然居尊而惟賢是從養之貞也能守其貞則吉曰居貞吉但柔之為道不利逺者利濟能事終非五有只好順從賢者故曰順以從上上得止之剛頥道之極則在是得上之止方為克盡頥貞故曰由頥至此方是由乎頥之道也然更須知厲方吉又利于能涉大川大川云者頥中之險無窮豈惟已之渴飢是險即一民一物未得養貞無非是險必能養賢以及萬民此險方涉得過故六五特係不可一語見拂經之養雖居貞終不得言盡善也上九特係利涉一語見非盡濟其險于由頥之道終未克全也總內卦有三凶字外卦有三吉字動體多凶靜體多吉也待養于初有吉無凶待養于上有凶無吉其義何也凡養于下未有無因而求者非分相臨則情義相與故有貞可擇也若養于上則所需者利祿也利祿以義而食乃是自求口實不謂之待養于上也惟非義之祿故謂之拂若五乃居尊之人豈有以養待人之理所需于上者才德耳故爻中但言拂經獨不言頥一字之辨不可混淆如此凡人先以謀食之心用之于謀道皆有顛頥之象後以謀道之心盡用之於謀食皆有拂頥之象夫顛雖不能謀之于先能擇之于後猶未為失惟既拂而至於失類至於大悖遂無頥道可由皆上求一念為之也口實人之所必不能不求者也將于何求乎可以自審矣大過棟橈利有攸往亨橈者杌桱之意彖曰大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉頥自震歷艮是全局後天圖大過自巽歷兊中間離坤是四柔卦半局柔必以剛為主女必以男為主故聖人于此特提出四剛大來作主曰大過巽兊本柔體也卦畫又本末皆柔是剛大極難主持時節故雜卦曰大過顛也是顛倒世界聖人正要于顛倒時把剛大來做主宰這時節非用過大力量不可故必須要過為人之所不敢為任人之所不能任此其過也乃過乎不得不過所過者過於大故曰大者過也大過是變而不失常窮而不失正能經能權大學問卦象四剛爻居中從初不曽有剛以為之立基要終又無有剛以為之結局其肩鴻任重都只在中間一力擔當勢誠危而責誠巨故象棟橈棟取其從中承荷橈因其本末皆柔惟橈也見其傾危之易勝任之難惟棟也見其任之必不可逃力之必不可委此所以要過于大利有攸往則正處過之道也蓋四剛雖過過而得中中則無過剛之病其德巽而説巽説皆柔道以剛大而用柔道行之故曰巽而説行試思以極大力量人能以遜順和説行之將何往而不利蓋剛仍得柔之濟非一於任剛則過處恰好是中以此而往所以得亨可見非過不成剛中非過不見巽説之妙則所云過者正是隨時之妙用也大過之時豈不大矣哉中字最重惟其以剛中行巽説巽説仍是大為主方是過而非過故曰乃亨乃字行字俱要看大過之時極難處之時大過之事極難為之事惟初既是柔立本無基終又是柔末路難收獨以一點陽剛正氣負天地間重任時最易撓要不為之撓時無可往要能利有攸往這都是過人事卒之剛維終始砥柱乾坤必賴之當此時必待是人有是人方主得是時故曰大過之時大若揖遜征誅非常之事但可言大不可言過惟上下無邦本末俱傾獨有人焉以一團陽氣拄上拄下使乾坤以之不毁非真正至剛至大任斯文之統者不足語大過也象曰澤滅木大過君子以獨立不懼遁世無悶巽兊雖同是柔卦然巽卦陽在上是生氣故為木為長為高要他進而上行兊卦隂在上是消氣故為澤為少為附要他潤而下降今澤在上木在下是隂氣直來湮滅陽生之氣也所以云滅木這陽氣豈可為隂氣滅了此時自然要陽氣出頭故取象大過言觀滅木之象為當大過之時也君子不懼無悶正是不受他滅處君子挺立乾坤滅木之澤不能撼故獨立不懼時不能移受滅之木無所損故遁世無悶初六藉用白茅無咎象曰藉用白茅柔在下也九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也九三棟橈凶象曰棟橈之凶不可以有輔也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也上六過涉滅頂凶無咎象曰過涉之凶不可咎也大過不是純任剛也惟其以剛用柔見剛大之常過故柔爻而順剛則吉剛爻而得柔之用則吉皆剛為主也所謂雖過非過過而中者也若不得柔之用或剛而反動于柔不得過之義矣初柔在下全以承剛為事故象白茅白巽象茅柔物妙處惟在下以柔順剛正見大為主之義故無咎二處初柔之上其用柔乃用順剛之柔也故稱生稊稱女妻論二與初非應也不過以近相得而成相與二之過也然以過而有生育之功何害于過正過而中者也若九五處柔説之下其用柔有見説于柔之象是不能以我得柔而反以柔得我故為生華為老婦得其士夫士夫五剛也老婦上柔也以剛而見得于柔大當過而不過者也所以不惟無譽且可醜之甚也三四中爻正是棟象三之應在上不能下取初柔而乃上巽柔説殊非大過之義故撓而凶不可輔剛不能得柔之輔也四之應在初以柔巽乎兊剛剛而得柔藉正是大為主故隆而吉不橈乎下得柔之藉則不橈也然終是本末弱不免他吝曰他吝見得雖隆而可危處甚多大過之時其難如此上乃乘剛之柔滅木之澤當此時必不利往者也若過而涉必有滅頂之凶然時有當涉雖滅亦正故凶而無咎于義無愧也過涉滅頂凶以為殺身成仁固矣然更有辨若道德名義卓然挺立先是陽剛君子則其臨事而死也必扶植綱常必關係世運此所謂剛過而中不可言過涉亦不可言凶也惟已先是隂柔之質或不能正身于先又不擇義而輕任于後至於時變事及不得不死乃是過涉之凶苐比偷生之耻則逺矣故無咎前項如夷齊比干顔張之於唐文山之於宋後項如荀息宗魯後世袁粲桑維翰之流是也總大過之時大矣哉全要識一時字時當慎則慎時當與則過以相與時可輔則輔皆大為主也時易橈必不橈時不可涉必須涉尤見大為主也皆過所當過故曰過而中顧柔在上則不可與柔在下則可與者巽柔得生氣兊柔得消氣且初為本上為末救過者於本處善補則有濟於末處求補雖欲補亦無及也然太過之時時之窮也君子能盡過之道不能必過之必濟故要終可以無愧於義不能自免於凶此所謂獨立不懼砥柱乾坤大人事業也習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉上經以乾坤始以坎離終者坎離後天之位即先天乾坤之位蓋乾坤之用不可見以坎離為用故人受天地之中以生人心之乾坤於何見藏而為坎發而為離即人心全體乾坤也完得坎德才是雲行雨施完得離德才是大明終始學不知坎離亦終無乾坤可言坎中一陽是乾來坤中天地生生之妙都從此孕藏這點陽透入隂中乾坤於此而交故曰坎者陷也如衝鋒陷堅之陷非陽剛力量不能陷有此一陷方轉坤之闔而為乾之闢萬化之門於此開矣然陽剛既入隂柔墜落而不能出流溺而不能返亦是這一陷即如猛將陷陳可以收廓清之功亦易有覆亡之患人心亦然幾希之天陷入形氣中踐形盡性者在此墮坑落塹者亦在此故坎者險也險之為義最精人心一點乾知獨立坤形之中分毫不可混雜不可瞞昧如壁立萬仞天下之至峻絶者此險也莫貴于險也然天人理欲界限毫釐于此失腳便無駐立之地日流日下而不可返天下之至危疑者此險也莫艱于險也故坎險學問苐一緊要關隘亦苐一難過關隘知得陷險二義分明然後可以知坎卦上加一習字千聖危微心法便從此一字闡明鳥數飛曰習相繼不已之義兩坎相重內既有險外又有險層層疊疊無非畏途可見人生一日一日便在險中終身到底到底亦在險中安得有個放手鬆身之地聖人於此見得真切便知這個險場就是人一生住身場不由你不在裡頭過活終日要在裡頭習故曰習坎習而不已一得一失便從此習上分岐若識得坎險險便是下手做工夫實地從此戰兢惕厲步步操修所習者就是上達路所云時習之功此習也若識不得險險便是陷溺人深塹從此昏迷放逸步步墜落所習者就是下流路所云逺性之習此習也千古而下聖益聖狂益狂豈是聖人獨無險凡人獨有險只為習險處差故曰習坎重險也水流不盈二句舉水體以象心體釋有孚二字有孚者至實而可信之謂也坎中一點乾剛是天然一定實理以一人之心合之千萬人而同以一時之人心合之千萬世之人心而同所謂孚也只看水水有定體常流通而不盈溢此水之性也惟水性一定隨你歷千溪萬壑必不失其常然之信論水之興波作浪最易溢是水然皆壅激使然也而水之不失信者自在人心亦有定體常流行而不橫決此心之常也惟心體有常隨你歷千險萬險必不失其常然之信論心之變幻無方最難測是心然皆陷溺使然也而心之不失信者自在顧人心本來雖有一定之中心之操與不操却存乎人所以維心方得亨維心者一念萬念息息操存無間斷也蓋坎之剛中即此心未發之中時時維此心則時時存此中故曰以剛中也虞廷允執厥中正是維心之義如此自然亨然既能維又要行維只是存此心行則見諸用惟用處所行無不中方是發皆中節而全體大用之中這才是天體流行故曰行有尚往有功也有功者出險之功險而尚行方是乾健之天行乾來而陷入坤柔之中能行而透出坤柔之外此所謂有功也存存不已謂之維隨處流通謂之行俱是習字中實工夫險不是人生後當如此只為天地原來如此無險不成天地也天險無形地險有形王公設險法其無形者為名分等級法其有形者為封疆界限無非險之為用君子一身那一時無天險之用那一時無地險之用險之時用豈不大哉象曰水洊至習坎君子以常德行習教事一至再至謂之洊至原泉混混過往來續無有間斷故君子修治工夫亦無間斷德行有常如水之不失信教事習而又習如水之重習也教事即中庸修道之謂教治已治人不必兩句分屬德行原所以成物教事原所以修已初六習坎入于坎窞凶象曰習坎入坎失道凶也九二坎有險求小得象曰求小得未出中也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終無功也初柔最下險而又險者人終身最怕是這個習從此而習日流日下如何能從二上出既入坎又入窞水底穴之象坎以尚行為道入窞正與尚行反故失道而凶初之習坎習于下者也二內卦之中惟危之心惟微之心皆二所有謂之有險人生溺于險皆因不知有險若能有此險便能知出險求小得從小處求從小處得也操心工夫原是細密微小處不漏方是真操存故涓滴不已遂成江河積小則大通之道也千丈之堤潰于蟻穴遺小則失大之幾也中庸曰致曲正是求小工夫要二之所以能求能得皆以得中之故不昧此中自然無微不謹故象曰未出中言時雖未出險已是得了中也三視初稍上有可出之機者然身是險上又是險則來有坎之而往亦坎往來坎坎正要在此際力掙勇往方得出路若沒有這假尚往力量却要就險中尋個倚靠安身之地這險中可是你依據得的此為險且枕蓋險而知其不安便不是險若不知其不可安是自家安災利危必至溺而陷不入坎窞不止巳入于坎窞何時有上出之功故不可用象曰終無功到底無上行之日與初同歸也六四樽酒簋二用缶納約自牖終無咎象曰樽酒簋二剛柔際也六四上體下坎已出尋出險之路只在此爻四之一脈通則兩坎皆通而成流行之水矣牖是取其可通之路也酒食是取其求通之物也納約正取聫屬交孚之義指二五也四雖隂柔近五中是其有可明通處人但有明可通則無微而不可入故雖酒以一樽二以一簋用以瓦缶皆可將其誠意聫其交孚可以免咎四能順五故曰剛柔際二之求小四之納約義正相通有四以相通而二與五無有不孚心體流行而險平矣九五坎不盈袛既平無咎象曰坎不盈中未大也上六繫用徽纆置于叢棘三嵗不得凶象曰上六失道凶三嵗也五剛中而正心體到五已是通行無礙所謂流而不盈之水也故既曰不盈又曰祗既平祗既云者適到盡平田地也險與平正相反邵子詩去盡風波存止水世間何事不能平人只為險未除心體難平平則更何險可言萬頃波濤皆成安瀾川源不息皆為順流更何咎之有象曰中未大何也乾稱大哉然必到雲行雨施天下平方是大坎之既平只説得心體平必到離之正邦心量盡滿方説得大直至既濟五爻坎離工夫一齊俱到故爻云不如西鄰之禴祭實受其福象曰吉大來也才稱得大字此處説未大亦非心體上有歉也見得心雖中正尚有險在還要習還要維還要尚行無窮盡之詞也六處險終至此尚未能出更有何時出得豈是險終不可出只怕人自不肯出故一則曰係用把徽纆來自係縛也再則曰置于向叢棘中自拘置也終其身纒于膠結入于危途有安平道理不知自由故謂之失道而凶三嵗也三嵗總是久而不出之意初失道從先墮落上失道到底陷溺兩者病則一般惟觀上之凶乃知險無底止與生俱終才失道俱是險故雖上聖猶嚴末路堯舜終身兢業或一失足而三嵗之凶即不免也危矣危矣總習坎之義人終身日日在險中但行便是出之路才不行便是入之路故曰行有尚初困而不知行蚩蚩之氓也愚不肖一項人二得中本心不失如有恆之質可與進者三有畫而不肯前之象中材而暴棄一項人四有以愚進明之功上六則居髙而自墜舍上而趨下是髙明而到底不返一項人究竟入于坎窞而已習雖不同然習上一路甚難習下多途甚易世變滔滔江河不返所由來矣習坎重險也可不畏哉離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也坎離雖有兩名其在人心即是一體一用坎以離為用離以坎為體坎中實人心之誠也離中虛人心之明也誠體而明用也離本乾體中畫坤柔順乾而行便成明體人心只順乎天理人心之大明也故曰麗也兩相附麗之義一柔居兩剛之中相附而成麗蓋坤柔非明以麗陽而有明乾剛本明必得柔來相麗方顯其明惟火亦然火性本明然未嘗見其明空中有火必得木相麗方發其光明故邵子曰薪火之體也火薪之用也火以用為本以體為末所以人心本明其明亦不可見必于用處發明心而不附麗天理亦無明可言此麗之義也天理本至正故利貞方是真明離明之大用全則坎中心體得矣這才是乾坤合德此坎離居上經之終離麗也麗之象只看日月光燭四海以其麗乎天只看百榖草木敷榮萬象以其麗乎地日月之明原是天明却以麗而成明百榖草木之文原是地文却以麗而成文人心亦然天地間至光至明是這種正理人心之明得麗乎正則一心之明便通天下而皆明如大學所云明明德于天下者豈不化成天下乎化成天下何亨如之重明云者上下兩卦一體一用重明之義下卦地用內藴之明襲地之黃中通理上卦天明外用之明律天之日月運行此之謂麗乎正然所以成麗妙處全在離中這一點順剛之柔至虛至明又中又正人常以此虛心只揀中正道理依之何患不亨所以要飬這點柔中取義牝牛者坤為母牛一味承天而行人若飬得這坤牛只是順天而行才到得大明終始畜字正與坎卦維字同力坎中剛健非用力操持不維離中柔順非從容馴熟不飬離明火性易燥易炎若不自按伏直到極純極粹田地於明義未當也畜牝牛其旨微矣精矣重明麗正重字中有相麗之義日月相麗則互光二火相麗則增輝人已相麗則彼此互觀蓋視人明視已昏必相資為照而明者乃益明也卲子坎離詩水體以器注火用以薪傳體在天地後用在天地先麗木而明者後天地之火也未麗之前有先天地而為火者矣麗物而明者後天地之明也未麗之前有先天地而為明者矣學者欲知大明終始之義須于此悟入象曰明兩作離大人以繼明照于四方明兩作與重明之義又不同已明益明謂之兩作日新又新是也繼明正緝熙之謂凡有斷有續必非真明真明自能繼惟心體為洊至之習坎故必須有兩作之繼明習也繼也皆易中一字心法獨稱大人者非南面而聼天下嚮明而治使天下盡成文明之化于離明事業終難言也坎一數之始離九數之終聖人了手功夫不過一明明德初九履錯然敬之無咎象曰履錯之敬以辟咎也六二黃離元吉象曰黃離元吉得中道也九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也二五皆柔中二尤得正離之主爻在二是人一點本心之真明也以其得坤之黃中故曰黃離元吉畜牝牛者畜此初以剛質離為柔體正是剛柔易錯之際人腳下差正在錯處要差從初處步履一差便到底是差如何可以不敬坤初曰履坤二曰敬履錯處知敬正坤順苐一步要緊工夫才可永無差錯之過故曰以辟咎三在二之上中而過矣象日昃之明論真明之體何時有昃論盈虛消息之運却有時昃時乎昃便有個處昃之道得其道即是中正當昃而知處昃日用常行俱是可樂之境安常以自樂所以鼓舞而歌也取缶言至尋常之物若不識這個道理則當此盈虛消息之際必生盛衰欣戚之感大耋之嗟情所必至一有此嗟變節晚途隳行末路皆從此一念所致凶之道也如此豈是終如其始常而可久之明故曰何可久觀初之易錯二之易昃則知所謂黃離必自乾知中大明透出來非是總為隙光之照九四突如其來如焚如死如棄如象曰突如其來如無所容也後明將繼之時四以剛迫之故其象如此六五出涕沱若戚嗟若吉象曰六五之吉離王公也上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也四重剛而不中下火方炎上火相逼突然而來之象上卦屬用人之聰明外用最易犯最不妙是一突字凡自生意見故弄聰明皆是突也強陽觸物察淵不祥這些凶威虐焰無不從突中來所以焚而死而棄也知得焚的病方曉得突有自禍之酷烈知得死的病方曉得突是不久自消滅的知得棄的病方曉得突是到底一毫無用的如此看來這樣明天地間更無安著處故曰無所容也五以重明麗二之正明體適用南面而聽天下民有未生見得是已之憂民未知教見得是已之咎故出涕而沱若痛戚而又嗟若沱與嗟皆至虛至明中流出一假不容自己之情這是合天下為明心事所以為王公之離上處明極明之至者也能以已之明正天下而同歸于明虞書所云德威德明此明也有王用出征之象如此天下化成剛柔相劑天下之至美在焉曰有嘉折首殱厥渠魁也是燭姦之明匪其首之同類則獲是辨析之明獲者使之去暗即明同生于光天中也如此彰疸既明孰不向風所以能正邦王者以明正天下不但舉其折首之威又及其宥罪之仁者所謂柔道之用中正之麗如此總明明德之學也黃離係于二可見一中為明德本體初言敬可見戒懼為明中苐一下手工夫五言涕言戚可見滿腔惻隱才是明中真發現要之于正邦則正已而物正所謂明明德于天下分量斯滿若有明而不能貞其明隨時銷隕于哀戚場中出沒或有明而不能善其明露其鋒焰以不戢之火自焚于明道何有世之明有二其聰明智巧者雖靈慧絶人而無不百憂晚景畏死貪生于通晝夜徹幽明之知冥如也皆日昃之離其作聰明任機智者至為世大害如亂國喪家賊人禍已無不以明為孽皆突如之離鑑空而物自獻形衡平而物自取正此元吉中正之黃離我願君王心化作光明燭此涕沱戚嗟王公之離坎離水火也謂坎離一體謂水火亦一體可乎曰非也水火氣也兩也坎離為水火者也一也天地兩也乾坤為天地者也一也坎離乾坤一也坎離之體即乾坤之體坎離之用皆乾坤之用也程子曰體用一源盡之矣周易像象述卷四

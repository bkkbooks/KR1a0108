body:
  text: 周易像象述卷十明吳桂森撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也下繫節節申明上繫上繫首章說易簡理得次章說六爻之動三極之道故此處首明動而貞于一則易簡之理得矣太極生兩儀四象八卦三畫既具純而乾坤交而六子自然便有健順有動陷止入麗說之象故曰象在其中天地有此理則有此象也八卦相重成六十四象則六位已具每象之中有六様時義故爻在其中爻之理具于彖象中也六十四卦不過剛柔兩畫相推一卦六變六爻亦不過剛柔相推再推而極之每卦具六十四變故曰變在其中其變化无不備也聖人因象爻而繫之辭觀㑹通以行典禮如此而動動皆成象成爻故動在其中善動之道具在所繫辭中也故吉凶悔吝之分皆于動處生蓋辭中所言吉凶悔吝不過言其理之有定在者使辭吉矣必如其動則吉辭凶矣能不動又何凶有悔吝矣動而知其介則悔而无咎无非于動時神其變化也聖人教人用易之法全在此只歸重動在其中一句爻象所陳皆是天理聖人闡發其理都是天命之不可違故曰繫辭焉以命之剛柔者立本者也變通者趣時者也吉凶者貞勝者也貞正也常也天地之道貞觀者也觀示也日月之道貞明者也天下之動貞夫一者也剛柔是一定之體然其用則以剛推柔以柔推剛時宜不同故變通所以趨時也惟其時有不同則當乎時者為貞不當乎時者為不貞得其貞无不吉失其貞无不凶吉凶无定形以貞勝者也非互相勝之謂何為貞剛只是主柔只是承故觀于天地天常主地常承以貞為法象者也曰貞觀即大觀在上之觀天尊地卑乾坤定位這便是天地一个大觀法處又觀于日月日常明月代明以貞為懸象著明者也曰貞明剛柔有推移而其貞之理則一動之貞貞夫一故吉凶悔吝之生一與不一之間也六位有剛柔爻質有剛柔皆一定者也變通之剛柔則時乎剛而柔時乎柔而剛迭用者也惟一定故位有當不當爻有宜不宜吉凶所以殊惟變通則宜剛而剛不失剛為主之貞宜柔而柔不失柔為承之貞所謂貞于一者如此夫乾確然示人易矣夫坤隤然示人簡矣確然健貌隤然順貌所謂貞觀者也爻也者效此者也象也者像此者也爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭天下之動貞于一只為乾坤原貞于一也夫乾靜專動直只是一个健所以確然知大始而示人以易夫坤靜闔動闢只是一个順所以隤然作成物而示人以簡易簡貞于一也效得此一便是爻像得此一便是象其一不一何處分皆在人一念動處分一念之動而貞便是爻是象故爻象動于内則吉凶自分必无不貞應于外自然成盛徳大業而變化見矣聖人所以因爻象繫之辭正欲人因辭而知慎動因動而知貞一无非一段憂天下深情故繫辭而命之也下文言仁言義正是聖人所以貞天下之動者動是㡬在隠微之介謂之内涉于既動方有吉凶可見謂之外本義内謂蓍卦之中外謂蓍卦之外只就書上說也天地之大徳曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義何言聖人之情天地大徳无過一生聖人體其生生者以仁育天下裁其生生者以義正天下无不于繫辭中見之仁乾之元善義坤之方外義者仁之輔也非義正无以成仁育即乾始坤成之理合則生生聖人在位然後民生蒙澤故大寳曰位生民之道財為先故聚人曰財凡利于民生者皆曰財見利必妨義故理財正辭以禁民非曰義聖人備物致用立成器以為天下利皆理財事也辨吉凶明失得皆正辭事也理財正辭皆所以禁非也六爻之動三極之道故象也爻也變也聖人設之繫之无非示人善動之道惟貞于一方為善動易簡理得方為貞于一仁義即易簡之理也語脈一貫右第一章此章言卦爻吉凶造化功業申明善動之道古者包犧氏之王天下也仰則觀象於天俯則觀法于地觀鳥獸之文與地之宜近取諸身逺取諸物于是始作八卦以通神明之徳以類萬物之情神明之徳如健順動止之性萬物之情如雷風山澤之象此正聖人體天地大生之徳仁育義正天下之事上古聖人原通天地萬物為一身故能上象天下法地通萬物之文與宜于是逺近皆取作八卦而神明通萬物類也蓋自八卦作則日用不知之民皆得以象天法地利用出入是聖人神明之徳所通也即齋戒以神明其徳之謂天地間萬物无不得以遂其生若其性是萬物之情所以類也謂物各得其類能盡物之性也鳥獸動物本乎天孕育生化有其文皆天之象草木植物本乎地髙下燥濕有其宜皆地之法作結繩而為網罟以佃以漁蓋取諸離兩目相承而物麗焉包犧氏没神農氏作斵木為耜揉木為耒耒耨之利以教天下蓋取諸益上入下動日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑上明而下動教佃田獵漁以使民鮮食教稼穡以使民穀食交易通財以使民足貨皆所以遂民之生生理民之財用聖人仁育義正之事包犧首開天地便啓人這㸃離明以佃以漁以耕非但為民口腹計交食于地交養于天便是參兩天地大作用日中交易便是變通盡利鼓舞盡神凡後世養生事神行禮何者不本于此故曰禮始諸飲食神農氏没黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉无不利太古之民徐徐于于其生也期于有養而已故聖人以食貨為先逮乎中古民俗漸移可憂者不獨在食也故聖人曲盡其變通神化之道變而通通而久然後神明而得自天之祐此仁之至義之盡也羲農所取三卦首離明次震生巽齊皆東南卦生天下之能事也黄帝堯舜所取十卦方合東南西北兼取成天下之能事也黄帝堯舜垂衣裳而天下治蓋取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙木在水上服牛乗馬引重致逺以利天下蓋取諸隨下動上悅重門擊柝以待暴客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過下止上動弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期无數後世聖人易之以棺槨蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬取諸乾坤只觀上衣下裳天地𤣥黄之義全具人一身尊卑之分貴賤之等截然有辨故垂衣裳而天下治聖人以禮化天下皆象乾坤也各卦取象皆有精義渙取其利涉而无所不通隨取其隨時而无所不宜豫之義防患不嫌于謹小過之義養生不厭于精飲食之際一毫辨晰不精非小過也睽之中有相成之義故以之用威壯于棟下有天宇之可安故用以居室人一日不安天宇非壯義也送死大事故不嫌于過盛至于書契之作尤聖人因人情之變而曲盡變通宜民之道是生民之所不可一日无也自結繩以來聖人南面而聴天下惟此書契故離明之用非夬无以通其窮百官以治萬民以察制器尚象聖人之妙用至矣盡矣无以加矣首作結繩蓋取諸離人无離明便自斷了生生之本人不知益便自絶了養命之源不知噬嗑便是自塞了日用飲食之道不知乾坤衣裳而顛倒馬牛而襟𥚑矣不知小過飲食不知正味禽獸而芻豢矣无豫則終日處危境无隨則終日无安行无壯而一身无居止不知睽而生何以逺患不知大過而死何以殁寧至于書契一日不用而前何以通千古後何以垂百世雖生于天壤終日如長夜而不旦也豈不哀哉故聖人制器先之以離明繼之以澤天夬欲人无失此明以終无失此天也噫微矣右第二章言聖人制器尚象之事申明開物成務之事是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也易一路說象至此發明聖人立卦立象无非為人像此象也故彖之所言衆理具焉如材之皆備以待人之取用爻之所言則爻象中之理有隨時而宜者以待人效之而動動而能像則得其貞動而不能像則失其貞吉凶悔吝之分分以此也人不備六十四象何以言材不備三百八十四爻何以言動則所謂像者終未湊手右第三章申明吉凶悔吝生乎動陽卦多陰震坎艮陰卦多陽巽離兌其故何也陽卦竒陰卦耦其徳行何也陽一君而二民君子之道也陰二君而一民小人之道也以言八卦之徳則八徳同也以言六子之用則妙萬物者同也惟就其陰陽之質言竒偶既分則剛柔分大小分貴賤分故其徳行有君子之道有小人之道君子之道宜為主宜居尊小人之道宜為從宜居卑于是八卦雜居有愛有惡有相得不相得而吉凶悔吝于是乎生矣然有貞一之道焉柔不凌剛小不加大賤不妨貴君子得其為君子小人安其為小人則趨時之妙用而自天祐之吉无不利者也右第四章申明卦有小大易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歳成焉往者屈也來者信也屈信相感而利生焉言往來屈信皆感應自然之常理尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以往未之或知也窮神知化徳之盛也承上章陽為君陰為民此合陰陽而致一之道也致一則千變萬化无窮之妙用出矣故致一則吉不致一則凶引十一爻无非發明此義大凡思慮貴一不貴二人不能善感應之道都為思慮紛擾不得歸一然却有个縁故若在感應往來上用心便都是憧憧不可勝用之思慮若在个本原上用心便只是一路蓋往來處其途則殊其用則百如何思慮得若本原處則其歸同也其致一也有思慮而只謂之无思无慮何也一處用心則非營營之思慮也得了无思无慮本體何至有朋從之擾這不是斷絶了往來屈信悍然不顧之謂蓋論屈信往來自是有个定理有往則有來有屈則有信今日往明日自來往處屈得一分來處自信得一分故有小小屈便有小小信尺蠖是也有大段屈便有大段信龍蛇是也龍蛇不是秋冬蟄藏則不能存其身如何有春夏之變化有蟄藏以存身工夫自有出而變化作用所以君子不在屈屈信信上著思慮只在屈信之一致上着思慮一致處只是个理所謂義也精義入神則屈信往來都一以貫之无所不妙故足以致用如此用无不利身无不安自然日新富有故曰以崇徳也崇徳兼廣業在到徳日以崇自然不言而信不疾而速有不可測識之妙所謂聖不可知此也然君子用心只知有精義充積而至于窮神至于知化不過積盛自致爾原來只是這个都在致一中若不在致一處著思慮便終日在往來上着力濟得甚事是所謂朋從之擾也往者屈也根上文往來說二句要活看往屈來自信則來屈往自信摠見其相因而必然之意未之或知言其神妙有不可思議境界乃深贊之辭精義而利用利用而崇徳一直說下本義精義入神乃所以為出而致用之本利用安身乃所以為入而崇徳之資内外交相養互相發也似非正意殊塗者理之不可齊百慮者用心之不可齊也易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶困六三易曰公用射隼于髙墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括括結碍也是以出而有獲語成器而動者也解上六子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此之謂也噬嗑初九善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶噬嗑上九子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑否九五子曰徳薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也鼎九四子曰知㡬其神乎君子上交不謟下交不凟其知㡬乎㡬者動之微吉之先見者也君子見㡬而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望豫六二子曰顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行也易曰不逺復无祗悔元吉復初九天地絪緼絪緼交密之狀萬物化醇醇謂厚而凝也男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也損六三子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶益上九所引爻辭无非精義利用之學至損三爻復舉致一二字以結明之恒之立心勿恒則不知一之故也困之失其據失其安則失義而不知利用者也解之時而動出而獲則精義而得其利用者也噬嗑之初與上小人取禍有輕重皆從不知義來否之保治君子戒慎于未然皆從知義來惟不知義必不能勝重大之任如鼎之自覆惟知義必能貞如石之介得豫之先㡬義者宜也宜動而動有㡬之先見者焉出于㡬入于非㡬則出于義入于非義故㡬者動之微吉之先見者也精義入神然後得知㡬故知㡬其神乎知㡬者窮神知化之門也如復之知㡬則元吉而无祗悔矣知㡬知致一之㡬也不能知㡬則恒之危以動也懼以語也无交而求也蓋心无主自不能有常心不能有常能免或擊之凶乎孫聞斯曰吉凶悔吝生乎動何以但云吉之先見蓋凶悔吝處之各有道知㡬者知此也處之盡道則凶悔吝同歸于吉矣損爻艮在上陽卦也天象男象兌在下陰卦也地象女象損道只在上行三人行下三爻上行也若三爻齊行則六三一陰與兩陽爻有二矣非致一矣惟損其六三則初剛上行與六四合二剛上行與六五合是致一也以六三一爻上行則得上九為友而陰陽亦合矣是致一也此乃以兌女從艮男女成得絪緼方開得化生之門所謂致一而利用安身者如此可見精義入神不過要精一君二民君子之道兩章之㫖盡發明于此爻右第五章申明上章引七爻擬議以成變化之道子曰乾坤其易之門耶乾陽物也坤陰物也陰陽合徳而剛柔有體以體天地之撰以通神明之徳撰猶事也其稱名也雜而不越差繆於稽其類其衰世之意耶夫易彰往而察來而微顯闡幽開而當名辯物正言句斷辭則備矣其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隠因貳以濟民行以明失得之報肆陳也貳疑也易只是陰陽徃來朱子言之詳六十四卦只是乾坤往來畢竟乾坤雖有兩名无兩理故陰陽合徳然既成八卦却有剛卦有柔卦其體截然不同故曰剛柔有體體天地之撰天地間條條理理許多事易一一象出是天地之事以易而體聖人神明變化妙用易一一顯出是神明之徳以易而通彰往即藏往之知天地間无窮應用无不于此彰明察來即知來之神凡吉凶由來之故无不于此通徹微顯者于顯而可見處實寓其藏用者而顯者至微闡幽者于幽而不見處實寓其顯仁者而幽者畢闡若此者聖人皆為衰世之民開一條共由之路故謂之開即開物字道理盡從此開出也六十四卦之名擬諸形容象其物宜故當乎其名尊卑大小貴賤動靜内外莫不有辨故辨乎其物物即理也有元有亨有利不利貞不貞其中吉凶悔吝无不分明故正其言皆于斷辭備之矣惟其名又當物又辨言又正故稱小而類則大㫖則逺辭則文既曲中其事又肆而能隠肆者其事則陳列顯見而隠而不可知之妙存焉即中庸費而隠也夫天下之動貞于一貳則不一因其貳而明失得以告之失得既明則吉凶一理民无有不共趨者也此民行所以濟也開字只虚虚說一路開通這些道理故云開物右第六章申明吉凶與民同患易之興也其于中古乎作易者其有憂患乎是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之修也益徳之裕也困徳之辨也井徳之地也巽徳之制也九卦皆反身修徳以處憂患之事也而有序焉履和而至謙尊而光復小而辨于物恒雜而不厭損先難而後易益長裕而不設充長而不造作困窮而通井居其所而遷巽稱而隠稱物之宜而潛隠不露履以和行謙以制禮復以自知恒以一徳損以逺害益以興利困以寡怨井以辨義謂安而能慮巽以行權有一徳自有一徳之妙和而至等句言妙也有妙斯有用履以和行等句言用也九徳終身不可離言憂患為衰世言耳徳由踐履入故始之以履基是根基立徳須有根基禮之用和為貴惟和乃為至有不可行者非至也行已是立徳根基履和而至故可以和行行不和一步不得行矣履必有所執持故次之以謙柄是人所執持者謙尊而不有其尊故尊而光夫尊而能降自周旋中規矩故謙以制禮謙不外矜則知反本故次之以復本本源也本立道生端倪雖小而與後生枝葉不同故小而辨于物所謂道心惟微也這个辨于物處㡬微之介都是自家一㸃真知故復以自知復則可久故次之以恒固堅固也能恒處雜亂之中有至一者在故不厭一則自不雜于二三矣所以一徳書曰終始惟一可久之道无過遏欲故次之以損修修治也損須于難尅處自家尅所以先難便後易如此欲日就減故害可逺欲減則理長故次之以益裕有充長不禦之意有所造作則充長亦非自然惟益已之所有自裕而无假造作此真利也故益之以興利理欲消長驗于艱難故次之以困辨辨其徳之得力何如從自家心上細細分析精明非自他人辨别也於難處得力自无不亨所以窮而通得于已自无怨尤故可以寡怨困中可以觀養故次之以井地成徳地位與基字本字意不同造詣成就實地也自得則居安居安而資深逢源井不改邑養而不窮故居其所而遷所逢源也遷出而不匱也靜中養得定自然動時見得分明故井以辨義安而能慮此語精養定然後變化出故次之以巽終焉制裁制也隨事有裁决也巽以柔入故能稱物以為裁度而又隠而不露此神明妙用變化微權故巽以行權九以字重朱子曰巽是低心下意將心入那事裏面去順他道理方能制若心粗如何行權便錯了右第七章申明道義之門易之為書也不可逺為道也屢遷變動不居周流六虚卦之六位上下无常剛柔相易不可為典要惟變所適其出入以度外内使知懼又明于憂患與故无有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虚行方道也此章深言易道變動而神非有神明黙成之徳行不可以體易易之于人不可須臾離者也其為道屢遷時時有變易事事有變易遷移轉徙既无方又无體變動而无定所可居故周流于六虚之位曲暢旁通无所不妙以上下之位言之時上時下无常位也以剛柔之體言之時剛而易柔柔而易剛无定體也有不可以典要執者一惟變所適耳惟變所適正是屢遷處蓋天地間无須臾不變者時也隨時而變者中也惟變所適正時中之妙用故易道須臾不可逺不可逺欲逺之而不可得也惟因變屢遷則上下无常非真无常也剛柔相易非真无定也一出一入自有一定之度在變之所適正適于必不易之度也既有个一定之度則人之自外而内先言外者因上文先言出无時不要變易却又都有个一定不易之矩絲毫走作不得如此安得不兢兢可懼故曰外内使知懼也然聖人不但指出一定之理使人知懼又明說个憂患之故以示人吉凶俱善之道如云憂悔吝者存乎介震无咎者存乎悔是不特明吉凶併其當憂患之故而亦明之所以人自知憂懼雖无師保而常如父母臨之也聖人示人明切如此皆在繫辭中所以人只要從初便率循聖人之辭以揆度此義之方則知惟變所適正是一定向方所在是其始雖若无典要而其既盡是聖人之典常所為至變易而常一定者如此然惟八徳完全隨時用中則黙而成之不言而信易道行矣苟非其人易豈可以虚行哉惟變所適一篇之主出入以度云者易有體用出入即外内二字易不過八卦相盪如今日一事當以何卦為體何卦為用明日一事又以何卦為體何卦為用假如雷入巽出則為益巽入雷出則為恒體用間一卦不合時皆不可為度故合外内都要懼初字與既字相呼應初率其辭乃擬議以成變化工夫既有典常則變而能常乃變化已成功夫典要與典常字相應一定而可執者謂之典要易无方體故不可為典要至理之不易處謂之典常即㑹通之典禮易有太極故有典常二義要分辨右第八章申明神而明之存乎其人易之為書也原始要終以為質也六爻相雜惟其時物也其初難知其上易知本末也初辭擬之卒成之終言初上二爻若夫雜物撰徳辨是與非則非其中爻不備謂卦中四爻噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝耶易六十四象每卦具始終之理有所發端而由來者有所究竟而歸往者完全具備故原始要終以為質六爻相雜則剛柔迭居有六様變化皆一卦中隨時之用故曰時物也惟原始要終以為質故初之所擬到底是此理初擬之上成而終之如木之有本與末本其根底末其枝幹其實一件也惟六爻相雜有時物不同所以雜一物便撰一徳撰文之撰蓋兩卦相雜爻又剛柔相雜則所做之事各各不同所以有是非之辨成徳者是也不成徳者非也皆于中四爻備之然六爻不過一位之變其始終本末全理則具于一卦彖中惟居而觀得象玩得辭其全體分明方動而觀得變玩得占是以吉凶存亡之故不待動而變在靜而居之時已可知故知者觀其彖辭則思過半矣下文兩條發明剛柔之位不同則剛柔之爻其當位不當位用亦不同所謂雜物撰徳辨是與非者辨諸此而已二四位柔故柔居之可以无咎可以用柔中則剛之不當位明矣三五位剛故剛勝則柔之不當位明矣此其大槩也若隨時變化其情之愛惡又各不同不盡以剛柔得位然後吉也孫聞斯曰原始要終以為質一句該易之義按一卦有一卦始終合六十四卦又只一始終序卦雜卦各為原始要終右第九章申明六爻之義易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉等謂逺近貴賤之差道有變動道本无變動也因時位變動而見道之變動爻者效此變動之道也故曰爻爻有等等級之等位有貴賤陰陽此一定之等畫有剛柔體質此不齊之等皆等也寔定理也故謂之物剛宜居貴居陽柔宜居賤居陰惟不能盡符而有相雜雜則參錯故謂之文一雜便有當不當而吉凶生矣易者合天地人之事摠歸之人故兼三才而两之右第十章申明六爻之動三極之道與上章合易之興也其當殷之末世周之盛徳邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也危懼故得平安慢易則必傾覆易之道也羲皇畫卦至文王序之彖之發揮一段吉凶之故使民知懼故易之興興于周也易者使傾易謂輕忽惟懼則自然知危知危則不敢輕忽故可以補過无咎由于能悔能悔由于知懼故百物不廢則无一事不懼懼以終始聖人繫易深意盡于是矣右第十一章申明憂悔吝震无咎之義夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能說諸心能研諸侯之慮侯之二字衍文定天下之吉凶成天下之亹亹者前篇末章曰聖人設卦以盡情偽繫辭焉以盡其言故此章專發明卦中之情夫乾健坤順性之徳也惟其有險有阻而情生情生而吉凶生聖人繫辭以盡言正言其情也人惟因聖人之辭以得卦之情則知吉凶之故因知變化之道險阻不能害而情也皆歸于性矣所謂利貞者性情也通章一意貫下黙而成之不言而信存乎徳行論徳行无過成健順之徳行夫乾至健也豈不易知却要知得易中有險夫坤至順也豈不簡能却要知得簡中有阻危而不安曰險對易字看塞而難通曰阻對簡字看何言乎險乾健无險交于坤則有動有陷有止而成險惟知險纔得常健而易者得其為易何言乎阻坤順无阻交于乾則有入有麗有說而成阻惟知阻纔得常順而簡者得其為簡是乾坤易簡之妙全在險阻一知以此說心研慮而吉凶定亹亹成矣本義如自髙臨下而知其險如自下趨上而知其阻按如此看險阻二字推之便知八卦有情偽蓋既有動陷止便有動而可不可陷而出不出止而當不當之情入麗說亦然八卦相為推盪相得不相得之情分矣知其情而變化所以吉凶可定亹亹可成詳見金針能研諸侯之慮一說侯即候字也當㡬之慮為候一說侯即屯之建侯初發之一念二說俱可通悅心心字以本體言慮以發動言悅心居而安者易也研慮玩而占者易也是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能惟知險知阻則夫云為之間自能知變化言曰云行曰為擬議以成變化這纔得吉凶俱善百祥來集成天下一條至吉之路所謂吉事有祥也這原是乾坤至易至簡之理特人不知險阻則自不知趨吉耳這吉祥道理見之為象則利天下之事无不于此成故象事知器這吉祥道理玩之為占則吉凶之故无不知其由來故占事知來此道理自天地設位原自見成髙卑貴賤動靜剛柔本來易簡故天地設位而易行乎其中只是非有聖人成能則河圖洛書而立卦則蓍龜神物而揲蓍效天地變化而繫辭如何定吉凶成亹亹惟有聖人成天地之能所以觀象觀變能盡人謀以通天下之志也四營十八變能合鬼謀以通神明之徳也於是日用不知之百姓皆知險知阻而可以與能矣與能與聖人之知也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷聖人成能于何見得只是與民同患使知險阻之情而已故伏羲畫八卦其情已告于象中後世文周二聖猶恐隠而難知于是繫之爻彖之辭而情乃盡見矣說明情字故就象而觀剛柔雜居其吉凶之象已大約可見只是時位不同則其吉凶隨時變動必有个因時之義在所謂利也利者義之和故變動以利言惟有變動則吉凶之情又因爻位而遷矣遷者一卦之吉凶又變為六様必六爻吉凶之情无不旁通斯有吉无凶而謂之有祥矣六爻之情則下文相攻相取是也聖人所言六爻之情則下文六様辭是也知險知阻于此知之而已說心研慮于此說與研而已是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝易之情何如不外愛惡逺近兩端愛則相得惡則必不相得故吉凶大勢于此而分然相愛也或得之于近而不能取之于逺則吉中向凶而有吝相惡也或失之于近而能取之于逺逺近可以互見則凶中向吉而有悔故悔吝以逺近相取生相愛相取此相得之情也于情為真相惡不相取此不相得之情也于情為偽真則利自然得吉偽則害自然不吉故利害之生分于情偽之相感也所以易之情大凡不相得便凶或相得之中而有害焉則悔且吝所謂知險知阻知此情也利害句摠上二句觀下文𦂳接情字可見愛惡分于卦逺近定于爻如震下而艮上則為頥有相得之情反之為小過有不相得之情然頤之初逺于上曰舍爾靈龜不能相取小過之五逺于三曰取彼在穴則能相取吉凶悔吝所由生也餘可類通將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈過當者謂之多此舉爻彖之辭以明觀情之法吉一而已其不相得之情不一故聖人見其情則繫辭以擬之將叛背去也則知其中多愧而其辭慙如迷復爻疑自惑也則知其中騖亂而其辭枝如見豕見鬼爻躁則其中飛揚故其辭過當而苦多離之突如爻誣善粉飾也謂无是善而飾為是善其中皆偽故其辭游如翰音登天失守則无據故其辭屈如大壯之不能退不能遂一一因辭觀情則愛惡真偽无不瞭然所謂險阻无不知矣因辭而知險阻之情因情而知吉凶因吉凶而知變化此變化云為吉事有祥也則乾坤徳行成矣上繫首以易簡終以徳行故此章以易簡徳行結之易道懼以終始知險阻知懼也聖人吉凶與民同患全在提醒他這㸃恐懼之知故曰百姓與能右第十二章申明首繫吉凶變化字說卦傳昔者聖人之作易也幽贊于神明而生蓍參天兩地而倚數幽贊神明猶言贊化育觀變于陰陽而立卦發揮于剛柔而生爻和順于道徳而理于義窮理盡性以至于命人之所以為人本自通神明合天地體陰陽㑹剛柔但人自囿于形骸不知天之命我者何在而人不勝小矣作易聖人要立生人之命于是設為蓍數卦爻以教人復這命命者何也具之人則為性在天地間則為理析言之隨事隨物之義合言之共由共得之道徳是也所謂蓍與數與卦與爻无非明此者也故蓍云者因人有幽贊神明者在蓍由此而生數云者因人有參天兩地者在數倚此而起曰倚謂靠此而起也卦云者人皆有陰陽之變當觀故觀之以立卦爻云者人皆有剛柔之用當發揮故因之以生爻惟幽贊介紹以傳命謂之贊參兩觀變發揮故道徳于此而從容以妙合時義于此條理而得宜理于此无不窮方于性无不盡而命于此至矣至命者人而達天之謂也右第一章明易理皆性命昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分陰分陽迭用柔剛故易六位而成章承上章窮理盡性至命易所以順性命之理也性命之理仁義是也天道有陽生陰成地道有剛克柔克陰陽剛柔即是人道之仁義故易六爻備三才之道寔則分天之陰陽用地之剛柔者皆在人故人道立而天道地道皆于此立矣成章成天地人之文章也仁之育即天之陽地之剛義之正即天之陰地之柔合之方成文章分辨也兩而化也迭用用處合也一而神也陰陽亦迭用剛柔亦有分兩句互文見義右第二章明仁義為性命之理通上為一章天地定位山澤通氣雷風相薄音迫水火不相射音石八卦相錯卲子曰此伏羲八卦之位數往者順知來者逆是故易逆數也據本義畫卦先震艮次坎離次巽兌易之數乾一兌二離三震四巽五坎六艮七坤八是皆逆也雷以動之風以散之雨以潤之日以晅之艮以止之兌以說之乾以君之坤以藏之定位章先說天地而後言六子有父母而後有男女也雷動章先說六子而後言乾坤六子之用皆父母之用也前章說六子先山澤西北東南次風雷西南東北次水火東西相錯之義也後章言六子先震巽二長次坎離二中次艮兌二少相生之序也八卦中有一卦未像則不能相錯而何以言數往知來八徳中有一徳未備則不能成用動散等之用而何以言乾君坤藏世以已往為數往本文无己字以未來為知來本文无未字非也出而應用為往反而探本為來故作善而可得福作不善而必召殃此感召之有定者也皆往也順也惟天先福而如何知其善先禍而如何知其不善中庸善不善必先知此感召所由致者也皆來也逆也夫易正使人反其本尋其源知其所由來故易逆數也能知來則數往自在其中聖人作易之意却全為知來故只言易逆數也天地造化大凡以順而生以逆而變易所言者變也故六十四變以順成體以逆成用聖人畫卦其相生之序一爻兩儀二爻四象三爻八卦四爻一十六卦五爻三十二卦六爻六十四卦此體也以順生者也聖人揲蓍求卦其相錯之用從六十四一索而得初爻從三十二再索而得二爻從十六三索而成内卦從八卦四索而得四爻從四象五索而得五爻從兩儀六索而定一卦用也詳金仁山氏說以逆成者也凡用處无不是逆也以順而生則乾交坤而有三男坤交乾而有三女以逆而用則三男之動陷止皆所以成乾之健也三女之入麗說皆所以成坤之順也坤之順亦不過成乾之健也可反求而知也六十四卦之序其用皆然如屯後繼以蒙是以蒙來逆屯寔所以用蒙成屯也无䝉屯不成功故序卦每曰然後受之以云有屯然後蒙可受受蒙然後屯成其變化是知來者從流以返源因用以探本之功一部易不是逆不成變化故曰易逆數也通章只看八卦相錯句八八互相錯而六十四變成矣數往句是賔知來句是主此章揲蓍全用大衍之數故曰逆數也右第三章第四章言八卦定位對待之體而用在其中帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮卲子曰此卦乃文王所定所謂後天之學也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聴天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮言萬物之隨帝以出入也神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也帝字另句下文出震齊巽皆帝之為也與次章神字對看帝也神也即所謂命也天命之性一動自爾兢惕兢惕便是生機故帝出乎震中庸首言戒慎恐懼出震之理也纔有震動便有巽入敬謹與巽順原相合而來故出乎震則齊乎巽震動巽齊則无不明之徳故相見乎離中庸之誠而明也南面而聴天下非明不可故嚮明而治取諸離明徳新民原為一事萬物相見則必有以養之有治則有養也萬物待養于坤坤作成物以母道養子極顧復之恩曰致役乎坤養則說故說言乎兌萬物得成就則自說兌以陰成物也陰盛則薄陽非乾元以主宰乎陰此時乾剛自然要戰陰西北方陰盛而陽必戰之位也故戰乎乾即坤之龍戰有戰則有所歸藏萬物入坎而歸藏得成功之時故曰勞乎坎功勞之勞舊讀勞去聲作慰勞說大意亦相同蓋萬有成功孕而復生之機在是故謂之勞于是終而復始焉艮者所以成始而成終也得其止自然復動而出震故艮之成終處即是成始處也動萬物者天理之所發動撓萬物者天機之所鼓舞熯乎火則光輝之發越也說萬物潤萬物稍有别兌一陰在上以形普施萬物之上為成物之利澤故謂之說萬物坎一陽在中以氣潛滋萬物之中為受命之根本故謂之潤萬物兌陰澤坎陽水六者皆神之妙則皆帝之所為也水火相逮三句又言六子交相為用上章言不相射以為害也却反相逮而交濟為用水養火火温水相薄而鼓扇雷出巽入也却又不相害而交與雷動風發所以謂之神六子之變化皆乾坤之變化故曰然後能變化而萬物于此成也帝出乎震萬物同源之主宰萬物出乎震則物物各具之主宰右第五章第六章言八卦一氣流行之用而體則不易乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也此言八卦之性情乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊逺取諸物者如此乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口近取諸身如此徤順等八卦之徳有一徳自有一樣情性馬之為乾以性健也牛之為坤以性順也餘同但物性則各得其一不能相兼惟人八徳皆備人而不能全體八徳與一偏之物何異甚而一徳亦不能純如馬之純乎健牛之純乎順毋乃人而反不如物乎乾為首條正見八者全具于一身但具是形而不具是徳則形亦委形皆人之自不成其形也故聖則踐形踐形者通身八物也八徳主之者謂之帝妙之者謂之神人試自體驗乾為首能行健而首出乎坤為腹能以厚載為度量乎震為足能動以天乎巽為股能風行于逺近乎坎耳能聰乎離目能明乎艮為手能執持而有止乎兌為口皆代天言乎能如此則成象之人也不如此人亦物焉而已右第七章第八章第九章明易之廣大以言乎天地之間則備矣乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中音仲男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女索求也人一身有父母之道有三男之道有三女之道皆在人自索自求故云一索再索而得男得女也三才總人道於此章尤見分明右第十章明乾道成男坤道成女乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釜為吝嗇為均為子母牛為大輿為文為衆為柄其于地也為黑震為雷為龍為𤣥黄為旉花之通名為大塗為長子為决躁為蒼筤竹為萑葦其于馬也為善鳴為馵足為作足為的顙其于稼也為反生其究為健為蕃鮮巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其于人也為寡髪為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隠伏為矯輮為弓輪其于人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曵其于輿也為多𤯝為通為月為盜其于木也為堅多心離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾音干卦為鱉為蟹為蠃力禾反為蚌為龜其于木也為科上槁艮為山為徑路為小石為門闕為果蓏音卵為閽寺為指為狗為䑕為黔喙之屬其于木也為堅多節兌為澤為少女為巫為口舌為毁折為附决其于地也為剛鹵為妾為羊此章所著欲人知天地間凡成象成形人仰觀俯察之間開眼觸目无非是八物也龔氏曰觸類而長之乾為君為圜則知坤為臣為方巽為曲直則知離為鋭乾為寒則知巽為暑坤為凉艮為温以方位推離為乾卦則知坎為濕坎為血卦則知離為氣皆可類通矣右第十一章所以類萬物之情序卦傳有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之穉也物稺不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也右上篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必决故受之以夬夬者决也决必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽巽者入也入而後說之故受之以兌兌者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉右下篇連山首艮歸藏首坤周易首乾文王所序也文王精藴全在序卦中其因象定名觀象繫辭皆序卦既定而名之繫之者也觀乾坤之後名屯蒙可見卦有進退消長之序如先天圖乾南坤北陽左陰右是也又有陰陽推遷之序如乾為天天風姤天山遯卦氣之序是也皆一成不移有自然相因之序觀其前可以知其後因其往可以知其來覆驗之而不差理之有定者也惟周易此序不知其所以然而然相推遷也不以漸次相推移也不拘剛柔故據其前不可以按其後觀其往不可以定其來无成跡可尋變之无窮者也蓋有定者生成之序如人物之生而長長而成无不同者也无定者有生後之感遇此不可同于彼今日不可槩來日日變日異者也易序造化之至變也惟其盡造化之至變故人无得測其變之由而天下之萬變卒不能外焉所以能通神明體天地類萬物行變化而定天下之吉凶成天下之亹亹焉神无方易无體於序卦見之仲尼潛心文王知其變化難也故曰知變化之道者其知神之所為乎序卦多言物有其理不盡其事虚而非物有其事不當其理則偽而无物故誠者物之終始不誠无物无物亦无易矣致知在格物此物字序卦成于相錯蓋八卦不相錯不變也序卦之數逆順則生逆則變變于逆也詳見逆數圖說序卦之法不出一个相錯其相錯之法則是一參一兩所謂參天兩地是也以上下經言之是以兩而錯陽為主之卦多在上經陰為主之卦多在下經上下篇又分三局父母為首局男道為中局女道為末局是以三而錯每一局十二卦又以兩而錯首局乾坤泰否為對中局剥復咸恒為對末局夬姤豐旅為對每六卦之中三分之各兩卦兩卦中對合之又自相為錯蓋六十四大段分之以至于一卦卦中兩卦三爻亦是一參一兩无非陰陽對待亦无非先陽而後陰則其序亦天然有定一毫不可紊亂者也其錯之中如上經少下經多已後相錯每每前少後多則陽竒陰偶之義也此皆造化自然之變故說者曰易序分明一个世運圖蓋世運不能違也不出兼三才而兩之分陰分陽迭用柔剛孫聞斯先生曰君子所居而安者易之序也此序斷不可移如有乾然後有坤有坎然後有離六十四之序皆然故每曰受之以受之以三字即是君子以三字受得一卦然後可再受一卦其序一步凌躐不得故曰居而安云雜卦傳序卦文王之易也雜卦則夫子之易也序以陰陽得中為主故上經以泰否居中以坎離為終下經以咸恒為始損益居中既未為終皆三陰三陽相平之卦所以調氣化之中後天而奉天時之道也雜以辨别君子小人為主故首言乾剛次坤柔末則以剛决柔終之蓋盡人事以挽囘氣化使剛常為主柔常順從氣化有雜揉而道常歸一先天而天弗違之道也乾剛坤柔比樂師憂臨觀之義或與或求以我臨物曰與物來觀我曰求二卦互有與求屯見而不失其居蒙雜而著震起也艮止也乾剛坤柔起首截然分開剛自然為可貴可尊柔自然為可賤可卑則剛當為主自是天地間必不可倒置者故剛在上得位則衆所歸往而成樂世矣剛在下而統衆則責任所萃而能憂世矣一上一下雖有憂樂之分其繫當世之重則皆此剛也臨剛在下上四柔待澤焉觀剛在上下四柔從風焉皆剛為與柔為求也屯一剛上而居于五位當其顯見然有震初一剛根抵于下故見而不失其居居者本心之安居也蒙一剛内而居于二中若其易雜有艮上一剛透而著見于上本義坎幽昧艮光明故雜而著著者心體之光明也震起也剛從下起一起无有不起艮止也剛從上止一止无不得止十卦剛不為柔雜故居第一局損益盛衰之始也大畜時也无妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁无色也序卦泰否在上經損益在下經雜卦易損益于上易泰否于下蓋泰否天運損益人事雜卦重在盡人事以囘天運故以損益先也萃升兩剛合併剛専主故亦移而上損損剛益柔也損則虚之極故為盛㡬益以剛益柔也益則盈之漸故為衰㡬大畜畜乎乾剛所以得乎畜之時无妄乾剛之動所以災為外至災非自取萃剛聚而柔皆聚聚而有貫通之精神升剛升而柔時升升而不復來于汚下謙剛下止功髙徳重之君子也自處以卑所以矯輕豫剛上出鼓動一世之君子也謹動于早所以儆怠噬嗑剛柔皆噬噬所當噬知味之食也賁剛柔相文天地至文文而无色十卦剛柔相劑而不為所雜者兌見而巽伏也隨无故也蠱則飭也剥爛也復反也晉晝也明夷誅也井通而困相遇也兌巽本柔卦一柔見而在外則說乎剛矣一柔伏而在下則順乎剛矣隨震剛來下兌柔故動而日新无故蠱巽柔要于剛止故事能整而得飭剥于羣陰剥爛中存一剛也復一剛來反而羣陰復生也晉離明出暗正晝之象明夷以明去暗誅夷之象觀乎晝則明夷為夜矣觀乎誅則晉為賞矣可以互知離明乾體人心之天明故雜卦于離與乾並重井以柔巽剛所以得通非逢坎剛之源不得通也困以柔揜剛所以終遇非不失坎剛之所不能遇也十卦當柔道盛而主之以剛所以盡人事者无過此咸速也恒久也渙離也節止也解緩也蹇難也睽外也家人内也兩卦相對雜卦中先後多與序卦反所用不同也皆有義上經以井困終夫井通則坎中一剛養而不窮困遇則困中一剛困而得亨全是剛中為主故下經咸恒以下皆言剛柔相得有柔皆聴于剛之妙咸剛下柔上以男下女其感通甚神故咸速也恒剛上柔下男女正位得其常道故恒久也渙剛來不窮故離而為渙有利逺之用節剛柔分而剛得中故止而成節亦中節之和解雷雨之用生長之道緩以濡之也故解必待時而解蹇險止之用危懼之道難平聲以惕之也故蹇當无時不蹇暌離明外煜睽皆可孚家人離明内照風出有自八卦剛柔相劑為用柔无不順從于剛者也否泰反其類也大壯則止遯則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故親寡旅也至此則剛柔自不混而无分而各有其類矣所謂方以類聚物以羣分也否泰正言其類之相反惟大小之類既分自然剛常為主而柔類從之大壯剛不過壯而止所當止也遯以剛逺柔而退所當退也大有則君子之羣合而為衆同人則君子之合自相為親如此人心故習漸漸可去革去故也人心明徳漸漸日新鼎取新也摠或有時柔小過然過者自過剛大之為主者不得而過上下合而成孚皆剛中為孚柔小信從之而无不孚處其時之盛雖或豐而多故然有日中之明不以多故蔽也處其時之暫雖或旅而親寡有安止之明不以親寡失也十二卦皆從柔用而純歸剛大駸駸有純乾之漸矣如大有同人剛多而移下經柔得位也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬决也剛决柔也君子道長小人道憂也此下則以剛變柔要歸純乾以為終局小畜四卦皆乾故移于此離者人心之明坎者人心之險離上則得乾之上運日進于髙明而心天位矣坎下則得坤之下承安處于靜止而心地位矣離上坎下則上下皆貞而純乎乾剛以君之矣故即舉四乾卦終之小畜剛以柔畜是入細工夫寡之又寡克去之義故小畜寡也履以柔履剛是踏實工夫步步躬行故履不處也需剛健而不陷不輕犯險以行曰不進也訟上健而下險不使險内伏曰不親也不親乎險大過以下八卦不相為對然无非明剛主乎柔而夬之决柔則純乾矣故以終焉大過兩柔包四剛不以乾包坤而反居内故謂之顛然惟顛也而乾剛在内主持見其為大者過也姤遇也柔進而剛有遇之道所以咸章不使柔成壯女也二卦剛將為柔勝而必以剛主也漸女漸進也女而待男行則吉頤乾包坤也以君子養小人則正二卦剛得以勝柔而必以剛主也既濟剛卦上柔卦下則謂之定歸妹兌女下震男則女得所終矣是柔從剛而兩得也未濟坎男下離女則男必至窮矣是剛下柔而兩失也如此明乎剛不可一日不主柔必如夬之剛决柔則小人盡變為君子而成純乾之體矣斯所謂首出庶物萬國咸寧者也大過以下則甚言剛柔有貞勝之勢以見必不可不純主乾剛以躋一世於君子蓋聖人憂危之深意云序卦天地不齊之運故自乾坤開闢以後剛柔日交則日變自淳而趨漓自厚而入薄氣化日不同人心日改化莫知終窮故要歸于未濟到底是一未防範无已時兢惕无已時文王憂世之深衷也雜卦人道善反之事故戴乾履坤以來剛柔自克自勝由漓反淳由薄歸厚形骸復歸天理情欲返還天性純是本來故要歸于夬到底完此乾剛已為君子舉世共成君子此仲尼救世之至道也惟知天運之日異月不同則知天不可不以人事補惟知人之日返日純粹則知人還可以合乎天二聖心一道同也人心坎離即先天之乾坤故離明之體完則乾天之體復矣從坎險經歴盡則離明之體完矣雜首局不言離祗言坎與序卦同從坎入手也損益第二局言離不言坎則險去而天明透矣兌巽第三局以晉明夷井困終之猶序之終以坎離也下經咸恒首局以解蹇睽家人結之亦坎離也否泰中局以豐旅結之亦有離无坎則全是離明用事矣十四卦皆无坎至于末局先提離坎即以大有同人需訟四卦繼之明著坎離合乾人心一天體也然後以未濟夬終焉未濟坎離之合仍序所終而特繫之一夬正明人能盡化為君子天運亦有所不能拘所云統天御天則此道是也噫至矣盡矣周易像象述卷十
